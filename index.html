ds a Claude Code review step as a required (blocking) pre-merge check. Occasionally the agent enters a long exploration loop investigating a large PR, and developers end up waiting 10+ minutes for a check that normally finishes in under 2. What is the most effective way to bound this without removing the guarantee the check provides?","question_ja":"チームはClaude Codeのレビューステップを必須（ブロッキング）のマージ前チェックとして追加した。時折、エージェントが大きなPRを調査する中で長い探索ループに入り、通常2分未満で終わるチェックに開発者が10分以上待たされることがある。このチェックが提供する保証を失わずに、これを最も効果的に抑制する方法はどれか。","options_en":{"A":"Add `--max-turns` (and/or `--max-budget-usd`) so the check errors out past a bound instead of running indefinitely, surfacing runaway runs as a fast, visible failure","B":"Switch the check from blocking to non-blocking so slow runs no longer hold up merges while the team looks into what is causing the occasional slowdown","C":"Increase the timeout at the CI runner level only, without changing any Claude Code invocation flags, so slow runs simply get more time to finish before failing","D":"Disable the review step temporarily until someone has time to investigate why some runs take much longer to complete than others"},"options_ja":{"A":"`--max-turns`（または `--max-budget-usd`）を追加し、妥当な上限を超えたらエラーで終了させ、暴走した実行を速く目に見える失敗として表面化させる","B":"チームが原因を調査している間、遅い実行がマージを止めないようチェックをブロッキングから非ブロッキングに変更する","C":"Claude Codeの呼び出しフラグは変えず、CIランナー側のタイムアウトだけを延長し、遅い実行にもっと時間を与える","D":"一部の実行がなぜ長くかかるのか誰かが調査する時間ができるまで、レビューステップを一時的に無効化する"},"correct":"A","explanation_ja":{"why_correct":"`--max-turns` や `--max-budget-usd` はprint modeで暴走を防ぐための決定論的な上限であり、チェックが必須（ブロッキング）である保証を維持したまま、異常に長い実行を速やかにエラーとして検知できる。根本の『暴走ループ』という原因に対して、保証つきの上限で対処している。","B":"非ブロッキングに変えることは、このチェックが本来提供すべき『マージ前に必ずレビューされる』という保証そのものを失わせる。症状（待ち時間）を消すために目的を放棄している。","C":"CIランナーのタイムアウトを延長しても、探索ループ自体は無制限のままで、単に待たされる時間が長くなるだけの対症療法。","D":"チェックの無効化は保証を完全に失わせる最も極端な対処であり、抑制ではなく撤去にあたる。"},"references":[{"title":"Claude Code CLI reference (--max-turns, --max-budget-usd)","url":"https://code.claude.com/docs/en/cli-reference"}],"lesson":"ブロッキングCIチェックの暴走対策は --max-turns / --max-budget-usd で上限を設け、チェックの保証自体は維持する。","principle_tags":["deterministic-termination","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-05","codex":"2026-07-05*"},"status":"reviewed"},{"id":"S5-D4-001","scenario":"claude-code-ci","domain":4,"task_statement":"4.1","question_en":"Your CI review prompt says \"flag any code that looks risky.\" In practice, it flags nearly every instance of string concatenation near SQL-adjacent code, including parameterized queries that are already safe from injection, so developers have started ignoring all findings from this check. What is the most effective prompt change?","question_ja":"CIのレビュープロンプトには「危険に見えるコードにフラグを立てる」とだけ書かれている。実際には、SQL関連コード付近の文字列連結のほぼすべてにフラグを立ててしまい、すでにインジェクションから安全なパラメータ化クエリまで含まれるため、開発者はこのチェックの指摘をすべて無視するようになった。最も効果的なプロンプト変更はどれか。","options_en":{"A":"Add \"be more careful and thorough when reviewing this kind of code\" to the existing instruction, without specifying what makes a case reportable","B":"Remove SQL-related checks entirely from the review's scope so this category never produces findings again","C":"Replace the vague instruction with explicit criteria: flag SQL string concatenation only when it embeds unsanitized input, not parameterized queries","D":"Lower the confidence threshold at which findings are reported, so fewer of the borderline SQL-related findings are shown"},"options_ja":{"A":"既存の指示に「もっと注意深く徹底的にレビューして」と追加するだけで、何が報告に値するかは具体化しない","B":"SQL関連のチェックをレビュー対象から完全に除外し、このカテゴリでは指摘が出ないようにする","C":"曖昧な指示を明示的な基準に置き換える。パラメータ化されていない・サニタイズされていない外部入力を組み込むSQL文字列連結のみをフラグ対象とし、パラメータ化クエリは対象外とする","D":"指摘を報告する信頼度のしきい値を下げ、境界的なSQL関連の指摘の表示数を減らす"},"correct":"C","explanation_ja":{"why_correct":"誤検知の根本原因は『何が危険かの基準が曖昧』であること。具体的な基準（未サニタイズ・非パラメータ化の外部入力を含む場合のみ）に置き換えることで、安全なパラメータ化クエリを除外しつつ実際にリスクのあるパターンだけを検出でき、誤検知率を直接下げる。","A":"『もっと注意深く』は既存の指示と同様に曖昧なままで、何を危険とみなすかの基準を何も追加していない。同じ失敗が繰り返される。","B":"SQLチェックの完全な除外は、誤検知だけでなく本来検出すべき真の脆弱性の検出も失わせる。過剰な対処（やりすぎ）で問題をすり替えている。","D":"信頼度しきい値の調整は恣意的なノブであり、そもそも『何を危険とみなすか』というルール自体が誤っている根本原因には対処していない。"},"references":[{"title":"Claude Code common workflows (code review prompts)","url":"https://docs.claude.com/en/docs/claude-code/common-workflows"}],"lesson":"誤検知が多いレビュープロンプトは、曖昧な形容詞ではなく具体的な報告基準に置き換えて根本原因を直す。","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-05","codex":"2026-07-05*"},"status":"reviewed"},{"id":"S5-D4-002","scenario":"claude-code-ci","domain":4,"task_statement":"4.2","question_en":"Your CI classifies each commit message as \"needs changelog entry\" or not, using few-shot examples. All of the few-shot examples happen to be bug-fix commits, and the classifier now inconsistently misclassifies new-feature commits and dependency-bump commits. What is the most effective few-shot design fix?","question_ja":"CIは少数ショット例を使って各コミットメッセージを「変更履歴への記載が必要」か否かに分類している。少数ショット例はすべてバグ修正コミットで、その結果、新機能コミットや依存関係更新コミットの分類が一貫せずに誤る。最も効果的な少数ショット設計の修正はどれか。","options_en":{"A":"Add several more bug-fix examples with more elaborate step-by-step reasoning, so the existing category is demonstrated even more thoroughly than before","B":"Remove the few-shot examples entirely and rely on a single longer written instruction that describes all of the commit categories in prose instead","C":"Increase the number of bug-fix examples to 20 or more so the classification pattern for that one category becomes completely unmistakable","D":"Include few-shot examples spanning all major commit categories — bug fix, feature, dependency bump, docs — each with its classification reasoning"},"options_ja":{"A":"既存のバグ修正例をより詳しい理由づけとともにさらに数個追加し、同じカテゴリをより徹底的に示す","B":"少数ショット例を完全に取り除き、代わりにすべてのコミットカテゴリを説明する1つの長い指示文に頼る","C":"バグ修正例を20個以上に増やし、そのカテゴリの分類パターンを疑いようのないものにする","D":"バグ修正・新機能・依存関係更新・ドキュメントなど主要なコミットカテゴリすべてにまたがる少数ショット例を含め、それぞれの分類理由を示す"},"correct":"D","explanation_ja":{"why_correct":"誤分類はバグ修正以外のカテゴリで起きているのに、少数ショット例がバグ修正カテゴリに偏っていることが根本原因。各カテゴリを代表する例をそれぞれ理由づけ付きで含めることで、モデルはカテゴリ間の区別を学習でき、新機能や依存関係更新のような未提示カテゴリへの汎化が改善する。","A":"同じカテゴリ（バグ修正）の例を増やしても、他カテゴリとの区別を学習する材料にはならず、根本原因を直していない。","B":"少数ショット例は判断の曖昧なケースの汎化に効果的であり、それを完全に取り除いて説明文だけに頼るのは、crafting-guideが示す『詳細な指示だけでは一貫性が出ない』典型パターンに逆行する。","C":"バグ修正例をいくら増やしても同一カテゴリの精緻化にすぎず、新機能・依存関係更新カテゴリの誤分類は解消されない。"},"references":[{"title":"Claude Code common workflows (prompting)","url":"https://docs.claude.com/en/docs/claude-code/common-workflows"}],"lesson":"少数ショット例は誤分類が起きているカテゴリを代表するように選ぶ。1カテゴリへの偏りは他カテゴリへの汎化を妨げる。","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-05","codex":"2026-07-05*"},"status":"reviewed"},{"id":"S5-D4-003","scenario":"claude-code-ci","domain":4,"task_statement":"4.4","question_en":"Your CI extraction step parses a changelog entry from a PR description into structured fields (version, type, summary). Occasionally the `version` field fails to parse because a PR description uses a non-standard format like \"v2.3\" instead of \"2.3.0\". What is the most effective retry strategy?","question_ja":"CIの抽出ステップは、PRの説明文から変更履歴エントリ（version, type, summary）を構造化フィールドとしてパースしている。時折、PRの説明文が「2.3.0」ではなく「v2.3」のような非標準形式を使っているために `version` フィールドのパースが失敗する。最も効果的なリトライ戦略はどれか。","options_en":{"A":"Feed back the specific validation error (e.g., \"version did not match semver, got 'v2.3'\") and ask the model to correct just that one field","B":"Automatically retry the exact same extraction prompt, completely unchanged, up to three times in a row with no additional information at all","C":"Silently default the `version` field to \"0.0.0\" whenever parsing fails, so the pipeline never blocks or slows down because of this particular step","D":"Increase the model's temperature setting on every single retry so it produces a differently worded phrasing of the same extraction attempt"},"options_ja":{"A":"パース失敗時に、具体的な検証エラー（例:「version フィールドがsemver形式に一致せず、'v2.3' が得られた」）をフィードバックし、そのフィールドだけを修正するようモデルに依頼する","B":"追加情報なしで、同一の抽出プロンプトをそのまま最大3回自動リトライする","C":"パースが失敗するたびに `version` フィールドを黙って \"0.0.0\" にデフォルト設定し、このステップでパイプラインが止まらないようにする","D":"リトライ時にモデルのtemperature設定を上げ、同じ抽出について異なる言い回しを生成させる"},"correct":"A","explanation_ja":{"why_correct":"有効なvalidation-retryは、失敗の具体的な理由（どのフィールドが、なぜ、何の値で失敗したか）をモデルにフィードバックし、そのフィールドの修正を求める。これは形式の不一致（フォーマットの問題でリトライ可能）というリトライすべき失敗の性質に対応した、行動可能な修正。","B":"同じ入力に同じプロンプトを繰り返しても、失敗の原因についての新しい情報が与えられないため、同じ結果になる可能性が高い。","C":"デフォルト値で黙って埋めることは、実際には存在しない値を捏造して見せかけ上パイプラインを通すだけで、データの正確性を損ない、失敗を隠蔽している。","D":"temperatureはフォーマットの不一致という具体的な問題に対応する手段ではなく、無関係なレバーを動かしているだけの誤った適用。"},"references":[{"title":"Claude Code common workflows (structured output, validation)","url":"https://docs.claude.com/en/docs/claude-code/common-workflows"}],"lesson":"抽出失敗時のリトライは、具体的な検証エラーをフィードバックして該当フィールドの修正を求める。","principle_tags":["nullable-over-hallucination","structured-errors"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-05","codex":"2026-07-05*"},"status":"reviewed"},{"id":"S5-D4-004","scenario":"claude-code-ci","domain":4,"task_statement":"4.6","question_en":"Your CI runs a single Claude Code pass to review an entire 40-file pull request for both style and correctness issues at once. Reviewers notice correctness bugs are caught inconsistently — sometimes flagged, sometimes missed for the same class of bug — while style feedback stays reliable. What architecture change would most improve correctness-finding consistency?","question_ja":"CIは、40ファイルからなるプルリクエスト全体のスタイルと正確性の両方の問題を、単一のClaude Codeパスで一度にレビューしている。レビュアーは、同じ種類のバグでも正確性の指摘は一貫せず（あるときはフラグが立ち、あるときは見逃される）、一方でスタイルの指摘は安定していることに気づいた。正確性の指摘の一貫性を最も改善するアーキテクチャ変更はどれか。","options_en":{"A":"Use a model with a larger context window for the single combined pass, without otherwise changing the review architecture","B":"Reduce the number of files reviewed per run by splitting the PR into arbitrary chunks, keeping the combined style-and-correctness review in each chunk","C":"Run two independent passes over the PR — one scoped only to correctness, another scoped only to style — instead of asking for both in one pass over all 40 files","D":"Have three independent reviewers each perform the same combined style-and-correctness pass and only report findings that at least two of the three separately flag"},"options_ja":{"A":"レビューアーキテクチャ自体は変えず、単一の統合パスに使うモデルのコンテキストウィンドウを大きくする","B":"PRを恣意的なチャンクに分割してレビュー対象ファイル数を減らすが、各チャンク内ではスタイルと正確性を統合したレビューのまま行う","C":"PRに対して2つの独立したパスを実行する。1つは正確性の問題のみ、もう1つはスタイルの問題のみに範囲を絞り、40ファイル全体を対象に両方を1パスで求めるのをやめる","D":"3人の独立したレビュアーがそれぞれ同じスタイルと正確性を統合したパスを行い、3人中2人以上がフラグを立てた指摘のみを報告する"},"correct":"C","explanation_ja":{"why_correct":"1回のパスでスタイルと正確性という異なる種類の懸念を同時に見ようとすると注意が分散し、正確性のような深い推論を要する観点の検出が不安定になる（attention dilution）。関心事ごとに独立した焦点を絞ったパスに分けることで、単一責任の原則により各パスの検出精度が安定する。","A":"コンテキストウィンドウを大きくしても、1パス内でスタイルと正確性という異なる種類の観点を同時に見るという注意分散の構造自体は変わらない。","B":"恣意的なファイル数によるチャンク分割は、スタイルと正確性を混ぜたままレビューする構造を維持しており、根本原因（関心事の混在）に対処していない。加えてクロスファイルの正確性問題を見落とすリスクもある。","D":"3人のレビュアーによる多数決は、間欠的にしか検出されない真の指摘を『少数意見』として抑制してしまう既知のアンチパターンであり、コストも高い、やりすぎた対処。"},"references":[{"title":"Claude Code common workflows (multi-pass review)","url":"https://docs.claude.com/en/docs/claude-code/common-workflows"}],"lesson":"スタイルと正確性など異なる種類の懸念は、1パスに混在させず関心事ごとに独立したパスへ分割して検出の一貫性を上げる。","principle_tags":["single-responsibility","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-05","codex":"2026-07-05*"},"status":"reviewed"},{"id":"S6-D4-001","scenario":"structured-extraction","domain":4,"task_statement":"4.3","question_en":"Your extraction system handles two input types: invoices with a fixed, known schema, and free-text emails whose content type isn't known in advance (could be an invoice, a receipt, or neither). For invoices, you always want Claude to call `extract_invoice`. For emails, you want Claude to decide among `extract_invoice`, `extract_receipt`, or calling no tool at all. What is the correct `tool_choice` configuration for each case?","question_ja":"抽出システムは2種類の入力を扱う。固定の既知スキーマを持つ請求書と、内容の種類が事前にわからない自由文のメール（請求書かもしれないし、領収書かもしれないし、どちらでもないかもしれない）である。請求書に対しては常に `extract_invoice` を呼ばせたい。メールに対しては `extract_invoice`・`extract_receipt`・ツール不使用のいずれかをClaudeに判断させたい。それぞれのケースで正しい `tool_choice` の設定はどれか。","options_en":{"A":"Use `tool_choice: {\"type\": \"any\"}` for both invoices and emails, since `any` guarantees some tool will be called in either case","B":"Use `tool_choice: {\"type\": \"auto\"}` for both invoices and emails, letting Claude decide freely in every case based on the document content","C":"Use `tool_choice: {\"type\": \"tool\", \"name\": \"extract_invoice\"}` for both invoices and emails, so extraction behavior stays perfectly consistent across input types","D":"Use `tool_choice: {\"type\": \"tool\", \"name\": \"extract_invoice\"}` for invoices to force that specific tool, and `tool_choice: {\"type\": \"auto\"}` for emails so Claude can decide"},"options_ja":{"A":"請求書とメールの両方に `tool_choice: {\"type\": \"any\"}` を使う。`any` はどちらの場合もいずれかのツールが呼ばれることを保証するため","B":"請求書とメールの両方に `tool_choice: {\"type\": \"auto\"}` を使い、あらゆる場合にドキュメント内容に基づきClaudeに自由に判断させる","C":"請求書とメールの両方に `tool_choice: {\"type\": \"tool\", \"name\": \"extract_invoice\"}` を使い、入力の種類によらず抽出の挙動を完全に一貫させる","D":"請求書には `tool_choice: {\"type\": \"tool\", \"name\": \"extract_invoice\"}` を使ってそのツールを強制し、メールには `tool_choice: {\"type\": \"auto\"}` を使ってClaudeに判断させる"},"correct":"D","explanation_ja":{"why_correct":"スキーマが既知で確実に決まっているケース（請求書）は、`tool_choice` で特定のツール名を強制することでその呼び出しを保証できる。一方、文書種別が事前に分からず複数の妥当な選択肢がある場合（メール）は `auto` にしてClaude自身に文書内容から適切なツール（またはツールなし）を判断させるのが正しい使い分け。","A":"`any` はモデルが必ず『いずれかのツール』を呼ぶことを保証するが、どのツールかは保証しない。請求書のように特定のツールを確実に呼ばせたい場面には不十分。","B":"請求書のように呼び出すツールが確実に分かっている場面でも `auto` に任せると、モデルがツールを呼ばない、または誤ったツールを選ぶ余地を残してしまい、保証が必要な処理に確率的な判断を持ち込むことになる。","C":"メールの内容が請求書でない場合にも `extract_invoice` を強制すると、実際には該当しないスキーマへ無理に当てはめる誤抽出が発生する。既知スキーマ向けの強制指定を、内容が不確かなケースにまで一律適用する誤り。"},"references":[{"title":"Claude tool use — forcing tool use (tool_choice)","url":"https://docs.claude.com/en/docs/build-with-claude/tool-use/implement-tool-use"}],"lesson":"スキーマが既知で確実な入力には tool_choice で特定ツールを強制し、内容が不確かな入力には auto でモデルに判断させる。","principle_tags":["code-must-prompt-should"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-05","codex":"2026-07-05*"},"status":"reviewed"},{"id":"S6-D4-002","scenario":"structured-extraction","domain":4,"task_statement":"4.5","question_en":"You need to extract structured fields from 50,000 archived support tickets for a one-time historical analysis. Results are needed within the next 3 business days, and nobody is waiting on any individual ticket's result in real time. What is the most appropriate processing approach?","question_ja":"1回限りの過去分析のために、アーカイブされた5万件のサポートチケットから構造化フィールドを抽出する必要がある。結果は今後3営業日以内に必要で、個々のチケットの結果をリアルタイムで待っている人はいない。最も適切な処理方式はどれか。","options_en":{"A":"Process all 50,000 tickets synchronously with high concurrency, since this is the fastest way to get every result back","B":"Submit the extraction as a Batches API job for all 50,000 tickets, since the workload is latency-tolerant and fits the 3-day deadline","C":"Submit only a random sample of 500 tickets through the Batches API and extrapolate the extracted patterns to the remaining 49,500","D":"Use the Batches API, but design each ticket extraction as a loop that calls tools mid-batch-request and re-injects results to continue that same request"},"options_ja":{"A":"5万件すべてを高い並行度で同期的に処理する。これがすべての結果を得る最速の方法だから","B":"5万件すべてに対してMessage Batches APIジョブとして抽出を投入する。このワークロードは遅延許容であり、バッチのウィンドウは3日の締め切りに十分収まるため","C":"Batches APIで500件のランダムサンプルのみを処理し、抽出パターンを残りの49,500件に外挿する","D":"Batches APIを使うが、各チケットの抽出をバッチリクエストの実行中にツールを呼び出し、その結果を同一リクエスト内に再投入して続行するループとして設計する"},"correct":"B","explanation_ja":{"why_correct":"5万件・遅延許容（リアルタイムで待つ人がいない）・締め切りに数日の余裕がある、というこのワークロードの特性はMessage Batches APIの想定用途（最大24時間の処理ウィンドウ、リアルタイムSLA不要）と正確に一致する。","A":"高並行度の同期処理は、リアルタイム性が不要なこのワークロードには過剰でコストの高い選択であり、遅延許容度に見合ったツール選択（right-tool-for-latency）に反する。","C":"この分析は要件として全件の抽出が必要であり、サンプリングして外挿することは、要求されていない前提（サンプルで十分）を勝手に置いて範囲を縮小するものであり、根本的な要求を満たさない。","D":"Message Batches APIの各リクエストは投入時点の内容を単発で処理する。バッチ実行中の応答（tool_useなど）を受けて外部でツールを実行し、その結果を同一バッチ実行の続きとして動的に注入するという往復はサポートされない。続きが必要なら新しい（バッチまたは同期の）リクエストとして再投入する必要があり、この一回性の投入モデルとは相容れない設計。"},"references":[{"title":"Message Batches API","url":"https://docs.claude.com/en/docs/build-with-claude/batch-processing"}],"lesson":"大量・遅延許容・締め切りに余裕があるワンタイムのワークロードにはMessage Batches APIが適する。ただし1バッチ内での複数ターンのツール呼び出しはできない。","principle_tags":["right-tool-for-latency"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-05","codex":"2026-07-05*"},"status":"reviewed"},{"id":"S6-D5-001","scenario":"structured-extraction","domain":5,"task_statement":"5.5","question_en":"Your invoice extraction pipeline outputs a confidence score for each extracted field. The team proposes: \"Route anything below 0.9 to human review — 0.9 sounds strict enough to catch most errors.\" What is the flaw in this proposal, and what should be done instead?","question_ja":"請求書抽出パイプラインは、抽出した各フィールドに信頼度スコアを出力する。チームは「0.9未満はすべて人によるレビューに回す。0.9ならほとんどの誤りを捕捉できるほど厳格に聞こえる」と提案している。この提案の欠陥と、代わりに何をすべきか。","options_en":{"A":"There is no real flaw — 0.9 is a reasonable, sufficiently strict round number to use as the routing threshold across all fields and document types","B":"Calibrate the threshold empirically using a labeled validation set, measuring what confidence level actually predicts correct extractions per field","C":"Raise the arbitrary threshold to 0.95 instead of 0.9, so that even fewer low-confidence extractions can slip through to production","D":"Remove confidence scoring entirely and route every extracted field to human review, since any threshold is inherently unreliable"},"options_ja":{"A":"実質的な欠陥はない。0.9はすべてのフィールド・文書種別に共通して使う十分に厳格でキリの良いしきい値として妥当","B":"ラベル付き検証データセットを使ってしきい値を経験的に較正する。『キリが良く厳格に聞こえるから』ではなく、実際にどの信頼度水準がフィールドや文書種別ごとに正しい抽出を予測するかを計測して決める","C":"恣意的なしきい値を0.9ではなく0.95に引き上げ、低信頼度の抽出が本番へ漏れる件数をさらに減らす","D":"信頼度スコアリング自体をやめ、しきい値はどれも本質的に信頼できないため、抽出したすべてのフィールドを人によるレビューに回す"},"correct":"B","explanation_ja":{"why_correct":"モデルの信頼度スコアは、キリの良い数字に見えるという理由だけでは正しく較正されているとは限らない。実際にどの水準が各フィールド・文書種別で正しい抽出を予測するかは、ラベル付き検証セットを用いた経験的な較正（stratified samplingを含む）でしか確認できない。これが根本原因への対処。","A":"『0.9はキリが良く厳格に聞こえる』というのはまさに検証されていない思い込みであり、フィールドや文書種別によってモデルの信頼度の較正具合は異なりうるため、根拠のない仮定である。","C":"しきい値を0.95に上げても、根本原因（このしきい値がラベル付きデータで検証されていないこと）は変わらず、恣意的な数字を別の恣意的な数字に置き換えているだけ。","D":"信頼度スコアリングを完全に放棄し全件を人手レビューに回すのは、コストと運用負荷の面でやりすぎであり、信頼度スコアという有用なシグナルの活用を放棄する極端な対処。"},"references":[{"title":"Claude Cookbooks — classification and confidence calibration patterns","url":"https://github.com/anthropics/claude-cookbooks"}],"lesson":"信頼度によるルーティングしきい値は、キリの良い数字ではなくラベル付き検証データによる経験的な較正で決める。","principle_tags":["nullable-over-hallucination"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-05","codex":"2026-07-05*"},"status":"reviewed"},{"id":"S6-D5-002","scenario":"structured-extraction","domain":5,"task_statement":"5.1","question_en":"Your pipeline feeds an entire 40-page contract into a single prompt and asks Claude to extract 15 fields (parties, effective date, payment terms, termination clauses, and more) in one pass. Fields located near the beginning and end of the contract are extracted reliably, but several fields whose source text sits in the middle pages are frequently missed or extracted incorrectly. What is the most effective fix?","question_ja":"パイプラインは40ページの契約書全体を1つのプロンプトに投入し、15個のフィールド（当事者、発効日、支払条件、解除条項など）を1回のパスで抽出するようClaudeに依頼している。契約書の冒頭と末尾付近にあるフィールドは確実に抽出できるが、中盤のページに根拠がある複数のフィールドは頻繁に見落とされるか誤って抽出される。最も効果的な修正はどれか。","options_en":{"A":"Increase the model's max_tokens setting for the response so there is more room to write out each of the 15 extracted fields","B":"Reorder the 15 fields alphabetically in the prompt's instructions so the model processes them in a more predictable sequence","C":"Split the extraction into targeted passes over sections of the contract, instead of one monolithic pass over all 40 pages at once","D":"Ask the model to first summarize the entire 40-page contract, and then extract all 15 fields from that summary instead of from the original text"},"options_ja":{"A":"抽出した15個のフィールドをすべて書き出す余地を増やすため、応答のmax_tokens設定を増やす","B":"プロンプトの指示内で15個のフィールドをアルファベット順に並べ替え、モデルがより予測可能な順序で処理できるようにする","C":"契約書全体40ページを1回の単一パスで処理するのではなく、契約書のセクションごとに絞った抽出パスに分割する（あるいは、まず各フィールドの根拠があるページを特定させてから、そのセクションから抽出させる）","D":"まずモデルに40ページの契約書全体を要約させ、元のテキストではなくその要約から15個のフィールドすべてを抽出させる"},"correct":"C","explanation_ja":{"why_correct":"長い文書の中盤にある情報が見落とされやすい現象（lost-in-the-middle）は、文書中の位置に関する既知の弱点。セクションごとに絞った抽出パスに分ける、または根拠ページを先に特定させてから抽出させることで、各フィールドの根拠テキストをモデルの注意が届きやすい位置に持ってくることができ、根本原因に対処する。","A":"max_tokensは出力側の生成余地を増やすものであり、入力文書の中盤にある情報がモデルに見落とされやすいという入力側の問題には対処しない。","B":"フィールドの提示順序を変えても、各フィールドの根拠がどのページにあるかという入力文書側の構造は変わらず、中盤の情報が見落とされやすい問題は解消しない。","D":"要約は本質的に情報を圧縮し、詳細を失う（lossy）。特に契約条項のような正確な文言が重要なフィールドでは、要約から抽出することでかえって精度が落ちる可能性が高い。"},"references":[{"title":"Claude Cookbooks — long context tips (lost-in-the-middle)","url":"https://github.com/anthropics/claude-cookbooks"}],"lesson":"長文書の中盤情報が見落とされる場合は、セクション単位の絞った抽出パスや根拠位置の事前特定で対処する。要約経由の抽出は詳細を損ないやすい。","principle_tags":["position-aware-context"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-05","codex":"2026-07-05*"},"status":"reviewed"},{"id":"S6-D4-003","scenario":"structured-extraction","domain":4,"task_statement":"4.1","question_en":"Your pipeline extracts personally identifiable information (PII) from digitized form submissions and flags any field that \"looks like it could be sensitive\" for redaction. In practice, it redacts nearly every numeric field, including harmless internal reference numbers and page counts, alongside genuine PII like national ID numbers. What is the most effective prompt change?","question_ja":"パイプラインはデジタル化済みのフォーム提出データから個人識別情報（PII）を抽出し、「機微情報に見えそうな」フィールドをすべてredaction対象としてフラグする。実際には、国民ID番号のような本物のPIIだけでなく、無害な社内参照番号やページ数のような数値フィールドまでほぼすべてredactionしてしまう。最も効果的なプロンプト変更はどれか。","options_en":{"A":"Add \"only redact fields that are truly sensitive\" to the existing instruction, without specifying what counts as truly sensitive in this context","B":"Lower the model's confidence threshold for flagging a field as sensitive, so fewer borderline numeric fields end up getting redacted","C":"Redact every numeric field on every form by default, since it is always safer to over-redact than to risk missing genuine PII fields","D":"Replace the vague instruction with explicit criteria naming PII categories to redact (national ID, birth date, address, phone), excluding reference numbers"},"options_ja":{"A":"既存の指示に「本当に機微な情報だけをredactせよ」と追加するだけで、何が機微とみなされるかはそれ以上具体化しない","B":"境界的な数値フィールドがredactされにくくなるよう、フィールドを機微とフラグする信頼度のしきい値を下げる","C":"本物のPIIを見逃すリスクを避けるため、常にすべてのフォームのすべての数値フィールドをデフォルトでredactする","D":"曖昧な指示を、redact対象とする具体的なPIIカテゴリ（国民ID番号、生年月日、自宅住所、電話番号）を明示し、社内参照番号やページ数を明示的に除外する基準に置き換える"},"correct":"D","explanation_ja":{"why_correct":"誤検知の根本原因は『機微情報とは何か』の基準が曖昧なこと。具体的なPIIカテゴリを列挙し、除外すべき無害な数値フィールドを明示することで、モデルが実際に判断できる具体的な境界を与え、根本原因を直す。","A":"『本当に機微な情報だけ』という言い換えも依然として曖昧であり、何が該当するかの具体的な基準を与えていないため、同じ誤検知が繰り返される。","B":"信頼度しきい値の調整は恣意的なノブに過ぎず、『何を機微とみなすか』という誤った基準そのものには対処していない。","C":"すべての数値フィールドを一律にredactするのはやりすぎであり、内部参照番号やページ数といった業務上有用な情報まで失わせる過剰な対処。"},"references":[{"title":"Claude Code common workflows (prompting precision)","url":"https://docs.claude.com/en/docs/claude-code/common-workflows"}],"lesson":"誤検知の多い抽出・分類プロンプトは、曖昧な形容詞ではなく具体的な包含/除外基準に置き換える。","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-05","codex":"2026-07-05*"},"status":"reviewed"},{"id":"S6-D4-004","scenario":"structured-extraction","domain":4,"task_statement":"4.2","question_en":"Your pipeline classifies extracted line items from receipts into categories (meals, travel, office supplies, other). All of your few-shot examples happen to be meal line items, and the classifier now inconsistently misclassifies travel and office-supply line items. What is the most effective few-shot design fix?","question_ja":"パイプラインは、レシートから抽出した明細項目をカテゴリ（食事、旅費、事務用品、その他）に分類している。少数ショット例はたまたますべて食事の明細項目で構成されており、その結果、旅費や事務用品の明細項目の分類が一貫せず誤っている。最も効果的な少数ショット設計の修正はどれか。","options_en":{"A":"Add several more meal line-item examples with more detailed reasoning, reinforcing the one category that is already well represented","B":"Remove the few-shot examples entirely and rely on a single longer written instruction that describes all four categories in prose instead","C":"Include few-shot examples spanning all four categories — meals, travel, office supplies, other — each with its classification reasoning","D":"Increase the number of meal examples to 20 or more so that category's classification pattern becomes completely unmistakable"},"options_ja":{"A":"食事の明細例をより詳しい理由づけとともにさらに数個追加し、すでによく表現されている1カテゴリを補強する","B":"少数ショット例を完全に取り除き、代わりに4つのカテゴリすべてを説明する1つの長い指示文に頼る","C":"4つのカテゴリ（食事、旅費、事務用品、その他）すべてにまたがる少数ショット例を含め、それぞれの分類理由を示す","D":"食事の例を20個以上に増やし、そのカテゴリの分類パターンを疑いようのないものにする"},"correct":"C","explanation_ja":{"why_correct":"誤分類は食事以外のカテゴリで起きているのに、少数ショット例が食事カテゴリに偏っていることが根本原因。4カテゴリすべてを代表する例をそれぞれ理由づけ付きで含めることで、モデルはカテゴリ間の区別を学習でき、汎化が改善する。","A":"同じカテゴリ（食事）の例を増やしても、他カテゴリとの区別を学習する材料にはならず、根本原因を直していない。","B":"少数ショット例は曖昧なケースの汎化に効果的であり、それを完全に取り除いて説明文だけに頼るのは詳細な指示だけでは一貫性が出ないという典型的な失敗パターンに逆行する。","D":"食事の例をいくら増やしても同一カテゴリの精緻化にすぎず、旅費・事務用品カテゴリの誤分類は解消されない。"},"references":[{"title":"Claude Code common workflows (few-shot prompting)","url":"https://docs.claude.com/en/docs/claude-code/common-workflows"}],"lesson":"少数ショット例は誤分類が起きているカテゴリを代表するように選ぶ。1カテゴリへの偏りは他カテゴリへの汎化を妨げる。","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-05","codex":"2026-07-05*"},"status":"reviewed"}]};</script>
<script>
(function(){
'use strict';
/* ---------- データ ---------- */
const QS = EXAM_DATA.questions;
const SCN = EXAM_DATA.scenarios;
const SCN_BY_KEY = {}; SCN.forEach(s => SCN_BY_KEY[s.key] = s);
const DOMAINS = EXAM_DATA.domains || [];
const DOM_BY_ID = {}; DOMAINS.forEach(d => DOM_BY_ID[d.id] = d);
const EX = EXAM_DATA.exam_structure;
const LS_PRACTICE = 'ccaf_practice_v1';
const LS_HISTORY  = 'ccaf_mock_history_v1';
const LS_USERS    = 'ccaf_users_v1';
const LS_CUR_USER = 'ccaf_current_user_v1';
const LS_COMMENTS = 'ccaf_comments_v1';

/* ---------- ユーティリティ ---------- */
const $ = s => document.querySelector(s);
const esc = s => String(s == null ? '' : s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function loadLS(key, fallback){
  try { const v = JSON.parse(localStorage.getItem(key)); return v == null ? fallback : v; }
  catch(e){ return fallback; }
}
function saveLS(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
function pad(n){ return String(n).padStart(2, '0'); }
function fmtDateTime(iso){
  const d = new Date(iso);
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate())
       + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function fmtDur(sec){
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + '分' + pad(s) + '秒';
}
function downloadJSON(obj, filename){
  const blob = new Blob([JSON.stringify(obj, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
/* ---------- 学習者プロファイル ----------
   練習の正解履歴は学習者ごとに別キーで保存（未設定は従来キー＝後方互換）。
   本番モードの結果には user フィールドが記録される。 */
function currentUser(){ return loadLS(LS_CUR_USER, ''); }
function userList(){ return loadLS(LS_USERS, []); }
function userLabel(u){ return u ? u : '（名前未設定）'; }
function fileSlug(u){ return u ? '-' + u.replace(/[^\w぀-ヿ゠-ヿ一-鿿-]+/g, '_') : ''; }
function practiceKey(){ const u = currentUser(); return u ? LS_PRACTICE + '::' + u : LS_PRACTICE; }
function renderUserSelect(){
  const sel = $('#user-select');
  const cur = currentUser();
  const users = userList();
  let h = '<option value="">（名前未設定）</option>';
  users.forEach(u => { h += '<option value="' + esc(u) + '">' + esc(u) + '</option>'; });
  h += '<option value="__add__">＋ 学習者を追加…</option>';
  sel.innerHTML = h;
  sel.value = users.includes(cur) ? cur : '';
}
(function initUserSelect(){
  renderUserSelect();
  $('#user-select').addEventListener('change', () => {
    const sel = $('#user-select');
    if (sel.value === '__add__'){
      const name = (prompt('学習者名を入力してください（例: 山田太郎 / Taro）') || '').trim();
      if (name && name !== '__add__'){
        const users = userList();
        if (!users.includes(name)){ users.push(name); saveLS(LS_USERS, users); }
        saveLS(LS_CUR_USER, name);
      }
    } else {
      saveLS(LS_CUR_USER, sel.value);
    }
    renderUserSelect();
    applyPracticeFilter();
    if (!$('#tab-history').hidden) renderHistory();
  });
})();
/* ---------- コメント（フィードバック） ----------
   問題への疑問・指摘をローカルに保存し、履歴タブからJSONで書き出して開発者へ送る */
function commentsAll(){ return loadLS(LS_COMMENTS, []); }
function commentFormHTML(qid){
  const n = commentsAll().filter(c => c.id === qid).length;
  return '<div class="exp-block fb-block" data-qid="' + esc(qid) + '"><details>'
    + '<summary>💬 この問題にコメント・質問を残す / Leave a comment' + (n ? '（保存済み ' + n + ' 件）' : '') + '</summary>'
    + '<textarea class="fb-text" rows="3" placeholder="内容の誤りの指摘・質問・疑問など。履歴タブの「コメント」からJSONで書き出して開発者に送れます / Report an issue or ask a question about this item"></textarea>'
    + '<div style="margin-top:6px"><button class="fb-save small">コメントを保存 / Save</button></div>'
    + '</details></div>';
}
document.addEventListener('click', e => {
  const btn = e.target.closest('.fb-save');
  if (!btn) return;
  const block = btn.closest('.fb-block');
  const ta = block.querySelector('.fb-text');
  const text = (ta.value || '').trim();
  if (!text) return;
  const all = commentsAll();
  all.push({ id: block.dataset.qid, user: currentUser() || null, at: new Date().toISOString(), text: text });
  saveLS(LS_COMMENTS, all);
  ta.value = '';
  btn.textContent = '保存しました ✓ / Saved';
  setTimeout(() => { btn.textContent = 'コメントを保存 / Save'; }, 1600);
});
function feedbackSectionHTML(){
  const cms = commentsAll();
  let h = '<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin:22px 0 8px">'
    + '<h3>💬 コメント（フィードバック）' + (cms.length ? '（' + cms.length + ' 件）' : '') + '</h3>'
    + '<span class="spacer" style="flex:1"></span>'
    + (cms.length ? '<button class="small" id="fb-export">JSONエクスポート</button>'
      + '<button class="btn-danger small" id="fb-clear">消去</button>' : '')
    + '</div>';
  if (!cms.length){
    h += '<p class="small muted">まだコメントはありません。練習の解説や模試の全問レビューから、問題への疑問・指摘を残せます。</p>';
    return h;
  }
  h += '<p class="small muted" style="margin-bottom:6px">「JSONエクスポート」でファイルに書き出し、開発者（江尻）へ送ってください。</p>';
  cms.slice().reverse().forEach(c => {
    h += '<div class="hist-row" style="align-items:flex-start">'
      + '<span class="when">' + fmtDateTime(c.at) + '</span>'
      + '<span class="chip user">👤 ' + esc(userLabel(c.user)) + '</span>'
      + '<span class="chip">' + esc(c.id) + '</span>'
      + '<span class="small" style="flex:1 1 100%; white-space:pre-wrap">' + esc(c.text) + '</span>'
      + '</div>';
  });
  return h;
}
function bindFeedbackSection(){
  const ex = $('#fb-export'), cl = $('#fb-clear');
  if (ex) ex.addEventListener('click', () => {
    downloadJSON({ schema: 'ccaf-feedback-v1', exportedAt: new Date().toISOString(), comments: commentsAll() },
      'ccaf-feedback-' + new Date().toISOString().replace(/[:T]/g, '-').slice(0, 16) + '.json');
  });
  if (cl) cl.addEventListener('click', () => {
    if (confirm('保存済みコメントをすべて消去します（エクスポート済みか確認してください）。よろしいですか？')){
      localStorage.removeItem(LS_COMMENTS);
      renderHistory();
    }
  });
}
function scenarioName(key, lang){
  const s = SCN_BY_KEY[key];
  if (!s) return key;
  return lang === 'en' ? s.name_en : s.name_ja;
}
function domainLabel(q){
  const d = DOM_BY_ID[q.domain];
  return 'D' + q.domain + (d ? '：' + d.name_ja : '');
}
function taskTitle(q){
  const d = DOM_BY_ID[q.domain];
  if (!d || !d.task_statements) return '';
  const t = d.task_statements.find(t => t.id === q.task_statement);
  return t ? t.title : '';
}
function qMetaChipsHTML(q){
  let h = '<div class="chips">';
  h += '<span class="chip">' + esc(q.id) + '</span>';
  h += '<span class="chip">' + esc(scenarioName(q.scenario, 'ja')) + '</span>';
  h += '<span class="chip dom">D' + q.domain + ' / ' + esc(q.task_statement) + '</span>';
  if (q.difficulty) h += '<span class="chip">' + esc(q.difficulty) + '</span>';
  if (q.status === 'draft') h += '<span class="chip draft">draft</span>';
  h += '</div>';
  return h;
}
function qTextHTML(q, lang){
  let h = '';
  if (lang === 'en' || lang === 'both') h += '<p class="qtext en">' + esc(q.question_en) + '</p>';
  if (lang === 'ja' || lang === 'both') h += '<p class="qtext ja">' + esc(q.question_ja) + '</p>';
  return h;
}
function optBodyHTML(q, key, lang){
  if (lang === 'en')  return '<span class="en">' + esc(q.options_en[key]) + '</span>';
  if (lang === 'ja')  return '<span>' + esc(q.options_ja[key]) + '</span>';
  return '<span class="en">' + esc(q.options_en[key]) + '</span><span class="ja">' + esc(q.options_ja[key]) + '</span>';
}
/* 言語別ラベル（見出し・定型文） */
function tLabel(lang, ja, en){
  if (lang === 'en') return en;
  if (lang === 'ja') return ja;
  return ja + ' / ' + en;
}
/* 解説本文（why_correct / 誤答レター）。EN欠落時はJAへフォールバック */
function expText(q, key, lang){
  const ja = (q.explanation_ja && q.explanation_ja[key]) || '';
  const en = (q.explanation_en && q.explanation_en[key]) || ja;
  if (lang === 'en') return esc(en);
  if (lang === 'ja') return esc(ja);
  return '<span class="en">' + esc(en) + '</span><br><span class="ja">' + esc(ja) + '</span>';
}
function lessonText(q, lang){
  const en = q.lesson_en || q.lesson;
  if (lang === 'en') return esc(en);
  if (lang === 'ja') return esc(q.lesson);
  return '<span class="en">' + esc(en) + '</span><br><span class="ja">' + esc(q.lesson) + '</span>';
}
function explanationHTML(q, chosen, lang){
  const ok = chosen === q.correct;
  let h = '<div class="card">';
  h += '<div class="verdict ' + (ok ? 'ok' : 'ng') + '">'
     + (ok ? tLabel(lang, '正解！', 'Correct!') : tLabel(lang, '不正解。', 'Incorrect.')) + ' '
     + tLabel(lang, '正解は', 'The answer is') + ' <b>' + q.correct + '</b>'
     + (chosen ? '（' + tLabel(lang, 'あなたの回答', 'your answer') + ': ' + esc(chosen) + '）'
               : '（' + tLabel(lang, '未回答', 'unanswered') + '）') + '</div>';
  h += '<div class="exp-block"><h4>' + tLabel(lang, 'なぜ ' + q.correct + ' が正解か', 'Why ' + q.correct + ' is correct') + '</h4><p>'
     + expText(q, 'why_correct', lang) + '</p></div>';
  h += '<div class="exp-block"><h4>' + tLabel(lang, '誤答の理由', 'Why the other options are wrong') + '</h4>';
  ['A','B','C','D'].forEach(k => {
    if (k === q.correct || !q.explanation_ja[k]) return;
    const mine = (k === chosen);
    h += '<div class="exp-wrong' + (mine ? ' mine' : '') + '"><span class="k">' + k + '</span>'
       + (mine ? '<span class="mine-tag">' + tLabel(lang, 'あなたの回答', 'your answer') + '</span>' : '')
       + '　' + expText(q, k, lang) + '</div>';
  });
  h += '</div>';
  h += '<div class="exp-block"><h4>' + tLabel(lang, '教訓', 'Lesson') + '</h4><div class="lesson">' + lessonText(q, lang) + '</div></div>';
  if (q.references && q.references.length){
    h += '<div class="exp-block refs"><h4>' + tLabel(lang, '出典', 'Sources') + '</h4>';
    q.references.forEach(r => {
      h += '<a href="' + esc(r.url) + '" target="_blank" rel="noopener">' + esc(r.title) + ' ↗</a>';
    });
    h += '</div>';
  }
  h += '<div class="exp-block"><h4>' + tLabel(lang, '分類', 'Classification') + '</h4><p class="small muted">' + esc(domainLabel(q))
     + '　｜　' + tLabel(lang, 'タスク', 'Task') + ' ' + esc(q.task_statement)
     + (taskTitle(q) ? '：' + esc(taskTitle(q)) : '') + '</p></div>';
  h += commentFormHTML(q.id);
  h += '</div>';
  return h;
}

/* ---------- タブ ---------- */
document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('active', b === btn));
    ['practice','mock','history'].forEach(t => {
      $('#tab-' + t).hidden = (t !== btn.dataset.tab);
    });
    if (btn.dataset.tab === 'history') renderHistory();
  });
});
$('#bank-meta').textContent = '収載 ' + QS.length + ' 問 ・ '
  + (EXAM_DATA.meta.version ? 'v' + EXAM_DATA.meta.version + ' ・ ' : '')
  + '生成 ' + EXAM_DATA.meta.generated_at
  + (EXAM_DATA.meta.include_drafts ? ' ・ draft含む' : '');

/* ==================================================================
   練習モード
================================================================== */
const practice = { pool: [], idx: 0, chosen: null, lang: 'ja' };

function practiceHist(){ return loadLS(practiceKey(), {}); }

function baseFilteredPool(){
  const sc = $('#pf-scenario').value, dm = $('#pf-domain').value;
  return QS.filter(q =>
    (sc === 'all' || q.scenario === sc) &&
    (dm === 'all' || String(q.domain) === dm));
}
function applyPracticeFilter(){
  const hist = practiceHist();
  let pool = baseFilteredPool();
  if ($('#pf-unsolved').checked){
    pool = pool.filter(q => !(hist[q.id] && hist[q.id].correct > 0));
  }
  practice.pool = shuffle(pool);
  practice.idx = 0;
  practice.chosen = null;
  renderPractice();
}
function renderPracticeProgress(){
  const hist = practiceHist();
  const base = baseFilteredPool();
  const solved = base.filter(q => hist[q.id] && hist[q.id].correct > 0).length;
  $('#pf-progress').innerHTML = 'このフィルタで <b>' + solved + ' / ' + base.length
    + '</b> 問 正解済み' + (practice.pool.length
      ? '　（出題中: ' + (practice.idx + 1) + ' / ' + practice.pool.length + ' 問目）'
      : '');
}
function renderPractice(){
  renderPracticeProgress();
  const box = $('#pf-question');
  if (!practice.pool.length){
    box.innerHTML = '<div class="card empty">条件に合う問題がありません。フィルタを変更してください。</div>';
    return;
  }
  const q = practice.pool[practice.idx];
  const lang = practice.lang;
  const chosen = practice.chosen;
  let h = '<div class="card">';
  h += qMetaChipsHTML(q);
  h += qTextHTML(q, lang);
  h += '<div class="options">';
  ['A','B','C','D'].forEach(k => {
    let cls = 'opt';
    if (chosen){
      if (k === q.correct) cls += ' correct';
      else if (k === chosen) cls += ' wrong-chosen';
    }
    h += '<button class="' + cls + '" data-key="' + k + '"' + (chosen ? ' disabled' : '') + '>'
       + '<span class="key">' + k + '</span><span class="body">' + optBodyHTML(q, k, lang) + '</span></button>';
  });
  h += '</div></div>';
  if (chosen) h += explanationHTML(q, chosen, lang);
  h += '<div class="qactions">'
     + (chosen ? '<button class="btn-primary" id="pf-next">次の問題 →</button>'
               : '<button id="pf-skip">スキップ →</button>')
     + '</div>';
  box.innerHTML = h;

  if (!chosen){
    box.querySelectorAll('.opt').forEach(btn => {
      btn.addEventListener('click', () => answerPractice(q, btn.dataset.key));
    });
    $('#pf-skip').addEventListener('click', nextPractice);
  } else {
    $('#pf-next').addEventListener('click', nextPractice);
  }
}
function answerPractice(q, key){
  practice.chosen = key;
  const hist = practiceHist();
  const rec = hist[q.id] || { attempts: 0, correct: 0, lastAnswer: null, lastAt: null };
  rec.attempts += 1;
  if (key === q.correct) rec.correct += 1;
  rec.lastAnswer = key;
  rec.lastAt = new Date().toISOString();
  hist[q.id] = rec;
  saveLS(practiceKey(), hist);
  renderPractice();
}
function nextPractice(){
  practice.chosen = null;
  if (!practice.pool.length){ renderPractice(); return; }
  if ($('#pf-unsolved').checked){
    // 現在の次の問題から始まる順序に回転し、正解済みをプールから外す
    const hist = practiceHist();
    const solved = q => hist[q.id] && hist[q.id].correct > 0;
    const rotated = practice.pool.slice(practice.idx + 1)
      .concat(practice.pool.slice(0, practice.idx + 1));
    practice.pool = rotated.filter(q => !solved(q));
    practice.idx = 0;
  } else {
    practice.idx = (practice.idx + 1) % practice.pool.length;
  }
  renderPractice();
}
/* フィルタ初期化 */
(function initPracticeFilters(){
  const scSel = $('#pf-scenario');
  scSel.innerHTML = '<option value="all">すべて</option>'
    + SCN.map(s => '<option value="' + esc(s.key) + '">' + esc(s.name_ja) + '</option>').join('');
  const dmSel = $('#pf-domain');
  dmSel.innerHTML = '<option value="all">すべて</option>'
    + [1,2,3,4,5].map(i => {
        const d = DOM_BY_ID[i];
        return '<option value="' + i + '">D' + i + (d ? ' ' + esc(d.name_ja) : '') + '</option>';
      }).join('');
  scSel.addEventListener('change', applyPracticeFilter);
  dmSel.addEventListener('change', applyPracticeFilter);
  $('#pf-unsolved').addEventListener('change', applyPracticeFilter);
  $('#pf-lang').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      practice.lang = b.dataset.lang;
      $('#pf-lang').querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
      renderPractice();
    });
  });
})();
applyPracticeFilter();

/* ==================================================================
   本番モード
================================================================== */
let mock = null;          // 進行中セッション
let mockTimerId = null;
let lastResult = null;    // 結果画面表示中のデータ
const review = { lang: 'ja' };

function mockCapacity(){
  const byScn = {};
  QS.forEach(q => { (byScn[q.scenario] = byScn[q.scenario] || []).push(q); });
  const counts = Object.values(byScn)
    .map(a => Math.min(a.length, EX.questions_per_scenario))
    .sort((a,b) => b - a)
    .slice(0, EX.scenarios_drawn);
  return {
    scenarioCount: Math.min(Object.keys(byScn).length, EX.scenarios_drawn),
    total: counts.reduce((a,b) => a + b, 0)
  };
}
function renderMockStart(){
  $('#mk-start').hidden = false; $('#mk-exam').hidden = true; $('#mk-result').hidden = true;
  const cap = mockCapacity();
  const short = (cap.total < EX.questions_total) || (cap.scenarioCount < EX.scenarios_drawn);
  let h = '<div class="card">';
  h += '<h2 style="margin-bottom:10px">本番モード（模擬試験）</h2>';
  h += '<p class="muted">本番の CCA-F 形式に合わせた模試です。</p>';
  h += '<ul class="muted" style="margin:10px 0 10px 22px">'
     + '<li>' + SCN.length + ' シナリオから <b>' + EX.scenarios_drawn + ' つをランダム抽出</b> × 各最大 <b>'
     + EX.questions_per_scenario + ' 問</b>（計 ' + EX.questions_total + ' 問想定）</li>'
     + '<li>制限時間 <b>' + EX.time_limit_minutes + ' 分</b>（下で変更可）</li>'
     + '<li>試験中は本番同様 <b>英語表示のみ</b>。フラグ・見直し・選び直しが可能</li>'
     + '<li>合格ラインの目安: スケールドスコア <b>' + EX.passing_scaled_score + '</b></li>'
     + '</ul>';
  if (short){
    h += '<div class="notice">⚠ 現在の問題バンク（' + QS.length + ' 問・' + cap.scenarioCount
       + ' シナリオ）では最大 <b>' + cap.total + ' 問</b>での模試になります（本番は '
       + EX.questions_total + ' 問・' + EX.scenarios_drawn + ' シナリオ）。</div>';
  }
  h += '<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-top:14px">'
     + '<label class="muted">制限時間 <input type="number" id="mk-limit" value="' + EX.time_limit_minutes
     + '" min="1" max="600" style="width:80px"> 分</label>'
     + '<button class="btn-primary" id="mk-begin">試験を開始する</button>'
     + '</div>';
  h += '</div>';
  $('#mk-start').innerHTML = h;
  $('#mk-begin').addEventListener('click', startMock);
}
function startMock(){
  const limit = Math.max(1, parseInt($('#mk-limit').value, 10) || EX.time_limit_minutes);
  const byScn = {};
  QS.forEach(q => { (byScn[q.scenario] = byScn[q.scenario] || []).push(q); });
  const keys = shuffle(Object.keys(byScn)).slice(0, EX.scenarios_drawn);
  const questions = [];
  const scenarios = [];
  keys.forEach(k => {
    const picked = shuffle(byScn[k]).slice(0, EX.questions_per_scenario);
    scenarios.push({ key: k, count: picked.length });
    questions.push(...picked);
  });
  mock = {
    questions, scenarios,
    answers: {}, flags: {},
    cur: 0,
    startedAt: new Date().toISOString(),
    timeLimitMin: limit,
    deadline: Date.now() + limit * 60000
  };
  $('#mk-start').hidden = true; $('#mk-result').hidden = true; $('#mk-exam').hidden = false;
  renderMockExamShell();
  renderMockQuestion();
  clearInterval(mockTimerId);
  mockTimerId = setInterval(tickMock, 1000);
  tickMock();
}
function renderMockExamShell(){
  $('#mk-exam').innerHTML =
    '<div class="exam-top">'
    + '<div class="timer" id="mk-timer">--:--</div>'
    + '<div class="muted small">残り時間</div>'
    + '<div class="spacer"></div>'
    + '<button class="btn-danger" id="mk-finish">試験を終了する</button>'
    + '</div>'
    + '<div class="exam-layout">'
    + '<aside class="qnav"><div class="grid" id="mk-grid"></div>'
    +   '<div class="legend">'
    +   '<span><i style="background:rgba(90,169,255,.5)"></i>回答済み</span>'
    +   '<span><i style="background:rgba(247,168,61,.6)"></i>フラグ</span>'
    +   '<span><i style="background:#232b38"></i>未回答</span>'
    +   '</div></aside>'
    + '<div id="mk-qarea"></div>'
    + '</div>';
  $('#mk-finish').addEventListener('click', () => finishMock(false));
}
function tickMock(){
  if (!mock) return;
  const remain = Math.max(0, mock.deadline - Date.now());
  const sec = Math.ceil(remain / 1000);
  const m = Math.floor(sec / 60), s = sec % 60;
  const t = $('#mk-timer');
  if (t){
    t.textContent = pad(m) + ':' + pad(s);
    t.classList.toggle('low', remain < 10 * 60000);
  }
  if (remain <= 0) finishMock(true);
}
function renderMockGrid(){
  const grid = $('#mk-grid');
  grid.innerHTML = mock.questions.map((q, i) => {
    let cls = 'cell';
    if (mock.answers[q.id]) cls += ' answered';
    if (mock.flags[q.id]) cls += ' flagged';
    if (i === mock.cur) cls += ' current';
    return '<button class="' + cls + '" data-i="' + i + '">' + (i + 1) + '</button>';
  }).join('');
  grid.querySelectorAll('.cell').forEach(c => {
    c.addEventListener('click', () => { mock.cur = +c.dataset.i; renderMockQuestion(); });
  });
}
function renderMockQuestion(){
  renderMockGrid();
  const i = mock.cur, q = mock.questions[i];
  const scn = SCN_BY_KEY[q.scenario];
  const chosen = mock.answers[q.id] || null;
  let h = '<div class="card">';
  h += '<div class="chips"><span class="chip">Question ' + (i + 1) + ' / ' + mock.questions.length + '</span>'
     + '<span class="chip">' + esc(scn ? scn.name_en : q.scenario) + '</span></div>';
  if (scn && scn.context_en){
    h += '<details class="scenario-ctx"><summary>Scenario context</summary><p>'
       + esc(scn.context_en) + '</p></details>';
  }
  h += '<p class="qtext en">' + esc(q.question_en) + '</p>';
  h += '<div class="options">';
  ['A','B','C','D'].forEach(k => {
    const cls = 'opt' + (chosen === k ? ' selected' : '');
    h += '<button class="' + cls + '" data-key="' + k + '">'
       + '<span class="key">' + k + '</span><span class="body"><span class="en">'
       + esc(q.options_en[k]) + '</span></span></button>';
  });
  h += '</div></div>';
  h += '<div class="qactions" style="justify-content:space-between">'
     + '<button id="mk-flag" class="btn-flag' + (mock.flags[q.id] ? ' on' : '') + '">'
     + (mock.flags[q.id] ? '⚑ フラグ解除' : '⚐ フラグを付ける') + '</button>'
     + '<span>'
     + '<button id="mk-prev"' + (i === 0 ? ' disabled' : '') + '>← 前へ</button> '
     + '<button id="mk-next" class="btn-primary"' + (i === mock.questions.length - 1 ? ' disabled' : '') + '>次へ →</button>'
     + '</span></div>';
  $('#mk-qarea').innerHTML = h;

  $('#mk-qarea').querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => {
      mock.answers[q.id] = btn.dataset.key;   // 選び直し可能
      renderMockQuestion();
    });
  });
  $('#mk-flag').addEventListener('click', () => {
    mock.flags[q.id] = !mock.flags[q.id];
    renderMockQuestion();
  });
  $('#mk-prev').addEventListener('click', () => { if (mock.cur > 0){ mock.cur--; renderMockQuestion(); } });
  $('#mk-next').addEventListener('click', () => { if (mock.cur < mock.questions.length - 1){ mock.cur++; renderMockQuestion(); } });
}
function finishMock(auto){
  if (!mock) return;
  const unanswered = mock.questions.filter(q => !mock.answers[q.id]).length;
  if (!auto && unanswered > 0){
    if (!confirm('未回答が ' + unanswered + ' 問あります。終了して採点しますか？')) return;
  }
  clearInterval(mockTimerId); mockTimerId = null;
  const finishedAt = new Date().toISOString();
  const durationSec = Math.min(
    mock.timeLimitMin * 60,
    Math.round((Date.parse(finishedAt) - Date.parse(mock.startedAt)) / 1000));
  const answers = mock.questions.map(q => ({
    id: q.id,
    chosen: mock.answers[q.id] || null,
    correct: q.correct,
    flagged: !!mock.flags[q.id]
  }));
  const rawScore = answers.filter(a => a.chosen === a.correct).length;
  const total = answers.length;
  const scaledEstimate = Math.round(100 + (rawScore / total) * 900);
  const result = {
    schema: 'ccaf-result-v1',
    mode: 'mock',
    user: currentUser() || null,
    startedAt: mock.startedAt,
    finishedAt, durationSec,
    timeLimitMin: mock.timeLimitMin,
    scenarios: mock.scenarios.map(s => s.key),
    answers, rawScore, total, scaledEstimate
  };
  const hist = loadLS(LS_HISTORY, []);
  hist.push(result);
  saveLS(LS_HISTORY, hist);
  lastResult = { result, questions: mock.questions.slice() };
  mock = null;
  renderMockResult();
}
function rateRowHTML(label, ok, total){
  const pct = total ? Math.round(ok / total * 100) : 0;
  return '<tr><td>' + esc(label) + '</td><td class="num">' + ok + ' / ' + total + '</td>'
    + '<td class="num">' + pct + '%</td>'
    + '<td><div class="bar"><i style="width:' + pct + '%"></i></div></td></tr>';
}
function renderMockResult(){
  $('#mk-start').hidden = true; $('#mk-exam').hidden = true; $('#mk-result').hidden = false;
  const { result, questions } = lastResult;
  const qById = {}; questions.forEach(q => qById[q.id] = q);
  const pass = result.scaledEstimate >= EX.passing_scaled_score;
  const pct = Math.round(result.rawScore / result.total * 100);

  let h = '<div class="card score-hero">'
    + '<div class="big">' + result.scaledEstimate + '<small> / 1000（換算目安）</small></div>'
    + '<div><div style="font-size:20px; font-weight:700">' + result.rawScore + ' / ' + result.total
    + ' <span class="muted small">(' + pct + '%)</span></div>'
    + '<span class="badge ' + (pass ? 'pass' : 'fail') + '">'
    + (pass ? '✓ ' + EX.passing_scaled_score + ' ライン超え' : '✗ ' + EX.passing_scaled_score + ' ライン未達')
    + '</span></div>'
    + '<div class="spacer" style="flex:1"></div>'
    + '<div><button class="btn-primary" id="mk-export">結果をエクスポート</button> '
    + '<button id="mk-again">スタート画面へ</button></div>'
    + '<p class="small muted" style="flex-basis:100%">受験者: ' + esc(userLabel(result.user)) + '　｜　'
    + '※ スケールドスコアは round(100 + 素点比率 × 900) の単純換算で、'
    + '公式の等化（equating）とは異なる目安です。所要時間 ' + fmtDur(result.durationSec) + '。</p>'
    + '</div>';

  // シナリオ別
  h += '<div class="card"><h3 style="margin-bottom:8px">シナリオ別正答率</h3><table class="stats">'
    + '<tr><th>シナリオ</th><th>正答</th><th>率</th><th></th></tr>';
  result.scenarios.forEach(key => {
    const as = result.answers.filter(a => qById[a.id].scenario === key);
    h += rateRowHTML(scenarioName(key, 'ja'), as.filter(a => a.chosen === a.correct).length, as.length);
  });
  h += '</table></div>';

  // ドメイン別
  const doms = [...new Set(questions.map(q => q.domain))].sort();
  h += '<div class="card"><h3 style="margin-bottom:8px">ドメイン別正答率</h3><table class="stats">'
    + '<tr><th>ドメイン</th><th>正答</th><th>率</th><th></th></tr>';
  doms.forEach(dm => {
    const as = result.answers.filter(a => qById[a.id].domain === dm);
    const d = DOM_BY_ID[dm];
    h += rateRowHTML('D' + dm + (d ? '：' + d.name_ja : ''),
      as.filter(a => a.chosen === a.correct).length, as.length);
  });
  h += '</table></div>';

  // 全問レビュー
  h += '<div class="card"><div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:6px">'
    + '<h3>全問レビュー</h3>'
    + '<span class="seg" id="rv-lang">'
    + '<button data-lang="en"' + (review.lang === 'en' ? ' class="active"' : '') + '>EN</button>'
    + '<button data-lang="ja"' + (review.lang === 'ja' ? ' class="active"' : '') + '>JA</button>'
    + '<button data-lang="both"' + (review.lang === 'both' ? ' class="active"' : '') + '>EN+JA</button>'
    + '</span></div><div id="rv-list"></div></div>';

  $('#mk-result').innerHTML = h;
  $('#mk-export').addEventListener('click', () => {
    downloadJSON(result, 'ccaf-result' + fileSlug(result.user) + '-' + result.finishedAt.replace(/[:T]/g, '-').slice(0, 16) + '.json');
  });
  $('#mk-again').addEventListener('click', renderMockStart);
  $('#rv-lang').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      review.lang = b.dataset.lang;
      $('#rv-lang').querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
      renderReviewList();
    });
  });
  renderReviewList();
}
function renderReviewList(){
  const { result, questions } = lastResult;
  const ansById = {}; result.answers.forEach(a => ansById[a.id] = a);
  const lang = review.lang;
  let h = '';
  questions.forEach((q, i) => {
    const a = ansById[q.id];
    const ok = a.chosen === q.correct;
    h += '<div class="review-item">';
    h += '<div class="rhead"><span class="rmark ' + (ok ? 'ok' : 'ng') + '">' + (ok ? '○' : '×') + '</span>'
      + '<b>問 ' + (i + 1) + '</b><span class="chip">' + esc(q.id) + '</span>'
      + '<span class="chip dom">D' + q.domain + ' / ' + esc(q.task_statement) + '</span>'
      + (a.flagged ? '<span class="chip" style="color:var(--flag);border-color:var(--flag)">⚑ flag</span>' : '')
      + '</div>';
    h += qTextHTML(q, lang);
    h += '<div class="options">';
    ['A','B','C','D'].forEach(k => {
      let cls = 'opt';
      if (k === q.correct) cls += ' correct';
      else if (k === a.chosen) cls += ' wrong-chosen';
      h += '<div class="' + cls + '"><span class="key">' + k + '</span><span class="body">'
        + optBodyHTML(q, k, lang) + '</span></div>';
    });
    h += '</div>';
    h += '<div class="exp-block"><h4>' + tLabel(lang, 'なぜ ' + q.correct + ' が正解か', 'Why ' + q.correct + ' is correct') + '</h4><p>'
      + expText(q, 'why_correct', lang) + '</p></div>';
    if (!ok && a.chosen && q.explanation_ja[a.chosen]){
      h += '<div class="exp-block"><h4>' + tLabel(lang, 'あなたが選んだ ' + esc(a.chosen) + ' の誤答理由', 'Why your choice ' + esc(a.chosen) + ' is wrong') + '</h4>'
        + '<div class="exp-wrong mine"><span class="k">' + esc(a.chosen) + '</span>　'
        + expText(q, a.chosen, lang) + '</div></div>';
    }
    if (!a.chosen){
      h += '<p class="small muted">' + tLabel(lang, '（この問題は未回答でした）', '(This question was left unanswered)') + '</p>';
    }
    h += '<div class="exp-block"><div class="lesson">' + lessonText(q, lang) + '</div></div>';
    h += commentFormHTML(q.id);
    h += '</div>';
  });
  $('#rv-list').innerHTML = h;
}
renderMockStart();

/* ==================================================================
   履歴タブ
================================================================== */
function renderHistory(){
  const hist = loadLS(LS_HISTORY, []);
  const box = $('#hist-box');
  if (!hist.length){
    box.innerHTML = '<div class="empty">本番モードの履歴はまだありません。<br>「本番モード」タブから模試を受けると、ここに結果が記録されます。</div>'
      + feedbackSectionHTML();
    bindFeedbackSection();
    return;
  }
  let h = '<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:8px">'
    + '<h3>本番モード履歴（' + hist.length + ' 回）</h3>'
    + '<span class="spacer" style="flex:1"></span>'
    + '<button class="btn-danger small" id="hist-clear">履歴を消去</button></div>';
  h += '<p class="small muted" style="margin-bottom:6px">バーは換算スコア（0〜1000、緑=720以上）の推移です。</p>';
  hist.slice().reverse().forEach((r, revIdx) => {
    const idx = hist.length - 1 - revIdx;
    const pass = r.scaledEstimate >= EX.passing_scaled_score;
    h += '<div class="hist-row">'
      + '<span class="when">' + fmtDateTime(r.finishedAt) + '</span>'
      + '<span class="chip user">👤 ' + esc(userLabel(r.user)) + '</span>'
      + '<span class="score"><b>' + r.scaledEstimate + '</b> <span class="muted small">('
      + r.rawScore + '/' + r.total + ')</span></span>'
      + '<span class="muted small" style="flex:0 0 90px">' + fmtDur(r.durationSec) + '</span>'
      + '<span class="bar ' + (pass ? 'ok' : 'ng') + '"><i style="width:'
      + Math.round(r.scaledEstimate / 1000 * 100) + '%"></i></span>'
      + '<button class="small" data-dl="' + idx + '">JSON</button>'
      + '</div>';
  });
  h += feedbackSectionHTML();
  box.innerHTML = h;
  bindFeedbackSection();
  box.querySelectorAll('[data-dl]').forEach(btn => {
    btn.addEventListener('click', () => {
      const r = hist[+btn.dataset.dl];
      downloadJSON(r, 'ccaf-result' + fileSlug(r.user) + '-' + r.finishedAt.replace(/[:T]/g, '-').slice(0, 16) + '.json');
    });
  });
  $('#hist-clear').addEventListener('click', () => {
    if (confirm('本番モードの履歴をすべて消去します。よろしいですか？')){
      localStorage.removeItem(LS_HISTORY);
      renderHistory();
    }
  });
}
})();
