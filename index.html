g) detects the flag and holds the shipment, while the human console resolves from the evidence. The deciding detail is the dual audience — machine and human — which demands a machine-readable flag, not prose annotations. The root cause of the mis-deliveries is not that a value was chosen, but that the fact of the conflict was erased.","A":"Preferring the freshest timestamp looks reasonable, but recency does not guarantee correctness (a batch sync can stamp stale values with new timestamps) — and it is still a silent single-value pick that hides the conflict from downstream. The most tempting distractor.","B":"Blanket precedence for one source is silent conflict resolution wearing governance clothes. When the CRM holds the stale address — say, right after a customer asked support to update it — the mis-deliveries reproduce, and downstream never learns a conflict existed.","C":"Rejecting every conflicted record for manual re-entry over-reacts — trivial formatting differences would flood staff — and wrecks throughput. Surfacing conflicts and continuing to process are compatible."},"references":[{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"},{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"対立は無言で解消せず、機械可読な conflict フラグ＋帰属で下流へ渡す。機械は保留で、人間は根拠で応じられる","lesson_en":"Never resolve conflicts silently: emit a machine-readable conflict flag with attribution, so machines can hold and humans can judge","principle_tags":["structured-errors","escalate-with-handoff"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D5-004","scenario":"structured-extraction","domain":5,"task_statement":"5.6","question_en":"A knowledge pipeline extracts company facts — current CEO, headquarters, employee count — from a news archive spanning 2015 to 2025. All articles are fed to extraction as equal-weight text, and the output regularly reports executives who left years ago as \"current\". What is the right fix?","question_ja":"ナレッジパイプラインが2015〜2025年のニュースアーカイブから企業の事実——現CEO・本社所在地・従業員数——を抽出している。すべての記事は等価なテキストとして抽出に投入されており、出力には何年も前に退任した経営者が「現職」として頻繁に混入する。正しい修正はどれか。","options_en":{"A":"Attach each article's publication date to every extracted claim and resolve time-sensitive fields using the latest-dated support","B":"Add a system prompt instruction telling the model to prefer the most recent information whenever the sources disagree on a fact","C":"Limit the extraction corpus to articles published within the last twelve months so that outdated facts cannot enter the output","D":"Add a deduplication pass that keeps the first value extracted for each entity and discards any later duplicate values"},"options_ja":{"A":"抽出された各主張に記事の公表日を付与して保持し、時間依存フィールドは最新日付の根拠に基づいて解決する","B":"事実についてソース間の食い違いがあるときは最新の情報を優先せよ、というシステムプロンプト指示を追加する","C":"抽出コーパスを直近12ヶ月以内に公表された記事に限定し、古い事実が出力に入り込めないようにする","D":"エンティティごとに最初に抽出された値を残し、後から来た重複値を破棄する重複排除パスを追加する"},"correct":"A","explanation_ja":{"why_correct":"「現CEO」のような時間依存の事実は、その主張がいつ時点のものかという時間メタデータなしには解決できない。各抽出主張に記事の公表日を付与して保持し、時間依存フィールドは最新日付の根拠で解決すれば、アーカイブ全体の価値を保ったまま古い事実の「現職」混入が構造的に消える。時間的な来歴（temporal provenance)の保持が根本修正だ。「現在の〜」というフィールドは、その意味自体が最新時点の状態を求めるため、公表日と本文から読み取れる as-of 時点による解決が定義上正しい。定義差や記録品質に由来する対立（新しさ≠正しさ）とは問題の種類が異なる。","B":"「最新を優先せよ」という指示は、抽出処理に日付信号が渡っていなければ実行不能だ。モデルは記事本文だけから公表日を確実には知れない。前提となるメタデータの供給が先である。","C":"直近12ヶ月への限定は、古い記事にしか記録されていない不変の事実（創業年・本社移転の経緯など）ごとコーパスを捨てる過剰なフィルタだ。","D":"「最初に抽出された値を残す」重複排除は、処理順という恣意的な順序を正しさの代理にしている。処理が古い記事から始まれば、最古の事実こそが勝ってしまう。"},"explanation_en":{"why_correct":"Time-dependent facts like \"current CEO\" cannot be resolved without temporal metadata saying when each claim was asserted. Attaching the publication date to every extracted claim and resolving time-sensitive fields by latest-dated support structurally eliminates stale facts posing as current — while keeping the full archive's value. Preserving temporal provenance is the root fix. A field like \"current CEO\" demands the latest state by its very semantics, so resolving by publication date — and the as-of time readable from the text — is correct by definition. That differs in kind from conflicts rooted in definitional or data-quality differences, where newer does not mean truer.","B":"A prefer-the-recent instruction is unexecutable when no date signal reaches the extraction: the model cannot reliably infer publication dates from article bodies alone. Supplying the prerequisite metadata comes first.","C":"Restricting to the last twelve months is an over-broad filter that throws away facts recorded only in older articles — founding years, past relocations — along with the staleness.","D":"Keep-the-first deduplication substitutes an arbitrary processing order for correctness; if processing starts from older articles, the stalest fact is exactly the one that wins."},"references":[{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"}],"lesson":"時間依存の事実には公表日メタデータを保持して反映する。等価扱いのコーパスは古い事実を最新として吐く","lesson_en":"Carry publication-date metadata for time-sensitive facts — an undated corpus reports stale facts as current","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D5-005","scenario":"structured-extraction","domain":5,"task_statement":"5.1","question_en":"Extracting obligations from 200-page contracts in a single request, the team notices a pattern: clauses from the opening and closing sections are captured reliably, but clauses from middle sections are frequently missed. The output stays well under the max_tokens limit. What restructuring addresses this?","question_ja":"200ページの契約書を1回のリクエストで抽出して義務条項を取り出しているが、チームはあるパターンに気づいた。冒頭と末尾のセクションの条項は確実に捕捉されるのに、中盤のセクションの条項が頻繁に取りこぼされるのだ。出力は max_tokens の上限には遠く達していない。この問題に対処する再構成はどれか。","options_en":{"A":"Repeat the extraction instructions and the obligation checklist at both the beginning and the end of the prompt","B":"Split the contract into section-level chunks, run the structured extraction per chunk, and merge the chunk results","C":"Increase max_tokens so the model has enough output budget to report the clauses from every part of the contract","D":"Add an instruction directing the model to pay particular attention to the middle sections of the input document"},"options_ja":{"A":"抽出指示と義務条項チェックリストを、プロンプトの冒頭と末尾の両方で繰り返す","B":"契約書をセクション単位のチャンクに分割し、チャンクごとに構造化抽出を実行して結果をマージする","C":"max_tokens を増やし、契約書のあらゆる部分の条項を報告できる出力予算をモデルに与える","D":"入力文書の中盤セクションに特に注意を払うようモデルに指示を追加する"},"correct":"B","explanation_ja":{"why_correct":"端は拾えて中盤が落ちるという形は、長大コンテキストの中間部で想起が落ちる位置依存の劣化（lost-in-the-middle）の典型だ。契約書をセクションという構造単位でチャンク化し、各チャンクに構造化抽出を実行してマージすれば、どの条項も自分のリクエスト内では中間に埋もれない位置で処理される。コンテキスト構造の再設計こそが位置劣化への対処である。","A":"指示の首尾反復は指示遵守を強めるテクニックであり、文書本文の中間部の想起低下には作用しない。落ちているのは指示ではなく中盤の内容だ。","C":"出力が max_tokens に遠く達していないことをシナリオが明示している。出力予算は制約になっておらず、この決め手を見落とした選択肢だ。","D":"「中盤に注意せよ」は位置依存の劣化に対する確率的な緩和で、コンテキストの構造自体を変えない。多少の改善はあっても信頼できる水準には届かない。"},"explanation_en":{"why_correct":"Reliable capture at the edges with frequent misses in the middle is the signature of lost-in-the-middle — position-dependent recall degradation deep inside a long context. Chunking the contract by structural units (sections), extracting per chunk, and merging means no clause sits in the buried middle of its own request. Restructuring the context is the treatment for positional degradation.","A":"Repeating instructions at head and tail strengthens instruction adherence; it does nothing for recall of document content in the middle. What is being lost is the mid-document content, not the instructions.","C":"The scenario states output stays well under max_tokens — output budget is not the constraint. This option misses that deciding detail.","D":"\"Attend to the middle\" is probabilistic mitigation of a positional effect and leaves the context structure unchanged; any improvement falls short of reliable."},"references":[{"title":"Context windows","url":"https://docs.claude.com/en/docs/build-with-claude/context-windows"},{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"}],"lesson":"長文書の中盤取りこぼしは lost-in-the-middle。構造単位でチャンク化→各個抽出→マージで位置劣化を回避する","lesson_en":"Mid-document misses are lost-in-the-middle: chunk by structure, extract per chunk, merge","principle_tags":["position-aware-context","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D2-001","scenario":"structured-extraction","domain":2,"task_statement":"2.2","question_en":"Your MCP extraction tool receives text from an upstream OCR service. When OCR fails and delivers empty text, the tool returns a normal success result with every field set to null. Downstream, these records are read as \"document contains no data\" and the invoices are archived unprocessed. Genuinely blank cover pages also occur in the stream. How should the tool behave when OCR fails?","question_ja":"MCP抽出ツールは上流のOCRサービスからテキストを受け取る。OCRが失敗して空テキストが届いたとき、ツールは全フィールドが null の通常の成功結果を返している。下流ではこれらのレコードが「データのない文書」と読まれ、請求書が未処理のままアーカイブされている。ストリームには本当に白紙のカバーページも混ざる。OCR失敗時、ツールはどう振る舞うべきか。","options_en":{"A":"Add an ocr_succeeded boolean inside the success payload so that downstream consumers can check whether text was available","B":"Have the tool retry the OCR service internally up to three times before it falls back to returning the all-null record","C":"Fail the call with an error result that separates \"OCR unavailable — retry later\" from extraction of a truly blank page","D":"Add a downstream rule that treats records with every field null as failed documents and reroutes them into a retry queue"},"options_ja":{"A":"成功ペイロードの中に ocr_succeeded ブール値を追加し、テキストが得られたかどうかを下流の消費者が確認できるようにする","B":"全null レコードの返却へフォールバックする前に、ツール内部でOCRサービスを最大3回までリトライさせる","C":"「OCR障害・後で再試行」と「本当に白紙のページの抽出成功」を区別できるエラー結果として、呼び出しを失敗させる","D":"全フィールドが null のレコードを失敗文書として扱いリトライキューへ回し直す規則を、下流に追加する"},"correct":"C","explanation_ja":{"why_correct":"OCRの失敗は抽出の失敗であって「データのない文書」ではない。そして失敗と白紙を出力上区別できるのは、失敗を観測したツール自身だけだ。MCP のツール実行エラー（isError: true）として失敗させ、content にアプリ定義の機械可読なエラー情報（例: category: upstream_ocr_failure, retryable: true）を載せれば、呼び出し側はリトライという正しい行動を取れ、白紙ページの全null成功とは別の経路に明確に分かれる。なおカテゴリや retryable は MCP 標準のフィールドではなく、アプリ側で定義する設計慣習である。","A":"成功ペイロード内のフラグは、エラーをエラーチャネルに載せない偽装の変種だ。フラグを知らない消費者は今後も全null成功として誤読し、汎用のエラー処理（リトライ・アラート）も発火しない。","B":"内部リトライは一時的障害への有効な補助だが、リトライ枯渇後になお全null成功へフォールバックするなら、失敗の隠蔽という根本はそのまま残る。","D":"下流での全null検出は層違いの症状対処だ。本物の白紙ページも全nullになるため、下流からは失敗と空文書を区別できない——区別できるのは失敗を知っているツール自身だけである。"},"explanation_en":{"why_correct":"An OCR failure is an extraction failure, not a \"document with no data\" — and the only layer that can tell failure from blankness is the tool that observed the failure. Failing the call as an MCP tool-execution error (isError: true), with an app-defined machine-readable envelope in the content (e.g. category: upstream_ocr_failure, retryable: true), lets the caller retry and cleanly separates this path from the all-null success of a genuinely blank page. Note that category and retryable are app-side design conventions, not MCP-standard fields.","A":"A flag inside the success payload is a variant of the same disguise — the error never reaches the error channel. Consumers unaware of the flag keep misreading all-null successes, and generic error handling (retries, alerts) never fires.","B":"Internal retries are a useful aid for transient faults, but if exhaustion still falls back to all-null success, the root problem — failure concealment — remains fully intact.","D":"Detecting all-null records downstream is a symptom fix at the wrong layer: genuinely blank pages also produce all nulls, so downstream cannot tell failure from emptiness. Only the tool, which observed the failure, can."},"references":[{"title":"MCP Tools","url":"https://modelcontextprotocol.io/docs/concepts/tools"},{"title":"How to implement tool use","url":"https://docs.claude.com/en/docs/agents-and-tools/tool-use/implement-tool-use"}],"lesson":"失敗と空を区別できるのは失敗を観測した層だけ。エラーはその層から、失敗として構造化して発する","lesson_en":"Only the layer that observed a failure can tell 'failed' from 'empty' — emit the structured error from that layer","principle_tags":["structured-errors","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"}]};</script>
<script>
(function(){
'use strict';
/* ---------- データ ---------- */
const QS = EXAM_DATA.questions;
const SCN = EXAM_DATA.scenarios;
const SCN_BY_KEY = {}; SCN.forEach(s => SCN_BY_KEY[s.key] = s);
const DOMAINS = EXAM_DATA.domains || [];
const DOM_BY_ID = {}; DOMAINS.forEach(d => DOM_BY_ID[d.id] = d);
const EX = EXAM_DATA.exam_structure;
const LS_PRACTICE = 'ccaf_practice_v1';
const LS_HISTORY  = 'ccaf_mock_history_v1';
const LS_USERS    = 'ccaf_users_v1';
const LS_CUR_USER = 'ccaf_current_user_v1';
const LS_COMMENTS = 'ccaf_comments_v1';

/* ---------- ユーティリティ ---------- */
const $ = s => document.querySelector(s);
const esc = s => String(s == null ? '' : s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function loadLS(key, fallback){
  try { const v = JSON.parse(localStorage.getItem(key)); return v == null ? fallback : v; }
  catch(e){ return fallback; }
}
function saveLS(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
function pad(n){ return String(n).padStart(2, '0'); }
function fmtDateTime(iso){
  const d = new Date(iso);
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate())
       + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function fmtDur(sec){
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + '分' + pad(s) + '秒';
}
function downloadJSON(obj, filename){
  const blob = new Blob([JSON.stringify(obj, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
/* ---------- 学習者プロファイル ----------
   練習の正解履歴は学習者ごとに別キーで保存（未設定は従来キー＝後方互換）。
   本番モードの結果には user フィールドが記録される。 */
function currentUser(){ return loadLS(LS_CUR_USER, ''); }
function userList(){ return loadLS(LS_USERS, []); }
function userLabel(u){ return u ? u : '（名前未設定）'; }
function fileSlug(u){ return u ? '-' + u.replace(/[^\w぀-ヿ゠-ヿ一-鿿-]+/g, '_') : ''; }
function practiceKey(){ const u = currentUser(); return u ? LS_PRACTICE + '::' + u : LS_PRACTICE; }
function renderUserSelect(){
  const sel = $('#user-select');
  const cur = currentUser();
  const users = userList();
  let h = '<option value="">（名前未設定）</option>';
  users.forEach(u => { h += '<option value="' + esc(u) + '">' + esc(u) + '</option>'; });
  h += '<option value="__add__">＋ 学習者を追加…</option>';
  sel.innerHTML = h;
  sel.value = users.includes(cur) ? cur : '';
}
(function initUserSelect(){
  renderUserSelect();
  $('#user-select').addEventListener('change', () => {
    const sel = $('#user-select');
    if (sel.value === '__add__'){
      const name = (prompt('学習者名を入力してください（例: 山田太郎 / Taro）') || '').trim();
      if (name && name !== '__add__'){
        const users = userList();
        if (!users.includes(name)){ users.push(name); saveLS(LS_USERS, users); }
        saveLS(LS_CUR_USER, name);
      }
    } else {
      saveLS(LS_CUR_USER, sel.value);
    }
    renderUserSelect();
    applyPracticeFilter();
    if (!$('#tab-history').hidden) renderHistory();
  });
})();
/* ---------- コメント（フィードバック） ----------
   問題への疑問・指摘をローカルに保存し、履歴タブからJSONで書き出して開発者へ送る */
function commentsAll(){ return loadLS(LS_COMMENTS, []); }
function commentFormHTML(qid){
  const n = commentsAll().filter(c => c.id === qid).length;
  return '<div class="exp-block fb-block" data-qid="' + esc(qid) + '"><details>'
    + '<summary>💬 この問題にコメント・質問を残す / Leave a comment' + (n ? '（保存済み ' + n + ' 件）' : '') + '</summary>'
    + '<textarea class="fb-text" rows="3" placeholder="内容の誤りの指摘・質問・疑問など。履歴タブの「コメント」からJSONで書き出して開発者に送れます / Report an issue or ask a question about this item"></textarea>'
    + '<div style="margin-top:6px"><button class="fb-save small">コメントを保存 / Save</button></div>'
    + '</details></div>';
}
document.addEventListener('click', e => {
  const btn = e.target.closest('.fb-save');
  if (!btn) return;
  const block = btn.closest('.fb-block');
  const ta = block.querySelector('.fb-text');
  const text = (ta.value || '').trim();
  if (!text) return;
  const all = commentsAll();
  all.push({ id: block.dataset.qid, user: currentUser() || null, at: new Date().toISOString(), text: text });
  saveLS(LS_COMMENTS, all);
  ta.value = '';
  btn.textContent = '保存しました ✓ / Saved';
  setTimeout(() => { btn.textContent = 'コメントを保存 / Save'; }, 1600);
});
function feedbackSectionHTML(){
  const cms = commentsAll();
  let h = '<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin:22px 0 8px">'
    + '<h3>💬 コメント（フィードバック）' + (cms.length ? '（' + cms.length + ' 件）' : '') + '</h3>'
    + '<span class="spacer" style="flex:1"></span>'
    + (cms.length ? '<button class="small" id="fb-export">JSONエクスポート</button>'
      + '<button class="btn-danger small" id="fb-clear">消去</button>' : '')
    + '</div>';
  if (!cms.length){
    h += '<p class="small muted">まだコメントはありません。練習の解説や模試の全問レビューから、問題への疑問・指摘を残せます。</p>';
    return h;
  }
  h += '<p class="small muted" style="margin-bottom:6px">「JSONエクスポート」でファイルに書き出し、開発者（江尻）へ送ってください。</p>';
  cms.slice().reverse().forEach(c => {
    h += '<div class="hist-row" style="align-items:flex-start">'
      + '<span class="when">' + fmtDateTime(c.at) + '</span>'
      + '<span class="chip user">👤 ' + esc(userLabel(c.user)) + '</span>'
      + '<span class="chip">' + esc(c.id) + '</span>'
      + '<span class="small" style="flex:1 1 100%; white-space:pre-wrap">' + esc(c.text) + '</span>'
      + '</div>';
  });
  return h;
}
function bindFeedbackSection(){
  const ex = $('#fb-export'), cl = $('#fb-clear');
  if (ex) ex.addEventListener('click', () => {
    downloadJSON({ schema: 'ccaf-feedback-v1', exportedAt: new Date().toISOString(), comments: commentsAll() },
      'ccaf-feedback-' + new Date().toISOString().replace(/[:T]/g, '-').slice(0, 16) + '.json');
  });
  if (cl) cl.addEventListener('click', () => {
    if (confirm('保存済みコメントをすべて消去します（エクスポート済みか確認してください）。よろしいですか？')){
      localStorage.removeItem(LS_COMMENTS);
      renderHistory();
    }
  });
}
function scenarioName(key, lang){
  const s = SCN_BY_KEY[key];
  if (!s) return key;
  return lang === 'en' ? s.name_en : s.name_ja;
}
function domainLabel(q){
  const d = DOM_BY_ID[q.domain];
  return 'D' + q.domain + (d ? '：' + d.name_ja : '');
}
function taskTitle(q){
  const d = DOM_BY_ID[q.domain];
  if (!d || !d.task_statements) return '';
  const t = d.task_statements.find(t => t.id === q.task_statement);
  return t ? t.title : '';
}
function qMetaChipsHTML(q){
  let h = '<div class="chips">';
  h += '<span class="chip">' + esc(q.id) + '</span>';
  h += '<span class="chip">' + esc(scenarioName(q.scenario, 'ja')) + '</span>';
  h += '<span class="chip dom">D' + q.domain + ' / ' + esc(q.task_statement) + '</span>';
  if (q.difficulty) h += '<span class="chip">' + esc(q.difficulty) + '</span>';
  if (q.status === 'draft') h += '<span class="chip draft">draft</span>';
  h += '</div>';
  return h;
}
function qTextHTML(q, lang){
  let h = '';
  if (lang === 'en' || lang === 'both') h += '<p class="qtext en">' + esc(q.question_en) + '</p>';
  if (lang === 'ja' || lang === 'both') h += '<p class="qtext ja">' + esc(q.question_ja) + '</p>';
  return h;
}
function optBodyHTML(q, key, lang){
  if (lang === 'en')  return '<span class="en">' + esc(q.options_en[key]) + '</span>';
  if (lang === 'ja')  return '<span>' + esc(q.options_ja[key]) + '</span>';
  return '<span class="en">' + esc(q.options_en[key]) + '</span><span class="ja">' + esc(q.options_ja[key]) + '</span>';
}
/* 言語別ラベル（見出し・定型文） */
function tLabel(lang, ja, en){
  if (lang === 'en') return en;
  if (lang === 'ja') return ja;
  return ja + ' / ' + en;
}
/* 解説本文（why_correct / 誤答レター）。EN欠落時はJAへフォールバック */
function expText(q, key, lang){
  const ja = (q.explanation_ja && q.explanation_ja[key]) || '';
  const en = (q.explanation_en && q.explanation_en[key]) || ja;
  if (lang === 'en') return esc(en);
  if (lang === 'ja') return esc(ja);
  return '<span class="en">' + esc(en) + '</span><br><span class="ja">' + esc(ja) + '</span>';
}
function lessonText(q, lang){
  const en = q.lesson_en || q.lesson;
  if (lang === 'en') return esc(en);
  if (lang === 'ja') return esc(q.lesson);
  return '<span class="en">' + esc(en) + '</span><br><span class="ja">' + esc(q.lesson) + '</span>';
}
function explanationHTML(q, chosen, lang){
  const ok = chosen === q.correct;
  let h = '<div class="card">';
  h += '<div class="verdict ' + (ok ? 'ok' : 'ng') + '">'

const practice = { pool: [], idx: 0, chosen: null, lang: 'ja' };

function practiceHist(){ return loadLS(practiceKey(), {}); }

function baseFilteredPool(){
  const sc = $('#pf-scenario').value, dm = $('#pf-domain').value;
  return QS.filter(q =>
    (sc === 'all' || q.scenario === sc) &&
    (dm === 'all' || String(q.domain) === dm));
}
function applyPracticeFilter(){
  const hist = practiceHist();
  let pool = baseFilteredPool();
  if ($('#pf-unsolved').checked){
    pool = pool.filter(q => !(hist[q.id] && hist[q.id].correct > 0));
  }
  practice.pool = shuffle(pool);
  practice.idx = 0;
  practice.chosen = null;
  renderPractice();
}
function renderPracticeProgress(){
  const hist = practiceHist();
  const base = baseFilteredPool();
  const solved = base.filter(q => hist[q.id] && hist[q.id].correct > 0).length;
  $('#pf-progress').innerHTML = 'このフィルタで <b>' + solved + ' / ' + base.length
    + '</b> 問 正解済み' + (practice.pool.length
      ? '　（出題中: ' + (practice.idx + 1) + ' / ' + practice.pool.length + ' 問目）'
      : '');
}
function renderPractice(){
  renderPracticeProgress();
  const box = $('#pf-question');
  if (!practice.pool.length){
    box.innerHTML = '<div class="card empty">条件に合う問題がありません。フィルタを変更してください。</div>';
    return;
  }
  const q = practice.pool[practice.idx];
  const lang = practice.lang;
  const chosen = practice.chosen;
  let h = '<div class="card">';
  h += qMetaChipsHTML(q);
  h += qTextHTML(q, lang);
  h += '<div class="options">';
  ['A','B','C','D'].forEach(k => {
    let cls = 'opt';
    if (chosen){
      if (k === q.correct) cls += ' correct';
      else if (k === chosen) cls += ' wrong-chosen';
    }
    h += '<button class="' + cls + '" data-key="' + k + '"' + (chosen ? ' disabled' : '') + '>'
       + '<span class="key">' + k + '</span><span class="body">' + optBodyHTML(q, k, lang) + '</span></button>';
  });
  h += '</div></div>';
  if (chosen) h += explanationHTML(q, chosen, lang);
  h += '<div class="qactions">'
     + (chosen ? '<button class="btn-primary" id="pf-next">次の問題 →</button>'
               : '<button id="pf-skip">スキップ →</button>')
     + '</div>';
  box.innerHTML = h;

  if (!chosen){
    box.querySelectorAll('.opt').forEach(btn => {
      btn.addEventListener('click', () => answerPractice(q, btn.dataset.key));
    });
    $('#pf-skip').addEventListener('click', nextPractice);
  } else {
    $('#pf-next').addEventListener('click', nextPractice);
  }
}
function answerPractice(q, key){
  practice.chosen = key;
  const hist = practiceHist();
  const rec = hist[q.id] || { attempts: 0, correct: 0, lastAnswer: null, lastAt: null };
  rec.attempts += 1;
  if (key === q.correct) rec.correct += 1;
  rec.lastAnswer = key;
  rec.lastAt = new Date().toISOString();
  hist[q.id] = rec;
  saveLS(practiceKey(), hist);
  renderPractice();
}
function nextPractice(){
  practice.chosen = null;
  if (!practice.pool.length){ renderPractice(); return; }
  if ($('#pf-unsolved').checked){
    // 現在の次の問題から始まる順序に回転し、正解済みをプールから外す
    const hist = practiceHist();
    const solved = q => hist[q.id] && hist[q.id].correct > 0;
    const rotated = practice.pool.slice(practice.idx + 1)
      .concat(practice.pool.slice(0, practice.idx + 1));
    practice.pool = rotated.filter(q => !solved(q));
    practice.idx = 0;
  } else {
    practice.idx = (practice.idx + 1) % practice.pool.length;
  }
  renderPractice();
}

let mock = null;          // 進行中セッション
let mockTimerId = null;
let lastResult = null;    // 結果画面表示中のデータ
const review = { lang: 'ja' };

function mockCapacity(){
  const byScn = {};
  QS.forEach(q => { (byScn[q.scenario] = byScn[q.scenario] || []).push(q); });
  const counts = Object.values(byScn)
    .map(a => Math.min(a.length, EX.questions_per_scenario))
    .sort((a,b) => b - a)
    .slice(0, EX.scenarios_drawn);
  return {
    scenarioCount: Math.min(Object.keys(byScn).length, EX.scenarios_drawn),
    total: counts.reduce((a,b) => a + b, 0)
  };
}
function renderMockStart(){
  $('#mk-start').hidden = false; $('#mk-exam').hidden = true; $('#mk-result').hidden = true;
  const cap = mockCapacity();
  const short = (cap.total < EX.questions_total) || (cap.scenarioCount < EX.scenarios_drawn);
  let h = '<div class="card">';
  h += '<h2 style="margin-bottom:10px">本番モード（模擬試験）</h2>';
  h += '<p class="muted">本番の CCA-F 形式に合わせた模試です。</p>';
  h += '<ul class="muted" style="margin:10px 0 10px 22px">'
     + '<li>' + SCN.length + ' シナリオから <b>' + EX.scenarios_drawn + ' つをランダム抽出</b> × 各最大 <b>'
     + EX.questions_per_scenario + ' 問</b>（計 ' + EX.questions_total + ' 問想定）</li>'
     + '<li>制限時間 <b>' + EX.time_limit_minutes + ' 分</b>（下で変更可）</li>'
     + '<li>試験中は本番同様 <b>英語表示のみ</b>。フラグ・見直し・選び直しが可能</li>'
     + '<li>合格ラインの目安: スケールドスコア <b>' + EX.passing_scaled_score + '</b></li>'
     + '</ul>';
  if (short){
    h += '<div class="notice">⚠ 現在の問題バンク（' + QS.length + ' 問・' + cap.scenarioCount
       + ' シナリオ）では最大 <b>' + cap.total + ' 問</b>での模試になります（本番は '
       + EX.questions_total + ' 問・' + EX.scenarios_drawn + ' シナリオ）。</div>';
  }
  h += '<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-top:14px">'
     + '<label class="muted">制限時間 <input type="number" id="mk-limit" value="' + EX.time_limit_minutes
     + '" min="1" max="600" style="width:80px"> 分</label>'
     + '<button class="btn-primary" id="mk-begin">試験を開始する</button>'
     + '</div>';
  h += '</div>';
  $('#mk-start').innerHTML = h;
  $('#mk-begin').addEventListener('click', startMock);
}
function startMock(){
  const limit = Math.max(1, parseInt($('#mk-limit').value, 10) || EX.time_limit_minutes);
  const byScn = {};
  QS.forEach(q => { (byScn[q.scenario] = byScn[q.scenario] || []).push(q); });
  const keys = shuffle(Object.keys(byScn)).slice(0, EX.scenarios_drawn);
  const questions = [];
  const scenarios = [];
  keys.forEach(k => {
    const picked = shuffle(byScn[k]).slice(0, EX.questions_per_scenario);
    scenarios.push({ key: k, count: picked.length });
    questions.push(...picked);
  });
  mock = {
    questions, scenarios,
    answers: {}, flags: {},
    cur: 0,
    startedAt: new Date().toISOString(),
    timeLimitMin: limit,
    deadline: Date.now() + limit * 60000
  };
  $('#mk-start').hidden = true; $('#mk-result').hidden = true; $('#mk-exam').hidden = false;
  renderMockExamShell();
  renderMockQuestion();
  clearInterval(mockTimerId);
  mockTimerId = setInterval(tickMock, 1000);
  tickMock();
}
function renderMockExamShell(){
  $('#mk-exam').innerHTML =
    '<div class="exam-top">'
    + '<div class="timer" id="mk-timer">--:--</div>'
    + '<div class="muted small">残り時間</div>'
    + '<div class="spacer"></div>'
    + '<button class="btn-danger" id="mk-finish">試験を終了する</button>'
    + '</div>'
    + '<div class="exam-layout">'
    + '<aside class="qnav"><div class="grid" id="mk-grid"></div>'
    +   '<div class="legend">'
    +   '<span><i style="background:rgba(90,169,255,.5)"></i>回答済み</span>'
    +   '<span><i style="background:rgba(247,168,61,.6)"></i>フラグ</span>'
    +   '<span><i style="background:#232b38"></i>未回答</span>'
    +   '</div></aside>'
    + '<div id="mk-qarea"></div>'
    + '</div>';
  $('#mk-finish').addEventListener('click', () => finishMock(false));
}
function tickMock(){
  if (!mock) return;
  const remain = Math.max(0, mock.deadline - Date.now());
  const sec = Math.ceil(remain / 1000);
  const m = Math.floor(sec / 60), s = sec % 60;
  const t = $('#mk-timer');
  if (t){
    t.textContent = pad(m) + ':' + pad(s);
    t.classList.toggle('low', remain < 10 * 60000);
  }
  if (remain <= 0) finishMock(true);
}
function renderMockGrid(){
  const grid = $('#mk-grid');
  grid.innerHTML = mock.questions.map((q, i) => {
    let cls = 'cell';
    if (mock.answers[q.id]) cls += ' answered';
    if (mock.flags[q.id]) cls += ' flagged';
    if (i === mock.cur) cls += ' current';
    return '<button class="' + cls + '" data-i="' + i + '">' + (i + 1) + '</button>';
  }).join('');
  grid.querySelectorAll('.cell').forEach(c => {
    c.addEventListener('click', () => { mock.cur = +c.dataset.i; renderMockQuestion(); });
  });
}
function renderMockQuestion(){
  renderMockGrid();
  const i = mock.cur, q = mock.questions[i];
  const scn = SCN_BY_KEY[q.scenario];
  const chosen = mock.answers[q.id] || null;
  let h = '<div class="card">';
  h += '<div class="chips"><span class="chip">Question ' + (i + 1) + ' / ' + mock.questions.length + '</span>'
     + '<span class="chip">' + esc(scn ? scn.name_en : q.scenario) + '</span></div>';
  if (scn && scn.context_en){
    h += '<details class="scenario-ctx"><summary>Scenario context</summary><p>'
       + esc(scn.context_en) + '</p></details>';
  }
  h += '<p class="qtext en">' + esc(q.question_en) + '</p>';
  h += '<div class="options">';
  ['A','B','C','D'].forEach(k => {
    const cls = 'opt' + (chosen === k ? ' selected' : '');
    h += '<button class="' + cls + '" data-key="' + k + '">'
       + '<span class="key">' + k + '</span><span class="body"><span class="en">'
       + esc(q.options_en[k]) + '</span></span></button>';
  });
  h += '</div></div>';
  h += '<div class="qactions" style="justify-content:space-between">'
     + '<button id="mk-flag" class="btn-flag' + (mock.flags[q.id] ? ' on' : '') + '">'
     + (mock.flags[q.id] ? '⚑ フラグ解除' : '⚐ フラグを付ける') + '</button>'
     + '<span>'
     + '<button id="mk-prev"' + (i === 0 ? ' disabled' : '') + '>← 前へ</button> '
     + '<button id="mk-next" class="btn-primary"' + (i === mock.questions.length - 1 ? ' disabled' : '') + '>次へ →</button>'
     + '</span></div>';
  $('#mk-qarea').innerHTML = h;

  $('#mk-qarea').querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => {
      mock.answers[q.id] = btn.dataset.key;   // 選び直し可能
      renderMockQuestion();
    });
  });
  $('#mk-flag').addEventListener('click', () => {
    mock.flags[q.id] = !mock.flags[q.id];
    renderMockQuestion();
  });
  $('#mk-prev').addEventListener('click', () => { if (mock.cur > 0){ mock.cur--; renderMockQuestion(); } });
  $('#mk-next').addEventListener('click', () => { if (mock.cur < mock.questions.length - 1){ mock.cur++; renderMockQuestion(); } });
}
function finishMock(auto){
  if (!mock) return;
  const unanswered = mock.questions.filter(q => !mock.answers[q.id]).length;
  if (!auto && unanswered > 0){
    if (!confirm('未回答が ' + unanswered + ' 問あります。終了して採点しますか？')) return;
  }
  clearInterval(mockTimerId); mockTimerId = null;
  const finishedAt = new Date().toISOString();
  const durationSec = Math.min(
    mock.timeLimitMin * 60,
    Math.round((Date.parse(finishedAt) - Date.parse(mock.startedAt)) / 1000));
  const answers = mock.questions.map(q => ({
    id: q.id,
    chosen: mock.answers[q.id] || null,
    correct: q.correct,
    flagged: !!mock.flags[q.id]
  }));
  const rawScore = answers.filter(a => a.chosen === a.correct).length;
  const total = answers.length;
  const scaledEstimate = Math.round(100 + (rawScore / total) * 900);
  const result = {
    schema: 'ccaf-result-v1',
    mode: 'mock',
    user: currentUser() || null,
    startedAt: mock.startedAt,
    finishedAt, durationSec,
    timeLimitMin: mock.timeLimitMin,
    scenarios: mock.scenarios.map(s => s.key),
    answers, rawScore, total, scaledEstimate
  };
  const hist = loadLS(LS_HISTORY, []);
  hist.push(result);
  saveLS(LS_HISTORY, hist);
  lastResult = { result, questions: mock.questions.slice() };
  mock = null;
  renderMockResult();
}

    if (!ok && a.chosen && q.explanation_ja[a.chosen]){
      h += '<div class="exp-block"><h4>' + tLabel(lang, 'あなたが選んだ ' + esc(a.chosen) + ' の誤答理由', 'Why your choice ' + esc(a.chosen) + ' is wrong') + '</h4>'
        + '<div class="exp-wrong mine"><span class="k">' + esc(a.chosen) + '</span>　'
        + expText(q, a.chosen, lang) + '</div></div>';
    }
    if (!a.chosen){
      h += '<p class="small muted">' + tLabel(lang, '（この問題は未回答でした）', '(This question was left unanswered)') + '</p>';
    }
    h += '<div class="exp-block"><div class="lesson">' + lessonText(q, lang) + '</div></div>';
    h += commentFormHTML(q.id);
    h += '</div>';
  });
  $('#rv-list').innerHTML = h;
}
renderMockStart();

/* ==================================================================
   履歴タブ
================================================================== */
function renderHistory(){
  const hist = loadLS(LS_HISTORY, []);
  const box = $('#hist-box');
  if (!hist.length){
    box.innerHTML = '<div class="empty">本番モードの履歴はまだありません。<br>「本番モード」タブから模試を受けると、ここに結果が記録されます。</div>'
      + feedbackSectionHTML();
    bindFeedbackSection();
    return;
  }
  let h = '<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:8px">'
    + '<h3>本番モード履歴（' + hist.length + ' 回）</h3>'
    + '<span class="spacer" style="flex:1"></span>'
    + '<button class="btn-danger small" id="hist-clear">履歴を消去</button></div>';
  h += '<p class="small muted" style="margin-bottom:6px">バーは換算スコア（0〜1000、緑=720以上）の推移です。</p>';
  hist.slice().reverse().forEach((r, revIdx) => {
    const idx = hist.length - 1 - revIdx;
    const pass = r.scaledEstimate >= EX.passing_scaled_score;
    h += '<div class="hist-row">'
      + '<span class="when">' + fmtDateTime(r.finishedAt) + '</span>'
      + '<span class="chip user">👤 ' + esc(userLabel(r.user)) + '</span>'
      + '<span class="score"><b>' + r.scaledEstimate + '</b> <span class="muted small">('
      + r.rawScore + '/' + r.total + ')</span></span>'
      + '<span class="muted small" style="flex:0 0 90px">' + fmtDur(r.durationSec) + '</span>'
      + '<span class="bar ' + (pass ? 'ok' : 'ng') + '"><i style="width:'
      + Math.round(r.scaledEstimate / 1000 * 100) + '%"></i></span>'
      + '<button class="small" data-dl="' + idx + '">JSON</button>'
      + '</div>';
  });
  h += feedbackSectionHTML();
  box.innerHTML = h;
  bindFeedbackSection();
  box.querySelectorAll('[data-dl]').forEach(btn => {
    btn.addEventListener('click', () => {
      const r = hist[+btn.dataset.dl];
      downloadJSON(r, 'ccaf-result' + fileSlug(r.user) + '-' + r.finishedAt.replace(/[:T]/g, '-').slice(0, 16) + '.json');
    });
  });
  $('#hist-clear').addEventListener('click', () => {
    if (confirm('本番モードの履歴をすべて消去します。よろしいですか？')){
      localStorage.removeItem(LS_HISTORY);
      renderHistory();
    }
  });
}
})();
</script>
