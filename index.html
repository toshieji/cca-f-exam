 の起動コマンドの --allowedTools で列挙して事前承認する"},"correct":"D","explanation_ja":{"why_correct":"決め手は「無人環境で、必要なツールは特定できている」こと。--allowedTools は列挙したツールだけを事前承認し、未許可のツールは自動実行では使えないままにする。中断の原因（誰も承認できないツール要求）を、権限を必要最小限に保ったまま解消する——最小権限と自動化を両立させる解だ。","A":"失敗しなくはなるが、すべてのツールと操作を無条件に許すのは CI の自動実行には過剰な権限付与だ。必要なのはレビューが使う数個のツールの事前承認だけである。","B":"プロンプトの指示は確率的で、ツール使用の抑止を保証しない。しかもレビューに必要なツールまで使わせない方向の回避で、仕事そのものが成立しなくなりうる。","C":"対話セッションでの承認状態は .claude/settings.local.json（コミットされないプロジェクトローカル設定）に保存されるもので、CI ランナーへ移送して流用する設計になっていない。ランナー環境が再作成されるたびに壊れる脆い運用だ。"},"explanation_en":{"why_correct":"The deciding details: an unattended environment, and the needed tools are known. --allowedTools pre-approves exactly the listed tools while leaving everything else unavailable to the automated run. It removes the cause of the abort — a permission request nothing can approve — while keeping permissions at the minimum the job needs: least privilege and automation reconciled.","A":"The failures stop, but unconditionally allowing every tool and operation is far more permission than an unattended CI run should hold. All the job needs is pre-approval of the few tools the review uses.","B":"Prompt instructions are probabilistic and cannot guarantee tool avoidance — and steering away from needed tools may make the job itself impossible.","C":"Interactive approval state is saved in .claude/settings.local.json — local, uncommitted configuration that is not designed to be transplanted onto a CI runner, and it breaks every time the runner environment is recreated."},"references":[{"title":"Claude Code: CLI reference","url":"https://code.claude.com/docs/en/cli-reference"},{"title":"Claude Code: GitHub Actions","url":"https://code.claude.com/docs/en/github-actions"}],"lesson":"ヘッドレス実行のツール承認は --allowedTools で必要最小限を事前付与する。全開放は過剰、プロンプト抑止は保証なし","lesson_en":"Pre-approve the minimal tool set with --allowedTools for headless runs — not blanket bypass, not prompt-based avoidance","principle_tags":["least-privilege"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D3-004","scenario":"claude-code-ci","domain":3,"task_statement":"3.6","question_en":"The AI code review takes about six minutes per run. After it was made a required blocking status check on every push to every pull request, developers' small iterative pushes started queueing behind reviews and frustration boiled over. How should the pipeline be redesigned without weakening review quality?","question_ja":"AI コードレビューには1回およそ6分かかる。これを全 PR への push ごとの必須（blocking）ステータスチェックにしたところ、開発者の細かい反復 push がレビュー待ちの行列を作り、不満が噴出した。レビューの品質を弱めずにパイプラインをどう再設計すべきか。","options_en":{"A":"Shrink the review prompt and its scope until the blocking check completes in under a minute per push","B":"Post reviews as non-blocking advisory PR comments during development; keep a blocking gate only at merge","C":"Make the review opt-in, running only when a developer manually adds a review-requested label to the PR","D":"Move the review to a nightly job that examines everything merged that day and files follow-up issues"},"options_ja":{"A":"レビューのプロンプトと対象範囲を削り、blocking チェックが毎 push 1分以内に完了するようにする","B":"開発中は非ブロッキングの助言コメントとして PR に投稿し、blocking ゲートはマージ時点にのみ置く","C":"レビューをオプトインにし、開発者が手動でレビュー依頼ラベルを付けた PR に対してのみ実行する","D":"レビューを夜間ジョブへ移し、その日にマージされたものを一括レビューして後追いの Issue を起票する"},"correct":"B","explanation_ja":{"why_correct":"決め手は摩擦の発生箇所——開発中の push ごとに6分間ブロックしていること。開発イテレーション中は advisory（非ブロッキング）の PR コメントとして知見を流し続け、品質保証が本当に必要な境界であるマージにだけ blocking ゲートを置けば、待ち行列は消えゲートの保証は残る。blocking と non-blocking はチェックの目的に応じて使い分けるものだ。","A":"範囲を削れば速くはなるが、レビューの検出力を犠牲にする方向の妥協で、「品質を弱めない」という要件に反する。","C":"ゲートが任意化し、レビューされないままマージされる経路が生まれる。保証が要る場面から blocking を外してしまっている。","D":"マージ後の後追いレビューでは、問題がメインラインに入ってから見つかる。pre-merge の保証を丸ごと手放す後退だ。"},"explanation_en":{"why_correct":"The deciding detail is where the friction occurs: blocking six minutes on every push during development. Stream findings as advisory (non-blocking) PR comments while developers iterate, and place the blocking gate only at the boundary that truly needs the guarantee — merge. Queueing disappears; the gate's guarantee remains. Blocking vs non-blocking is chosen per check purpose.","A":"Cutting scope buys speed by sacrificing detection power — it violates the requirement not to weaken review quality.","C":"The gate becomes optional, creating a path where unreviewed code merges. It removes blocking exactly where the guarantee is needed.","D":"Post-merge review finds problems only after they land on the mainline. It surrenders the pre-merge guarantee entirely."},"references":[{"title":"Claude Code: GitHub Actions","url":"https://code.claude.com/docs/en/github-actions"},{"title":"Claude Code Best Practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"開発ループには advisory（非ブロッキング）、保証が要るマージ境界にだけ blocking ゲートを置く","lesson_en":"Advisory feedback while developers iterate; a blocking gate only at the merge boundary that needs the guarantee","principle_tags":["right-tool-for-latency"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D3-005","scenario":"claude-code-ci","domain":3,"task_statement":"3.2","question_en":"A /generate-tests slash command is needed both in CI and on every developer's machine. Today each developer keeps a personal version in their own user scope (~/.claude/commands/), the copies have drifted apart, and the CI runner has no copy at all. What is the correct placement?","question_ja":"テスト生成用の /generate-tests スラッシュコマンドを CI と全開発者のマシンの両方で使いたい。現状は各開発者が自分のユーザースコープ（~/.claude/commands/）に個人のバージョンを持っており、内容は互いにずれ、CI ランナーにはそもそも存在しない。正しい配置はどれか。","options_en":{"A":"Add a CI setup step that downloads the latest command file from a shared drive into the runner's user scope","B":"Publish the canonical prompt on the team wiki and have each developer paste updates into their own copy","C":"Commit the command to the repository's .claude/commands/ so CI and every developer share one versioned copy","D":"Inline the full generation prompt into the workflow YAML so the pipeline no longer depends on the command"},"options_ja":{"A":"CI のセットアップステップで、共有ドライブから最新のコマンド定義をランナーのユーザースコープへ配置する","B":"正本のプロンプトをチーム Wiki に置き、更新のたびに各開発者が自分のコピーへ貼り付ける運用にする","C":"コマンド定義をリポジトリの .claude/commands/ にコミットし、CI と全開発者が同一のバージョン管理された定義を共有する","D":"生成プロンプト全文をワークフロー YAML に埋め込み、パイプラインがコマンド定義に依存しないようにする"},"correct":"C","explanation_ja":{"why_correct":"決め手は「CI とチーム全員が同じ定義を使う必要がある」こと。プロジェクトスコープ（リポジトリ内の .claude/commands/）に置けば、チェックアウトした全環境——CI ランナーも各開発者も——が同一の定義を自動的に手にし、変更はコードレビューと Git 履歴で管理される。個人の好みはユーザースコープ、チームで共有するものはプロジェクトスコープ、というスコープ設計の原則どおりだ。","A":"リポジトリ外の配布経路をもう1本作る症状対処。正本が版管理の外にあるというドリフトの根本原因が残り、開発者ローカル側のばらつきも直らない。","B":"手動同期は必ずずれる。一貫性を人間の運用ルールで「推奨」しているだけで、保証がない。","D":"CI は直るが定義が二重化し、今度は YAML と各ローカルコピーの間でドリフトが始まる。開発者側の問題は何も解決しない。"},"explanation_en":{"why_correct":"The deciding detail: CI and the whole team must use the same definition. In project scope (.claude/commands/ inside the repository), every environment that checks out the repo — CI runners and developers alike — automatically gets the identical definition, and changes flow through code review and Git history. This is the scoping principle: personal preferences in user scope, shared team assets in project scope.","A":"A symptom patch that adds another out-of-repo distribution channel. The root cause of drift — the canonical copy living outside version control — remains, as does the local divergence.","B":"Manual synchronization inevitably drifts. It merely recommends consistency via human process, guaranteeing nothing.","D":"Fixes CI but duplicates the definition, so drift restarts between the YAML and each local copy. The developer-side problem is untouched."},"references":[{"title":"Claude Code: Slash commands","url":"https://code.claude.com/docs/en/slash-commands"},{"title":"Claude Code Best Practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"CI とチームで共有する定義はプロジェクトスコープ（リポジトリ内 .claude/）に置き、バージョン管理に載せる","lesson_en":"Anything CI and the team share belongs in project scope — versioned inside the repo's .claude/","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D4-001","scenario":"claude-code-ci","domain":4,"task_statement":"4.1","question_en":"The review bot leaves 20-30 comments per pull request, most of them naming preferences and minor style opinions. Developers have started skimming past all bot comments — including the occasional genuine defect buried among them. What is the most effective fix?","question_ja":"PR レビューボットが1つの PR に20〜30件のコメントを付け、その大半が命名の好みや些末なスタイル論点だ。開発者はボットのコメントを一律に読み飛ばすようになり、まれに混ざる本物の欠陥指摘まで一緒に無視され始めた。最も効果的な修正はどれか。","options_en":{"A":"Cap the bot at five comments per pull request so developers only ever face a short list of findings","B":"Append a prompt line asking the reviewer to focus on important problems and avoid minor nitpicks","C":"Lower the sampling temperature so the reviewer stops surfacing borderline stylistic observations","D":"Give the prompt explicit criteria: severity definitions and a scope limited to correctness and security"},"options_ja":{"A":"PR あたりのコメント数を5件までに制限し、開発者が常に短いリストだけを見るようにする","B":"重要な問題に集中し細かい指摘を避けるように、という一文をプロンプトに追記する","C":"サンプリング温度を下げ、際どいスタイル上の観察が表面化しないようにする","D":"明示的なレビュー基準をプロンプトに定義する。深刻度の定義と、correctness と security に限定した対象範囲を含める"},"correct":"D","explanation_ja":{"why_correct":"偽陽性の洪水の根本原因は、何を報告すべきかの基準がモデルに与えられていないことだ。①レビューする次元を correctness / security に明示的に限定し、②深刻度の定義を与え、③報告に値する条件を基準として書く。精度を上げ偽陽性を減らす第一手は、プロンプトへの明示的基準・深刻度定義・スコープ限定の記述である。","A":"件数の上限は基準ではない。何を残すかの定義がないままでは、その5件が些末な指摘で埋まることを止められない。","B":"「重要」「細かい」の定義がなく、判断基準をモデルの解釈に委ねたままの曖昧な訓示で、挙動はほとんど変わらない。基準は具体的に書いて初めて機能する。","C":"温度はサンプリングのランダム性に影響するだけで、何を報告すべきかという基準の欠如は直らない。低温でも同じ種類の指摘は出続ける。"},"explanation_en":{"why_correct":"The flood of false positives has one root cause: the model was never given criteria for what deserves reporting. (1) Explicitly restrict the reviewed dimensions to correctness and security, (2) supply severity definitions, (3) state the conditions a finding must meet. Explicit criteria, severity definitions, and scope restriction in the prompt are the first-line tools for raising precision.","A":"A count cap is not a criterion. Without a definition of what to keep, nothing stops those five comments from being trivia.","B":"\"Important\" and \"minor\" remain undefined, leaving the judgment to the model's interpretation. Vague exhortations barely change behavior; criteria work only when written concretely.","C":"Temperature affects sampling randomness, not the missing definition of what to report. The same class of findings keeps appearing at low temperature."},"references":[{"title":"Prompt engineering overview","url":"https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/overview"},{"title":"Claude Code Best Practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"偽陽性の多さは基準の不在。明示的基準＋深刻度定義＋スコープ限定をプロンプトに書くのが第一手","lesson_en":"Excess false positives signal missing criteria: write explicit criteria, severity definitions, and scope into the prompt","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D4-002","scenario":"claude-code-ci","domain":4,"task_statement":"4.1","question_en":"Many of the review bot's findings read like \"this section could be improved\" or \"consider revisiting this logic.\" Developers cannot tell which file, what the problem is, or what change would resolve it. What is the most effective change to make findings actionable?","question_ja":"レビューボットの指摘の多くが「この部分は改善の余地がある」「このロジックは見直したほうがよい」のような文で、開発者にはどのファイルの何が問題で、どう変更すれば解決するのかが分からない。指摘を行動可能にする最も効果的な変更はどれか。","options_en":{"A":"Establish a team convention that developers reply to unclear bot comments asking it to elaborate","B":"Require every finding to state the file and line, why it is a problem, and a concrete suggested change","C":"Raise the severity threshold so the bot reports fewer findings, leaving only the clearest problems","D":"Add a second Claude pass that rewrites the review comments in clearer, more polished language"},"options_ja":{"A":"不明瞭なボットのコメントには開発者が返信で詳細を尋ねる、というチーム運用ルールを整備する","B":"すべての指摘に、ファイルと行の位置・問題である理由・具体的な修正案の3点を必須の形式として要求する","C":"深刻度のしきい値を上げて報告件数を減らし、最も明白な問題だけが残るようにする","D":"レビューコメントをより明瞭で洗練された文章に書き直す2回目の Claude パスを追加する"},"correct":"B","explanation_ja":{"why_correct":"行動不能の原因は指摘の内容ではなく出力形式が未指定なことだ。位置（file:line）・問題である理由・具体的な修正案という3要素をプロンプトで必須の形式として要求すれば、すべての指摘が「どこを・なぜ・どう直すか」を必ず運ぶ。actionable feedback はレビュープロンプト設計における明示的な出力要件である。","A":"曖昧さの解消コストを受け手に転嫁する運用の症状対処。往復が増えるだけで、指摘の初期品質は何も変わらない。","C":"件数が減っても、残った指摘の曖昧さはそのままだ。問題は量ではなく形式である。","D":"元の指摘に位置や修正案の情報が含まれていなければ、書き直しパスはそれを生み出せない。存在しない情報は磨いても現れず、層を足すだけの症状対処になる。"},"explanation_en":{"why_correct":"The findings are unactionable not because of their substance but because no output format was specified. Requiring three elements — location (file:line), why it is a problem, and a concrete suggested fix — as a mandatory format guarantees every finding carries where, why, and how. Actionable feedback is an explicit output requirement of review-prompt design.","A":"A process patch that shifts the cost of disambiguation onto recipients. It adds round trips without improving the findings' initial quality.","C":"Fewer findings, same vagueness in what remains. The problem is format, not volume.","D":"If the original finding lacks location and fix information, a rewriting pass cannot invent it. Absent information does not appear through polishing — this just stacks a layer on the symptom."},"references":[{"title":"Prompt engineering overview","url":"https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/overview"}],"lesson":"指摘は形式で行動可能にする。位置（file:line）・理由・具体的修正案をプロンプトの必須出力要件にする","lesson_en":"Findings become actionable through format: mandate file:line, the reason, and a concrete fix in the prompt","principle_tags":["structured-errors"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D4-003","scenario":"claude-code-ci","domain":4,"task_statement":"4.1","question_en":"On every pull request the review bot reads broadly across the repository and reports pre-existing problems in files the PR never touched. Authors are buried in findings unrelated to their change and have stopped trusting the reviews. What is the most effective fix?","question_ja":"レビューボットは PR が開かれるたびにリポジトリを広く読み、その PR が触れてもいないファイルの既存問題まで指摘する。作者は自分の変更と無関係な指摘に埋もれ、レビュー結果を信用しなくなった。最も効果的な修正はどれか。","options_en":{"A":"Provide the PR diff plus minimal surrounding context and state that review scope is limited to the changed lines","B":"Instruct the bot to tag findings in untouched files as pre-existing so that developers can filter them out","C":"Maintain a baseline list of known repository issues and suppress any reported finding that matches an entry","D":"Tell the reviewer to report only the findings it considers high-confidence, regardless of file location"},"options_ja":{"A":"PR の diff と必要最小限の周辺コンテキストだけを渡し、レビュー範囲は変更行に限定すると明示する","B":"変更されていないファイルへの指摘には既存問題のタグを付けさせ、開発者がフィルタできるようにする","C":"リポジトリの既知の問題をベースライン一覧として管理し、一致する指摘を出力から抑制する","D":"ファイルの場所を問わず、確信度が高いと判断した指摘だけを報告するようレビュアーに指示する"},"correct":"A","explanation_ja":{"why_correct":"PR レビューの責務はその PR が導入する変化の検査だ。入力の段階でレビュー対象を diff（＋理解に必要な最小限の文脈）に絞れば、無関係なコードがそもそも渡らないため、無関係な指摘は構造的に生成されなくなる。出力を後からフィルタするより、入力の scope restriction が先である。","B":"ノイズは生成されたまま分類だけさせる症状対処。タグ付け自体も確率的で漏れが出るうえ、開発者のフィルタ作業という負担も残る。","C":"ベースライン一覧の保守という恒久コストを抱え込む。しかも新しく発見される無関係な指摘は一覧に載っていないため、そのまますり抜ける。","D":"確信度と関連性は別の軸だ。触れていないファイルの既存問題は高確信度で報告され続けるため、無関係な指摘は減らない。"},"explanation_en":{"why_correct":"A PR review's responsibility is to examine the change the PR introduces. Restricting the input to the diff (plus the minimum context needed to understand it) means irrelevant code never reaches the reviewer, so irrelevant findings are structurally impossible. Scope restriction at the input beats filtering the output afterwards.","B":"The noise is still generated; it is merely labeled. Tagging is itself probabilistic and leaks, and developers still bear the filtering burden.","C":"Takes on the permanent cost of maintaining a baseline list — and newly discovered irrelevant findings are not on the list, so they slip through.","D":"Confidence and relevance are different axes. Pre-existing problems in untouched files keep being reported with high confidence, so the irrelevant findings remain."},"references":[{"title":"Prompt engineering overview","url":"https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/overview"},{"title":"Claude Code: GitHub Actions","url":"https://code.claude.com/docs/en/github-actions"}],"lesson":"PR レビューの対象はその PR の diff。出力のフィルタより先に、入力の範囲を渡す側で絞る","lesson_en":"A PR review's scope is the PR's diff: restrict the input before you filter the output","principle_tags":["least-privilege","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D4-004","scenario":"claude-code-ci","domain":4,"task_statement":"4.2","question_en":"To stabilize severity classification (critical / major / minor) in the review bot, the team added six few-shot examples of boundary cases to the prompt. Classifications still fluctuate between runs. Inspecting the examples, you find two of them label nearly identical null-check omissions differently — one critical, one minor. What should happen next?","question_ja":"レビューボットの深刻度分類（critical / major / minor）を安定させるため、チームは境界ケースの few-shot 例6件をプロンプトに追加した。しかし分類は依然として実行ごとにぶれる。例を精査すると、ほぼ同一の null チェック漏れに対して2件の例が異なるラベル——一方は critical、他方は minor——を付けていた。次に何をすべきか。","options_en":{"A":"Double the number of few-shot examples so the model sees more evidence of where each severity boundary actually lies","B":"Rewrite the prose severity definitions to be longer and more precise so the examples carry less of the burden","C":"Fix the two contradictory examples so every label agrees with the definitions, keeping the example set internally consistent","D":"Split the review into three per-severity passes so each severity level is judged in isolation from the others"},"options_ja":{"A":"few-shot 例の数を倍にし、各深刻度の境界がどこにあるかの証拠をより多くモデルに見せる","B":"散文の深刻度定義をより長く精密に書き直し、例が担う負担を減らす","C":"矛盾している2つの例を修正し、すべてのラベルが定義と一致する内部一貫性のある例セットに保つ","D":"レビューを深刻度ごとの3パスに分割し、各深刻度レベルを他から隔離して判定させる"},"correct":"C","explanation_ja":{"why_correct":"few-shot は例が基準を定義する仕組みであり、矛盾した例は「どちらの基準に合わせるか」をモデルの確率に委ねる——実行ごとのぶれはその現れだ。ほぼ同一のケースに逆のラベルが付いた2例を直せば、6件のままで例セットが一つの基準を語り始める。数を増やす前に、例セットの内部一貫性を直すのが先である。","A":"矛盾を残したまま数を増やせば、矛盾のシグナルも一緒に増幅される。ぶれの原因は例の不足ではなく例の不一致だ。","B":"例は散文より具体的で強い信号を持つため、定義をいくら精密化しても矛盾した例が残る限り例が勝ち続ける。逆方向の増強だ。","D":"3パス分割は実行コストを3倍にする過剰対応で、矛盾した例セットは各パスにそのまま持ち込まれる。原因に触れていない。"},"explanation_en":{"why_correct":"Few-shot examples define the standard; contradictory examples delegate \"which standard\" to the model's probabilities — the run-to-run fluctuation is exactly that. Fix the two examples that label nearly identical cases oppositely, and the six-example set speaks with one voice. Before adding volume, restore the set's internal consistency.","A":"Adding volume while the contradiction remains amplifies the contradictory signal along with everything else. The cause is inconsistency, not scarcity.","B":"Examples are more concrete than prose and carry the stronger signal, so however precise the definitions get, the contradictory examples keep winning. Reinforcement in the wrong direction.","D":"Three per-severity passes triple the cost while carrying the contradictory example set into every pass. The cause goes untouched."},"references":[{"title":"Prompt engineering: Use examples (multishot prompting)","url":"https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/multishot-prompting"}],"lesson":"few-shot は例が基準を定義する。分類がぶれたら、例を増やす前に例セット内の矛盾を疑う","lesson_en":"Few-shot examples define the standard. When classifications fluctuate, audit the example set for contradictions before adding more","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D4-005","scenario":"claude-code-ci","domain":4,"task_statement":"4.2","question_en":"The test-generation job's output format keeps shifting: sometimes prose with code fragments, sometimes a bare fenced block, sometimes an explanation followed by code — and downstream automation keeps breaking. An instruction to output only test code was already added, but the format still collapses whenever the input module type changes. What is the most effective fix?","question_ja":"テスト生成ジョブの出力形式が安定しない。あるときはコード片が混ざった散文、あるときはコードブロックのみ、あるときは説明の後にコード——と揺れ、後段の自動処理が壊れ続けている。「テストコードのみを出力せよ」という指示は既に追加したが、入力するモジュールのタイプが変わるとやはり形式が崩れる。最も効果的な修正はどれか。","options_en":{"A":"Build a tolerant downstream parser that extracts code from prose, fenced blocks, and mixed responses","B":"Strengthen the existing instruction with capitalized emphasis that output must contain only test code","C":"Add one thorough few-shot example showing a typical module and a perfectly formatted test-file output","D":"Add few-shot examples pairing deliberately varied module types with the identical output format each time"},"options_ja":{"A":"散文・コードブロック・混在のどの応答形式からもコードを取り出せる、寛容なパーサーを後段に構築する","B":"出力にはテストコードのみを含めること、という既存の指示を大文字の強調付きでさらに強くする","C":"few-shot の例を1つ追加する。典型的なモジュールと、完璧にフォーマットされたテストファイル出力の丁寧な例を示す","D":"few-shot の例を複数追加する。意図的に異なるタイプのモジュールを入力に選び、どの例でも同一の出力形式を示す"},"correct":"D","explanation_ja":{"why_correct":"崩れる条件が「入力タイプが変わったとき」である以上、示すべきは入力の多様性×出力形式の不変性だ。形の異なるモジュールがすべて同一の出力形式に写ることを複数の例で見せる varied-format few-shot は、「形式は入力によらず一定」という一般化を最も直接的に教える。","A":"下流を複雑化して不整合を吸収する症状対処。新しい崩れ方が現れるたびにパーサーを追いかけ続けることになる。","B":"指示は既に与えられ、破られているのが症状だ。同じ手段の強度を上げても確率的な遵守のまま変わらない。語る（instruction）より示す（example）が形式を固定する。","C":"1例だけでは形式が例の入力タイプと結び付いて学習されうる。「入力タイプが変わると崩れる」という症状に対して、まさに多様性が足りない。惜しい誤答だ。"},"explanation_en":{"why_correct":"Since the format collapses exactly when the input module type changes, what must be demonstrated is input variety crossed with format invariance. Varied-format few-shot — several examples where differently shaped modules all map to the identical output format — teaches the generalization \"format is constant regardless of input\" as directly as possible.","A":"A symptom patch that absorbs inconsistency by complicating downstream. Each new way the format collapses means chasing the parser again.","B":"The instruction already exists and is being violated — that is the symptom. Turning up the volume on the same mechanism leaves compliance probabilistic. Showing beats telling for format.","C":"With a single example, the format can be learned as tied to that example's input type. Against a symptom of collapsing when input type changes, one example lacks precisely the needed variety — the near-miss answer."},"references":[{"title":"Multishot prompting","url":"https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/multishot-prompting"}],"lesson":"形式の一貫性は「多様な入力×同一の出力形式」を示す複数の few-shot で教える。1例では入力タイプに縛られる","lesson_en":"Teach format consistency with several few-shot examples: varied inputs, one identical output format","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D4-006","scenario":"claude-code-ci","domain":4,"task_statement":"4.4","question_en":"Generated test files occasionally contain syntax errors. Today, when the syntax check fails, the pipeline re-runs the entire generation prompt from scratch — losing the test cases that were generated correctly and doubling the cost each time. What is the most effective redesign?","question_ja":"生成されたテストファイルが時々構文エラーを含む。現在は構文チェックに失敗するとプロンプト全体を最初から再実行しており、正しく生成できていたテストケースまで毎回失われ、コストも倍増している。最も効果的な再設計はどれか。","options_en":{"A":"Lower the generation temperature so syntactically valid test files come out more frequently","B":"On failure, retry with the failing file and the exact parser error so only the broken part is repaired","C":"Generate three candidate test files per module and keep whichever candidate passes the syntax check","D":"Route syntax-failing files into a human review queue where an engineer repairs them before commit"},"options_ja":{"A":"生成の温度を下げ、構文的に正しいテストファイルが出力される頻度を高める","B":"検証失敗時は、失敗したファイルとパーサーの正確なエラーメッセージを渡して再試行させ、壊れた箇所だけを修復させる","C":"モジュールごとにテストファイルの候補を3つ生成し、構文チェックを通過した候補を採用する","D":"構文エラーのファイルは人間のレビューキューへ回し、エンジニアが修正してからコミットする"},"correct":"B","explanation_ja":{"why_correct":"validation-retry ループの設計原則は、「何がどこでどう失敗したか」という具体的な検証エラーをフィードバックして修正させることだ。失敗ファイルとエラーメッセージを渡せば、モデルは壊れた箇所だけを修復し、正しく生成できていた部分は保持される。フィードバックのないゼロからの再生成は、修正が失敗箇所に向かう保証のない賭けの繰り返しである。","A":"エラーの発生頻度を下げるだけで、起きたときの扱いは変わらない。失敗時に良品まで捨てるという設計上の問題がそのまま残る。","C":"コストを3倍にする力業で、3候補すべてが失敗する可能性も残る。エラー情報を使わないため、修正が収束していく仕組みがない。","D":"自動化パイプラインに人手の同期ポイントを恒久的に埋め込む後退だ。機械的に検出でき、具体的なエラー内容も得られる失敗は、自動の修正ループで閉じられる。"},"explanation_en":{"why_correct":"The design principle of a validation-retry loop is to feed back the specific validation error — what failed, where, and how — so the model repairs it. Given the failing file and the parser's message, the model fixes only the broken part while the correctly generated tests survive. Regenerating from scratch without feedback is a repeated gamble with no guarantee the fix lands on the failure.","A":"Reduces how often errors occur but changes nothing about what happens when they do. The design flaw — discarding good output on failure — remains.","C":"Brute force at triple cost, with the possibility that all three candidates fail. Since no error information is used, there is no mechanism for repairs to converge.","D":"Permanently embeds a human synchronization point in an automated pipeline. A failure that is mechanically detectable and comes with a concrete error message can be closed by an automated repair loop."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"検証失敗は良品を保持し、具体的エラーを添えて壊れた箇所だけ修復させる。ゼロから再生成は良品まで捨てる","lesson_en":"On validation failure, keep what passed and repair only the broken part with the specific error attached — regenerating from scratch discards good work","principle_tags":["structured-errors","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D4-007","scenario":"claude-code-ci","domain":4,"task_statement":"4.5","question_en":"A nightly job regenerates API documentation for 500 modules through sequential real-time API calls, and it has become the largest line item in the monthly API bill. The results only need to be ready by the following morning. What is the most effective cost reduction?","question_ja":"夜間ジョブが500モジュールの API ドキュメントを逐次のリアルタイム API 呼び出しで再生成しており、月次の API 費用の中で最大の項目になっている。結果は翌朝までに揃っていればよい。最も効果的なコスト削減はどれか。","options_en":{"A":"Parallelize the real-time API calls across workers so the job completes in a fraction of the time","B":"Trim each module's prompt and the shared boilerplate to cut the tokens consumed per documentation call","C":"Submit all 500 modules as one Message Batches API job at night and collect the results before morning","D":"Move generation to a smaller, cheaper model and accept whatever quality difference results from it"},"options_ja":{"A":"リアルタイム API 呼び出しをワーカー間で並列化し、ジョブを大幅に短い時間で完了させる","B":"各モジュールのプロンプトと共通ボイラープレートを切り詰め、1呼び出しあたりの消費トークンを減らす","C":"500モジュール全体を1つの Message Batches API ジョブとして夜間に投入し、朝までに結果を回収する","D":"生成をより小さく安価なモデルへ移し、それによって生じる品質の差は受け入れる"},"correct":"C","explanation_ja":{"why_correct":"決め手は「翌朝まででよい」という遅延許容だ。Message Batches API は非同期処理——大半のバッチは1時間以内に完了し、24時間以内に完了しなかった分は期限切れとして失効する——と引き換えに標準料金から50%引きになる。大量・非対話・遅延許容というこのジョブの性質と完全に一致する。ワークロードの遅延許容度に処理方式を合わせるのがバッチ設計の基本である。","A":"速くはなるがコストは1件も減らない。困っているのは所要時間ではなく費用だ。","B":"削減幅はプロンプト中の冗長部分の比率で頭打ちになる。仕組みとして50%減が保証される Batches に比べて効果が小さく、切り詰めすぎれば本文品質への副作用も出る。","D":"要件にない品質の妥協を持ち込む勝手な前提だ。同じモデルのまま50%削れる手段が存在する以上、出力品質を賭ける必要がない。"},"explanation_en":{"why_correct":"The deciding detail is the latency tolerance: results are only needed by morning. The Message Batches API trades asynchronous processing — most batches finish within an hour, and anything unfinished at 24 hours expires — for a 50% discount off standard pricing, matching this job's profile exactly: high volume, non-interactive, latency-tolerant. Matching the processing mode to the workload's latency tolerance is the core of batch design.","A":"Faster, but not one call cheaper. The pain is cost, not wall-clock time.","B":"Savings are capped by the fraction of redundant prompt content — small next to the structurally guaranteed 50% of Batches, with quality side effects if trimmed too far.","D":"Imports a quality compromise nowhere in the requirements. With a mechanism that cuts 50% on the same model, there is no need to gamble output quality."},"references":[{"title":"Message Batches API","url":"https://docs.claude.com/en/docs/build-with-claude/batch-processing"}],"lesson":"遅延許容×大量×コスト重視は Message Batches API へ（50%減・非同期・24時間ウィンドウ、超過分は失効）","lesson_en":"Latency-tolerant, high-volume, cost-sensitive work belongs on the Message Batches API (50% off, asynchronous, 24-hour window with expiry)","principle_tags":["right-tool-for-latency"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D4-008","scenario":"claude-code-ci","domain":4,"task_statement":"4.5","question_en":"Your team already runs several offline analytics workloads through the Message Batches API at half the cost of real-time calls. Seeing the savings, a manager proposes: \"Let's migrate the required blocking pre-merge AI review to the Batches API too and cut that bill in half as well.\" How should this proposal be evaluated?","question_ja":"チームはすでに複数のオフライン分析ワークロードを Message Batches API で動かしており、リアルタイム呼び出しの半額で済んでいる。この節約を見たマネージャーが「必須のブロッキング pre-merge AIレビューも Batches API に移行して、あの請求も半分にしよう」と提案した。この提案をどう評価すべきか。","options_en":{"A":"Agree: consolidating every Claude workload onto one API path halves cost and simplifies the pipeline","B":"Agree, provided batch jobs are submitted with a priority flag that expedites the pre-merge requests","C":"Decline: the Batches API cannot return structured JSON output, which the merge gate needs to parse","D":"Decline: batches carry no latency SLA and can take hours, unusable for a check developers wait on"},"options_ja":{"A":"賛成する。すべての Claude ワークロードを1つの API 経路に集約すればコストは半減し、パイプラインも単純になる","B":"条件付きで賛成する。マージ前のリクエストを優先処理させる priority フラグを付けてバッチを投入すればよい","C":"反対する。Batches API は構造化 JSON 出力を返せないため、マージゲートに必要なパースが成立しない","D":"反対する。バッチにはレイテンシ SLA がなく処理に数時間かかりうるため、開発者が待つチェックには使えない"},"correct":"D","explanation_ja":{"why_correct":"Batches API の割引の対価は遅延だ。レイテンシ SLA はなく、個々のジョブは数時間かかりうるうえ、24時間以内に完了しなければ期限切れとして失効する——同期的な完了時刻の保証は存在しない。blocking の pre-merge チェックは開発者がマージをその場で待つ、遅延許容度がゼロに近いワークロードであり、オフライン分析で成功したのは遅延許容だったからにすぎない。同じ手段を遅延非許容のワークロードへ広げるのは latency-tolerance matching の失敗である。","A":"コスト削減が成立した条件（遅延許容）を無視した過剰一般化だ。マージが数時間待たされ、開発フロー全体が停止する。","B":"Batches API に優先処理のフラグは存在しない。実在しない機能を前提にした緩和策は評価の土台にならない。","C":"結論は同じ反対だが理由が誤っている。バッチ内のリクエストは通常の Messages API とほぼ同等の機能（ストリーミング等ごく一部を除く）を使えるため、構造化出力は問題なく成立する。誤った根拠での否決は、次に似た正しい提案が来たときの判断を誤らせる。"},"explanation_en":{"why_correct":"The Batches discount is paid for with latency. There is no latency SLA: individual jobs can take hours, and anything unfinished at 24 hours expires — there is no guarantee of synchronous completion at all. A blocking pre-merge check is a near-zero-latency-tolerance workload where developers wait on the spot; the offline analytics succeeded only because they were latency-tolerant. Extending the same tool to a latency-intolerant workload is a failure of latency-tolerance matching.","A":"Overgeneralization that ignores the condition that made the savings work: latency tolerance. Merges would wait hours and the development flow would stall.","B":"No priority flag exists in the Batches API. A mitigation premised on a nonexistent feature is no basis for approval.","C":"Right conclusion, wrong reason. Requests inside a batch support nearly everything the regular Messages API does (streaming and a few exceptions aside), so structured output works fine. Rejecting on a false basis corrupts the next judgment when a similar but sound proposal arrives."},"references":[{"title":"Message Batches API","url":"https://docs.claude.com/en/docs/build-with-claude/batch-processing"}],"lesson":"Batches にレイテンシ SLA はない。人が待つ blocking チェックには使わず、遅延許容度で処理方式を選ぶ","lesson_en":"Batches has no latency SLA: match processing mode to latency tolerance, and keep developer-blocking checks real-time","principle_tags":["right-tool-for-latency"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D4-009","scenario":"claude-code-ci","domain":4,"task_statement":"4.6","question_en":"Security, performance, style, and test-coverage used to run as separate reviews. To cut cost they were merged into one large combined prompt. Since the merge, the pipeline misses classes of problems that the individual focused reviews reliably caught before. What is the most effective fix?","question_ja":"以前はセキュリティ・性能・スタイル・テスト網羅を別々のレビューとして走らせていた。コスト削減のため1つの大きな統合プロンプトにまとめたところ、統合後は、単独レビュー時代には確実に捕まえていた問題クラスを見逃すようになった。最も効果的な修正はどれか。","options_en":{"A":"Move to a model with a larger context window so the combined prompt fits with plenty of room to spare","B":"Split the review back into focused passes, one dimension per pass, and merge the findings afterwards","C":"Reorder the combined prompt so that the highest-priority dimension appears first in the instructions","D":"Append a final self-check step asking the reviewer whether it overlooked issues in any of the dimensions"},"options_ja":{"A":"より大きなコンテキストウィンドウを持つモデルへ移行し、統合プロンプトが余裕を持って収まるようにする","B":"レビューを次元ごとの focused pass に分割し直し、1パス1次元で実行して結果を後から統合する","C":"統合プロンプト内の指示の順序を並べ替え、最優先の次元が最初に来るようにする","D":"いずれかの次元で見逃しがないかを自己点検させる最終ステップを、プロンプトの末尾に追加する"},"correct":"B","explanation_ja":{"why_correct":"症状は attention dilution——1回の生成に多くの検査次元を同時に負わせると各次元へ向かう注意が薄まり、単独なら捕まえていた問題を落とす。プロンプトが収まらないのではなく注意が薄まるのが原因なので、1パス1次元の focused pass に分割して各実行の注意を単一の関心事に集中させ、結果を統合するのが正しい。単一責任の原則はレビューパスにも適用される。","A":"「収まっているのに見逃す」が症状であり、容量の問題ではない。窓を広げても注意の希釈は解消しない。","C":"先頭に置いた次元は改善しうるが、残る3次元の希釈はそのままだ。全次元の検出力を回復する解ではない。","D":"自己点検も同じ希釈された1回の生成の中で行われる確率的な後追いにすぎず、単独レビュー並みの検出力を取り戻す保証はない。"},"explanation_en":{"why_correct":"The symptom is attention dilution: loading many inspection dimensions onto a single generation thins the attention each receives, dropping problems that focused runs caught. The prompt fits — capacity is not the issue — so the fix is splitting back into focused passes, one dimension per pass, concentrating each run's attention on a single concern and merging results afterwards. Single responsibility applies to review passes too.","A":"The symptom is missing issues while the prompt already fits — not a capacity problem. A larger window does not undo attention dilution.","C":"The first-placed dimension may improve, but the dilution of the other three remains. It does not restore detection across all dimensions.","D":"The self-check happens inside the same diluted single generation — a probabilistic afterthought with no guarantee of recovering focused-level detection."},"references":[{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"},{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"検査次元を1回の生成に積むほど注意は希釈される。レビューは次元ごとの focused pass に分割して統合する","lesson_en":"Stacking review dimensions dilutes attention: run focused single-dimension passes and merge the findings","principle_tags":["single-responsibility"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D4-010","scenario":"claude-code-ci","domain":4,"task_statement":"4.6","question_en":"Because review findings vary between runs, a colleague proposes: \"Run the same review three times and keep only findings that appear in at least two runs — majority vote.\" Hard-to-detect problem classes such as race conditions, which surface only intermittently, are among the most important things the review must catch. How should this be handled?","question_ja":"レビューの指摘が実行のたびに揺れるため、同僚が「同じレビューを3回走らせ、2回以上の実行に現れた指摘だけを採用する多数決にしよう」と提案した。レースコンディションのように検出自体が難しく、間欠的にしか報告されない問題クラスも、このレビューが捕まえるべき最重要の対象に含まれる。どう対応すべきか。","options_en":{"A":"Collect the union of findings across the runs, then accept or drop each one via a separate verification pass","B":"Adopt the proposal as is: findings that fail to recur across runs are noise the vote correctly removes","C":"Extend the proposal to five runs with a three-vote threshold so the consensus is statistically stronger","D":"Replace repetition with a single run at temperature zero, making repeated sampling unnecessary altogether"},"options_ja":{"A":"実行横断の指摘を和集合として収集し、採用可否は指摘ごとの個別の検証パスで判定する","B":"提案をそのまま採用する。複数回の実行で再現しない指摘は、多数決が正しく除去してくれるノイズだ","C":"提案を拡張し、5回実行・3票以上のしきい値にしてコンセンサスの統計的な強度を高める","D":"反復を温度ゼロの1回実行に置き換え、複数回のサンプリング自体を不要にする"},"correct":"A","explanation_ja":{"why_correct":"多数決の暗黙の前提は「本物の問題は毎回検出される」だが、シナリオはそれを明示的に否定している——レースコンディションのような難しい本物の問題ほど間欠的にしか検出されない。多数決はまさにその最重要クラスを系統的に捨てる。検出（recall）は和集合で最大化し、精度は各指摘を個別に検証するパスで担保する。検出と採否の判定を分離するのが正しい構造だ。","B":"「再現しない指摘＝ノイズ」という前提が誤りだ。間欠的な本物の検出を偽陽性もろとも捨て、しかも捨てたことに誰も気づけない。","C":"しきい値を上げるほど間欠的な本物の検出はさらに通りにくくなる。誤った仕組みの強化であり、問題を悪化させる。","D":"温度ゼロは1回の実行の再現性を与えるだけで、複数回サンプリングが持っていた検出の広がりを失う。難しい問題を拾う機会はむしろ減る。"},"explanation_en":{"why_correct":"Majority voting silently assumes that real problems are detected on every run — and the scenario explicitly negates that: the hardest real problems, like race conditions, surface only intermittently. The vote systematically discards exactly that most important class. Maximize detection (recall) with the union of findings, then secure precision through a verification pass that checks each finding individually. Separating detection from acceptance is the correct structure.","B":"The premise \"non-recurring finding = noise\" is false. It throws away intermittent true detections along with the false positives — and no one can tell it happened.","C":"The higher the threshold, the harder it becomes for intermittent true detections to pass. Reinforcing the wrong mechanism makes the problem worse.","D":"Temperature zero buys reproducibility of one run while losing the detection spread that repeated sampling provided. The chance of catching hard problems goes down, not up."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"多数決コンセンサスは間欠的な本物の検出を潰す。検出は和集合で集め、採否は指摘ごとの個別検証で決める","lesson_en":"Majority consensus suppresses intermittent true findings: union for detection, per-finding verification for acceptance","principle_tags":["root-cause-fix"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D4-001","scenario":"structured-extraction","domain":4,"task_statement":"4.3","question_en":"Your extraction pipeline sends documents to Claude with the instruction \"Respond with only a JSON object matching this schema.\" The downstream parser fails intermittently: some responses arrive wrapped in markdown code fences, and others begin with \"Here is the extracted data:\". Which change most effectively eliminates this class of failure?","question_ja":"抽出パイプラインは文書を「このスキーマに一致するJSONオブジェクトのみで応答せよ」という指示とともにClaudeへ送っている。下流のパーサーが断続的に失敗している。応答がmarkdownコードフェンスで囲まれて届くことがあり、「Here is the extracted data:」という前置き文で始まることもあるためだ。この失敗クラスを最も効果的に排除する変更はどれか。","options_en":{"A":"Strengthen the system prompt with \"Output raw JSON only, with no markdown fences and no introductory text\" plus an example of a rejected response","B":"Add a preprocessing step to the parser that strips markdown fences and any leading prose with a regular expression before calling json.loads","C":"Set temperature to 0 so the model follows the formatting instruction deterministically on every single request","D":"Define the output schema as a tool's input schema and force the call with tool_choice, reading the tool arguments as the extraction result"},"options_ja":{"A":"「生のJSONのみを出力。markdownフェンスも前置き文も禁止」という指示と却下例をシステムプロンプトに追加して強化する","B":"json.loads の前に、markdownフェンスと先頭の散文を正規表現で除去する前処理ステップをパーサーに追加する","C":"temperature を 0 に設定し、すべてのリクエストで形式指示に決定論的に従うようにする","D":"出力スキーマをツールの input_schema として定義し tool_choice で呼び出しを強制、ツール引数を抽出結果として読み取る"},"correct":"D","explanation_ja":{"why_correct":"前置きやコードフェンスの混入は、自由テキストというチャネル自体が構造を保証しないことの現れだ。スキーマをツールの input_schema として定義し tool_choice でそのツールの呼び出しを強制すれば、抽出結果はツール引数という構造化チャネルで返り、散文が混入する余地がAPIレベルでなくなる。症状でなくチャネル選択という根本原因を修正している。なお現在は structured outputs（output_config の JSON 出力指定）でも同等のスキーマ保証が得られる。","A":"プロンプト指示の強化は確率的な改善にとどまる（\"code must, prompt should\"）。下流パースには保証が必要であり、混入は頻度が下がるだけで残る。","B":"パーサー側の除去は症状対処。フェンスと既知の前置きは剥がせても前置き表現のバリエーションは尽きず、いたちごっこが続く。","C":"temperature は出力のばらつきを狭めるだけで、形式遵守を保証する仕組みではない。0 でも前置きを含む応答は生成されうる。"},"explanation_en":{"why_correct":"Preambles and code fences are symptoms of the real problem: free text is a channel that guarantees no structure. Defining the schema as a tool's input schema and forcing the call with tool_choice returns the extraction through the structured tool-arguments channel, removing any room for prose at the API level. It fixes the root cause — channel choice — not the symptom. Note that structured outputs (a JSON output_config) now provides the same schema guarantee as an alternative mechanism.","A":"Stronger prompt wording is a probabilistic improvement (\"code must, prompt should\"). Downstream parsing needs a guarantee; contamination becomes rarer but persists.","B":"Parser-side stripping treats symptoms. Fences and known preambles can be removed, but preamble variations are unbounded — a permanent whack-a-mole.","C":"Temperature narrows output variance; it is not a format-enforcement mechanism. A preamble can still be generated at temperature 0."},"references":[{"title":"Tool use overview","url":"https://docs.claude.com/en/docs/agents-and-tools/tool-use/overview"},{"title":"Structured outputs","url":"https://docs.claude.com/en/docs/build-with-claude/structured-outputs"}],"lesson":"構造の保証はプロンプトでなくプラットフォーム機構で（tool_choice 強制 / structured outputs）。自由テキストは構造を保証しない","lesson_en":"Guarantee structure with platform mechanisms (forced tool_choice / structured outputs), not prompts — free text guarantees nothing","principle_tags":["code-must-prompt-should","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D4-002","scenario":"structured-extraction","domain":4,"task_statement":"4.3","question_en":"Your invoice schema declares purchase_order as a required string field. Around 30% of supplier invoices legitimately carry no PO number, yet extractions for those invoices come back with plausible-looking values such as \"PO-2024-0117\" that appear nowhere in the document. Which change most directly stops the fabrication?","question_ja":"請求書スキーマは purchase_order を required な文字列フィールドとして宣言している。仕入先請求書の約30%には正当にPO番号が存在しないのだが、そうした請求書の抽出結果に「PO-2024-0117」のような、文書のどこにも書かれていないもっともらしい値が返ってくる。この捏造を最も直接的に止める変更はどれか。","options_en":{"A":"Add a validation rule that rejects PO numbers not matching the customer's known numbering format, and retry the extraction when it fires","B":"Make purchase_order nullable and state in the prompt that null is the correct output when the information is absent from the document","C":"Add few-shot examples demonstrating correct PO extraction, drawn from invoices in which a PO number is actually present","D":"Add a second verification pass that searches the document text for each extracted PO number and drops any value it cannot locate"},"options_ja":{"A":"顧客の既知の採番形式に一致しないPO番号を却下する検証ルールを追加し、発火時に抽出をリトライする","B":"purchase_order を nullable にし、「その情報が文書に存在しなければ null が正しい出力」とプロンプトで明示する","C":"PO番号が実際に記載されている請求書から取った、正しいPO抽出を実演する few-shot 例を追加する","D":"抽出された各PO番号を文書テキスト内で検索し、見つからない値を破棄する第2の照合パスを追加する"},"correct":"B","explanation_ja":{"why_correct":"required なスキーマは「必ず何かで埋めよ」という圧力であり、文書に存在しない情報に対する正直な出口を塞いでいる。フィールドを nullable にし「無い情報は null」と明示すれば、正直な回答がスキーマ上も指示上も正当化され、捏造を生む圧力そのものが消える。nullable-over-hallucination の原則である。","A":"形式検証はもっともらしい捏造を素通しする（捏造値は採番形式に合うように作られる）。生成圧力という根本を残した症状対処だ。","C":"POが存在する請求書の例をいくら見せても「無いときにどうするか」は教えられない。問題が起きているのは欠損ケースであり、例がそのケースをカバーしていない。","D":"照合パスは捏造の多くを事後検出できるが、推論コストを増やす追加層であり、捏造を生む原因（required＋出口なし）はそのまま残る。"},"explanation_en":{"why_correct":"A required field is pressure to fill in something, closing off any honest exit for information the document does not contain. Making the field nullable and stating that null is the correct output for absent information legitimizes the honest answer at both the schema and instruction level — the pressure that produces fabrication disappears. This is the nullable-over-hallucination principle.","A":"Format validation waves plausible fabrications through (fabricated values look like real PO numbers). A symptom fix that leaves the generation pressure in place.","C":"Examples from invoices that contain a PO can never teach what to do when one is absent. The failures happen on the absence case, which these examples do not cover.","D":"A verification pass catches many fabrications after the fact, but it is an added inference cost layered on top of an unchanged cause: required plus no honest exit."},"references":[{"title":"Structured outputs","url":"https://docs.claude.com/en/docs/build-with-claude/structured-outputs"},{"title":"Claude Cookbooks","url":"https://github.com/anthropics/claude-cookbooks"}],"lesson":"required スキーマは欠損情報の捏造を誘発する。無い情報には nullable＋「無ければ null」で正直な出口を用意する","lesson_en":"Required fields invite fabrication when data is absent. Give an honest exit: nullable plus an explicit null instruction","principle_tags":["nullable-over-hallucination","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D4-003","scenario":"structured-extraction","domain":4,"task_statement":"4.3","question_en":"The document_type field is declared as a free string. Downstream routing switches on its value, but production logs show \"inv\", \"Invoice\", \"INVOICES\", and \"invoice document\" for the same type, breaking the routing. The intake stream also occasionally includes genuinely new document kinds the team has not seen before. How should the field be restructured?","question_ja":"document_type フィールドは自由文字列として宣言されている。下流のルーティングはこの値で分岐するのだが、本番ログには同じ種別に対して「inv」「Invoice」「INVOICES」「invoice document」が現れ、ルーティングが壊れている。一方で取り込みストリームには、チームが見たことのない新種の文書も稀に混ざる。フィールドをどう再構成すべきか。","options_en":{"A":"Change document_type to an enum of the known types plus an \"other\" value, with a free-text detail field for documents classified as other","B":"Normalize the strings downstream with lowercasing and a fuzzy-match lookup table that maps observed variants to the canonical types","C":"Change document_type to an enum containing exactly the document types the pipeline currently supports, rejecting anything outside it","D":"Keep the string type but add a prompt instruction listing the canonical labels and requiring the model to copy one of them verbatim"},"options_ja":{"A":"document_type を既知タイプ＋「other」の enum に変更し、other に分類された文書向けの自由記述の詳細フィールドを併設する","B":"下流で小文字化と、観測された揺れを正規タイプへ対応付けるファジーマッチ変換テーブルによる正規化を行う","C":"document_type を、パイプラインが現在サポートする文書タイプだけを含む enum に変更し、それ以外は拒否する","D":"文字列型のまま、正規ラベルの一覧をプロンプトに列挙し、その中の1つを逐語的に複写するよう指示を追加する"},"correct":"A","explanation_ja":{"why_correct":"enum は既知タイプの表記揺れをスキーマレベルで排除し、下流ルーティングは enum 値に対して安全に分岐できる。同時に「other」＋詳細フィールドが未知の新種への受け皿になり、誤分類の押し込みも検証失敗も避けられる。既知の安定性と未知への開放性を両立させる定石の構成だ。","B":"下流の変換テーブルは症状対処。新しい揺れが観測されるたびにテーブルを保守し続けることになり、自由文字列という契約自体は直っていない。","C":"「other」のない閉じた enum は、新種の文書が来たとき誤った既存タイプへの押し込みか失敗を強いる。「稀に新種が来る」というシナリオの決め手と衝突する。","D":"逐語複写の指示は確率的で、文字列型のままでは揺れの再発を防ぐ機構が存在しない。保証が必要な下流分岐に対して指示だけで応えている。"},"explanation_en":{"why_correct":"An enum eliminates spelling variance for known types at the schema level, letting downstream routing switch safely on enum values. At the same time, \"other\" plus a detail field gives genuinely new document kinds a landing spot, avoiding both forced misclassification and validation failure. This is the standard pattern that combines stability for the known with openness to the unknown.","B":"A downstream lookup table treats symptoms: every newly observed variant means more table maintenance, and the free-string contract itself is never fixed.","C":"A closed enum without \"other\" forces new document kinds into a wrong existing type or into failure — colliding with the scenario's deciding detail that new kinds occasionally arrive.","D":"A verbatim-copy instruction is probabilistic; with the string type unchanged there is no mechanism preventing variance from recurring. It answers a guarantee requirement with prompt text."},"references":[{"title":"Structured outputs","url":"https://docs.claude.com/en/docs/build-with-claude/structured-outputs"}],"lesson":"分類フィールドは enum＋other＋詳細フィールド。既知は固定し、未知には受け皿を残す","lesson_en":"Classification fields: enum + \"other\" + a detail field. Pin down the known, leave a landing spot for the unknown","principle_tags":["code-must-prompt-should","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D4-004","scenario":"structured-extraction","domain":4,"task_statement":"4.3","question_en":"Extraction already runs through a tool call whose input schema declares every field and type. Still, about 2% of responses deviate: numeric amounts arrive as strings, or extra fields appear that the schema never declared. The downstream loader requires exact schema conformance on every record. What is the most effective fix?","question_ja":"抽出はすでに、全フィールドと型を宣言した input_schema を持つツール呼び出し経由で実行されている。それでも応答の約2%が逸脱する。数値の金額が文字列で届いたり、スキーマに無い余分なフィールドが現れたりするのだ。下流のローダーは全レコードに厳密なスキーマ準拠を要求している。最も効果的な修正はどれか。","options_en":{"A":"Restate the full schema in the system prompt and add an instruction to follow every declared field type exactly as written","B":"Extend the parser to coerce mismatched types into the declared ones and silently drop any fields the schema does not declare","C":"Enable strict mode for the tool schema so the platform guarantees that every output validates against the declared schema","D":"Add a validation step that detects schema violations and automatically re-sends the request until the output finally passes"},"options_ja":{"A":"スキーマ全体をシステムプロンプトに再掲し、宣言されたすべてのフィールド型に厳密に従うよう指示を追加する","B":"型不一致を宣言型へ強制変換し、スキーマ未宣言のフィールドを黙って破棄するようパーサーを拡張する","C":"ツールスキーマの strict mode を有効化し、すべての出力が宣言スキーマに対して妥当であることをプラットフォームに保証させる","D":"スキーマ違反を検出し、出力が通るまでリクエストを自動再送する検証ステップを追加する"},"correct":"C","explanation_ja":{"why_correct":"下流の要件は「全レコードの厳密準拠」という保証だ。strict mode を有効化すれば、出力がスキーマに適合することがプラットフォーム側で保証され、型逸脱・余分フィールドという失敗クラス自体が消滅する。保証が要件のとき、確率を上げる層を足すのではなく保証機構そのものを使うのが正しい。（strict が保証するのは強制ツール呼び出しの input のスキーマ準拠であり、refusal や max_tokens による途中終了は stop_reason 側で別途扱う）","A":"スキーマの再掲と型遵守の指示は確率的で、2%を減らすことはあっても0にはできない。要件が保証である以上、プロンプトでは足りない。","B":"パーサーでの型強制と黙殺破棄は症状対処であり、誤変換による静かなデータ破壊のリスクを持ち込む。逸脱の発生自体は放置される。","D":"検証リトライは失敗を事後修復する層で、レイテンシとコストを恒常的に追加する。逸脱クラスを丸ごと消せる保証機構が使える場面では過剰な回り道だ。リトライは、strict が扱えない意味的な検証（値の妥当性）にこそ残すべき層である。"},"explanation_en":{"why_correct":"The downstream requirement is a guarantee: exact conformance on every record. Enabling strict mode makes the platform guarantee that output validates against the declared schema, eliminating the entire failure class of type deviations and undeclared fields. When a guarantee is required, use the guarantee mechanism — do not stack probabilistic layers. (Strict mode guarantees schema conformance of the forced tool call's input; refusals and max_tokens truncation are handled separately via stop_reason.)","A":"Restating the schema and demanding type fidelity is probabilistic: it may shrink the 2% but cannot reach zero. A guarantee requirement cannot be met by prompt text.","B":"Parser-side coercion and silent dropping treat symptoms while introducing quiet data-corruption risk through mis-coercion. The deviations themselves keep occurring.","D":"A validation-retry loop repairs failures after the fact, permanently adding latency and cost — an over-built detour when a mechanism exists that removes the failure class outright. Retry loops belong at the layer strict mode cannot cover: semantic validation of the values themselves."},"references":[{"title":"Structured outputs","url":"https://docs.claude.com/en/docs/build-with-claude/structured-outputs"}],"lesson":"スキーマ厳密準拠が要件なら strict mode の保証を使う。プロンプト強化・後処理補正・リトライは確率的な層にすぎない","lesson_en":"When exact schema conformance is required, turn on strict mode. Prompts, coercion, and retries are probabilistic layers","principle_tags":["code-must-prompt-should","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D4-005","scenario":"structured-extraction","domain":4,"task_statement":"4.4","question_en":"When an extraction fails JSON schema validation, the pipeline re-sends the identical request, up to three times. Logs show that retries rarely succeed — the same validation failure usually repeats on every attempt. What change gives retries the best chance of succeeding?","question_ja":"抽出がJSONスキーマ検証に失敗すると、パイプラインは同一のリクエストを最大3回まで再送する。ログを見るとリトライはほとんど成功しておらず、同じ検証失敗が毎回繰り返されるのが通常だ。リトライの成功率を最も高める変更はどれか。","options_en":{"A":"Raise the retry limit from three attempts to ten so that more of the failures eventually produce a valid output","B":"Increase the temperature on retry attempts so the model becomes less likely to reproduce the identical invalid output","C":"Route all retry attempts to a larger, more capable model while keeping the original request otherwise unchanged","D":"Include the validator's findings in each retry, telling the model which fields failed and for what reason"},"options_ja":{"A":"リトライ上限を3回から10回へ引き上げ、より多くの失敗が最終的に妥当な出力へ到達するようにする","B":"リトライ時の temperature を上げ、同一の不正出力を再生成する可能性を下げる","C":"リクエスト内容はそのままに、リトライだけをより大きく高性能なモデルへルーティングする","D":"検証器の判定結果——どのフィールドがなぜ失敗したか——を毎回のリトライに添えてモデルに伝える"},"correct":"D","explanation_ja":{"why_correct":"同一入力の再送は同一の失敗を再生産しやすい——ログの「同じ失敗が毎回繰り返される」がその証拠だ。検証器が特定した具体的なエラー（どのフィールドが・なぜ）をリトライに添えれば、モデルは直すべき点を知った上で再生成できる。validation-retry はエラー内容のフィードバックがあって初めて機能する。","A":"入力が同じなら試行回数を増やしても分布は変わらない。同じ失敗の繰り返しをさらに7回積み増すだけの more-of-the-same だ。","B":"temperature 上昇は無誘導のランダム化で、偶然直ることはあっても狙った修正にはならない。別種の逸脱を新たに生む可能性すらある。","C":"モデル変更で成功率は動きうるが、手元にある最も価値の高い情報（検証エラー）を使わないままのコスト増だ。入力の曖昧さが同じなら大きいモデルも同じ失敗をしうる。"},"explanation_en":{"why_correct":"Re-sending identical input tends to reproduce the identical failure — the log's \"same failure on every attempt\" is the evidence. Attaching the validator's specific findings (which fields, for what reason) lets the model regenerate knowing exactly what to fix. Validation-retry only works when the error content is fed back.","A":"With unchanged input, more attempts sample the same distribution. It stacks seven more repetitions of the same failure — more of the same.","B":"Raising temperature is unguided randomization: an occasional accidental fix, never a targeted correction, and it can introduce new kinds of deviation.","C":"Switching models may move the needle, but at added cost while ignoring the most valuable information available — the validation error. Facing the same ambiguity, a larger model can fail the same way."},"references":[{"title":"Claude Cookbooks","url":"https://github.com/anthropics/claude-cookbooks"},{"title":"Structured outputs","url":"https://docs.claude.com/en/docs/build-with-claude/structured-outputs"}],"lesson":"検証エラーは具体的内容を添えて返す。同一リクエストの再送は同一の失敗を再現するだけ","lesson_en":"Feed the specific validation error back on retry — resending the identical request reproduces the identical failure","principle_tags":["structured-errors","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D4-006","scenario":"structured-extraction","domain":4,"task_statement":"4.4","question_en":"Your validation-retry loop attaches the validator error and retries every failure up to three times. An audit finds two patterns: date-format failures almost always succeed on retry, while failures on required information that the document simply does not contain end — after three attempts — with plausible fabricated values that pass validation. How should the retry policy change?","question_ja":"検証リトライループは検証エラーを添えて、あらゆる失敗を一律最大3回まで再試行している。監査で2つのパターンが見つかった。日付形式の失敗はリトライでほぼ必ず成功する一方、文書にそもそも存在しない必須情報での失敗は、3回の試行の末に検証を通過するもっともらしい捏造値で終わっているのだ。リトライポリシーをどう変えるべきか。","options_en":{"A":"Classify failures first: retry format errors with the error attached; route absent-information cases to null (with the schema made nullable) and review","B":"Cut the retry limit to a single attempt for every failure class so that fabricated values get fewer opportunities to appear","C":"Add a system prompt instruction that values absent from the document are to be left null rather than guessed, keeping the uniform retry policy","D":"Add a verification pass after every extraction that checks each output value against the source document text before it is accepted"},"options_ja":{"A":"まず失敗を分類する。形式エラーはエラーを添えてリトライし、情報不在のケースは（スキーマを nullable にした上で）null にして人間レビューへ回す","B":"捏造値が現れる機会を減らすため、すべての失敗クラスでリトライ上限を1回に切り下げる","C":"「文書に無い値は推測せず null のままにする」というシステムプロンプト指示を追加し、一律リトライポリシーは維持する","D":"すべての抽出の後に、各出力値を元文書テキストと照合してから受理する検証パスを追加する"},"correct":"A","explanation_ja":{"why_correct":"失敗には「リトライで直る種類」と「リトライが害になる種類」がある。形式エラーは情報が文書に存在し表現だけが誤っているため、フィードバック付きリトライが有効。一方、存在しない情報への再試行は「何か出せ」という圧力の反復であり、検証を通る捏造へと収束していく——監査が示した通りだ。失敗を分類し、リトライ不能なクラスを null＋人間レビューへ回すのが正しいポリシーである。なお null を正当な出力にするには、スキーマ側も該当フィールドを nullable にしておく必要がある（non-null required のままでは null が検証を通らない）。","B":"一律1回への切り下げは、直せるはずの形式エラーの修復機会まで捨てる過少対応。捏造は1回目の試行からも起きうるため、防止策としても不十分だ。","C":"推測禁止の指示は確率的な緩和にすぎず、リトライループが再試行のたびに出力圧力をかけ続ける構造は変わらない。ポリシー自体を変えない限り根本は残る。","D":"全件照合パスは捏造を事後に捕まえる網としては機能するが、全文書への追加推論コストが大きく、捏造を生み続けるリトライ構造そのものは放置される。"},"explanation_en":{"why_correct":"Failures split into a class that retries fix and a class that retries make worse. Format errors have the information present with only its rendering wrong, so feedback-guided retries work. Retrying absent information repeats the pressure to produce something, converging on fabrications that pass validation — exactly what the audit found. Classify failures and route the non-retryable class to null plus human review. Note the schema itself must make those fields nullable — with non-null required fields, null would never pass validation.","B":"Cutting everything to one attempt under-engineers: it discards the repair opportunity for fixable format errors, and fabrication can occur on the first attempt anyway.","C":"A no-guessing instruction is probabilistic mitigation; the retry loop keeps applying output pressure on every attempt. Without changing the policy itself, the root cause stays.","D":"A universal verification pass works as a net that catches fabrications after the fact, at significant added inference cost per document — while the retry structure that keeps producing them is left untouched."},"references":[{"title":"Claude Cookbooks","url":"https://github.com/anthropics/claude-cookbooks"},{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"リトライはエラー種別で分岐する。形式エラーは再試行で直り、欠損情報への再試行は捏造を誘発する——後者は null と人間レビューへ","lesson_en":"Branch retries by error class: format errors are retryable; retrying absent information breeds fabrication — route it to null and review","principle_tags":["nullable-over-hallucination","root-cause-fix"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D4-007","scenario":"structured-extraction","domain":4,"task_statement":"4.5","question_en":"A nightly job submits 10,000 documents through the Batches API and matches each result back to its source document by position in the results list. Reconciliation reports occasional cascades: when results come back in a different order than submission — with errored or expired entries mixed in — every subsequent document receives another document's extracted data. What is the correct fix?","question_ja":"夜間ジョブが Batches API 経由で1万件の文書を投入し、結果リスト内の位置によって各結果を元文書へ対応付けている。照合レポートには時折カスケード障害が現れる。結果が投入順と異なる順序で返り、errored や expired のエントリが混在すると、それ以降のすべての文書に別の文書の抽出データが割り当てられてしまうのだ。正しい修正はどれか。","options_en":{"A":"Sort the batch results by their created-at timestamp before aligning them against the submitted source document list","B":"Split the nightly job into batches of 100 documents so that an ordering mismatch corrupts at most one small batch","C":"Assign each request a custom_id carrying the document identifier and use it to correlate every result to its source","D":"Detect count mismatches between requests and results, and resubmit the entire batch whenever a mismatch is found"},"options_ja":{"A":"バッチ結果を作成タイムスタンプでソートしてから、投入した元文書リストと突き合わせる","B":"夜間ジョブを100件ずつの小バッチに分割し、順序ズレの影響が最大でも1つの小バッチに収まるようにする","C":"各リクエストに文書識別子を載せた custom_id を割り当て、すべての結果をそれで元文書に相関させる","D":"リクエスト数と結果数の不一致を検出し、不一致が見つかるたびにバッチ全体を再投入する"},"correct":"C","explanation_ja":{"why_correct":"Batches API の結果は投入順で返る保証がなく、失敗や期限切れも欠落ではなく errored / expired という非成功エントリとして混在して返る。位置による対応付けは仕様が保証しない前提の上に建っている。各リクエストに文書IDを載せた custom_id を割り当てて結果と相関させれば、順序の入れ替わりにも非成功エントリの混在にも影響されない照合になる。これが Batches API の設計上想定された対応付け方法だ。","A":"結果のタイムスタンプ順が投入順と一致する保証はない。順序不定という根本を、別の保証されない順序で置き換えているだけだ。","B":"バッチ縮小は被害半径を狭める緩和策であり、位置対応付けのズレ自体は各小バッチの内部で起き続ける。根本原因はそのままだ。","D":"全リクエストは非成功分も含めて結果に現れるため件数は通常一致し、この検出はほぼ発火しない。仮に発火しても、1万件全体の再投入という浪費で応えることになる。"},"explanation_en":{"why_correct":"Batches API results are not guaranteed to return in submission order, and failures are not gaps: errored and expired requests come back as non-succeeded result entries mixed into the list. Positional matching is built on an assumption the API never makes. Assigning each request a custom_id carrying the document identifier makes reconciliation immune to both reordering and non-succeeded entries — this is the correlation mechanism the Batches API is designed around.","A":"There is no guarantee result timestamps follow submission order. This swaps one unguaranteed ordering for another, leaving the root premise broken.","B":"Smaller batches shrink the blast radius; the positional misalignment itself keeps happening inside each small batch. The root cause is untouched.","D":"Since every request — including non-succeeded ones — appears in the results, the counts normally match and this check would rarely fire; when it did, it would answer with a wasteful resubmission of all 10,000 documents."},"references":[{"title":"Batch processing","url":"https://docs.claude.com/en/docs/build-with-claude/batch-processing"}],"lesson":"バッチ結果は位置で対応付けない。custom_id で相関させる","lesson_en":"Do not correlate batch results by position — correlate with custom_id","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D4-008","scenario":"structured-extraction","domain":4,"task_statement":"4.2","question_en":"Invoices in your intake stream typically show three dates — issue date, due date, and delivery date. The invoice_date field inconsistently captures one or another of them across visually similar documents. The downstream loader's contract requires a single invoice_date field — defined as the issue date — and cannot change this quarter. The field description already reads \"the date of the invoice\". What most effectively stabilizes the mapping?","question_ja":"取り込みストリームの請求書には通常3つの日付——発行日・支払期日・納品日——が記載されている。invoice_date フィールドは、見た目の似た文書間でそのどれかを不安定に拾ってしまう。下流ローダーの契約は単一の invoice_date フィールド（意味は発行日で固定）を要求しており、今四半期は変更できない。フィールド記述にはすでに「the date of the invoice」と書かれている。対応付けを最も効果的に安定させるのはどれか。","options_en":{"A":"Add a heuristic to the field description telling the model to select the date printed nearest the top of the document","B":"Add few-shot examples of multi-date invoices showing issue, due, and delivery dates with invoice_date correctly resolved in each","C":"Split the schema into issue_date, due_date, and delivery_date fields and let the downstream system decide which one it needs","D":"Set temperature to 0 so that the model makes the same date selection consistently across similar-looking documents"},"options_ja":{"A":"フィールド記述に「文書の最上部近くに印字された日付を選べ」という位置ヒューリスティックを追記する","B":"発行日・支払期日・納品日が併記され invoice_date が正しく解決されている複数日付請求書の few-shot 例を追加する","C":"スキーマを issue_date・due_date・delivery_date の3フィールドに分割し、どれを使うかは下流システムに決めさせる","D":"temperature を 0 に設定し、似た文書に対して同じ日付選択が一貫して行われるようにする"},"correct":"B","explanation_ja":{"why_correct":"失敗の正体は「複数候補からの選択規則」が定まっていないことだ。その曖昧ケースを狙い撃ちした few-shot——3つの日付が併記された請求書で invoice_date が正しく解決されている例——は、散文では伝わりにくい選択規則を実演で固定する。まさに問題が起きているケースを例がカバーしていることが決め手である。下流契約が意味を発行日と固定している以上、例はその規則を実演するだけでよい。","A":"位置ヒューリスティックはレイアウトが揃っている間だけ機能する近似で、支払期日を上部に置くテンプレートに出会った瞬間に系統的に誤る。選択規則を日付の意味でなく座標に結び付けている。","C":"フィールド分割は、今四半期は変更できないと明示された下流契約の変更を要求する。しかも「どれが invoice_date か」という判断を下流へ転嫁しているだけだ。","D":"temperature 0 は選択を安定させるが、安定して誤り続けることも同様に固定する。一貫性は正しさの代替にならない。"},"explanation_en":{"why_correct":"The failure is an unsettled selection rule among competing candidates. Few-shot examples aimed at exactly that ambiguity — invoices carrying all three dates with invoice_date correctly resolved — demonstrate the selection rule in a way prose struggles to convey. The deciding factor: the examples cover precisely the case where failures occur. With the downstream contract pinning the meaning to the issue date, the examples simply demonstrate that rule.","A":"A position heuristic is an approximation that holds only while layouts cooperate — the first template that prints the due date near the top makes it fail systematically. It ties the selection rule to coordinates instead of the date's meaning.","C":"Splitting the schema demands a change to a downstream contract explicitly frozen this quarter — and merely relocates the \"which date\" decision downstream.","D":"Temperature 0 stabilizes the selection, including stabilizing it on the wrong date. Consistency is not a substitute for correctness."},"references":[{"title":"Use examples (multishot prompting)","url":"https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/multishot-prompting"}],"lesson":"曖昧な対応付けの規則は、その曖昧ケースを実演する few-shot で固定する。散文の定義より例が強い","lesson_en":"Pin down ambiguous mappings with few-shot examples of exactly the ambiguous case — examples beat prose","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D4-009","scenario":"structured-extraction","domain":4,"task_statement":"4.1","question_en":"Your pipeline processes invoices from more than 40 vendors with widely varying layouts. The total_amount field — declared with only its name and type, no description — keeps capturing subtotals, per-line tax amounts, and occasionally page numbers. What is the most effective fix?","question_ja":"パイプラインは40社超のベンダーから届く、レイアウトが大きく異なる請求書を処理している。total_amount フィールド——名前と型だけが宣言され、記述は無い——が小計・行単位の税額・時にはページ番号まで拾い続けている。最も効果的な修正はどれか。","options_en":{"A":"Add a post-processing step that keeps only the largest monetary value whenever several candidate amounts were extracted from one document","B":"Constrain total_amount to a positive numeric type with a minimum value so that page numbers and other non-monetary values get rejected","C":"Add few-shot examples of correctly extracted totals, taken from the invoices of three representative vendors in the current mix","D":"Write inclusion and exclusion criteria into the field description: the final amount payable, not subtotals, tax lines, or page numbers"},"options_ja":{"A":"1つの文書から複数の候補金額が抽出された場合に、最大の金額だけを残す後処理ステップを追加する","B":"total_amount を最小値制約付きの正の数値型に制約し、ページ番号などの非金額値が却下されるようにする","C":"現在の構成のうち代表的な3ベンダーの請求書から取った、正しい合計抽出の few-shot 例を追加する","D":"フィールド記述に該当・非該当の判定基準を書く。該当は最終支払額、非該当は小計・税額行・ページ番号だと明示する"},"correct":"D","explanation_ja":{"why_correct":"フィールド名だけでは「何が該当し何が該当しないか」の判定基準が存在せず、モデルは金額らしきものすべてを候補にしてしまう。フィールド記述に明示的な定義——最終支払額が該当、小計・税額行・ページ番号は非該当——を書けば、レイアウトの多様性に依存しない一般規則が与えられる。40超のレイアウトに例で追随するのではなく、規則で覆うのが根本修正だ。","A":"「最大値を残す」は経験則の後処理で、クレジットノートや調整額を含む文書——最大値が合計でない文書——で静かに誤る。","B":"正の数値制約はページ番号を排除できない（ページ番号も正の数だ）。まして小計と合計の判別には何の情報も与えない。","C":"3ベンダーの例では40超のレイアウト多様性をカバーできない。定義なき例だけでは、例に無い未知レイアウトへの一般化が弱いままだ。"},"explanation_en":{"why_correct":"With only a name, there are no criteria for what qualifies and what does not, so the model treats every money-like number as a candidate. Writing an explicit definition into the field description — final amount payable qualifies; subtotals, tax lines, and page numbers do not — supplies a general rule independent of layout diversity. Covering 40+ layouts with a rule, rather than chasing them with examples, is the root fix.","A":"Keep-the-largest is a heuristic post-process that fails silently on documents with credit notes or adjustments, where the largest value is not the total.","B":"A positive-number constraint cannot even reject page numbers (also positive), let alone contribute anything to telling subtotals from totals.","C":"Examples from three vendors cannot cover 40+ layout variations. Without a definition, generalization to layouts absent from the examples stays weak."},"references":[{"title":"Structured outputs","url":"https://docs.claude.com/en/docs/build-with-claude/structured-outputs"},{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"}],"lesson":"過剰抽出はフィールド定義の不在が原因。該当/非該当の判定基準をフィールド記述に明示する","lesson_en":"Over-extraction comes from undefined fields. Write explicit inclusion and exclusion criteria into the field description","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D5-001","scenario":"structured-extraction","domain":5,"task_statement":"5.5","question_en":"Extracted records go to human review by random sampling: 5% of documents are selected regardless of content. Reviewers report spending most of their time confirming correct extractions, while customers keep finding errors in the untouched 95%. The extraction step can emit per-field confidence scores. How should review routing change?","question_ja":"抽出レコードの人間レビューは無作為抽出で行われており、内容にかかわらず文書の5%が選ばれる。レビュアーは時間の大半を正しい抽出の確認に費やしていると報告する一方、手つかずの95%の中のエラーを顧客が見つけ続けている。抽出ステップはフィールドレベルの確信度スコアを出力できる。レビューのルーティングをどう変えるべきか。","options_en":{"A":"Route documents to review based on per-field confidence scores, sending the low-confidence extractions into the human queue","B":"Increase the random review sample from five percent to twenty percent of all processed documents each day","C":"Run every document through extraction twice and send any document where the two runs disagree to the human review queue","D":"Restrict human review to the documents whose extraction output failed JSON schema validation during processing"},"options_ja":{"A":"フィールドレベルの確信度スコアに基づいて文書をルーティングし、低確信度の抽出を人間のキューへ送る","B":"無作為レビューのサンプル比率を、処理文書全体の5%から20%へ引き上げる","C":"全文書の抽出を2回実行し、2回の結果が食い違った文書を人間レビューのキューへ送る","D":"人間レビューの対象を、処理中にJSONスキーマ検証に失敗した抽出出力の文書だけに限定する"},"correct":"A","explanation_ja":{"why_correct":"レビューという希少リソースはエラーが濃い場所へ向けるべきだ。無作為抽出は、エラー率の低いシステムでは「正しい抽出の確認作業」にレビュー時間を浪費し、エラーの大半をレビュー外に残す——シナリオの2つの症状はまさにこれだ。確信度スコアが利用可能なのだから、低確信度の抽出に人間を集中させれば、同じレビュー量でエラー捕捉率が上がる。運用では、この確信度をラベル付き検証データで較正し、フィールド・文書タイプごとに閾値を設定・監視することが前提になる。","B":"20%への拡大はレビューコストを4倍にしながら、レビューがエラーの所在と無相関に配られる構造を温存する more-of-the-same だ。","C":"全件2回実行は推論コストを倍にし、2回とも同じ誤りをする系統的な誤抽出を素通しする。確信度が既に使えるのに使わない過剰装備でもある。","D":"スキーマ検証は形式の逸脱しか捕まえない。形式的には正しいが値が誤っている抽出——顧客が見つけているのはこの種類だ——はスキーマを通過してしまう。"},"explanation_en":{"why_correct":"Review capacity is scarce and should be aimed where errors concentrate. Random sampling in a low-error system wastes reviewer time confirming correct extractions while leaving most errors outside review — precisely the two symptoms in the scenario. With confidence scores available, concentrating humans on low-confidence extractions raises error capture at the same review volume. In production this presupposes calibrating the scores against labeled data and setting per-field, per-document-type thresholds under monitoring.","B":"Quadrupling to 20% multiplies review cost while preserving the structure in which review is distributed with no correlation to where errors are — more of the same.","C":"Running everything twice doubles inference cost and waves through systematic errors that both runs make identically. It also over-builds around confidence scores that already exist.","D":"Schema validation catches only structural deviations. Extractions that are structurally valid but factually wrong — the kind customers keep finding — pass the schema untouched."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"Claude Cookbooks","url":"https://github.com/anthropics/claude-cookbooks"}],"lesson":"人間レビューはランダムでなく確信度でルーティングする。低確信度にレビューを集中させる","lesson_en":"Route human review by confidence, not at random — concentrate reviewers where confidence is low","principle_tags":["root-cause-fix","escalate-with-handoff"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D5-002","scenario":"structured-extraction","domain":5,"task_statement":"5.5","question_en":"The extraction dashboard shows 96% field-level accuracy, and the team is celebrating. Then accounts payable reports that handwritten invoices — about 8% of volume — are \"almost always wrong\"; a spot check puts them near 71%. The current evaluation samples documents uniformly and reports one aggregate number. How should the team respond to this finding?","question_ja":"抽出ダッシュボードはフィールドレベル精度96%を示し、チームは祝賀ムードだ。ところが買掛部門から「手書きの請求書はほぼ毎回間違っている」という報告が入り、抜き取り検査では71%前後という結果が出た。現在の評価は文書を一様にサンプリングし、集計値を1つだけ報告している。チームはこの発見にどう対応すべきか。","options_en":{"A":"Raise the pipeline's overall accuracy target from 96 percent to 98 percent and continue tracking the single aggregate metric","B":"Add handwritten invoice samples to the few-shot examples in the extraction prompt to lift that segment's accuracy directly","C":"Evaluate accuracy per document type using stratified sampling, and direct fixes at whichever segments fall below target","D":"Route every handwritten invoice permanently to human data entry so the automated pipeline handles only typed documents"},"options_ja":{"A":"パイプライン全体の精度目標を96%から98%へ引き上げ、単一の集計指標の追跡を続ける","B":"抽出プロンプトの few-shot 例に手書き請求書のサンプルを追加し、そのセグメントの精度を直接引き上げる","C":"層別サンプリングで文書タイプ別に精度を評価し、目標を下回ったセグメントに対策を向ける","D":"手書き請求書は恒久的に全件を人間のデータ入力へ回し、自動パイプラインは活字文書だけを扱うようにする"},"correct":"C","explanation_ja":{"why_correct":"集計値96%は、92%を占める活字文書の好成績が8%の手書き文書の劣悪さを覆い隠す構造を持つ。文書タイプ別に層別サンプリングし精度をセグメント単位で計測すれば、弱いセグメントが恒常的に可視化され、対策の効果検証も次の盲点の検出も可能になる。現場の苦情が評価設計の盲点を暴いたのだから、直すべきは評価の粒度そのものだ。","A":"全体目標の引き上げでも、集計が弱セグメントを隠す構造は不変だ。活字側の改善だけで98%を達成でき、手書きは71%のまま放置されうる。","B":"few-shot 追加は対策候補ではあるが、計測基盤なしの思いつき修正だ。層別評価を先に作らなければ、その効果を検証する術も、次の弱セグメントを検出する術もないまま走ることになる。","D":"手書き全件の人間回しは71%の恒久化を前提にした撤退であり、コストを固定化する。まずセグメント別計測を作れば、改善可能かどうかを判断したうえで意思決定できる。"},"explanation_en":{"why_correct":"The 96% aggregate is structurally capable of hiding an 8%-volume segment's failure behind the strong performance of the other 92%. Stratified sampling with per-document-type accuracy keeps weak segments permanently visible, makes fixes verifiable, and detects the next blind spot. A field complaint exposed a blind spot in evaluation design — so the evaluation's granularity is what must change.","A":"Raising the aggregate target leaves the masking structure intact: 98% is reachable through typed-document gains alone while handwritten stays at 71%.","B":"Adding few-shot examples is a candidate fix, but a shot in the dark without measurement. Build the stratified evaluation first, or you run with no way to verify the effect and no way to detect the next weak segment.","D":"Permanently routing all handwritten volume to humans is a retreat that assumes 71% is forever, locking in the cost. Build segmented measurement first, then decide from evidence whether improvement is possible."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"Claude Cookbooks","url":"https://github.com/anthropics/claude-cookbooks"}],"lesson":"集計精度はセグメントの劣化を隠す。文書タイプ別に層別評価し、対策はセグメント単位で打つ","lesson_en":"Aggregate accuracy hides failing segments. Evaluate per document type with stratified sampling; fix per segment","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S6-D5-003","scenario":"structured-extraction","domain":5,"task_statement":"5.6","question_en":"Customer records are consolidated from three sources: the CRM, the billing system, and the support desk. When the sources disagree on a shipping address, the pipeline silently adopts whichever source it happened to read first, and several mis-deliveries have been traced back to this. Consolidated records feed both automated shipping and a human operations console. How should disagreements be handled?","question_ja":"顧客レコードをCRM・請求システム・サポートデスクの3ソースから統合している。配送先住所がソース間で食い違うとき、パイプラインは先に読み込んだ方のソースを無言で採用しており、複数の誤配送がこれに起因すると突き止められた。統合レコードは自動配送処理と人間のオペレーションコンソールの両方に供給される。食い違いをどう扱うべきか。","options_en":{"A":"Resolve address conflicts automatically by preferring the source system whose record carries the most recent update timestamp","B":"Designate the CRM as the system of record and have its address override the other two sources on every conflict","C":"Reject any customer record containing a field-level conflict and queue the entire record for manual re-entry by staff","D":"Keep per-field source attribution and emit any conflict as a structured flag carrying the competing values and their origins"},"options_ja":{"A":"最も新しい更新タイムスタンプを持つレコードのソースシステムを優先することで、住所の対立を自動解決する","B":"CRM を正本（system of record）と定め、対立時は常に CRM の住所が他の2ソースを上書きするようにする","C":"フィールドレベルの対立を含む顧客レコードは拒否し、レコード全体をスタッフによる手動再入力のキューへ回す","D":"全フィールドにソース帰属を保持し、対立は競合する値と出所を載せた構造化された conflict フラグとして出力する"},"correct":"D","explanation_ja":{"why_correct":"出所の異なる主張を統合するとき、対立の無言解消は情報の破壊だ。フィールドごとに claim-source マッピングを保持し、対立を構造化された conflict フラグ（競合値＋帰属）として出力すれば、機械の消費者である自動配送はフラグを検出して出荷を保留でき、人間コンソールは根拠を見て解決できる。供給先に機械と人間の両方がいることが決め手で、散文の注記ではなく機械可読なフラグが必要になる。誤配送の根本原因は「どれかを選んだこと」ではなく「対立が起きた事実を消したこと」である。","A":"最新更新の優先は一見合理的だが、タイムスタンプの新しさは正しさを保証しない（バッチ同期が古い値を新しい時刻で上書きする等）。そして依然として無言の単一値化であり、下流は対立の発生自体を知れない。最も引っかかりやすい選択肢だ。","B":"単一ソースの無条件優先は、ガバナンスの体裁をまとった無言の対立解消だ。CRM が古い住所を保持しているケース（顧客がサポート窓口で更新を依頼した直後など）では誤配送がそのまま再生産され、下流は対立が起きた事実を知れない。","C":"対立全件の拒否と手動再入力は、表記揺れ程度の軽微な差異まで人手に回す過剰反応で、スループットを壊す。対立の可視化と処理の継続は両立できる。"},"explanation_en":{"why_correct":"When consolidating claims from different sources, silently resolving a conflict destroys information. Keep a per-field claim-source mapping and emit conflicts as a structured flag carrying the competing values and their attributions: the machine consumer (automated shippin
