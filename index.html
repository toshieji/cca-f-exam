ource":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D2-004","scenario":"developer-productivity","domain":2,"task_statement":"2.5","question_en":"An engineer asks the agent where the config value PAYMENT_RETRY_LIMIT is consumed in an unfamiliar 400k-line codebase. The current implementation walks the repository tree and Reads files one by one from the top; the context fills up long before the relevant code is reached, and the answer never arrives. What approach fixes this?","question_ja":"エンジニアが、初見の40万行のコードベースで設定値 PAYMENT_RETRY_LIMIT がどこで使われているかをエージェントに尋ねた。現在の実装はリポジトリツリーを先頭から順に辿ってファイルを1つずつ Read しており、該当コードに到達するはるか前にコンテキストが埋まり、回答にたどり着けない。どのアプローチがこれを直すか。","options_en":{"A":"Answer from the repository README and directory layout, inferring the usage sites without opening the files","B":"Grep for the config key to locate usages, Read only the matching files, and widen only as needed","C":"Spawn several subagents that each read one section of the repository in full and report a summary","D":"Build an index by summarizing every file first, then answer the question from those summaries"},"options_ja":{"A":"リポジトリの README とディレクトリ構成から答え、ファイルを開かずに使用箇所を推測する","B":"Grep で設定キーの使用箇所を特定し、一致したファイルだけを Read し、必要なときだけ範囲を広げる","C":"複数のサブエージェントを起動し、それぞれにリポジトリの一区画を全部読ませて要約を報告させる","D":"先に全ファイルを要約してインデックスを構築し、その要約群から質問に回答する"},"correct":"B","explanation_ja":{"why_correct":"問いは「特定の識別子がどこで使われているか」であり、答えに必要なのはコードベースの一部だけだ。Grep で位置を特定し、一致ファイルだけを Read し、理解が足りなければ段階的に範囲を広げる——この incremental understanding が、コンテキストを答えに関係する部分だけに使う唯一の構成だ。全体を読む必要は問いのどこにもない。","A":"裏取りのない推測は、設定値のリネームや隠れた参照（動的キー・設定ファイル経由）を確実に取りこぼす。速いが、正しさを保証するものが何もない。","C":"総読み込み量は変わらず、コストを並列化しただけの力技。1つの識別子の所在という点の質問に対し、リポジトリ全域の要約を生成するのは膨大な無駄だ。","D":"1回の参照質問のために全ファイル要約という重い前処理を課す過剰設計。しかも要約は非可逆で、特定の識別子の使用箇所という細部は要約から抜け落ちやすい。"},"explanation_en":{"why_correct":"The question is \"where is this identifier consumed\" — only a sliver of the codebase is relevant. Grep to locate, Read only the matching files, widen incrementally if understanding falls short: incremental understanding is the only structure that spends context exclusively on answer-relevant material. Nothing in the question requires reading everything.","A":"Unverified inference reliably misses renames and hidden references (dynamic keys, config indirection). Fast, but nothing guarantees it is right.","C":"Same total read volume, just parallelized brute force. Generating repo-wide summaries to answer a point question about one identifier is enormous waste.","D":"Over-engineering: a heavy full-repo summarization pass for a single lookup. Summaries are lossy, and a specific identifier's usage sites are exactly the detail summaries tend to drop."},"references":[{"title":"Claude Code best practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"点の質問は Grep で位置特定→該当ファイルだけ Read→必要な分だけ段階拡大、の手順で解く","lesson_en":"Answer point questions procedurally: Grep to locate, Read only the hits, widen incrementally as needed","principle_tags":["least-privilege","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D3-001","scenario":"developer-productivity","domain":3,"task_statement":"3.1","question_en":"Your monorepo holds a React frontend and a Go backend. The single root CLAUDE.md now contains contradictory guidance — \"use camelCase for identifiers\" vs \"use snake_case for database fields\", frontend test conventions vs backend test conventions — and Claude keeps applying frontend rules to backend code. How should the configuration be reorganized?","question_ja":"モノレポに React のフロントエンドと Go のバックエンドが同居している。ルート唯一の CLAUDE.md には矛盾する指針——「識別子は camelCase」と「DB フィールドは snake_case」、フロントエンドのテスト規約とバックエンドのテスト規約——が同居し、Claude はバックエンドのコードにフロントエンドのルールを適用し続けている。設定をどう再編成すべきか。","options_en":{"A":"Split the guidance into two files under .claude/rules/ without paths frontmatter, one for the frontend and one for the backend","B":"Keep one root file but prefix every rule with a sentence stating which part of the monorepo it governs","C":"Place a CLAUDE.md inside frontend/ and backend/ so each area's conventions combine with the root file","D":"Convert each area's conventions into skills that developers invoke when they start work in that area"},"options_ja":{"A":"ガイダンスを .claude/rules/ 配下の2ファイル（paths frontmatter なし）に、フロントエンド用とバックエンド用として分割する","B":"ルート1ファイルのまま、各ルールの先頭にモノレポのどの部分に適用されるかを述べる一文を付ける","C":"frontend/ と backend/ の中にそれぞれ CLAUDE.md を置き、各領域の規約がルートと組み合わせて解釈されるようにする","D":"各領域の規約をスキルに変換し、その領域の作業を始めるときに開発者に起動してもらう"},"correct":"C","explanation_ja":{"why_correct":"CLAUDE.md は階層構造を持ち、作業中のディレクトリに応じた各レベルのファイルが組み合わせて解釈される。frontend/ と backend/ にそれぞれの規約を置けば、バックエンド作業時にはバックエンドの規約＋ルートの共通則だけが効き、矛盾は構造的に解消される。共通規約はルートに残せるので、重複もない。","B":"全ルールが依然として常時ロードされ、適用条件の文はモデルへの確率的なお願いにすぎない。矛盾する規約が同じコンテキストに載り続けるという根本原因が残る。","D":"規約は該当ファイルを触るあいだ常に効いてほしい環境情報で、起動を人の記憶に頼るスキル化は誤配置。起動忘れの分だけ規約違反が再発する。","A":"paths frontmatter の無い rules は常時ロードされる。分割しても両領域の規約が全セッションに載り続け、矛盾はそのまま残る（paths の glob を付けて初めてファイル種別スコープになる）。"},"explanation_en":{"why_correct":"CLAUDE.md is hierarchical: the files at each level relevant to where you're working combine and are interpreted together. With conventions in frontend/ and backend/, backend work sees only backend rules plus shared root rules — the contradiction dissolves structurally, and shared conventions stay unduplicated at the root.","B":"Every rule still loads all the time, and applicability sentences are probabilistic requests. The root cause — contradictory rules sharing one context — remains.","D":"Conventions are ambient context that should hold whenever matching files are touched; making them skills ties compliance to humans remembering to invoke them.","A":"Rules without a paths frontmatter are always loaded. Split or not, both areas' conventions ride along in every session and the contradiction persists — only a paths glob makes them file-scoped."},"references":[{"title":"Claude Code: Manage Claude's memory","url":"https://code.claude.com/docs/en/memory"}],"lesson":"領域ごとの規約はディレクトリ階層の CLAUDE.md へ。作業対象の領域に応じて root と組み合わせて解釈される","lesson_en":"Area-specific conventions go in directory-level CLAUDE.md files, interpreted together with the root for whatever area is being worked on","principle_tags":["single-responsibility","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D3-002","scenario":"developer-productivity","domain":3,"task_statement":"3.2","question_en":"Every Friday someone on the team generates release notes by pasting a thirty-line prompt into Claude Code, filling in that week's version number and date range by hand. Each member keeps a slightly different copy, so tone and structure drift depending on who runs it, and newcomers ask where to find \"the right version\". What is the appropriate fix?","question_ja":"毎週金曜、チームの誰かが30行のプロンプトを Claude Code に貼り付け、その週のバージョン番号と日付範囲を手で埋めてリリースノートを生成している。メンバーごとに微妙に異なるコピーを持っているため、誰が実行するかで文体と構成がぶれ、新人からは「正しい版はどこにあるのか」と質問が出る。適切な修正はどれか。","options_en":{"A":"Paste the thirty-line prompt into the root CLAUDE.md so every session automatically carries it","B":"Store one canonical copy of the prompt in the team wiki and have everyone paste from there weekly","C":"Have each member save the prompt as a personal slash command under their own user scope","D":"Check a project-scoped slash command into the repo, taking the version as $0 and the date range as $1"},"options_ja":{"A":"30行のプロンプトをルートの CLAUDE.md に貼り、すべてのセッションが自動で保持するようにする","B":"プロンプトの正本1部をチーム Wiki に置き、毎週全員がそこからコピーして貼る運用にする","C":"各メンバーが自分のユーザースコープに個人用スラッシュコマンドとしてプロンプトを保存する","D":"プロジェクトスコープのスラッシュコマンドをリポジトリにコミットし、バージョンは $0、日付範囲は $1 の引数で受け取る"},"correct":"D","explanation_ja":{"why_correct":"症状は3つ——毎週の同一プロンプト再利用、実行者間のぶれ、可変部分（バージョン・日付）の手埋め。プロジェクトスコープのスラッシュコマンドをリポジトリにコミットすれば、全員が同一の正本を使い（ぶれ解消）、繰り返しは /コマンド一発になり、可変部分は $0（バージョン）と $1（日付範囲）のインデックス引数で受け取れる。新人は git clone しただけで「正しい版」を手にする。","A":"週1回しか使わない30行を常時ロードのコンテキストに載せる誤配置。毎セッションのトークンを消費し続けるうえ、引数の仕組みもない。","B":"正本は一意になるが、コピペ運用自体が残るため転記ミスと手埋めが続く。Wiki とリポジトリの同期という新たなずれの発生源も増える。","C":"個人スコープではコピーの分散という根本原因がそのまま残る。各自の版は徐々に乖離し、チーム標準にはならない。"},"explanation_en":{"why_correct":"Three symptoms: weekly reuse of the same prompt, drift across members, hand-filled variables (version, dates). A project-scoped slash command committed to the repo gives everyone the identical canonical version (drift gone), collapses the ritual to one /command, and parameterizes the variable parts via indexed arguments ($0 for the version, $1 for the date range). Newcomers get \"the right version\" from git clone alone.","A":"Misplacement: thirty lines used once a week don't belong in always-loaded context — a permanent token cost with no argument mechanism.","B":"One canonical source, but the copy-paste workflow survives, so transcription errors and hand-filling continue — plus a new wiki-vs-repo sync gap.","C":"User scope preserves the root cause: distributed copies. Individual versions keep drifting apart, and nothing becomes the team standard."},"references":[{"title":"Claude Code: Slash commands","url":"https://code.claude.com/docs/en/slash-commands"}],"lesson":"チームの定型プロンプトはプロジェクトスコープのコマンドで正本一元化し、可変部分は $0 / $1 で引数化する","lesson_en":"Canonicalize recurring team prompts as project-scoped commands; parameterize the variable parts with $0 / $1","principle_tags":["single-responsibility","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D3-003","scenario":"developer-productivity","domain":3,"task_statement":"3.4","question_en":"A ticket asks for the fifteenth REST resource in an internal admin service. The previous fourteen followed an identical CRUD template and were all implemented with direct execution. Reading the spec, you notice this one is different: \"tags\" is the service's first many-to-many resource, and attaching tags requires backward-compatible API changes to two existing resources. A teammate says: \"Resource fifteen — run it directly like always.\" How should you proceed?","question_ja":"チケットは社内管理サービスへの15個目のRESTリソース追加を求めている。これまでの14個は同一のCRUDテンプレートに従い、すべて直接実行で実装してきた。仕様を読むと今回は違う。「tags」はこのサービス初の多対多リソースで、タグ付与には既存2リソースへの後方互換なAPI変更が必要だ。同僚は「15個目のリソースだ、いつも通り直接実行で」と言っている。どう進めるべきか。","options_en":{"A":"Use plan mode: the many-to-many shape and the changes to existing resources are new architectural ground, not the template","B":"Run it directly as the teammate suggests — fourteen consistent precedents make this exactly the established-pattern case where planning only adds overhead","C":"Run it directly, but have Claude write the integration tests first so any design mistake surfaces quickly in the suite","D":"Split the ticket: implement the templated CRUD part directly now and defer the tagging relation to a later ticket"},"options_ja":{"A":"plan mode を使う。多対多という形状と既存リソースへの変更は、テンプレートではなく新しい設計領域だから","B":"同僚の言う通り直接実行する。14個の一貫した前例があるこの状況こそ、計画が純粋なオーバーヘッドになる確立パターンの典型だから","C":"直接実行するが、まず Claude に統合テストを書かせ、設計ミスがスイートで早期に露見するようにする","D":"チケットを分割する。テンプレート通りのCRUD部分は今すぐ直接実装し、タグ付けのリレーションは後続チケットへ先送りする"},"correct":"A","explanation_ja":{"why_correct":"plan mode の判断基準は「このタスクの曖昧さ×設計分岐」であって、前例の数ではない。初の多対多リレーションと既存2リソースへの後方互換変更という2つの細部は、まさに設計が分岐する箇所——中間テーブルか埋め込みか、既存APIをどう拡張するか——であり、14個の前例はどれもその答えを持っていない。定型の顔をしたタスクの中の初物を、細部で見抜くことが決め手だ。","B":"前例の数は表面の類似を語るだけで、当該タスクの分岐を消さない。「いつも通り」の判断こそ、この設問が埋め込んだ2つの細部を読み落としている。最も引っかかりやすい選択肢だ。","C":"テストは実装の正しさを検証するが、設計の選択そのものは検証できない。誤った設計のまま green になったスイートは、手戻りの発見を遅らせるだけだ。","D":"分割は一見安全に見えるが、CRUD部分の scaffold が形状を先に焼き付け、後続のリレーション設計がその形に縛られる。偽装した先送りである。"},"explanation_en":{"why_correct":"The plan-mode criteria are this task's ambiguity × design divergence — not the count of precedents. The two details — the service's first many-to-many relation and backward-compatible changes to two existing resources — are exactly where designs diverge (join table vs embedding, how to extend the existing APIs), and none of the fourteen precedents answers them. The deciding skill is spotting the novel item wearing a template's face.","B":"Precedent counts speak to surface similarity and erase none of this task's divergence. \"Like always\" is precisely what misses the two details the ticket embeds. The most tempting wrong answer.","C":"Tests verify an implementation, not the design choice itself. A suite that goes green on the wrong design only delays the discovery of rework.","D":"The split looks safe, but scaffolding the CRUD part bakes in a shape first, and the later relation design inherits its constraints. Disguised deferral."},"references":[{"title":"Claude Code: Common workflows (plan mode)","url":"https://code.claude.com/docs/en/common-workflows"},{"title":"Claude Code best practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"plan mode は前例の数でなく当該タスクの分岐で判断する。定型の顔をした初物は細部で見抜く","lesson_en":"Judge plan mode by this task's divergence, not the precedent count — spot the novel task wearing a template's face","principle_tags":["plan-when-divergent"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D3-004","scenario":"developer-productivity","domain":3,"task_statement":"3.5","question_en":"A platform team asked for \"an internal tool to make on-call handoffs easier\" with no further detail. You had Claude write a full specification and implement it in one pass. The result — a CLI generating markdown reports — missed badly: the team wanted a Slack-integrated checklist with pager data attached. A second attempt is planned. What should change about the process?","question_ja":"プラットフォームチームから「オンコール引き継ぎを楽にする社内ツール」という以上の詳細がない依頼が来た。あなたは Claude に仕様書の作成と実装を一気に行わせた。結果——markdown レポートを生成する CLI——は期待を大きく外した。チームが欲しかったのは、ページャのデータが添付される Slack 統合のチェックリストだった。再挑戦が予定されている。プロセスの何を変えるべきか。","options_en":{"A":"Invest more in the upfront prompt yourself, specifying the tool's intended behavior in far greater detail","B":"Have Claude interview the requesters first, asking questions until requirements firm up, then implement","C":"Ship a first version quickly and converge on expectations through review rounds on the working tool","D":"Have Claude draft a detailed specification document and get the requesting team to sign off on it before any implementation starts"},"options_ja":{"A":"自分が事前プロンプトにもっと投資し、ツールのあるべき挙動をはるかに詳細に記述する","B":"まず Claude に依頼元へのインタビューをさせ、質問を重ねて要件が固まってから実装に進む","C":"最初の版を素早く出荷し、動くツールへのレビューを繰り返して期待値に収束させる","D":"Claude に詳細な仕様書を起草させ、実装開始前に依頼元チームのサインオフを取る"},"correct":"B","explanation_ja":{"why_correct":"失敗の原因は実装力ではなく、要件が誰の頭の中でも言語化されていなかったことだ。インタビューパターン——実装前に Claude へ「まず質問せよ」と指示し、利用者・ワークフロー・統合先・成果物の形を尋ねさせる——は、依頼元自身も明文化できていない要件を対話で引き出してから作る反復改善の手法で、今回の「Slack 統合」「ページャデータ」のような決定的な要件を実装前に表面化させられた。質問による引き出し（elicit）は、相手が言語化していなかった要件を表に出す。書いたものを承認させる（validate）だけでは、それは起きない。","A":"書き手が要件を知らないことが問題の根源なのに、その書き手の記述量を増やしても当てずっぽうが長くなるだけだ。今回外した本人の想像を精緻化する方向に解決はない。","C":"最も引っかかりやすい選択肢。反復自体は正しいが、根本的に間違った土台（CLI vs Slack 統合）の上の反復は作り直しの連続になる。安価な質問で防げたズレを、高価な実装後レビューで発見する構成だ。","D":"仕様書は作り手の推測を整形して承認させる装置になりがちだ。依頼元は書かれたものの妥当性は判断できても、書かれていない暗黙の要件を思い出す契機を持たない。引き出す（elicit）と承認を取る（validate）は別の行為である。"},"explanation_en":{"why_correct":"The failure wasn't implementation skill — the requirements existed in no one's head in articulated form. The interview pattern — instructing Claude to ask before building, probing users, workflows, integrations, and output shape — is the iterative-refinement technique for surfacing requirements the requesters themselves haven't verbalized. It would have exposed the decisive facts (Slack integration, pager data) before any code existed. Interview-style elicitation surfaces requirements the stakeholder had not verbalized; sign-off validation of a drafted document never triggers that.","A":"The root problem is that the prompt author didn't know the requirements; lengthening that author's guesswork just produces more detailed guesswork. The person who missed cannot spec their way out alone.","C":"The most tempting option: iteration is right, but iterating on a fundamentally wrong foundation (CLI vs Slack integration) means serial rebuilds — discovering through expensive post-build reviews what a cheap question would have caught.","D":"A spec document tends to formalize the builder's guesses for sign-off. The requesters can judge what is written, but nothing prompts them to surface the implicit requirements that never got written down. Eliciting and validating are different acts."},"references":[{"title":"Claude Code best practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"要件が曖昧なら、実装前に Claude に質問させるインタビューパターンで要件を引き出してから作る","lesson_en":"When requirements are vague, use the interview pattern — have Claude ask questions to firm them up before building","principle_tags":["escalate-with-handoff","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D5-001","scenario":"developer-productivity","domain":5,"task_statement":"5.4","question_en":"During codebase exploration, the agent's searches for common identifiers return thousands of matches, most from node_modules/ and a vendored/ directory of third-party code the team never edits. These match lists flood the context, and the agent starts losing track of findings from earlier in the session. What is the right fix?","question_ja":"コードベース探索中、一般的な識別子に対するエージェントの検索が数千件のマッチを返している。その大半は node_modules/ と、チームが編集することのないサードパーティコードの vendored/ ディレクトリ由来だ。このマッチ一覧がコンテキストを圧迫し、エージェントはセッション前半の調査結果を見失い始めている。正しい修正はどれか。","options_en":{"A":"Exclude the third-party directories from search scope and trim match output to what each question needs","B":"Run /compact after each burst of searches so the accumulated matches stop crowding the context window","C":"Move the sessions to a model with a larger context window so the full match volume fits comfortably","D":"Delegate every search to a subagent and have it forward its complete match list when it finishes"},"options_ja":{"A":"サードパーティのディレクトリを検索スコープから除外し、マッチ出力も各質問に必要な範囲まで絞り込む","B":"検索を一区切りするたびに /compact を実行し、蓄積したマッチがコンテキストを圧迫しないようにする","C":"より大きなコンテキストウィンドウのモデルにセッションを移し、マッチ全量が余裕で収まるようにする","D":"すべての検索をサブエージェントに委任し、完了時にマッチの全リストを転送させる"},"correct":"A","explanation_ja":{"why_correct":"コンテキストは有限予算であり、答えに寄与しないトークンは他の何かを押し出す。マッチの大半が「編集することのない」サードパーティコード由来である以上、それらは定義上ノイズだ。検索スコープからの除外で流入を発生源で止め、さらに出力を質問に必要な範囲（件数上限・ファイル一覧のみ等）に絞る——予算を答えに関係する情報だけに使う二段の絞り込みが正解となる。","B":"症状対処型。ノイズは一度コンテキストに入ってから消され、/compact は非可逆なので前半の調査結果——守りたかった当のもの——まで一緒に劣化する。","C":"容量を増やしてもノイズはノイズのままで、無関係なマッチの海は重要情報の埋没（lost-in-the-middle）を悪化させる。流入を絞らない限り根本は直らない。","D":"隔離の形だけ真似た誤用。全リストを転送するなら、圧迫の発生場所がサブエージェント経由に変わるだけで、メインのコンテキストに同じ洪水が届く。"},"explanation_en":{"why_correct":"Context is a finite budget: tokens that don't contribute to the answer evict something that does. Since most matches come from third-party code the team never edits, they are noise by definition. Excluding those directories stops the influx at the source, and trimming output to what each question needs (match caps, file-list-only passes) completes the two-stage narrowing that spends the budget only on answer-relevant information.","B":"Symptom treatment: the noise enters context before being cleaned, and /compact is lossy — degrading the early findings, the very thing that needed protecting.","C":"More capacity leaves noise as noise; an ocean of irrelevant matches worsens lost-in-the-middle burial of key information. Nothing is fixed until the influx narrows.","D":"Isolation in form only: forwarding the complete list just reroutes the flood through a subagent, delivering the same deluge to the main context."},"references":[{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"}],"lesson":"検索ノイズは発生源で止める。スコープ除外＋出力の絞り込みでコンテキスト予算を答えに関係する情報だけに使う","lesson_en":"Stop search noise at the source: scope exclusions plus output trimming keep the context budget on answer-relevant information","principle_tags":["least-privilege","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D1-001","scenario":"multi-agent-research","domain":1,"task_statement":"1.2","question_en":"Your coordinator spawns three web-search subagents for each research topic. Reviewing transcripts, you find all three consistently return the same handful of top-ranked sources, so the final report draws on far fewer sources than the token spend suggests. Each subagent receives the identical prompt: \"Research <topic> and return relevant sources.\" What is the most effective fix?","question_ja":"コーディネータはリサーチトピックごとに3体のWeb検索サブエージェントを起動する。トランスクリプトを確認すると、3体とも毎回同じ上位数ソースばかりを返しており、消費トークン量に見合わないほど最終レポートの情報源が少ない。各サブエージェントには同一のプロンプト「<topic> を調査し関連ソースを返せ」が渡されている。最も効果的な修正はどれか。","options_en":{"A":"Have the coordinator divide the topic into explicit non-overlapping scopes and assign a distinct scope to each subagent's prompt","B":"Add a deduplication step that removes repeated sources from the combined results before they reach the synthesis subagent","C":"Increase the number of search subagents from three to six so a larger share of the available sources gets covered per run","D":"Assign each subagent a different search provider so ranking differences naturally diversify the sources they find"},"options_ja":{"A":"コーディネータがトピックを重複しない明示的なスコープに分割し、各サブエージェントのプロンプトに別々の担当スコープを割り当てる","B":"統合サブエージェントに渡る前に、結合結果から重複ソースを除去する dedup 処理を追加する","C":"検索サブエージェントを3体から6体に増やし、1回の実行でカバーされるソースの割合を広げる","D":"各サブエージェントに異なる検索プロバイダを割り当て、ランキングの差で見つかるソースが自然に多様化するようにする"},"correct":"A","explanation_ja":{"why_correct":"3体のサブエージェントは互いの結果を見られない隔離コンテキストで動く。同一プロンプトなら、各自が独立に同じ上位ランクのソースへ収束するのは必然だ。重複の根本原因は探索空間の未分割にある。コーディネータが①トピックをサブトピック・ソース種別・期間などの重複しないスコープへ分割し、②各サブエージェントのプロンプトに担当範囲を明示すれば、同じトークン予算で探索面積が広がる。","B":"症状対処。重複ソースを事後に削っても消費済みトークンは戻らず、探索されなかった領域の欠落も埋まらない。","C":"同一プロンプトのまま台数を増やしても、各自が同じ上位ソースへ収束する構造は変わらず、コストだけが倍増する。","D":"プロバイダが違っても、同一トピックの同一クエリは各エンジンで似通った定番ソースへ収束しがちだ。多様化を偶然のランキング差に委ねる症状対処で、探索空間の分割という構造的な解決を欠いている。"},"explanation_en":{"why_correct":"The three subagents run in isolated contexts and cannot see each other's results; given identical prompts, each independently converging on the same top-ranked sources is inevitable. The root cause is an unpartitioned search space. Having the coordinator split the topic into non-overlapping scopes (subtopics, source types, time periods) and state each subagent's assigned scope in its prompt widens coverage for the same token budget.","B":"Symptom treatment. Removing duplicates afterwards refunds no spent tokens and fills none of the gaps left unexplored.","C":"With identical prompts, more agents still converge on the same top sources — cost doubles, coverage does not.","D":"Even across providers, the same query on the same topic converges on much the same canonical sources. It outsources diversity to incidental ranking differences — a symptomatic fix that still lacks the structural division of the search space."},"references":[{"title":"How we built our multi-agent research system","url":"https://www.anthropic.com/engineering/built-multi-agent-research-system"},{"title":"Claude Agent SDK: Subagents","url":"https://code.claude.com/docs/en/agent-sdk/subagents"}],"lesson":"サブエージェントの重複調査は事後 dedup でなく、コーディネータによる重複しないスコープ分割で防ぐ","lesson_en":"Prevent duplicated subagent research with coordinator-assigned non-overlapping scopes, not post-hoc dedup","principle_tags":["single-responsibility","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D1-002","scenario":"multi-agent-research","domain":1,"task_statement":"1.2","question_en":"Your coordinator concatenates the full raw transcripts of every upstream subagent — web searches with their result listings, document analyses, dead-end explorations — and hands the whole bundle to the report-generation subagent. Reports come out unfocused: key findings are buried and duplicated content appears verbatim. What architectural change addresses this?","question_ja":"コーディネータは、結果一覧付きのWeb検索・文書分析・行き止まりに終わった探索まで、上流サブエージェント全員の生トランスクリプトを連結し、レポート生成サブエージェントへ丸ごと渡している。出来上がるレポートは焦点が定まらず、重要な知見が埋もれ、同じ内容が逐語的に重複して現れる。どのアーキテクチャ変更が有効か。","options_en":{"A":"Let subagents pass outputs directly to each other so the report generator negotiates what it needs with each producer","B":"Instruct the report-generation subagent to first skim the bundle and disregard passages that look redundant or low-value","C":"Have the coordinator distill each subagent's transcript into structured findings and pass only that aggregate onward","D":"Run report generation on a configuration with a larger context window so the full transcripts fit without truncation"},"options_ja":{"A":"サブエージェント同士が出力を直接やり取りできるようにし、レポート生成者が各生産者と必要な内容を交渉して受け取る","B":"レポート生成サブエージェントに、まず束全体に目を通して冗長・低価値に見える箇所を無視してから書くよう指示する","C":"コーディネータが各サブエージェントのトランスクリプトを構造化された知見に蒸留し、その集約だけを下流へ渡す","D":"レポート生成をより大きなコンテキストウィンドウの構成で実行し、生トランスクリプト全量が切り詰めなしで収まるようにする"},"correct":"C","explanation_ja":{"why_correct":"hub-and-spoke 構成では、ハブであるコーディネータが中間結果を蒸留・集約してから下流へ渡す責務を持つ。レポート品質の低下は容量不足ではなく信号対雑音比の問題であり、検索ノイズや袋小路を含む生トランスクリプトを渡す限り、どれだけ読ませても要点は埋もれる。コーディネータが各出力を構造化された知見（主張・出典・確度）へ蒸留し、その集約だけを渡せば、レポート生成は高密度の入力から書ける。","A":"サブエージェント同士の直接通信は hub-and-spoke を崩し、調整コストと文脈汚染を全ペアに分散させる。オーケストレーションの責務はコーディネータに集約すべきだ。","B":"取捨選択の指示は確率的で、ノイズは既にコンテキストを消費している。入れてから無視させるのは手遅れだ。","D":"容量を増やしても信号対雑音比は変わらない。問題は入り切らないことではなく、埋もれることだ。"},"explanation_en":{"why_correct":"In a hub-and-spoke architecture, the coordinator (the hub) owns the responsibility of distilling and aggregating intermediate results before passing them downstream. The quality problem is signal-to-noise, not capacity: as long as raw transcripts full of search noise and dead ends are forwarded, key points stay buried no matter how much the report agent reads. Distilling each output into structured findings (claims, sources, confidence) and passing only the aggregate gives report generation a dense input.","A":"Direct subagent-to-subagent communication breaks hub-and-spoke, spreading coordination cost and context contamination across every pair. Orchestration belongs to the coordinator.","B":"A skim-and-ignore instruction is probabilistic, and the noise has already consumed context. Filtering after ingestion is too late.","D":"More capacity leaves the signal-to-noise ratio unchanged. The problem is not that content fails to fit — it is that findings drown."},"references":[{"title":"How we built our multi-agent research system","url":"https://www.anthropic.com/engineering/built-multi-agent-research-system"},{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"}],"lesson":"下流工程に渡すのは生ダンプでなく、ハブ（コーディネータ）が蒸留・集約した構造化知見","lesson_en":"Hand downstream stages the hub's distilled, structured aggregate — never raw transcript dumps","principle_tags":["root-cause-fix","position-aware-context"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D1-003","scenario":"multi-agent-research","domain":1,"task_statement":"1.2","question_en":"Production metrics show 70% of queries to your research system are simple fact checks answerable with a single web search, yet every query spawns all four subagents — search, document analysis, synthesis, report generation — making simple lookups slow and expensive. What is the most effective change?","question_ja":"本番メトリクスによれば、リサーチシステムへのクエリの70%はWeb検索1回で答えられる単純な事実確認だ。しかし現在はどのクエリでも検索・文書分析・統合・レポート生成の4サブエージェント全てを起動しており、単純な照会が遅く高コストになっている。最も効果的な変更はどれか。","options_en":{"A":"Cache the answers to previously seen queries so repeated fact checks skip the subagent pipeline entirely","B":"Have the coordinator assess each incoming query first and spawn only the subagents that query actually requires","C":"Launch the four subagents in parallel instead of sequentially so total wall-clock time per query drops","D":"Add keyword rules that route queries containing question words like \"when\" or \"who\" past the subagent pipeline"},"options_ja":{"A":"既出クエリの回答をキャッシュし、繰り返される事実確認がサブエージェント・パイプラインを完全にスキップできるようにする","B":"コーディネータが受信クエリをまず評価し、そのクエリが実際に必要とするサブエージェントだけを起動する","C":"4つのサブエージェントを逐次でなく並列に起動し、クエリあたりの合計実行時間を短縮する","D":"\"when\" や \"who\" などの疑問語を含むクエリをサブエージェント・パイプラインの外へ回すキーワードルールを追加する"},"correct":"B","explanation_ja":{"why_correct":"問題の核心は、クエリの複雑さと投入するオーケストレーションの重さが釣り合っていないことだ。コーディネータが最初にクエリを評価し、単純な事実確認は直接またはWeb検索サブエージェント1体で答え、深い調査にのみフルパイプラインを展開する——この動的なサブエージェント選択はモデル駆動の判断であり、70%を占める単純クエリの遅延とコストを構造的に解消する。","A":"キャッシュは再訪クエリにしか効かず、初見の単純クエリが全パイプラインを通る構造は残る。症状対処だ。","C":"並列化は遅延を縮めるがコストと過剰起動はそのまま。単純クエリに4エージェントが不要という根本原因に触れない。","D":"疑問語の有無は複雑さの代理指標として不正確だ。「When did the EU AI Act's provisions diverge across member states?」のように疑問語を含む深い調査はいくらでもあり、言い回しが変わるだけで誤ルーティングされる。判断が要る箇所でちょうど壊れるルールである。"},"explanation_en":{"why_correct":"The core problem is a mismatch between query complexity and the orchestration weight applied to it. Having the coordinator assess each query first — answering simple fact checks directly or with a single search subagent, and deploying the full pipeline only for deep research — is dynamic subagent selection, a model-driven decision that structurally removes the latency and cost for the 70% of simple queries.","A":"Caching only helps repeat queries; first-time simple queries still traverse the full pipeline. Symptom treatment.","C":"Parallelism shrinks latency but leaves cost and over-spawning untouched. It never addresses the root cause that four agents are unnecessary for simple queries.","D":"Question words are a poor proxy for complexity: \"When did the EU AI Act's provisions diverge across member states?\" contains one yet demands deep research, and a mere rephrasing changes the route. The rule breaks exactly where the judgment matters."},"references":[{"title":"How we built our multi-agent research system","url":"https://www.anthropic.com/engineering/built-multi-agent-research-system"},{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"起動するサブエージェントはクエリの複雑さに応じてコーディネータが動的に選ぶ。全部盛りを既定にしない","lesson_en":"Let the coordinator dynamically select subagents by query complexity — full fan-out must not be the default","principle_tags":["root-cause-fix","least-privilege"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D1-004","scenario":"multi-agent-research","domain":1,"task_statement":"1.3","question_en":"After a planning discussion with the user that narrowed the research question to post-2023 regulatory changes, the coordinator spawns a search subagent with the Task prompt: \"Research the topic we discussed above, respecting the constraints agreed earlier.\" The subagent returns generic results about the broad original topic. What is the correct fix?","question_ja":"リサーチ課題を2023年以降の規制変更に絞り込む計画議論をユーザーと行ったあと、コーディネータは検索サブエージェントを Task プロンプト「上で議論したトピックを、先ほど合意した制約を守って調査せよ」で起動した。サブエージェントは絞り込み前の広いトピックについての一般的な結果を返してきた。正しい修正はどれか。","options_en":{"A":"Enable the subagent context-inheritance option in AgentDefinition so spawned agents receive the parent conversation","B":"Have the subagent begin by asking the coordinator follow-up questions about the discussion before it starts searching","C":"Move the narrowed research question into the subagent's AgentDefinition system prompt so it is always available","D":"Write the narrowed question, time window, and agreed constraints explicitly into the Task prompt on every spawn"},"options_ja":{"A":"AgentDefinition のサブエージェント・コンテキスト継承オプションを有効化し、生成されたエージェントが親の会話を受け取れるようにする","B":"検索を始める前に、何が議論されたのかをサブエージェントからコーディネータへ追加質問させる","C":"絞り込んだリサーチ課題をサブエージェントの AgentDefinition システムプロンプトへ移し、常に参照できるようにする","D":"絞り込んだ課題・対象期間・合意済みの制約を、起動のたびに Task プロンプト自体へ明示的に書き込む"},"correct":"D","explanation_ja":{"why_correct":"サブエージェントは新しい隔離コンテキストで開始し、親の会話履歴を継承しない。「上で議論したトピック」「先ほど合意した制約」という参照は、サブエージェント側には指す先が存在しない。Task プロンプトはサブエージェントへの唯一の入力チャネルであり、必要な文脈——絞り込んだ課題・期間・制約——はそこに毎回明示的に書き込むしかない。","A":"AgentDefinition にそのようなフィールドは存在しない。コンテキストの隔離はサブエージェント設計の意図的な性質だ。","B":"サブエージェントは起動時のプロンプトを受けて完了まで自律的に走る。実行途中に親と対話して文脈を補う往復は設計上の想定ではなく、必要情報を最初から渡せばそもそも不要だ。","C":"AgentDefinition は静的な役割定義であり、リクエストごとに変わる絞り込み内容を置く場所ではない。次のリサーチでは古い制約が混入する。"},"explanation_en":{"why_correct":"Subagents start with a fresh, isolated context and inherit none of the parent conversation. References like \"the topic we discussed above\" and \"the constraints agreed earlier\" point at nothing on the subagent's side. The Task prompt is the only input channel to a subagent, so the needed context — the narrowed question, time window, and constraints — must be written into it explicitly on every spawn.","A":"AgentDefinition has no such field — context isolation is an intentional property of the subagent design.","B":"A subagent receives its spawn prompt and runs autonomously to completion; a mid-task Q&A round trip with the parent is not the designed interaction, and passing the information up front makes it unnecessary anyway.","C":"AgentDefinition is a static role definition, not a place for per-request specifics. The next research topic would inherit stale constraints."},"references":[{"title":"Claude Agent SDK: Subagents","url":"https://code.claude.com/docs/en/agent-sdk/subagents"},{"title":"Claude Code: Subagents","url":"https://code.claude.com/docs/en/sub-agents"}],"lesson":"サブエージェントは会話を継承しない。必要な文脈は毎回 Task プロンプトに明示的に書く","lesson_en":"Subagents inherit no conversation — pass every piece of needed context explicitly in each Task prompt","principle_tags":["explicit-context-passing"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D1-005","scenario":"multi-agent-research","domain":1,"task_statement":"1.3","question_en":"For a typical topic the coordinator issues five web searches covering independent subtopics. It currently launches one search subagent, waits for its result, then launches the next; end-to-end research time is dominated by this waiting. The searches do not depend on each other's results. What change gives the largest latency improvement?","question_ja":"典型的なトピックでは、コーディネータは互いに独立なサブトピックを扱う5件のWeb検索を発行する。現在は検索サブエージェントを1体起動して結果を待ち、それから次を起動する方式で、リサーチ全体の所要時間はこの待ち時間に支配されている。検索同士は互いの結果に依存しない。最も大きく遅延を改善する変更はどれか。","options_en":{"A":"Cut the number of subtopic searches from five to the two or three with the highest expected information value","B":"Have the coordinator issue all five Task calls in a single response so the independent searches run concurrently","C":"Merge the five subtopics into one search subagent invocation that works through them inside a single context","D":"Submit the five searches through the Message Batches API and assemble the results once the batch completes"},"options_ja":{"A":"サブトピック検索を5件から、期待情報価値が最も高い2〜3件に絞り込む","B":"コーディネータが1つのレスポンス内で5件の Task 呼び出しをまとめて発行し、独立な検索を同時実行する","C":"5つのサブトピックを1回のサブエージェント起動に統合し、単一のコンテキスト内で順に処理させる","D":"5件の検索を Message Batches API に投入し、バッチ完了時に結果を組み立てる"},"correct":"B","explanation_ja":{"why_correct":"決め手は「検索同士が互いの結果に依存しない」という一文だ。依存のない作業を順番に待つ理由はなく、コーディネータが1レスポンス内で複数の Task 呼び出しを発行すれば、5件の検索は並行に実行され、待ち時間は逐次の合計から最長の1件分へ縮む。カバレッジもコンテキスト分離も犠牲にしない、要件どおりの遅延改善だ。","A":"検索を減らすのはカバレッジを犠牲にする勝手なスコープ縮小で、チケットにない要件変更だ。遅延は並列化で削れるのだから探索範囲を削る必要はない。","C":"1体のエージェント内では5サブトピックが結局順に処理され、逐次性は解消しない。単一コンテキストに全サブトピックが積まれて焦点も薄まる。","D":"Batches API は遅延許容ワークロード向けで、完了まで最大24時間かかり得る。対話的なリサーチの高速化とは真逆の遅延特性であり、サブエージェントのマルチターンのツール実行にも適さない。"},"explanation_en":{"why_correct":"The deciding sentence is \"the searches do not depend on each other's results.\" There is no reason to serialize independent work: when the coordinator issues multiple Task calls in a single response, the five searches execute concurrently and waiting shrinks from the sum of all runs to the longest single run — with no sacrifice of coverage or context isolation.","A":"Cutting searches sacrifices coverage — an uninvited scope change. Since parallelism removes the latency, there is no need to shrink exploration.","C":"Inside one agent the five subtopics are still processed one after another, so the serialization remains, and a single context loaded with every subtopic dilutes focus.","D":"The Batches API targets latency-tolerant workloads and can take up to 24 hours — the opposite latency profile from speeding up interactive research, and unsuited to a subagent's multi-turn tool execution."},"references":[{"title":"Claude Agent SDK: Subagents","url":"https://code.claude.com/docs/en/agent-sdk/subagents"},{"title":"How we built our multi-agent research system","url":"https://www.anthropic.com/engineering/built-multi-agent-research-system"}],"lesson":"独立なサブタスクは1レスポンス内の並列 Task 呼び出しで同時実行する。依存がない作業を直列に待たない","lesson_en":"Run independent subtasks concurrently with parallel Task calls in one response — never serialize dependency-free work","principle_tags":["right-tool-for-latency"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D1-006","scenario":"multi-agent-research","domain":1,"task_statement":"1.3","question_en":"The document-analysis subagent's AgentDefinition prompt lists a fixed procedure: \"Step 1: open the PDF. Step 2: extract the abstract. Step 3: summarize each section in order...\" It works well on academic papers but produces broken output on interview transcripts and datasets, which have no abstract or sections. How should the prompt be restructured?","question_ja":"文書分析サブエージェントの AgentDefinition プロンプトには固定手順が列挙されている——「ステップ1: PDFを開く。ステップ2: アブストラクトを抽出する。ステップ3: 各セクションを順に要約する……」。学術論文ではよく機能するが、アブストラクトもセクションも持たないインタビュー書き起こしやデータセットでは壊れた出力になる。プロンプトをどう再構成すべきか。","options_en":{"A":"State the goal, output format, and constraints, and let the model choose its own steps for each document type","B":"Keep the procedure but add branches: one step list for papers, one for transcripts, and one for datasets","C":"Add a validation hook that detects deviation from the listed steps and restarts the subagent when it occurs","D":"Split document analysis into three specialized subagents, one per document type the system encounters"},"options_ja":{"A":"ゴール・出力フォーマット・制約を記述し、文書タイプごとの手順の選択はモデルに委ねる","B":"手順は保ちつつ分岐を追加する。論文用・書き起こし用・データセット用のステップリストをそれぞれ用意する","C":"列挙された手順からの逸脱を検出し、逸脱時にサブエージェントを再起動する検証フックを追加する","D":"文書分析を、システムが遭遇する文書タイプごとに1体ずつ、3つの専門サブエージェントに分割する"},"correct":"A","explanation_ja":{"why_correct":"固定のステップ列挙は事前構成された決定木であり、想定した入力形状（アブストラクトとセクションを持つ論文）から外れた瞬間に壊れる。エージェント的な作業への指示は、ゴール・成功基準・出力フォーマット・制約で書き、手順の選択はモデルの判断に委ねるべきだ。そうすればモデルは書き起こしには話者と論点の抽出、データセットには構造の記述と、入力に適応した手順を自ら組み立てる。","B":"分岐の列挙は変化のたびに増殖する決定木の拡張で、次の未知フォーマット（スライド、議事録）でまた壊れる。根本原因は手順の固定化そのものだ。","C":"フックが強制するのは「列挙された手順どおりか」という誤った不変条件だ。書き起こしでの手順逸脱こそが正しい適応であり、それを検出して再起動すれば正しい挙動を罰することになる。","D":"文書タイプごとのエージェント分割は過剰で、種別判定の前段が新たに必要になる上、未知タイプには依然として無力だ。"},"explanation_en":{"why_correct":"A fixed step enumeration is a pre-configured decision tree: it breaks the moment input deviates from the assumed shape (papers with abstracts and sections). Prompts for agentic work should state the goal, success criteria, output format, and constraints, delegating procedure to the model's judgment. The model then adapts — extracting speakers and themes from transcripts, describing structure for datasets — composing its own steps per input.","B":"Enumerating branches grows the decision tree with every variation and breaks again on the next unseen format (slides, meeting minutes). The root cause is the hardcoded procedure itself.","C":"The hook would enforce the wrong invariant — conformance to the listed steps. Deviating from those steps on a transcript is precisely the correct adaptation, so restarting on deviation punishes correct behavior.","D":"One agent per document type is over-engineering: it adds a new classification stage up front and still fails on unseen types."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"Claude Agent SDK: Subagents","url":"https://code.claude.com/docs/en/agent-sdk/subagents"}],"lesson":"エージェントへの指示はゴール・成功基準・制約で書く。手順の固定列挙は入力の変化で壊れる","lesson_en":"Prompt agents with goals, success criteria, and constraints — hardcoded step lists break when inputs vary","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D1-007","scenario":"multi-agent-research","domain":1,"task_statement":"1.6","question_en":"Asked to research a broad theme like \"the impact of AI regulation on healthcare startups,\" the system runs one research pass over the whole theme. The resulting report covers funding effects well but omits compliance costs and regional differences entirely, and spot checks confirm such misses are systematic across topics. What restructuring fixes this?","question_ja":"「AI規制がヘルスケア・スタートアップに与える影響」のような広いテーマを依頼されると、システムはテーマ全体に対して1回のリサーチパスを実行する。出来上がったレポートは資金調達への影響はよく押さえているが、コンプライアンスコストと地域差への言及が完全に抜けており、抜き取り確認ではこの種の取りこぼしがトピック横断で系統的に起きていることが確認された。どの再構成が有効か。","options_en":{"A":"Raise the research subagent's maximum output length so a single pass has enough room to address every aspect","B":"Run the same single-theme pass three times and merge the three reports, since different runs tend to surface different aspects of the theme","C":"Decompose the theme into a subtopic checklist, research each item, and verify the report against the checklist before synthesis","D":"Add a completeness-review agent that reads the drafted report and flags aspects it believes are missing"},"options_ja":{"A":"リサーチサブエージェントの最大出力長を引き上げ、1回のパスで全側面に触れられる余地を作る","B":"同一テーマの一括パスを3回実行して3本のレポートを統合する。実行ごとに浮かび上がる側面が異なるからだ","C":"テーマをサブトピックのチェックリストに分解して各項目を調査し、統合前にレポートをチェックリストと照合して欠落を検出する","D":"起草済みレポートを読み、欠けていると思われる側面をフラグする完全性レビュー・エージェントを追加する"},"correct":"C","explanation_ja":{"why_correct":"広いテーマへの一括1パスでは注意が目立つサブトピックへ引き寄せられ、取りこぼしは系統的に起きる。サブトピックのチェックリストへ分解すれば、カバレッジが「照合可能な成果物」に変わる。各項目は狭いスコープで集中調査され、統合前にコーディネータがレポートを列挙済みリストと突き合わせて、欠落分の追加調査を発行できる。分解と検証の組で、網羅が構造的に保証される。","A":"出力枠を広げても注意配分は変わらない。書く余地が足りないのではなく、探索の構造が単一パスであることが問題だ。","B":"実行ごとの揺らぎに頼るカバレッジは非決定的で、網羅の保証がない。3本のレポート間の重複を統合するコストも新たに生じる。","D":"起草後の指摘は検出止まりで、欠落を防ぐ構造を持たない。レビュー・エージェント自身も「何が欠けているべきか」の基準リストなしでは確率的な網にすぎず、指摘のたびに手戻りの再調査が走る。"},"explanation_en":{"why_correct":"A single pass over a broad theme lets attention gravitate to the salient subtopics, so omissions are systematic. Decomposing into a subtopic checklist turns coverage into a verifiable artifact: each item gets a focused, narrow-scope investigation, and before synthesis the coordinator checks the report against the enumerated list and issues follow-up research for anything missing. Decomposition plus verification makes coverage structural.","A":"A larger output budget does not change attention allocation. The problem is not room to write; it is the single-pass structure of exploration.","B":"Coverage that relies on run-to-run variance is non-deterministic and guarantees nothing, while adding the new cost of merging three overlapping reports.","D":"Post-draft flagging detects but does not prevent. Without an enumerated baseline of what should be present, the reviewer is itself a probabilistic net, and every flag triggers rework-style re-research after the fact."},"references":[{"title":"How we built our multi-agent research system","url":"https://www.anthropic.com/engineering/built-multi-agent-research-system"},{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"広いテーマは分解＋検証。サブトピックのチェックリスト化で、カバレッジを照合可能な成果物にする","lesson_en":"Broad themes need decomposition plus verification: a subtopic checklist makes coverage a checkable artifact","principle_tags":["single-responsibility","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D1-008","scenario":"multi-agent-research","domain":1,"task_statement":"1.6","question_en":"Your document-analysis stage runs one focused pass per document and produces good per-document summaries. A customer complains that a delivered report quoted one document's revenue figure as fact even though another document in the same corpus contradicted it. Each per-document summary was individually accurate. What change closes this gap?","question_ja":"文書分析ステージは文書ごとに1回の集中パスを実行し、単体としては良質な文書別サマリーを生成している。ところが、同一コーパス内の別文書が矛盾する数値を報告していたにもかかわらず、納品レポートがある文書の売上数値を事実として引用していたという苦情が顧客から来た。各文書別サマリーは個々には正確だった。どの変更がこのギャップを塞ぐか。","options_en":{"A":"Replace the per-document passes with one pass that reads the entire corpus at once so conflicts become visible","B":"Instruct each per-document analyst to flag statements that contradict the other documents in the corpus","C":"Run each per-document pass twice with different prompts and reconcile, catching what a single pass misses","D":"Keep the per-document passes and add an integration pass that checks their structured outputs for conflicts"},"options_ja":{"A":"文書別パスを、コーパス全体を一度に読む1回のパスへ置き換え、矛盾が視界に入るようにする","B":"各文書別アナリストに、コーパス内の他文書と矛盾する記述をフラグするよう指示する","C":"各文書別パスを異なるプロンプトで2回実行して突き合わせ、1回のパスの見落としを捕捉する","D":"文書別パスは維持し、その構造化出力を対象に文書間の矛盾を検査する統合パスを追加する"},"correct":"D","explanation_ja":{"why_correct":"矛盾は文書「間」の関係であり、単一文書だけを見るどのパスのスコープにも存在しない。文書別パス（焦点を保った事実抽出）はそのまま活かし、各パスの構造化出力（主張＋出典）を入力として文書横断の一貫性を検査する統合パスを第2段として追加する。per-document パス＋cross-document 統合パスの2段構成が、焦点の利点と関係の検出を両立させる。","A":"一括1パスは注意が薄まり、良好だった文書別品質を犠牲にする。大きなコーパスではコンテキストにも収まらない。","B":"各アナリストは隔離されたパスで自分の文書しか見ていない。他文書との矛盾のフラグは、原理的に実行不可能な指示だ。","C":"同一文書の二重チェックは文書内の見落としには効くが、矛盾は文書間にある。単独文書を何度読み直しても見えないものは見えない。"},"explanation_en":{"why_correct":"A contradiction is a relationship between documents — it exists in no pass whose scope is a single document. Keep the per-document passes (focused fact extraction) and add a second-stage integration pass that takes their structured outputs (claims plus sources) and checks cross-document consistency. The per-document pass + cross-document integration pass structure preserves the benefits of focus while adding relationship detection.","A":"One bulk pass dilutes attention and sacrifices the per-document quality that was working, and a large corpus may not fit in context at all.","B":"Each analyst's isolated pass sees only its own document. Flagging contradictions with other documents is an instruction that is impossible in principle.","C":"Double-checking the same document helps with intra-document misses, but the conflict lives between documents; rereading one document any number of times cannot reveal it."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"}],"lesson":"文書間の矛盾はどの単独文書パスにも見えない。per-document パス＋cross-document 統合パスの2段にする","lesson_en":"Cross-document conflicts are invisible to any single-document pass — add an integration pass over structured outputs","principle_tags":["single-responsibility","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D1-009","scenario":"multi-agent-research","domain":1,"task_statement":"1.1","question_en":"Your research loop terminates after a fixed cap of 5 iterations, and deep investigations are getting cut off mid-research with incomplete citations. A teammate proposes raising the cap to 20, citing a replay analysis run in a cap-free staging environment, where 95% of investigations completed naturally in fewer than 20 iterations. How should you evaluate this proposal?","question_ja":"リサーチループは固定の反復上限5で終了しており、深い調査が引用不完全なまま途中で打ち切られている。同僚は上限を20へ引き上げる提案をしており、根拠として、上限を外したステージング環境でのリプレイ分析では調査の95%が20反復未満で自然完了していたことを挙げている。この提案をどう評価すべきか。","options_en":{"A":"Accept it: the 95th-percentile data grounds the new cap empirically, which is how such limits should be chosen","B":"Decline it as the primary fix: drive termination from stop_reason, keeping a generous cap only as a safety net","C":"Go further and remove the cap entirely, since any fixed number will eventually truncate a deep investigation","D":"Have the model estimate the iterations each query needs before starting and set the cap from that estimate"},"options_ja":{"A":"受け入れる。95パーセンタイルの実測データに基づく新上限は、この種の制限値の正しい決め方だ","B":"主たる修正としては退ける。終了は stop_reason で駆動し、上限は余裕を持たせた安全網としてのみ残す","C":"さらに進めて上限を完全に撤廃する。固定値である限り、いずれ正当な深い調査を打ち切るからだ","D":"開始前にモデルへクエリごとの必要反復数を見積もらせ、その見積もりから上限を設定する"},"correct":"B","explanation_ja":{"why_correct":"反復上限を主たる終了条件にしている限り、どんな値を選んでも「深い調査の打ち切り」か「無意味な上限」かのトレードオフを引き受け続ける。モデルは完了を決定論的に通知している——stop_reason が tool_use の間はツールを実行して続行し、end_turn になったら終了する。これを主判定に据えれば残る5%の長い調査も自然に完走し、上限は無限ループやコスト暴走に対する安全網という本来の役割へ格下げできる。提案は上限の『値』を直すが『役割』の誤りを直さない。","A":"実測に基づく数値でも、上限が主判定である構造は変わらない。残る5%——多くの場合最も深く価値ある調査——は打ち切られ続け、stop_reason という決定論的な完了信号を無視し続けることになる。","C":"逆方向の極端化だ。ツール往復が止まらない異常系やコスト暴走への備えとして、緩い上限の安全網は残す価値がある。撤廃ではなく役割の変更が正しい。","D":"事前見積もりは推測にすぎず、リサーチは進むほど必要な深さが判明する性質を持つ。見積もりが外れれば同じ打ち切りが起き、根本の構造は変わらない。"},"explanation_en":{"why_correct":"As long as an iteration cap is the primary termination condition, every value trades premature truncation against meaninglessness. The model already signals completion deterministically: keep executing tools while stop_reason is tool_use, terminate at end_turn. Promoting that to the primary condition lets the remaining 5% — the deepest investigations — run to natural completion, and demotes the cap to its proper role: a safety net against runaway loops and cost blowups. The proposal fixes the cap's value, not its role.","A":"Empirically grounded or not, the cap remains the primary condition. The residual 5% — often the deepest, most valuable investigations — still get truncated, while the deterministic completion signal, stop_reason, keeps being ignored.","C":"The opposite extreme. A generous cap is worth keeping as protection against pathological tool loops and cost runaways. The fix is a change of role, not removal.","D":"An upfront estimate is a guess, and research characteristically reveals its required depth only as it proceeds. A wrong estimate reproduces the same truncation; the structure is unchanged."},"references":[{"title":"Handling stop reasons","url":"https://platform.claude.com/docs/en/build-with-claude/handling-stop-reasons"},{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"終了の主判定は stop_reason。反復上限は暴走への安全網であり、値をいくら調整しても役割の誤りは直らない","lesson_en":"stop_reason is the primary termination signal; an iteration cap is a runaway safety net — tuning its value never fixes its role","principle_tags":["deterministic-termination"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D1-010","scenario":"multi-agent-research","domain":1,"task_statement":"1.7","question_en":"Research runs on broad topics take roughly 40 minutes across many subtopics. When the process crashes at minute 35 — an unhandled exception, a network drop — the operator restarts it and the system re-researches everything from the beginning, doubling cost and delay. What is the most effective remediation?","question_ja":"広いトピックのリサーチ実行は多数のサブトピックにまたがり約40分かかる。35分時点でプロセスがクラッシュすると——未処理例外やネットワーク断——オペレータが再起動し、システムは全てを最初から調査し直すため、コストと遅延が倍になる。最も効果的な対策はどれか。","options_en":{"A":"Wrap the run in an automatic retry so a crashed research job restarts immediately without operator involvement","B":"Resume the crashed session and prompt the model to continue where it left off, using conversation history as the record","C":"Persist a manifest of completed and pending subtopics with their distilled findings as each finishes, and resume from it","D":"Split broad topics into several shorter research jobs so each one finishes well inside the typical crash-free window"},"options_ja":{"A":"実行を自動リトライで包み、クラッシュしたリサーチジョブがオペレータの介在なしに即座に再起動するようにする","B":"クラッシュしたセッションを再開し、会話履歴を進行記録として「中断したところから続けよ」とモデルに促す","C":"サブトピックの完了ごとに完了/未完了の一覧と蒸留済み知見のマニフェストを永続化し、そこから再開する","D":"広いトピックを複数の短いリサーチジョブに分割し、各ジョブが典型的な無障害時間内に確実に終わるようにする"},"correct":"C","explanation_ja":{"why_correct":"長時間ジョブを再開可能にする鍵は、外部化された進行状態だ。サブトピックという作業単位が完了するたびに「完了/未完了の一覧＋各完了分の蒸留済み知見」をマニフェストとして永続化すれば、クラッシュ後は未完了のサブトピックだけを再実行して統合に進める。35分の成果が保全され、チェックポイントの粒度が作業単位と一致していることで再開点も明確になる。","A":"自動化されたやり直しは無駄の自動化だ。35分分の成果は依然失われ、コスト倍増が人手なしで起きるようになるだけだ。","B":"セッション再開で会話履歴は復元できても、どのサブトピックが完了済みかの判定はモデルの確率的な再構築になる。走行中だったサブエージェントの中間作業は親に返っておらず（親に入るのは完了したサブエージェントの最終メッセージだけ）、二重実行や取りこぼしを防ぐ決定論的な進行記録にはならない。","D":"ジョブ分割はクラッシュに当たる確率を下げる回避策で、復旧能力は与えない。短いジョブも落ちれば最初からで、サブトピック横断の統合も分断される。"},"explanation_en":{"why_correct":"What makes a long job resumable is externalized progress state. Persisting a manifest — the list of completed and pending subtopics plus distilled findings for each completed one — as each unit of work finishes means a post-crash restart re-runs only the pending subtopics and proceeds to synthesis. The 35 minutes of work is preserved, and because checkpoint granularity matches the unit of work, the resume point is unambiguous.","A":"An automated do-over is automated waste: the 35 minutes of results are still lost; the doubled cost merely happens without a human.","B":"Resuming restores the conversation, but which subtopics completed becomes a probabilistic reconstruction. In-flight subagents' intermediate work was never returned to the parent — only a finished subagent's final message enters the parent history — so the transcript is not a deterministic progress record that prevents re-runs and gaps.","D":"Splitting jobs is an avoidance tactic that lowers the odds of hitting a crash but grants no recovery ability. A short job that dies still starts over, and cross-subtopic synthesis gets fragmented."},"references":[{"title":"How we built our multi-agent research system","url":"https://www.anthropic.com/engineering/built-multi-agent-research-system"}],"lesson":"長時間ジョブは作業単位ごとに状態マニフェスト（完了/未完了＋蒸留知見）を永続化し、再実行でなく再開できるようにする","lesson_en":"Persist a per-unit state manifest (done/pending + distilled findings) so long jobs resume instead of restarting","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D2-001","scenario":"multi-agent-research","domain":2,"task_statement":"2.1","question_en":"Your system exposes one tool, do_research(action, query, url, format), which searches the web, fetches pages, summarizes text, or saves findings depending on the action argument. Transcripts show the model regularly passes a url when searching, requests summaries before fetching anything, and saves findings to the wrong place. What is the correct redesign?","question_ja":"システムは do_research(action, query, url, format) という1つのツールを公開しており、action 引数に応じてWeb検索・ページ取得・テキスト要約・知見の保存を行う。トランスクリプトを見ると、モデルは検索時に url を渡す、何も取得していない段階で要約を要求する、知見を誤った場所へ保存するといった誤用を繰り返している。正しい再設計はどれか。","options_en":{"A":"Split it into focused tools — search_web, fetch_page, summarize_text, save_finding — each with its own parameters","B":"Expand the do_research description with a usage table documenting which parameters apply to which action value","C":"Keep one tool but make action an enum and return server-side validation errors when parameters do not match it","D":"Add few-shot examples of correct do_research calls to the system prompt so the model learns valid combinations"},"options_ja":{"A":"search_web・fetch_page・summarize_text・save_finding という単一責務のツールに分割し、それぞれ固有のパラメータを持たせる","B":"do_research の description を拡充し、どの action 値にどのパラメータが適用されるかの用法表を記載する","C":"ツールは1つのまま action を enum 化し、パラメータが action と一致しない場合にサーバ側検証エラーを返す","D":"正しい do_research 呼び出しの few-shot 例をシステムプロンプトに追加し、有効な組み合わせを学ばせる"},"correct":"A","explanation_ja":{"why_correct":"4つの無関係な責務が1つのインターフェースに同居し、パラメータの意味が action の値に依存して変わることが誤用の根本原因だ。単一責務のツールへ分割すれば、各ツールの名前・説明・パラメータスキーマそのものが正しい使い方を語る。search_web に url パラメータは存在せず、summarize_text は入力テキストを要求する——無効な組み合わせの多くがスキーマ上表現不可能になり、誤用は起きようがなくなる。","B":"説明の増強は、過積載インターフェースの上に文書を積むだけだ。パラメータの意味が action に依存して変わる構造が残る限り、選択の混乱も残る。","C":"検証エラーでの矯正は「誤呼び出し→エラー→再試行」の往復を常態化させ、トークンと遅延を浪費する。誤用を検出可能にするより、誤用を表現不可能にする方が強い。","D":"few-shot は確率的な緩和で、4責務×4パラメータの組み合わせ空間に対して例は常に不足する。インターフェース自体の曖昧さは残る。"},"explanation_en":{"why_correct":"The root cause of misuse is four unrelated responsibilities sharing one interface, with parameter meaning depending on the action value. Splitting into single-responsibility tools lets each tool's name, description, and parameter schema speak for itself: search_web simply has no url parameter, summarize_text requires input text — most invalid combinations become inexpressible in the schema, so the misuse cannot occur.","B":"Beefing up the description stacks documentation on top of an overloaded interface. As long as parameter meaning shifts with action, the selection confusion remains.","C":"Correcting via validation errors institutionalizes a wrong-call/error/retry loop, burning tokens and latency. Making misuse inexpressible beats making it detectable.","D":"Few-shot examples are probabilistic mitigation, and examples always undercover a 4-responsibility-by-4-parameter combination space. The interface's ambiguity survives."},"references":[{"title":"Writing effective tools for agents","url":"https://www.anthropic.com/engineering/writing-tools-for-agents"},{"title":"MCP Concepts: Tools","url":"https://modelcontextprotocol.io/docs/concepts/tools"}],"lesson":"action 引数で挙動が変わる万能ツールは単一責務ツール群に分割し、スキーマ自体に使い方を語らせる","lesson_en":"Split mode-switching mega-tools into single-purpose tools whose schemas make misuse inexpressible","principle_tags":["single-responsibility","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D2-002","scenario":"multi-agent-research","domain":2,"task_statement":"2.2","question_en":"Your fetch_page tool returns whatever the HTTP response body contains. When a source URL 404s or hits a paywall, the tool returns the error page's HTML as a normal success, and the synthesis subagent has started quoting phrases like \"Page not found\" and subscription pitches as source material attributed to the original URL. How should fetch_page change?","question_ja":"fetch_page ツールはHTTPレスポンスのボディをそのまま返す。ソースURLが404になったりペイウォールに当たったりすると、エラーページのHTMLが通常の成功として返り、統合サブエージェントは「Page not found」という文言や購読勧誘文を、元URLに帰属する資料として引用し始めている。fetch_page をどう変更すべきか。","options_en":{"A":"Prompt the synthesis subagent to check fetched text for signs of error pages and discard anything that looks suspicious","B":"Make fetch_page retry the request several times with backoff before returning whatever the final attempt produced","C":"Return an empty content string whenever the HTTP status is not 200 so no misleading text can ever reach the model","D":"Detect failure statuses and paywall markers, returning a structured error with category and retryability instead"},"options_ja":{"A":"統合サブエージェントに、取得テキストにエラーページの兆候がないか確認させ、疑わしいものを破棄させるようプロンプトする","B":"fetch_page がバックオフ付きで数回リトライし、最終試行が返したものをそのまま返すようにする","C":"HTTPステータスが200以外なら空の content 文字列を返し、誤解を招くテキストがモデルに届かないようにする","D":"失敗ステータスとペイウォールの兆候を検出し、ページ本文の代わりにカテゴリと再試行可否を持つ構造化エラーを返す"},"correct":"D","explanation_ja":{"why_correct":"これは失敗が成功の形で返る「ゴミ付き成功（success-with-garbage）」だ。HTTPステータスやペイウォールの兆候を決定論的に判定できるのはツール側であり、isError と not_found / paywalled / transient といったカテゴリ、retryable フラグを持つ構造化エラーを返せば、モデルは代替ソースへの切替や再試行を自分で選べる。エラーページの文言が出典として引用される経路そのものが消える。","A":"下流での見分けは確率的な対症で、ツールが持つHTTPステータスという決定的情報を捨て、モデルに本文からの推測をやらせる転倒だ。","B":"404やペイウォールは再試行で直らない決定的失敗であり、バックオフの後に同じゴミが返る。transient な失敗への内部リトライは有用でも、最終的に返す形が構造化されていなければ問題は残る。","C":"空文字列は失敗を空の成功に偽装する別種の隠蔽だ。モデルは「中身のないページ」と「取得失敗」を区別できず、なぜ失敗したか・再試行すべきかという行動可能な情報がゼロになる。"},"explanation_en":{"why_correct":"This is success-with-garbage — failure returned in the shape of success. The tool is the layer that can deterministically judge HTTP statuses and paywall markers, so it should return a structured error with isError, a category such as not_found / paywalled / transient, and a retryable flag. The model can then switch sources or retry on its own, and the pathway by which error-page copy gets cited as a source disappears entirely.","A":"Downstream detection is a probabilistic patch that discards the deterministic information the tool already has (the HTTP status) and asks the model to infer it back from body text.","B":"404s and paywalls are deterministic failures that retries cannot cure; after the backoff, the same garbage returns. Internal retries help for transient failures, but the problem remains unless the final return shape is structured.","C":"An empty string is a different disguise: failure dressed as empty success. The model cannot distinguish a genuinely empty page from a failed fetch and receives zero actionable information about why it failed or whether to retry."},"references":[{"title":"MCP Concepts: Tools","url":"https://modelcontextprotocol.io/docs/concepts/tools"},{"title":"Writing effective tools for agents","url":"https://www.anthropic.com/engineering/writing-tools-for-agents"}],"lesson":"エラーページ本文を成功として返すのはゴミ付き成功。ツールが判定できる失敗は構造化エラー（カテゴリ＋再試行可否）で返す","lesson_en":"Returning an error page's body as success is success-with-garbage — surface tool-detectable failures as structured errors","principle_tags":["structured-errors"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D2-003","scenario":"multi-agent-research","domain":2,"task_statement":"2.3","question_en":"Your fact-check subagent receives claims extracted from the draft report and must verify each one against its cited source. It currently carries the same general web_search and fetch_page tools as the search subagents. Traces show it wanders into open-ended browsing, returns tangential evidence, and occasionally \"verifies\" a claim against a different site than the one cited. What is the best change?","question_ja":"ファクトチェック・サブエージェントは、レポート草稿から抽出された主張を受け取り、それぞれを引用元ソースと突き合わせて検証する役割だ。現在は検索サブエージェントと同じ汎用の web_search と fetch_page を持っている。トレースを見ると、際限のないブラウジングに逸れ、本題から外れた証拠を返し、時には引用元とは別のサイトに対して主張を「検証」してしまっている。最善の変更はどれか。","options_en":{"A":"Add instructions to the fact-checker's prompt telling it to stay on the cited source and never browse beyond it","B":"Force web_search with tool_choice on every fact-check turn so the subagent always gathers evidence before judging","C":"Replace its toolset with a scoped verify_fact(claim, source_url) tool that fetches the cited source and checks the claim","D":"Keep the tools but have the coordinator re-verify every approved claim with a second general-purpose review pass"},"options_ja":{"A":"引用元ソースに留まりそれ以外をブラウズしないよう、ファクトチェッカーのプロンプトに指示を追加する","B":"tool_choice で毎ターン web_search を強制し、判定の前に必ず証拠収集が行われるようにする","C":"ツールセットを、引用元ソースを取得して主張を突き合わせるスコープ付きの verify_fact(claim, source_url) ツールに置き換える","D":"ツールはそのままに、承認された全主張をコーディネータが汎用の第2レビューパスで再検証する"},"correct":"C","explanation_ja":{"why_correct":"検証というタスクの形にツールの形を合わせるのが決め手だ。verify_fact(claim, source_url) は「引用元を取得し、主張と突き合わせる」以外の行動をインターフェース上取りようがなく、際限のないブラウジングも別サイトでの「検証」も構造的に起きなくなる。最小権限は危険なツールを外すことだけではなく、タスクの形に合わせて行動空間を絞ること——scoped tool の教科書的な適用である。","A":"プロンプトの行動制約は確率的で、汎用ツールが見えている限り逸脱の余地は残る。既に指示されているはずの役割から逸れているのが現状だ。","B":"tool_choice の強制は「必ず何かを検索する」ことしか保証せず、どこを検索するかは自由なままだ。引用元と無関係な証拠収集はむしろ増えうる。","D":"第2パスは逸脱した検証をもう一度汎用ツールで繰り返すだけで、コストを倍にしながら根本原因（行動空間が広すぎる）に触れない。"},"explanation_en":{"why_correct":"The deciding move is shaping the tool to the task. verify_fact(claim, source_url) leaves no interface-level room for anything except fetching the cited source and checking the claim against it — open-ended browsing and \"verification\" against the wrong site become structurally impossible. Least privilege is not only removing dangerous tools; it is narrowing the action space to the task's shape — the textbook scoped-tool application.","A":"Prompt-level behavioral constraints are probabilistic; while general tools remain visible, the room to wander remains. The agent is already deviating from a role it was presumably instructed to play.","B":"Forcing tool_choice guarantees only that something gets searched, not where. Evidence-gathering unrelated to the cited source can even increase.","D":"A second pass repeats the wandering verification with the same general tools — doubling cost without touching the root cause: an action space far wider than the task."},"references":[{"title":"Writing effective tool descriptions","url":"https://www.anthropic.com/engineering/writing-tools-for-agents"},{"title":"Agent SDK: Subagents","url":"https://code.claude.com/docs/en/agent-sdk/subagents"}],"lesson":"検証タスクには検証の形をしたスコープ付きツール（verify_fact）を渡す。行動空間をタスクの形に絞るのも最小権限","lesson_en":"Give verification a verification-shaped scoped tool (verify_fact). Narrowing the action space to the task is least privilege too","principle_tags":["least-privilege","single-responsibility"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D2-004","scenario":"multi-agent-research","domain":2,"task_statement":"2.4","question_en":"Your researchers should draw on the company's internal wiki — thousands of pages of product docs, postmortems, and design decisions — alongside web sources. The corpus is updated daily by many teams. How should you make it available to the research agents?","question_ja":"リサーチャーにはWebソースに加えて社内wiki——製品ドキュメント・ポストモーテム・設計判断の数千ページ——を活用させたい。コーパスは多数のチームによって毎日更新される。リサーチエージェントから利用可能にする方法として正しいのはどれか。","options_en":{"A":"Export the wiki nightly and paste the pages most relevant to each research topic into the subagent prompts","B":"Build a custom MCP server exposing the wiki as browsable resources, plus a search tool for locating pages on demand","C":"Mount the wiki's export directory into the agents' filesystem access so file tools can read any page directly","D":"Point a community web-search MCP server at the wiki's domain so existing search tooling covers it as well"},"options_ja":{"A":"wikiを毎晩エクスポートし、各リサーチトピックに最も関連するページをサブエージェントのプロンプトへ貼り込む","B":"wiki をブラウズ可能なリソースとして公開し、ページ検索用ツールも備えたカスタム MCP サーバを構築する","C":"wikiのエクスポートディレクトリをエージェントのファイルシステムアクセスに開放し、ファイルツールで任意のページを直接読ませる","D":"コミュニティ製のWeb検索 MCP サーバをwikiのドメインに向け、既存の検索ツール群でカバーする"},"correct":"B","explanation_ja":{"why_correct":"社内文書コーパスは、MCP リソース（コンテンツカタログ）の教科書的な適用対象だ。カスタム MCP サーバが wiki のページをリソースとして公開すれば、エージェントはカタログを一覧して必要なページだけをオンデマンドで読める（リソース対応サーバには一覧・読み取りのツールが自動提供される）。数千ページ規模では検索ツールの併設が発見可能性を支える。サーバが wiki 本体を直接参照する設計なら日次更新も反映され、事前のコンテキスト消費もない。","A":"手作業の選別はリサーチのたびに人手を要し、貼り込んだ時点で内容が古くなり始める。無関係ページによるコンテキスト消費も大きい。","C":"エクスポート同期という二重管理が生じる上、生ファイルの全開放はタイトル・種別などのメタデータによる発見可能性を欠き、アクセスも必要以上に広い。","D":"Web検索サーバは公開Webのインデックスを前提とし、社内wikiは対象にできない。実在するツールを合わない用途に流用する誤りだ。"},"explanation_en":{"why_correct":"An internal document corpus is the textbook case for MCP resources — a content catalog. A custom MCP server exposing wiki pages as resources lets agents list the catalog and read only the pages they need on demand (list/read tools are provided automatically for resource-capable servers). At thousands of pages, an accompanying search tool carries discoverability. If the server reads the live wiki, daily updates flow through, with no upfront context cost.","A":"Manual curation costs human effort per research run, goes stale the moment it is pasted, and burns context on irrelevant pages.","C":"This creates a second copy to keep in sync, and raw file exposure lacks the discoverability of titles and metadata while granting broader access than needed.","D":"Web-search servers presuppose a public web index; an internal wiki is not in their reach. This misapplies a real tool to a use it does not fit."},"references":[{"title":"MCP Concepts: Resources","url":"https://modelcontextprotocol.io/docs/concepts/resources"},{"title":"Claude Code: MCP","url":"https://code.claude.com/docs/en/mcp"}],"lesson":"更新され続ける社内文書コーパスは、カスタム MCP サーバのリソース（コンテンツカタログ）としてオンデマンド公開する","lesson_en":"Expose a living internal document corpus as MCP resources — a content catalog served on demand by a custom MCP server","principle_tags":["least-privilege","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S3-D5-001","scenario":"multi-agent-research","domain":5,"task_statement":"5.6","question_en":"Reviewing a delivered report on EV battery markets, you find it states \"global production capacity reached 2.9 TWh,\" citing a 2024 industry report — while a 2025 analyst note the searchers also retrieved put the figure at 2.1 TWh using a narrower definition of capacity. The report mentions neither the conflict nor the second source, and in another section the synthesizer averaged two conflicting numbers. What should the synthesis stage do instead?","question_ja":"EVバッテリー市場に関する納品済みレポートを確認すると、2024年の業界レポートを出典として「世界の生産能力は2.9TWhに到達」と記載されている。一方、検索サブエージェントが同じく取得していた2025年のアナリストノートは、より狭い生産能力の定義を用いて2.1TWhとしていた。レポートはこの対立にも第二のソースにも触れておらず、別のセクションでは統合サブエージェントが対立する2つの数値を平均していた。統合ステージは代わりに何をすべきか。","options_en":{"A":"Present both figures with source attribution and publication dates, marking the claim contested rather than established","B":"Adopt the figure from the more recently published source, since newer analysis supersedes earlier market reporting","C":"Search for an additional source and report whichever figure ends up with majority support across the sources found","D":"Omit the disputed statistic from the report until a follow-up run can determine which of the two sources is authoritative"},"options_ja":{"A":"両方の数値を出典帰属と公表日付きで併記し、その主張を established でなく contested として明示する","B":"より新しく公表されたソースの数値を採用する。新しい分析は古い市場報告を上書きするからだ","C":"追加のソースを検索し、見つかったソース群の中で多数派の支持を得た側の数値を報告する","D":"係争中の統計はレポートから外し、どちらのソースが正かをフォローアップ実行で判定できるまで保留する"},"correct":"A","explanation_ja":{"why_correct":"複数ソース統合の誠実さは「主張と出典の対応（claim-source mapping）」を保存することにある。2つの数値は定義も公表時期も異なり、どちらかを黙って選ぶ・平均する行為は、存在しない合意を捏造する。両数値を出典・公表日・定義の違いとともに併記し、contested（係争中）と established（確立済み）を区別して示せば、読者は主張の確からしさを自分で判定できる。なお平均値約2.5TWhはどのソースも主張していない数字であり、統合が生み出しうる最悪の捏造である。","B":"新しさは正しさを保証しない。ここでは定義の違いが差の主因であり、公表日の新旧による選好は恣意的選択（arbitrary selection）にすぎず、対立の存在自体を読者から隠す。","C":"多数決は同じ一次資料を引き写した非独立なソース群に簡単に歪む上、定義差に由来する正当な対立を「少数派の誤り」として抑圧する。集計しても対立は消えない。","D":"省略は不確実性の伝達の放棄だ。対立が存在するという事実自体が読者にとって重要な情報であり、握りつぶしは沈黙による誤導になる。"},"explanation_en":{"why_correct":"Honest multi-source synthesis preserves the claim-source mapping. The two figures differ in both definition and publication date; silently choosing one or averaging them fabricates a consensus that does not exist. Presenting both figures with attribution, publication dates, and the definitional difference — and distinguishing contested from established claims — lets readers judge reliability for themselves. Note that an averaged ~2.5 TWh is a number no source ever claimed: the worst fabrication a synthesizer can produce.","B":"Recency does not guarantee correctness. The difference stems mainly from definitions, so preferring the newer date is arbitrary selection — and it hides the conflict's very existence from the reader.","C":"Majority voting is easily skewed by non-independent sources that copy the same primary material, and it suppresses a legitimate definitional disagreement as a \"minority error.\" Tallying does not dissolve the conflict.","D":"Omission abandons the duty to convey uncertainty. That a conflict exists is itself material information for the reader; suppressing it misleads by silence."},"references":[{"title":"How we built our multi-agent research system","url":"https://www.anthropic.com/engineering/built-multi-agent-research-system"},{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"}],"lesson":"ソースが対立したら黙って選ばず平均もしない。出典・公表日付きで対立を明示し、contested / established を区別する","lesson_en":"When sources conflict, never silently pick or average — annotate the conflict with attribution and dates, contested vs established","principle_tags":["nullable-over-hallucination","structured-errors"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D3-001","scenario":"claude-code-ci","domain":3,"task_statement":"3.6","question_en":"Your GitHub Actions workflow runs `claude \"Review the changes in this branch\"` as a pipeline step. Every run hangs until the job timeout kills it; the logs show the CLI opened an interactive session and is waiting for user input that will never arrive. What change makes this step work in CI?","question_ja":"GitHub Actions のワークフローで、パイプラインのステップとして `claude \"このブランチの変更をレビューして\"` を実行している。毎回ジョブがタイムアウトで強制終了されるまでハングし、ログを見ると CLI が対話セッションを開き、来るはずのないユーザー入力を待っていた。このステップを CI で動かすための変更はどれか。","options_en":{"A":"Wrap the invocation in an expect script that feeds scripted keystrokes to the interactive session","B":"Raise the job timeout and configure the pipeline step to retry automatically when it gets cancelled","C":"Invoke the CLI with -p/--print so the prompt runs headless and the process exits when the response completes","D":"Set the CLAUDE_NONINTERACTIVE=true environment variable in the workflow so the CLI detects the CI context"},"options_ja":{"A":"起動を expect スクリプトでラップし、対話セッションに台本化したキー入力を送り込む","B":"ジョブのタイムアウトを延長し、キャンセルされたステップを自動リトライするようパイプラインを設定する","C":"-p / --print を付けて CLI を起動し、プロンプトをヘッドレスで実行して応答完了とともにプロセスを終了させる","D":"ワークフローに環境変数 CLAUDE_NONINTERACTIVE=true を設定し、CLI に CI コンテキストを検出させる"},"correct":"C","explanation_ja":{"why_correct":"決め手は「入力を与える人間が CI には存在しない」こと。-p / --print はヘッドレス（非対話）モードで、与えたプロンプトを一度実行し、応答が完了したらプロセスが終了する。パイプラインからのプログラム的実行はこのモードが前提であり、ハングの根本原因（対話セッションの開始）そのものを取り除く。","A":"対話セッションを残したまま入力を偽装する症状対処。送るべきキー入力は実行内容によって変わるため極めて脆く、非対話実行という本来の解決を回避している。","B":"ハングの原因に一切触れない症状対処。リトライしても同じ対話待ちが再現するだけで、時間と計算資源を浪費する。","D":"そのような環境変数は存在しない。非対話実行は -p / --print フラグで明示的に指定する。"},"explanation_en":{"why_correct":"The deciding detail: no human exists in CI to supply input. -p/--print is headless (non-interactive) mode — it executes the given prompt once and the process exits when the response completes. Programmatic pipeline invocation is exactly what this mode is for, and it removes the root cause (an interactive session being opened) rather than working around it.","A":"A symptom patch that keeps the interactive session and fakes input. The keystrokes needed vary with the run, making this extremely brittle while avoiding the actual non-interactive solution.","B":"Never touches the cause of the hang. Retries reproduce the same wait for input, burning time and compute.","D":"No such environment variable exists. Non-interactive execution is requested explicitly with the -p/--print flag."},"references":[{"title":"Claude Code: Headless mode","url":"https://code.claude.com/docs/en/headless"},{"title":"Claude Code: CLI reference","url":"https://code.claude.com/docs/en/cli-reference"}],"lesson":"CI に入力する人間はいない。パイプラインからの実行は -p / --print のヘッドレスモードで非対話にする","lesson_en":"No human sits in CI: run pipeline invocations headless with -p/--print","principle_tags":["right-tool-for-latency","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D3-002","scenario":"claude-code-ci","domain":3,"task_statement":"3.6","question_en":"Your pipeline parses Claude Code's prose review output with regular expressions to extract the number of findings and their severities. Every time the model's phrasing shifts slightly, the parsing breaks — the pipeline has gone down three times this quarter. What is the most effective fix?","question_ja":"パイプラインは Claude Code のレビュー出力（散文）を正規表現でパースし、指摘の件数と深刻度を抽出している。モデルの言い回しがわずかに変わるたびにパースが壊れ、この四半期だけで3回パイプラインが停止した。最も効果的な修正はどれか。","options_en":{"A":"Run the review with --output-format json plus a --json-schema, reading named fields from the structured result","B":"Add a prompt rule that all findings must be phrased in exactly the sentence pattern the pipeline's regular expressions expect","C":"Loosen the regular expressions and add fallback patterns covering the phrasings observed in past runs","D":"Pin the CLI and model versions in the workflow so the wording of review output stops shifting between runs"},"options_ja":{"A":"--output-format json に --json-schema を併用してレビューを実行し、構造化結果の名前付きフィールドを読む","B":"すべての指摘をパイプラインの正規表現が期待する文型どおりに記述せよというプロンプトルールを追加する","C":"正規表現を緩め、過去の実行で観測された言い回しをカバーするフォールバックパターンを追加する","D":"ワークフローで CLI とモデルのバージョンを固定し、実行間でレビュー出力の文言が変わらないようにする"},"correct":"A","explanation_ja":{"why_correct":"壊れ続ける根本原因は「機械が読む契約を散文の上に置いている」こと。--output-format json は結果を機械可読なラッパーで返し、--json-schema を併用すればレビュー結果そのものの形（件数・深刻度などのフィールド）が structured_output として固定される。パイプラインは文言ではなく名前付きフィールドを読むようになり、言い回しの変化は契約に影響しなくなる。","B":"プロンプトの指示は確率的で、文型の遵守を保証しない（code must, prompt should の罠側）。散文をパースするという根本原因もそのまま残る。","C":"観測済みの変化に後追いで適応する症状対処。次の未知の言い回しでまた壊れ、パターン集は際限なく育つ。","D":"バージョンを固定しても同一モデルの出力に言い回しの揺れは残るうえ、更新はいずれ必要になる。散文契約の脆さは解消しない。"},"explanation_en":{"why_correct":"The root cause of the repeated breakage is a machine-read contract sitting on top of prose. --output-format json returns the result in a machine-readable wrapper, and adding --json-schema pins the shape of the review itself — counts, severities — as structured_output with named fields. The pipeline reads fields, not phrasing, so wording shifts no longer touch the contract.","B":"Prompt instructions are probabilistic and cannot guarantee sentence-pattern compliance (the prompt-for-guarantee trap). The root cause — parsing prose — remains untouched.","C":"Adapts retroactively to already-observed variations. The next unseen phrasing breaks it again, and the pattern list grows without bound.","D":"Pinning versions still leaves run-to-run phrasing variation within the same model, and upgrades eventually become necessary. The fragility of a prose contract is untouched."},"references":[{"title":"Claude Code: Headless mode","url":"https://code.claude.com/docs/en/headless"},{"title":"Claude Code: CLI reference","url":"https://code.claude.com/docs/en/cli-reference"}],"lesson":"機械が読む出力を散文でパースしない。--output-format json で構造化し、契約をフィールドに置く","lesson_en":"Never let machines regex prose: make --output-format json the contract and read fields","principle_tags":["code-must-prompt-should","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S5-D3-003","scenario":"claude-code-ci","domain":3,"task_statement":"3.6","question_en":"After switching the review job to headless mode (-p), runs now fail partway through. The logs show the run aborted when the CLI attempted to use a file-editing tool that had no permission — and there is no human on the CI runner to approve anything. What is the appropriate fix?","question_ja":"レビュージョブをヘッドレスモード（-p）に切り替えてから、実行が途中で失敗するようになった。ログには、許可のないファイル編集ツールを使おうとした時点で run が中断されたと記録されている。CIランナー上に承認できる人間はいない。適切な修正はどれか。","options_en":{"A":"Pass --dangerously-skip-permissions so the headless run never has to wait on any permission decision","B":"Add a system-prompt instruction telling the reviewer to avoid invoking tools that would need approval","C":"Have a developer approve the tool prompts once locally, then carry that session's approval state to the runner","D":"Pre-approve the specific tools the review needs by listing them with --allowedTools in the CI invocation"},"options_ja":{"A":"--dangerously-skip-permissions を渡し、ヘッドレス実行が許可判断を一切待たないようにする","B":"承認が必要になるツールの使用を避けるよう、レビュー用のシステムプロンプトに指示を追加する","C":"開発者がローカルで一度ツール承認を行い、そのセッションの承認状態をランナーへ持ち込む","D":"レビューに必要なツールだけを CI
