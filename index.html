s only to <name>\" so Claude knows whom each rule is for","C":"Have every developer maintain a private, git-ignored copy of the full CLAUDE.md so each person controls exactly what gets loaded","D":"Keep one project CLAUDE.md that @imports each developer's preference file (docs/prefs-alice.md, docs/prefs-bob.md, ...), with a note telling Claude to apply only the current developer's section"},"options_ja":{"A":"チーム共通の規約はコミット済みのプロジェクト CLAUDE.md に置き、個人的な好みは本人のユーザーレベル ~/.claude/CLAUDE.md へ移す","B":"すべてプロジェクト CLAUDE.md に置いたまま、個人向けセクションに「この節は◯◯にのみ適用」とラベルを付け、誰のためのルールか Claude が判断できるようにする","C":"全開発者が git 管理外の CLAUDE.md 完全コピーを各自維持し、何をロードするかを各人が完全に制御できるようにする","D":"プロジェクト CLAUDE.md に各開発者の設定ファイル（docs/prefs-alice.md, docs/prefs-bob.md …）を @import で列挙し、「自分の分だけを適用すること」という注記を添える"},"correct":"A","explanation_ja":{"why_correct":"CLAUDE.md には階層がある。プロジェクト CLAUDE.md はリポジトリにコミットされ全員のセッションにロードされる「チームで共有すべき規約」の置き場、~/.claude/CLAUDE.md はそのユーザーの全プロジェクトに適用される「個人の好み」の置き場。2つの症状（個人設定の漏出／規約の不達）はどちらも配置が逆になっていることが原因で、それぞれを正しい層へ戻せば同時に解消する。","B":"全文が全員のコンテキストにロードされる事実は変わらず、ラベルによる選別はプロンプト頼みの確率的なフィルタ。無関係な個人設定が全員のトークンを浪費し続ける。","C":"共有をやめる方向の過剰対応。規約が各自のコピーでドリフトし、「新メンバーに規約が届かない」という2つ目の症状をむしろ全員に広げる。","D":"@import は整理のための機構で、プロジェクト相対の import は全員のセッションで列挙された全ファイルをロードする。誰の分を適用するかはプロンプト頼みの確率的な選別になり、トークンも人数分浪費する。さらに2つ目の症状（規約が個人側ファイルに残っている）には何も答えていない。"},"explanation_en":{"why_correct":"CLAUDE.md has a hierarchy. The project CLAUDE.md is committed to the repo and loads in everyone's sessions — the home for team-shared conventions. ~/.claude/CLAUDE.md applies to that user across all their projects — the home for personal preferences. Both symptoms (leaked personal settings / undelivered conventions) come from inverted placement; moving each to its correct layer fixes both at once.","B":"Everything still loads into everyone's context; label-based selection is a probabilistic, prompt-level filter, and irrelevant personal settings keep consuming everyone's tokens.","C":"Overkill in the anti-sharing direction: conventions drift across private copies, and \"new members never get the conventions\" spreads to everyone.","D":"@import is an organization mechanism: project-relative imports load every listed file in everyone's session. Which section applies becomes a probabilistic, prompt-level selection, and tokens are spent on all developers' preferences. It also does nothing about the second symptom — the conventions still live in the personal file."},"references":[{"title":"Claude Code: Manage Claude's memory","url":"https://code.claude.com/docs/en/memory"}],"lesson":"共有規約はプロジェクト CLAUDE.md、個人の好みはユーザースコープ。@import は整理であって条件分岐ではない","lesson_en":"Shared conventions go in the project CLAUDE.md; personal preferences in user scope. @import is organization, not a conditional","principle_tags":["single-responsibility"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D3-002","scenario":"code-generation","domain":3,"task_statement":"3.1","question_en":"A teammate pasted the team's entire 900-line release-procedure runbook into the project CLAUDE.md \"so Claude never forgets it.\" Releases happen twice a month, but now every coding session carries the runbook in context, and developers report Claude has become less consistent at following the shorter coding conventions that were already there. What is the best reorganization?","question_ja":"チームメンバーが900行のリリース手順書を丸ごとプロジェクト CLAUDE.md に貼り付けた。「Claude が忘れないように」という理由だ。リリースは月2回だが、いまや全コーディングセッションが手順書をコンテキストに抱えており、以前からあった短いコーディング規約への遵守が落ちたという報告が開発者から出ている。最善の再編成はどれか。","options_en":{"A":"Split the runbook into several files under docs/ and @import them from CLAUDE.md so the main file stays readable","B":"Condense the runbook to a 40-line summary inside CLAUDE.md and link to the full document for human readers","C":"Add an instruction at the top of CLAUDE.md telling Claude to read the release section only when the user's request mentions an upcoming release","D":"Move the runbook into a release skill invoked at release time, keeping CLAUDE.md for conventions that apply to every session"},"options_ja":{"A":"手順書を docs/ 配下の複数ファイルに分割し、CLAUDE.md から @import して本体ファイルを読みやすく保つ","B":"手順書を40行の要約に圧縮して CLAUDE.md に残し、全文は人間の読者向けドキュメントへのリンクにする","C":"CLAUDE.md の冒頭に「ユーザーの依頼にリリースの話題が含まれるときだけリリース節を読むこと」という指示を追加する","D":"手順書をリリース時に起動するスキルへ移し、CLAUDE.md は毎セッション適用される規約だけにする"},"correct":"D","explanation_ja":{"why_correct":"CLAUDE.md は毎セッション必ずロードされる。そこに置いてよいのは常時適用の規約だけで、月2回しか使わない手順書は必要なときだけロードされるスキル／スラッシュコマンドが正しい層。手順書の常駐はトークン消費に加えて既存規約への注意を薄め、「短い規約への遵守が落ちた」という症状がまさにその現れ。","A":"@import は整理のための機構で、ロード量は変わらない。分割してもインポートされた全文が毎セッション載る点は同じ。","B":"常駐量は減るが中途半端。40行ではリリース実務に必要な詳細が失われ、かつ残した要約は依然として無関係な全セッションに載り続ける。","C":"ロードはプロンプトでは制御できない機械的な動作。指示を足した時点で手順書全文は既にコンテキストとトークンを消費している。"},"explanation_en":{"why_correct":"CLAUDE.md is loaded in every session, so it should hold only always-applicable conventions. A runbook used twice a month belongs in a skill or slash command that loads on demand. Keeping it resident costs tokens and dilutes attention to the existing conventions — the reported drop in adherence to the short coding conventions is exactly that effect.","A":"@import is for organization; the load volume doesn't change. Split or not, the imported full text still loads every session.","B":"Less residue but half-hearted: 40 lines lose the operational detail needed during an actual release, while the remaining summary still rides along in every unrelated session.","C":"Loading is a mechanical behavior that prompts cannot control. By the time the instruction is read, the full runbook has already consumed context and tokens."},"references":[{"title":"Claude Code: Manage Claude's memory","url":"https://code.claude.com/docs/en/memory"},{"title":"Claude Code: Skills","url":"https://code.claude.com/docs/en/skills"}],"lesson":"CLAUDE.md は「毎回必要」なものだけ。たまにしか使わない作業手順はスキルで必要時ロードにする","lesson_en":"CLAUDE.md is for \"needed every time\" only. Occasional procedures go in skills, loaded on demand","principle_tags":["single-responsibility","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D3-003","scenario":"code-generation","domain":3,"task_statement":"3.2","question_en":"You are creating a /fix-issue command: it should fetch a GitHub issue with the gh CLI, then implement the fix. Your draft has two problems: every run stops to ask permission for the gh commands, and developers must paste the issue number into the command file by hand before each use. Which change fixes both?","question_ja":"/fix-issue コマンドを作っている。GitHub の issue を gh CLI で取得し、修正を実装するコマンドだ。ドラフトには2つの問題がある。実行のたびに gh コマンドの許可を求められて止まること、そして使うたびに issue 番号をコマンドファイルへ手で貼り付ける必要があることだ。両方を解決する変更はどれか。","options_en":{"A":"Grant permission in the command body by writing \"you are pre-approved to run any shell commands needed for this task\"","B":"In the frontmatter, declare allowed-tools with a scoped pattern like Bash(gh issue view *), and receive the issue number via $ARGUMENTS (or $0)","C":"Set allowed-tools: Bash so all shell commands run without permission prompts, and have the command ask the user for the issue number at runtime","D":"Add the gh commands to a SessionStart hook so the issue data is already fetched by the time the command runs"},"options_ja":{"A":"コマンド本文に「このタスクに必要なシェルコマンドは事前承認済みとして実行してよい」と書いて権限を与える","B":"frontmatter の allowed-tools に Bash(gh issue view *) のようなスコープ付きパターンを宣言し、issue 番号は $ARGUMENTS（または $0）で受け取る","C":"allowed-tools: Bash と宣言して全シェルコマンドを許可プロンプトなしで実行できるようにし、番号は実行時にユーザーへ質問させる","D":"SessionStart フックに gh コマンドを追加し、コマンドが実行される時点で issue データを取得済みにしておく"},"correct":"B","explanation_ja":{"why_correct":"ツールの事前承認は frontmatter の allowed-tools が担う仕組みで、Bash(gh issue view *) のようにコマンド単位のスコープで宣言できる（最小権限）。引数は $ARGUMENTS（入力された全引数文字列）または $0 以降のインデックス付きプレースホルダ（$0 が第1引数）で起動時に注入され、ファイルの手編集が不要になる。2つの問題はどちらも「専用の仕組みがあるのに使っていない」ことに起因している。","A":"本文の文言は権限システムに作用しない。許可プロンプトはハーネス側の機構であり、プロンプトで承認は与えられない。","C":"動くが Bash 全体の許可は過剰権限。gh issue view しか要らないのに任意コマンドが無確認で走る状態を作る。スコープ付きパターンで足りる場面で全開放するのは最小権限の放棄。","D":"SessionStart は毎セッション実行されるフックで、どの issue を扱うかはその時点では不明。トリガーの種類がタスクに合っていない。"},"explanation_en":{"why_correct":"Tool pre-approval is exactly what frontmatter allowed-tools does, and it can be scoped per command, e.g. Bash(gh issue view *) — least privilege. Arguments are injected at invocation via $ARGUMENTS (the full argument string) or indexed placeholders starting at $0 (the first argument), eliminating manual file edits. Both problems stem from not using the dedicated mechanisms that exist for these needs.","A":"Body text does not act on the permission system. Permission prompts are a harness mechanism; approval cannot be granted by prompt.","C":"It works, but blanket Bash approval is over-permissioning: only gh issue view is needed, yet arbitrary commands now run unchecked. Abandoning least privilege where a scoped pattern suffices.","D":"SessionStart runs every session, at a point where the issue number isn't known yet. The trigger type doesn't match the task."},"references":[{"title":"Claude Code: Skills (allowed-tools, arguments)","url":"https://code.claude.com/docs/en/skills"}],"lesson":"コマンド/スキルの事前承認は allowed-tools のスコープ付きパターンで、引数は $ARGUMENTS / $0 で。本文の文言は権限に作用しない","lesson_en":"Pre-approve command/skill tools with scoped allowed-tools patterns; take arguments via $ARGUMENTS or $0. Body text cannot grant permissions","principle_tags":["least-privilege","code-must-prompt-should"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D3-004","scenario":"code-generation","domain":3,"task_statement":"3.2","question_en":"Your team's /deep-audit command has Claude read dozens of modules and produce an architecture report. It works, but after running it the rest of the session degrades: the file contents read during the audit crowd the context, and later, unrelated requests get slow, low-quality answers. Developers like running it first thing in the morning and then continuing normal work in the same session. What is the best fix?","question_ja":"チームの /deep-audit コマンドは、Claude に数十のモジュールを読ませてアーキテクチャレポートを作らせる。機能はするが、実行後のセッションが劣化する。監査中に読んだファイル内容がコンテキストを占拠し、その後の無関係な依頼への応答が遅く低品質になるのだ。開発者は朝一で監査を実行し、同じセッションでそのまま通常作業を続けるのを好んでいる。最善の修正はどれか。","options_en":{"A":"Tell developers to run /compact right after the audit so the intermediate content is summarized away","B":"Trim the audit to read only the top-level modules so it generates less intermediate content in the first place","C":"Run the command in a forked context via context: fork so exploration happens outside the main conversation and only the report returns","D":"Move the audit procedure into CLAUDE.md so the instructions are always available and no longer need to be loaded each time the command is invoked"},"options_ja":{"A":"監査の直後に /compact を実行してもらい、中間内容を要約で片付ける","B":"監査対象をトップレベルのモジュールだけに絞り、そもそも生成される中間内容を減らす","C":"context: fork 指定でコマンドをフォークしたコンテキストで実行し、メイン会話にはレポートだけを返す","D":"監査手順を CLAUDE.md へ移して常時参照可能にし、コマンド起動のたびに手順をロードする必要をなくす"},"correct":"C","explanation_ja":{"why_correct":"探索で生じる大量の中間内容が本体の会話を汚すことが問題の構造。context: fork を指定したコマンドはフォークされたコンテキストで実行され、メイン会話には結果だけが戻る。「監査してから同じセッションで通常作業を続けたい」という使い方の要件に、コンテキスト隔離という構造でそのまま応えている。","A":"/compact は非可逆な要約で、監査結果の細部が失われるリスクを毎回負う。またコンテキストが一度ピークに達すること自体は防げない。","B":"レポートの品質要件を勝手に切り下げる対処。浅い監査では実行する価値自体が下がる。","D":"コストの主因は手順テキストではなく監査が読み込むファイル内容。しかも CLAUDE.md への常駐化は、全セッションに手順を載せる逆方向の変更。"},"explanation_en":{"why_correct":"The structural problem is exploration debris polluting the main conversation. A command with context: fork runs in a forked context, and only the result returns to the main conversation. It answers the usage requirement — audit first, then keep working in the same session — with isolation by construction.","A":"/compact is lossy summarization: you risk losing audit detail every time, and the context still peaks once before compaction.","B":"Unilaterally downgrades the report's quality requirement; a shallow audit undercuts the point of running it.","D":"The main cost is the file contents the audit reads, not the procedure text. Moving it into CLAUDE.md loads the procedure into every session — the opposite direction."},"references":[{"title":"Claude Code: Slash commands","url":"https://code.claude.com/docs/en/slash-commands"},{"title":"Claude Code: Skills","url":"https://code.claude.com/docs/en/skills"}],"lesson":"大量の中間出力を伴うコマンドは context: fork で隔離し、結果だけをメイン会話に返す","lesson_en":"Commands with heavy intermediate output: isolate them with context: fork and return only the result to the main conversation","principle_tags":["explicit-context-passing","single-responsibility"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D3-005","scenario":"code-generation","domain":3,"task_statement":"3.3","question_en":"A teammate created .claude/rules/deploy-checklist.md with paths: [\"src/**\"] containing the production deployment checklist. Two complaints have come in: the checklist now appears during ordinary bug-fix sessions that touch src/, and it often fails to appear during actual deployments, which mostly involve running commands rather than editing src files. What is the right restructuring?","question_ja":"チームメンバーが .claude/rules/deploy-checklist.md を paths: [\"src/**\"] で作成し、本番デプロイのチェックリストを入れた。苦情が2つ出ている。src/ を触る普通のバグ修正セッションにチェックリストが現れること、そして肝心のデプロイ作業（主にコマンド実行で、src のファイル編集はほぼない）では現れないことが多いことだ。正しい再構成はどれか。","options_en":{"A":"Narrow the glob to deployment-related file patterns such as [\"deploy/**\", \"**/*.yaml\"]","B":"Remove the paths frontmatter entirely so the checklist rule is always loaded and can never be missed","C":"Convert the checklist into a /deploy skill invoked when deploying; keep paths-scoped rules for file-type conventions","D":"Keep the rule as is, but add a first line instructing Claude to apply the checklist only when the user's request explicitly mentions a deployment"},"options_ja":{"A":"glob を [\"deploy/**\", \"**/*.yaml\"] などデプロイ関連のファイルパターンに合わせて狭める","B":"paths frontmatter を完全に外してルールを常時ロードにし、見逃しが構造的に起きないようにする","C":"チェックリストをデプロイ作業時に起動する /deploy スキルへ変換し、paths 付きルールはファイル種別の規約用に使う","D":"ルールはそのまま残し、先頭に「ユーザーの依頼が明示的にデプロイに言及したときのみチェックリストを適用」という一文を追加する"},"correct":"C","explanation_ja":{"why_correct":"paths の glob は「一致するファイルを Claude が読み込み・作業対象にしたとき」に発火する名詞（ファイル種別）トリガー。デプロイは動詞（作業）であり、ファイル編集を伴うとは限らない。2つの症状——src 編集で発火し、デプロイでは発火しない——はトリガー種別の取り違えそのもの。作業起点の手順はスキル／スラッシュコマンドに置く。","A":"名詞トリガーのまま対象を変えただけ。デプロイ作業がそれらのファイルを編集しない限り発火せず、2つ目の症状が残る。","B":"見逃しは消えるが、無関係なセッションすべてにチェックリストを載せる過剰対応で、1つ目の苦情を全セッションに拡大する。","D":"ロード自体は paths の一致で既に起きており、適用可否の文言は確率的なフィルタにすぎない。デプロイ時に発火しない問題（2つ目の苦情）には何の効果もない。"},"explanation_en":{"why_correct":"paths globs are noun (file-type) triggers — they fire when Claude reads or works on matching files. Deployment is a verb (a task) and doesn't necessarily edit files. The two symptoms — firing on src edits, staying silent during deploys — are precisely a trigger-type mismatch. Task-triggered procedures belong in a skill or slash command.","A":"Still a noun trigger, just with a different target. Unless a deploy edits those files it won't fire — the second symptom remains.","B":"The misses disappear, but at the cost of loading the checklist into every unrelated session — it scales complaint one up to all sessions.","D":"Loading already happened when paths matched; an applicability sentence is a probabilistic filter. And it does nothing for the not-firing-during-deploys problem."},"references":[{"title":"Claude Code: Manage Claude's memory","url":"https://code.claude.com/docs/en/memory"}],"lesson":"rules の paths はファイル種別（名詞）トリガー。作業（動詞）起点の手順はスキルにする","lesson_en":"rules' paths are file-type (noun) triggers. Task (verb)-triggered procedures go in skills","principle_tags":["single-responsibility","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D3-006","scenario":"code-generation","domain":3,"task_statement":"3.4","question_en":"Two tickets are in your queue. Ticket 1: add an \"export as CSV\" button to a settings page, following the same pattern as three existing export buttons. Ticket 2: introduce caching to cut API costs — the ticket does not specify which layers to cache, and the codebase could support at least three fundamentally different designs. How should you run Claude Code for each?","question_ja":"キューに2枚のチケットがある。チケット1: 設定ページに「CSVエクスポート」ボタンを追加する。既存の3つのエクスポートボタンと同じパターンでよい。チケット2: APIコスト削減のためキャッシュを導入する。どの層でキャッシュするかは未指定で、コードベース上は根本的に異なる設計が少なくとも3通りあり得る。それぞれ Claude Code をどう走らせるべきか。","options_en":{"A":"Run ticket 1 with direct execution, and start ticket 2 in plan mode","B":"Plan mode for both tickets — a review step before any code is written keeps a shared codebase safe","C":"Direct execution for both tickets, keeping design review in the pull request where the team can weigh in","D":"Plan mode for both tickets, but auto-approve the generated plan for ticket 1 so the planning round-trip costs no time"},"options_ja":{"A":"チケット1は直接実行で進め、チケット2は plan mode で始める","B":"両チケットとも plan mode。コードを書く前にレビューの段を挟むことが、チーム共有のコードベースを安全に保つ","C":"両チケットとも直接実行。設計レビューはチーム全員が意見できるプルリクエストで行う","D":"両チケットとも plan mode にするが、チケット1は生成された計画を自動承認して計画の往復コストをゼロにする"},"correct":"A","explanation_ja":{"why_correct":"plan mode の判断基準は「要件の曖昧さ×アーキテクチャ分岐の大きさ」。チケット2は層が未指定（曖昧）かつ3通りの設計があり得る（分岐大）で plan mode の典型。チケット1は確立済みパターンの踏襲で経路が明確、直接実行が最短。基準に照らして使い分けるのが正解で、一律の方針はどちらの方向でも誤る。","B":"パターン踏襲の小タスクに計画の往復を挟むのは純粋なオーバーヘッド。基準でなく一律ルールで運用する誤り。","C":"チケット2の設計ミスがPRで発覚するのは全実装が済んだ後——最も手戻りが高くつく時点。分岐の大きい仕事を無計画に走らせるリスクを引き受けている。","D":"形だけの計画を挟んで自動承認するのは、実質的に直接実行へ余分な手数を足しただけ。一律 plan mode という誤り（Bと同型）の上に、計画の意味——コードを書く前に人間が分岐を解消すること——を捨てる形骸化を重ねている。"},"explanation_en":{"why_correct":"The plan-mode criteria: requirement ambiguity × size of architectural divergence. Ticket 2 — layers unspecified (ambiguous) and at least three designs possible (large divergence) — is the classic plan-mode case. Ticket 1 follows an established pattern with a clear path, so direct execution is shortest. Deciding per ticket against the criteria is the answer; a blanket policy errs in either direction.","B":"Inserting planning round-trips into a pattern-following micro-task is pure overhead — operating on a blanket rule instead of the criteria.","C":"Ticket 2's design mistake would surface in the PR only after full implementation — the most expensive point for rework. It accepts the risk of running a high-divergence job unplanned.","D":"Rubber-stamping an auto-approved plan for ticket 1 is direct execution with extra steps. It keeps the blanket-rule mistake (same as B) while discarding what planning is for: a human resolving the divergence before any code is written."},"references":[{"title":"Claude Code: Common workflows (plan mode)","url":"https://code.claude.com/docs/en/common-workflows"},{"title":"Claude Code best practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"plan mode は「要件曖昧×設計分岐大」のとき。確立パターンの明確な経路は直接実行","lesson_en":"Plan mode when requirements are ambiguous and designs diverge widely; direct execution for clear paths on established patterns","principle_tags":["plan-when-divergent"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D3-007","scenario":"code-generation","domain":3,"task_statement":"3.4","question_en":"Product is still deciding between two data models for a new notifications module — event-sourced or state-based — with the decision expected in two weeks. A teammate proposes: \"Have Claude Code scaffold the module now — directories, empty classes, interfaces — so we can start instantly once product decides. We're not committing to anything, since there's no logic yet.\" How do you evaluate this?","question_ja":"プロダクトチームは新しい通知モジュールのデータモデルを、イベントソーシング型と状態保持型のどちらにするか検討中で、決定は2週間後の見込みだ。メンバーの提案:「今のうちに Claude Code でモジュールを scaffold しておこう——ディレクトリ・空クラス・インターフェースだけだ。ロジックがない以上、何にもコミットしていない。決定が出たら即着手できる」。この提案をどう評価するか。","options_en":{"A":"Agree — scaffolding is cheap, and unused files can be deleted at negligible cost if the decision goes the other way","B":"Agree, but require TODO markers on every undecided piece so the open questions stay visible in the code","C":"Disagree with picking one — scaffold both candidate designs on parallel branches instead, so either decision is equally ready the moment product announces it","D":"Disagree — interfaces and module boundaries encode one data model's shape, so scaffolding now is an implicit commitment, not a neutral head start"},"options_ja":{"A":"賛成。scaffold は安価であり、決定が逆に転んでも未使用ファイルの削除コストは無視できる","B":"賛成。ただし未決定箇所すべてに TODO マーカーを義務付け、オープンな論点がコードから見えるようにする","C":"一方だけ作ることに反対。両方の候補設計を並行ブランチで scaffold し、どちらに決まっても即座に同等に着手できるようにすべきだ","D":"反対。インターフェースとモジュール境界は一方のデータモデルの形を焼き付けるため、scaffold は中立な先行準備ではなく暗黙のコミットになる"},"correct":"D","explanation_ja":{"why_correct":"「ロジックがないからコミットしていない」が誤った前提。ディレクトリ構成・クラス境界・インターフェースのシグネチャはデータモデルの形そのもので、以後の作業は存在する構造に引き寄せられる（開発者は既にあるものを拡張する）。決定が別案に転んだとき、単なる削除ではなく「合わない構造の上に積まれた実装」と戦うことになる。分岐が大きく未決定なら、構造を作らずに決定を待つのが正しい先送り。","A":"「消せば済む」は錨効果を無視している。コードが存在した瞬間から後続作業がその形を前提にし始め、形は決定を生き延びる。","B":"TODO はコミットの存在を文書化するだけで、コミット自体は消えない。構造は依然として実装の流路を規定する。","C":"錨を1つでなく2つ作り、捨て作業も倍にする過剰対応。分岐の解消はプロダクトの決定で行われるのであって、ブランチの競争では行われない。"},"explanation_en":{"why_correct":"\"No logic means no commitment\" is the false premise. Directory layout, class boundaries, and interface signatures are the data model's shape itself; subsequent work gravitates toward existing structure (developers extend what's there). If the decision lands on the other model, you're not simply deleting files — you're fighting implementation stacked on a mismatched structure. With a large undecided divergence, the correct deferral is to create no structure and wait.","A":"\"Just delete it\" ignores anchoring: from the moment code exists, follow-on work assumes its shape, and the shape outlives the decision.","B":"TODOs document the commitment's existence; they don't remove it. The structure still channels the implementation.","C":"Creates two anchors instead of none and doubles the throwaway work. The divergence is resolved by the product decision, not by racing branches."},"references":[{"title":"Claude Code: Common workflows (plan mode)","url":"https://code.claude.com/docs/en/common-workflows"},{"title":"Claude Code best practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"scaffold は形状の暗黙コミット。「ロジックがないから中立」ではない——未決定の大きな分岐は構造を作らずに待つ","lesson_en":"Scaffolding is an implicit shape commitment — \"no logic yet\" is not neutrality. For a large undecided divergence, build no structure and wait","principle_tags":["plan-when-divergent"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D3-008","scenario":"code-generation","domain":3,"task_statement":"3.5","question_en":"You ask Claude Code to generate a new parser utility. The code works, but its style keeps missing your team's expectations — wrong error-handling idiom, non-standard naming. You have already iterated four times with feedback like \"make it cleaner\" and \"more idiomatic,\" with little improvement. What is the most effective next step?","question_ja":"Claude Code に新しいパーサーユーティリティを生成させた。動作はするが、チームの期待とスタイルが合わない——エラーハンドリングのイディオムが違い、命名も標準から外れる。「もっときれいに」「もっとイディオマティックに」といったフィードバックで既に4往復したが、ほとんど改善しない。最も効果的な次の一手はどれか。","options_en":{"A":"Write a longer prose description of the team's style covering naming, error handling, and formatting rules in detail","B":"Point Claude at an exemplar: \"follow the structure of src/utils/csvParser.ts\" and include a sample input with its expected output","C":"Add \"write clean, idiomatic, production-quality code\" to the project CLAUDE.md so every future session in the repository inherits the instruction","D":"Restart the session so the accumulated context from the four failed attempts stops influencing what gets generated"},"options_ja":{"A":"命名・エラーハンドリング・整形ルールを詳細に網羅した、より長い散文のスタイル説明を書いて渡す","B":"手本を示す。「src/utils/csvParser.ts の構造に従うこと」と指定し、サンプル入力とその期待出力を添える","C":"プロジェクト CLAUDE.md に「クリーンでイディオマティックな production 品質のコードを書くこと」を追加し、リポジトリの以後の全セッションに効かせる","D":"セッションを新規に始め、失敗した4往復で蓄積したコンテキストが生成結果に影響しないようにする"},"correct":"B","explanation_ja":{"why_correct":"「きれい」「イディオマティック」という形容詞は解釈がモデル任せで、4往復の停滞はフィードバックの信号が薄いことが原因。既存の模範ファイルと入出力例は、命名・エラー処理・構造の期待を具体物で伝える。スタイルの伝達では実例が散文説明に勝るというのが反復改善の基本パターン。","A":"散文は網羅しようとするほど長く曖昧になり、実例1つ分の情報密度に届きにくい。書く側のコストも高い。","C":"同じ曖昧な形容詞を常駐化しただけで、信号の薄さは変わらない。全セッションにトークンコストを追加する副作用付き。","D":"コンテキストを白紙にしても、より良い信号を与えない限り同じ系統の出力が出る。原因の取り違え。"},"explanation_en":{"why_correct":"Adjectives like \"clean\" and \"idiomatic\" leave interpretation to the model; four stalled iterations mean the feedback signal is too thin. An exemplar file plus an input/output sample conveys naming, error handling, and structural expectations in concrete form. For style transfer, examples beat prose — a core iterative-refinement pattern.","A":"Prose grows long and ambiguous as it chases completeness, and rarely reaches the information density of one real example. It's also costly to write.","C":"This just makes the same vague adjectives permanent, with an added token cost in every session. The signal stays thin.","D":"A blank context without a better signal produces the same family of output. A misdiagnosed cause."},"references":[{"title":"Claude Code best practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"スタイルの伝達は形容詞でなく手本（模範ファイル＋入出力例）で。example は散文に勝る","lesson_en":"Convey style with exemplars (a reference file + input/output samples), not adjectives. Examples beat prose","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D3-009","scenario":"code-generation","domain":3,"task_statement":"3.5","question_en":"Each time Claude Code fixes a reported bug in your date-handling module, the fix passes the developer's manual check, but a different behavior breaks and is discovered days later. This has now happened three times in a row. Which workflow change most directly stops the cycle?","question_ja":"日付処理モジュールのバグを Claude Code に修正させるたび、開発者の手動確認は通るのに、数日後に別の挙動の破壊が発覚する。これが3回連続で起きた。この循環を最も直接的に断つワークフロー変更はどれか。","options_en":{"A":"Have Claude explain each fix in detail before applying it, so the developer can catch side effects during review","B":"Have Claude re-generate the whole module from scratch instead of patching it, eliminating the inconsistencies accumulated across fixes","C":"Add a CLAUDE.md rule: \"after every change, carefully check that no other functionality has been affected\"","D":"Adopt test-driven iteration: write a failing test for the bug, then let Claude iterate until it passes while the full suite stays green"},"options_ja":{"A":"適用前に各修正の詳細な説明を Claude に出させ、開発者がレビューの段階で副作用を捕まえられるようにする","B":"パッチでなくモジュール全体をゼロから生成し直させ、修正のたびに蓄積した不整合を除去する","C":"CLAUDE.md に「変更のたびに、他の機能へ影響が出ていないか注意深く確認すること」というルールを追加する","D":"テスト駆動の反復にする。まずバグを再現する失敗テストを書き、全スイートを green に保ちながらテストが通るまで Claude に反復させる"},"correct":"D","explanation_ja":{"why_correct":"「数日後に発覚」は、回帰を捕まえる実行可能な安全網が存在しないことを意味する。失敗テスト→通るまで反復→全スイート維持のループは、修正のゴールを検証可能にし、既存挙動の保護をコード（テスト）で保証する。人の注意やモデルの注意深さという確率的な防御を、決定論的なチェックに置き換えるのが決め手。","A":"説明を読んで副作用を見抜くのは、まさに3回すり抜けた確率的な防御（人の注意）の強化版にすぎない。","B":"全体再生成は変更面積を最大化し、回帰のリスクをむしろ増やす。検証手段がないという根本問題も未解決のまま。","C":"「注意深く」は検証不能なプロンプト希望。保証が欲しい場面でプロンプトに頼る型の誤り。"},"explanation_en":{"why_correct":"\"Discovered days later\" means there is no executable safety net catching regressions. The failing-test → iterate-until-green → keep-the-suite-green loop makes the fix's goal verifiable and guards existing behavior with code (tests). The deciding move: replacing probabilistic defenses — human attention, model carefulness — with a deterministic check.","A":"Catching side effects by reading explanations is a beefed-up version of the same probabilistic defense (human attention) that already failed three times.","B":"Full regeneration maximizes the change surface and increases regression risk, while the root problem — no verification — stays unsolved.","C":"\"Carefully check\" is an unverifiable prompt hope — the classic mistake of using a prompt where a guarantee is needed."},"references":[{"title":"Claude Code best practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"回帰の再発は安全網の不在が原因。failing test → 反復 → スイート維持で検証をコード化する","lesson_en":"Recurring regressions mean a missing safety net. Codify verification: failing test → iterate → keep the suite green","principle_tags":["code-must-prompt-should","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D2-001","scenario":"code-generation","domain":2,"task_statement":"2.5","question_en":"A developer asks Claude Code where request throttling is implemented. The trace shows Claude ran Glob with patterns like **/*throttle*.ts and **/*ratelimit*, found no files, and concluded the feature does not exist — though it lives in middleware/gatekeeper.ts. The developer asks how to prevent this kind of miss. What do you advise?","question_ja":"開発者が Claude Code に「リクエストのスロットリングはどこで実装されている？」と尋ねた。トレースを見ると、Claude は **/*throttle*.ts や **/*ratelimit* といった Glob を実行してファイルが見つからず、「この機能は存在しない」と結論していた。実際の実装は middleware/gatekeeper.ts にある。この種の見逃しを防ぐにはどうすべきか、と開発者に聞かれた。何を助言するか。","options_en":{"A":"Search content, not filenames: Grep for domain terms like \"429\" or \"Retry-After\", and reserve Glob for when a path pattern is known","B":"Maintain a feature-to-file index in CLAUDE.md so Claude can look up implementation locations without having to search the codebase each time","C":"Broaden the Glob patterns to **/*.ts and have Claude open every match until the feature is found","D":"Add an embeddings-based code search MCP server so semantic queries replace filename pattern matching for feature discovery"},"options_ja":{"A":"ファイル名でなく中身を検索する。\"429\" や \"Retry-After\" などのドメイン用語を Grep で探し、Glob はパスパターンが既知のときに使う","B":"機能名→ファイルの対応表を CLAUDE.md に整備し、毎回コードベースを検索しなくても実装場所を引けるようにする","C":"Glob パターンを **/*.ts に広げ、機能が見つかるまで一致した全ファイルを開かせる","D":"埋め込みベースのコード検索 MCP サーバを追加し、機能探索ではファイル名パターン照合を意味検索で置き換える"},"correct":"A","explanation_ja":{"why_correct":"Glob はパスのパターン照合で、ファイル名が機能語彙に従っているときにしか機能しない。gatekeeper.ts のように命名と機能語彙が乖離するのは普通のこと。実装には \"429\" やヘッダ名のような内容レベルの痕跡が残るので、内容検索（Grep）が正しい第一手。ツールの責務——Grep=内容、Glob=パス——の使い分けが決め手。","B":"対応表は作った瞬間から陳腐化が始まる保守負債。検索で解ける問題を静的な索引の二重管理で補う症状対処。","C":"全ファイルの読み尽くしはコンテキストと時間の爆発。検索ツールがある環境で総当たりに退行している。","D":"組み込みの Grep で足りる問題に外部インフラを足す過剰装備。導入・保守コストに見合わない。"},"explanation_en":{"why_correct":"Glob matches path patterns and only works when filenames follow the feature vocabulary; names like gatekeeper.ts routinely diverge from it. Implementations do leave content-level traces — \"429\", header names — so content search (Grep) is the correct first move. The deciding knowledge is the division of labor: Grep = content, Glob = paths.","B":"An index starts going stale the moment it's written — a maintenance liability that duplicates what search already solves.","C":"Reading every file is a context and time explosion — regressing to brute force in an environment that has search tools.","D":"External infrastructure for a problem built-in Grep already solves; the setup and upkeep don't pay for themselves."},"references":[{"title":"Claude Code: Tools reference (Grep / Glob)","url":"https://code.claude.com/docs/en/tools-reference"},{"title":"Claude Code best practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"機能の所在は内容で探す（Grep）。Glob はパスパターン既知のとき。命名は機能語彙を保証しない","lesson_en":"Find features by content (Grep); Glob is for known path patterns. Naming doesn't guarantee the feature vocabulary","principle_tags":["single-responsibility","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D2-002","scenario":"code-generation","domain":2,"task_statement":"2.5","question_en":"During a bulk refactor, Claude Code's Edit calls on one generated file keep failing because the target string matches multiple locations. The file contains dozens of nearly identical accessor blocks, and only a few of them need this change. Claude retried the same Edit call unchanged and failed again. What guidance should you give for handling this file?","question_ja":"一括リファクタ中、ある生成コード由来のファイルに対する Claude Code の Edit が「対象文字列が複数箇所に一致する」ため失敗し続けている。ファイルにはほぼ同一のアクセサブロックが数十個並び、変更が必要なのはその一部だけである。Claude は同じ Edit 呼び出しを変えずに再試行し、また失敗した。このファイルの扱いについて、どう助言すべきか。","options_en":{"A":"Switch to sed via Bash for this file, since regular expressions handle repeated patterns better than exact-match anchors","B":"Split the generated file into one file per accessor so every anchor string becomes unique for future edits","C":"Expand each old_string with enough surrounding context to be unique; where that is impractical, fall back to Read plus a full-file Write","D":"Have Claude list every intended change and apply them manually yourself, since automated editing is not safe on files with this much repetition"},"options_ja":{"A":"このファイルは Bash 経由の sed に切り替える。繰り返しパターンには完全一致アンカーより正規表現が向いている","B":"生成ファイルをアクセサ1つにつき1ファイルへ分割し、今後の編集ですべてのアンカー文字列が一意になるようにする","C":"old_string に周辺のコンテキストを含めて一意になるまで広げる。一意化が現実的でない箇所は、Read してからファイル全体を Write する方式に切り替える","D":"意図する変更をすべて Claude に列挙させて自分の手で適用する。これほど反復の多いファイルへの自動編集は安全でない"},"correct":"C","explanation_ja":{"why_correct":"Edit は対象文字列の一意一致を前提とする設計で、同一文字列が並ぶファイルでは周辺コンテキストを含めてアンカーを一意化するのが正攻法。それでも一意化できないときの標準的なフォールバックが Read→全体 Write。同じ呼び出しの再試行は決定論的に同じ失敗を返すだけで、失敗の原因（アンカーの曖昧さ）に触れていない。なお、全一致箇所をまとめて置換する意図であれば replace_all: true という手段もあるが、この場面で変更するのは一部のブロックだけである。","A":"sed への切り替えは Edit の安全機構（一致内容の検証）を捨てる横滑り。正規表現の誤爆は、数十個の類似ブロックが並ぶファイルでこそ起きやすい。","B":"編集ツールの都合でプロダクトのファイル構成を変えるのは本末転倒の過剰対応。生成コードなら分割は次回の生成で消える。","D":"自動化の放棄。アンカーの一意化と全体書き換えという、ツール設計内の解決策が2つ残っているのに人手に退行している。"},"explanation_en":{"why_correct":"Edit is designed around a uniquely matching target string; in files full of identical blocks, the standard move is widening the anchor with surrounding context until it is unique. When that's impractical, the standard fallback is Read followed by a whole-file Write. Retrying the identical call deterministically returns the identical failure — it never touches the cause (anchor ambiguity). Note that replace_all: true exists for when every occurrence should change — but here only a subset of the blocks needs the edit.","A":"Switching to sed abandons Edit's safety mechanism (verifying what was matched). Regex misfires are most likely precisely in a file of dozens of near-identical blocks.","B":"Restructuring product files to suit an editing tool is backwards over-engineering — and for generated code the split evaporates at the next generation.","D":"Abandoning automation while two in-design solutions remain: anchor widening and the whole-file rewrite."},"references":[{"title":"Claude Code: Tools reference (Edit)","url":"https://code.claude.com/docs/en/tools-reference"},{"title":"Claude Code best practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"Edit の複数一致はアンカーを広げて一意化、無理なら Read→全体 Write。同一呼び出しの再試行は無意味","lesson_en":"Multiple Edit matches → widen the anchor until unique; if impractical, Read → whole-file Write. Retrying the same call is pointless","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D5-001","scenario":"code-generation","domain":5,"task_statement":"5.1","question_en":"Three hours into debugging a race condition, your context is nearly full, so you run /compact. Afterwards, Claude re-proposes two hypotheses your experiments had already ruled out, and asks for reproduction steps you provided earlier. You expect several more hours of investigation. How should you manage context going forward?","question_ja":"レース条件のデバッグを3時間続け、コンテキストが満杯に近づいたので /compact を実行した。するとその後、Claude は実験で棄却済みの仮説を2つ再提案し、以前伝えた再現手順を改めて尋ねてきた。調査はまだ数時間続く見込みだ。今後のコンテキスト管理はどうすべきか。","options_en":{"A":"Compact more frequently in smaller increments so each individual summarization has less material to lose","B":"Keep a working notes file — repro steps, ruled-out hypotheses, current theory — updated as you go, and have Claude re-read it after each compaction","C":"Avoid compaction entirely by starting a fresh session whenever the limit approaches, and re-explain the current state of the investigation verbally each time","D":"Trust the compacted summary and let Claude re-derive any discarded findings from the code when it needs them"},"options_ja":{"A":"/compact をより小刻みに高頻度で実行し、1回あたりの要約が失う量を減らす","B":"作業ノートファイル（再現手順・棄却済み仮説・現在の理論）を調査と並行して更新し、compaction のたびに Claude へ再読させる","C":"compaction を完全に避け、上限が近づくたびに新セッションを開始して、調査の現状を毎回口頭で説明し直す","D":"圧縮後の要約を信頼し、失われた知見は必要になった時点でコードから再導出させる"},"correct":"B","explanation_ja":{"why_correct":"/compact は非可逆な要約で、何が生き残るかは制御できない——棄却済み仮説の喪失がその実例。調査状態（再現手順・棄却済み仮説・現在の理論）を構造化してファイルに外部化すれば、何度 compaction が走っても確定事実は失われず、再読で即復元できる。調査があと数時間続くという見込みが、外部化への投資を正当化する決め手。","A":"頻度や粒度を変えても非可逆な要約である事実は変わらず、何が残るかは運任せのまま。","C":"compaction による部分喪失を、セッション切断による全喪失＋手動の再説明に置き換える改悪。人の記憶は棄却済み仮説の完全なリストを保持できない。","D":"再導出はまさに今起きた無駄（棄却済み仮説の再提案）の容認。実験で得た知見はコードからは再導出できない。"},"explanation_en":{"why_correct":"/compact is lossy summarization with no control over what survives — the lost ruled-out hypotheses are the live example. Externalize the investigation state (repro steps, ruled-out hypotheses, current theory) into a structured file: no matter how many compactions run, established facts survive, and a re-read restores them instantly. The expected additional hours of investigation justify the investment.","A":"Changing frequency or granularity doesn't change the lossiness; what survives remains luck.","C":"Trades partial loss from compaction for total loss at every session break, plus manual re-explanation. Human memory won't retain the full list of ruled-out hypotheses.","D":"Re-derivation is acceptance of exactly the waste that just occurred. Knowledge gained from experiments cannot be re-derived from the code."},"references":[{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"},{"title":"Claude Code: Commands reference (/compact)","url":"https://code.claude.com/docs/en/commands"}],"lesson":"/compact は非可逆。長い調査の状態はスクラッチパッドファイルに構造化して外部化し、要約を横断して保持する","lesson_en":"/compact is lossy. Externalize long-investigation state to a structured scratchpad file that persists across summaries","principle_tags":["position-aware-context","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D5-002","scenario":"code-generation","domain":5,"task_statement":"5.4","question_en":"Your task: make a small change to session-expiry behavior in a large, unfamiliar codebase. Authentication logic is spread across many modules, so Claude reads through them first; by the time it starts implementing, the context is dominated by full file contents, and the edit it proposes ignores a constraint it had correctly identified early in the exploration. What is the best restructuring of this workflow?","question_ja":"タスクは、大規模で不慣れなコードベースのセッション失効挙動に小さな変更を加えること。認証ロジックは多数のモジュールに分散しており、Claude はまずそれらを読み進めた。実装に取りかかる頃にはコンテキストがファイル全文で占拠され、提案された編集は、探索の序盤で正しく特定していたはずの制約を無視していた。このワークフローの最善の再構成はどれか。","options_en":{"A":"Have Claude re-read all of the key files again right before implementing, so the constraints it identified are fresh in context at the point of editing","B":"Read files with offset and limit so only the relevant fragments enter the context during the exploration phase","C":"Run /compact between the exploration and implementation phases to shrink the transcript before editing begins","D":"Delegate exploration to a subagent that returns a summary of the auth flow and constraints, keeping raw file contents out of the main context"},"options_ja":{"A":"実装の直前に主要ファイルすべてを再読させ、特定済みの制約が編集の時点でコンテキスト内で新鮮な状態になるようにする","B":"探索フェーズでは offset と limit を指定して、関連する断片だけをコンテキストに入れながらファイルを読ませる","C":"探索と実装のフェーズの間に /compact を実行し、編集を始める前にトランスクリプトを縮める","D":"探索をサブエージェントに委任し、認証フローと制約の要約だけを受け取って、生のファイル内容をメインコンテキストに入れない"},"correct":"D","explanation_ja":{"why_correct":"症状（序盤に特定した制約を実装時に無視）は、コンテキスト肥大による中間情報の劣化。探索をサブエージェントに委任すれば、大量のファイル読みはサブエージェント側の隔離されたコンテキストで消費され、メイン会話には蒸留された知見（フローと制約）だけが入る。実装は必要情報だけを持つクリーンなコンテキストで行える。","A":"再読はコストを繰り返し払う上に、既に肥大したコンテキストへさらに積む。序盤の探索分が無駄になる構造も変わらない。","B":"断片読みでも数が積めば肥大する。むしろ断片化によって、モジュールをまたぐ制約の見落としを助長する。","C":"/compact は非可逆で、まさに保持したい「序盤で特定した制約」が要約で落ちるリスクを、編集の直前という最悪のタイミングで負う。"},"explanation_en":{"why_correct":"The symptom — ignoring a constraint identified early — is mid-context degradation from bloat. Delegating exploration to a subagent confines the bulk file-reading to the subagent's isolated context; the main conversation receives only the distilled findings (flow and constraints), and implementation proceeds in a clean context holding exactly what's needed.","A":"Re-reading pays the cost twice and piles more onto an already bloated context; the early exploration remains wasted.","B":"Fragments still accumulate in volume, and fragmentation encourages missing constraints that span modules.","C":"/compact is lossy — the very constraint you want to keep may fall out of the summary, at the worst possible moment: right before editing."},"references":[{"title":"Claude Code: Subagents","url":"https://code.claude.com/docs/en/sub-agents"},{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"}],"lesson":"大規模探索はサブエージェントで隔離し、要約だけをメインに返す。生のファイル全文を実装コンテキストに持ち込まない","lesson_en":"Isolate large exploration in a subagent and return only the summary. Don't carry raw file contents into the implementation context","principle_tags":["explicit-context-passing","position-aware-context"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D5-003","scenario":"code-generation","domain":5,"task_statement":"5.4","question_en":"Your CI build script writes about 8,000 lines of output to build.log per run. In a typical fix-compile-fix session, Claude Code runs the build repeatedly and then reads the entire log file each time to find what failed; sessions hit the context limit within a handful of iterations, even though only the error summary ever matters. What is the right adjustment?","question_ja":"CIビルドスクリプトは1回あたり約8,000行の出力を build.log に書き出す。典型的な「修正→ビルド→修正」セッションでは Claude Code がビルドを繰り返し実行し、失敗箇所を探すために毎回ログファイル全体を読み込んでいる。実際に意味があるのはエラーサマリーだけなのに、数回の反復でセッションがコンテキスト上限に達してしまう。正しい調整はどれか。","options_en":{"A":"Have Claude extract just the failing section from build.log with Grep or tail, instead of reading the whole file each time","B":"Start a fresh session for each build iteration so the older logs never accumulate in the first place","C":"Add a CLAUDE.md instruction telling Claude to disregard the irrelevant log lines when it reads build output","D":"Lower the shared build configuration's log level to errors-only for the whole team, so the output shrinks at the source for everyone"},"options_ja":{"A":"build.log 全体を毎回読むのではなく、Grep や tail で失敗箇所だけを抽出して読ませる","B":"ビルドの反復ごとに新しいセッションを開始し、古いログがそもそも蓄積しないようにする","C":"CLAUDE.md に「ビルド出力を読むときは無関係なログ行を無視すること」という指示を追加する","D":"チーム共有のビルド設定でログレベルを errors-only に引き下げ、全員にとって出力が発生源から減るようにする"},"correct":"A","explanation_ja":{"why_correct":"冗長な出力はコンテキストに入れる前に削るのが原則。ログは既にファイルにあるのだから、全文の読み込みを Grep / tail による選択的読み出しに変えれば、各反復でコンテキストに入るのは失敗箇所の数十行だけになる。フルログはファイルに残っているので、必要になればいつでも追加で参照できる。自分のワークフロー内で完結し、他への副作用がない。","B":"ログは消えるが、修正の文脈（何を試して何が失敗したか）まで毎回捨てることになり、fix-compile-fix の反復そのものが成立しなくなる。蓄積の原因（全文読み込み）に触れない配置換え。","C":"「無視せよ」と指示しても、読み込んだ8,000行は既にコンテキストとトークンを消費した後。読み飛ばしはコスト削減にならない。","D":"共有インフラを1つの用途のために変える越権で、警告や詳細ログを必要とする他の開発者やCIに副作用が及ぶ。エージェント側のフィルタで足りる。"},"explanation_en":{"why_correct":"Trim verbose output before it enters context. The log is already in a file, so switching from whole-file reads to selective extraction with Grep or tail means each iteration ingests only the few dozen lines around the failure. The full log stays on disk for further inspection whenever needed. It is contained entirely within your own workflow, with no side effects on anyone else.","B":"The logs vanish, but so does the debugging context — what was tried and what failed — making the fix-compile-fix loop itself unworkable. A reshuffle that never touches the cause (whole-file reads).","C":"\"Ignore them\" arrives after the 8,000 lines have already been read into context and consumed tokens. Skipping while reading saves nothing.","D":"Changing shared infrastructure for one consumer's needs — the side effects hit developers and CI that rely on warnings and detailed logs. Agent-side filtering suffices."},"references":[{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"},{"title":"Claude Code best practices","url":"https://www.anthropic.com/engineering/claude-code-best-practices"}],"lesson":"冗長な出力はコンテキストに入れる前に削る（全文Readでなく Grep/tail の選択読み）。入れてから消すのは手遅れ","lesson_en":"Cut verbose output before it enters context (selective Grep/tail reads, not whole-file reads). Removing it afterwards is too late","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D5-004","scenario":"code-generation","domain":5,"task_statement":"5.2","question_en":"A ticket reads: \"Make the data export faster.\" Exploring the codebase, Claude finds two distinct export paths: a synchronous CSV endpoint used from the dashboard, and a nightly batch job that ships data to the warehouse. Optimizing them requires entirely different work, and either optimization would take roughly a week. The ticket author, a product manager, is reachable on Slack. What should happen next?","question_ja":"チケットには「データエクスポートを速くする」とだけ書かれている。コードベースを調べると、エクスポート経路は2つ見つかった。ダッシュボードから利用される同期的なCSVエンドポイントと、倉庫へデータを送る夜間バッチジョブだ。最適化の作業内容は両者でまったく異なり、どちらも1週間程度の作業になる見込みだ。チケット起票者のプロダクトマネージャーには Slack で連絡できる。次に何が起きるべきか。","options_en":{"A":"Optimize both paths in one changeset so the ticket is satisfied regardless of which one the author meant","B":"Optimize the CSV endpoint, since user-facing latency is usually what product managers mean, and note the assumption in the pull request","C":"Ask the author one targeted question presenting the two export paths found and what \"faster\" would mean for each","D":"Message the author, but to avoid losing time while waiting, start implementing the more likely CSV-path optimization in parallel"},"options_ja":{"A":"どちらが意図でも満たせるよう、1つの変更セットで両方の経路を最適化する","B":"プロダクトマネージャーの意図は通常ユーザー体感の速度なので、CSVエンドポイントを最適化し、その仮定をプルリクエストに明記する","C":"見つけた2つのエクスポート経路を提示し、それぞれにとって「速い」が何を意味するかを、起票者への的を絞った1つの質問で確認する","D":"起票者に質問は送るが、待ち時間を無駄にしないよう、有力そうなCSVエンドポイント側の最適化実装を並行して始める"},"correct":"C","explanation_ja":{"why_correct":"解釈が2つあり作業が週単位でまったく異なる（誤りのコスト大）のに対し、確認のコストは極小（Slack で即連絡でき、調査済みなので質問を具体化できる）。このコスト非対称が決め手で、推測着手でも差し戻しでもなく、2経路を提示した1つの質問が正解。起票者は選ぶだけでよくなる。","A":"作業・リスク・レビュー負荷を倍にする過剰対応。意図されていない側の変更は不要なリスクでしかない。","B":"「通常はこうだろう」は要件にない前提。PRでの開示は実装コストが沈んだ後に判明する仕組みで、外れたら往復がまるごと無駄になる。","D":"質問と並行して「有力そうな側」に着手するのは、答えが数分〜数時間で返る場面で週単位の作業を賭ける偽装した先送り。外れれば並行分は丸ごと捨てになり、確認を待つコストと釣り合わない。"},"explanation_en":{"why_correct":"Two interpretations diverge into entirely different week-scale work (high cost of error), while clarification costs almost nothing — the author is on Slack, and the completed investigation makes the question concrete. That cost asymmetry is the deciding detail: neither guessing nor bouncing, but one question presenting the two discovered paths, so the author only has to choose.","A":"Doubles the work, risk, and review burden; changes to the unintended path are pure unnecessary risk.","B":"\"Usually\" is an assumption not in the requirements. PR disclosure surfaces the mismatch only after the implementation cost is sunk — a wrong guess wastes the whole round trip.","D":"Starting the \"more likely\" path while the question is pending is disguised deferral: it wagers a week-scale effort in a situation where the answer arrives in minutes to hours. If the guess is wrong, the parallel work is discarded wholesale — a cost wildly out of proportion to simply waiting."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"誤りのコスト（週単位）と確認のコスト（1つの質問）が非対称なら、着手前に解消する。並行着手・仮定実装は先送りの偽装","lesson_en":"When the cost of being wrong (weeks) dwarfs the cost of asking (one question), resolve before starting. Parallel or assumed implementation is disguised deferral","principle_tags":["escalate-with-handoff"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D1-001","scenario":"developer-productivity","domain":1,"task_statement":"1.1","question_en":"Your team built a boilerplate-generation agent directly against the API. The loop executes each requested tool correctly, but before sending the next request it appends only the assistant's text blocks to the conversation history. In testing, the model calls read_template with identical arguments turn after turn and never progresses to writing files. What change fixes this?","question_ja":"チームが API を直接使ってボイラープレート生成エージェントを構築した。ループは要求されたツールを正しく実行するが、次のリクエストを送る前に会話履歴へ追記しているのはアシスタントのテキストブロックだけだ。テストでは、モデルが read_template を毎ターン同一引数で呼び続け、ファイル書き込みへ一向に進まない。どの変更がこれを直すか。","options_en":{"A":"Add a system prompt rule that forbids repeating a tool call once it has been made with the same arguments","B":"Append a tool_result block for each executed tool_use to the history before the next API request","C":"Detect the second identical tool call in the loop code, break out, and fall back to a plain-text completion","D":"Stop checking stop_reason and end the loop once the response text contains a generated code block"},"options_ja":{"A":"同一引数で一度実行したツール呼び出しの繰り返しを禁止するルールをシステムプロンプトに追加する","B":"実行した各 tool_use に対応する tool_result ブロックを、次の API リクエスト前に履歴へ追記する","C":"ループのコードで2回目の同一ツール呼び出しを検出したら脱出し、プレーンテキストの応答に切り替える","D":"stop_reason の確認をやめ、応答テキストに生成コードブロックが含まれた時点でループを終了する"},"correct":"B","explanation_ja":{"why_correct":"API はステートレスで、モデルは履歴に載ったものしか知らない。ツールは実行されても結果が履歴に戻っていないため、モデルから見れば read_template はまだ「未応答」であり、同じ呼び出しを繰り返すのは当然の挙動だ。各イテレーションで tool_use に対応する tool_result ブロックを user ターンとして履歴に追記すれば、モデルは結果を材料に次の行動へ進める。","A":"prompt で保証型。結果が見えないという根本原因が残るため、モデルは「まだ結果を得ていない」状況で繰り返し禁止と情報不足の板挟みになり、正しく前進できない。","C":"症状対処型。ループは止まるが、モデルは一度もテンプレートの中身を見ないままなので、生成物は入力なしの推測になる。","D":"テキスト解析を終了判定にするアンチパターン。tool_result 欠落という原因を直さないうえ、決定論的な stop_reason 判定を確率的な文字列一致に置き換えて別の脆さを持ち込む。"},"explanation_en":{"why_correct":"The API is stateless — the model knows only what is in the history. The tools run, but their results never return to the history, so from the model's perspective read_template is still unanswered, and repeating the call is the natural response. Appending a tool_result block for each tool_use as a user turn each iteration gives the model the material to move forward.","A":"A prompt-for-guarantee patch. The root cause — invisible results — remains, leaving the model squeezed between a no-repeat rule and missing information.","C":"Symptom treatment. The loop stops, but the model never sees the template contents, so the output becomes an input-free guess.","D":"Text parsing as a stop condition is the classic anti-pattern. It leaves the missing tool_result unfixed and swaps the deterministic stop_reason check for a fragile string match."},"references":[{"title":"Handling stop reasons","url":"https://platform.claude.com/docs/en/build-with-claude/handling-stop-reasons"},{"title":"Tool use overview","url":"https://docs.claude.com/en/docs/agents-and-tools/tool-use/overview"}],"lesson":"エージェントループでは、実行した tool_use ごとに tool_result を履歴へ追記する。返さなければモデルは同じ呼び出しを繰り返す","lesson_en":"In an agentic loop, append a tool_result to history for every executed tool_use — without it the model repeats the same call","principle_tags":["root-cause-fix","deterministic-termination"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D1-002","scenario":"developer-productivity","domain":1,"task_statement":"1.3","question_en":"Each time a newcomer asks a question, your onboarding assistant spawns an exploration subagent with the prompt: \"Explore the authentication module and answer: <the engineer's question>\". The answers come back buried in long prose walkthroughs of the code, and the parent agent spends a second pass re-reading and re-summarizing each report before it can respond. What should change?","question_ja":"新任エンジニアから質問が来るたびに、オンボーディング支援エージェントは「認証モジュールを探索して次の質問に答えよ: <質問>」というプロンプトで探索サブエージェントを起動する。返ってくる回答はコードを延々と歩く長い散文に埋もれており、親エージェントは応答の前に各レポートを読み直して再要約する第2パスを費やしている。何を変えるべきか。","options_en":{"A":"Raise the exploration subagent's turn limit so it has room to finish its walkthrough and reach a conclusion","B":"Insert a dedicated summarizer subagent between the explorer and the parent agent that condenses every report before the parent reads it","C":"Switch the explorer to a smaller, faster model so the long reports at least cost less to produce and re-read","D":"Define the return contract in the spawn prompt: direct answer first, then entry points, key files, and constraints, with a length budget"},"options_ja":{"A":"探索サブエージェントのターン上限を引き上げ、ウォークスルーを完走して結論に到達する余裕を持たせる","B":"探索担当と親エージェントの間に、読まれる前にすべてのレポートを圧縮する専用の要約サブエージェントを挟む","C":"探索担当を小型で高速なモデルに切り替え、長いレポートの生成と読み直しのコストを下げる","D":"起動プロンプトで返却契約を定義する。冒頭に質問への直接回答、続いてエントリポイント・主要ファイル・制約を、長さ予算内で"},"correct":"D","explanation_ja":{"why_correct":"サブエージェントが親に返せるのは最終メッセージだけであり、起動プロンプトはタスクに加えて成果物の形（返却契約）も規定する唯一の場所だ。回答を先頭に、構造化された項目と長さ予算を指定すれば、親は再読・再要約の第2パスなしでレポートをそのまま応答に使える。ゴールだけでなく返り値の形まで明示するのが、コンテキストを明示的に渡す設計のもう半分である。","A":"ターン上限は途中で切れる問題への対処で、今回の症状（完走した上で形が悪い）とは別のノブだ。ターンが増えれば散文はむしろ長くなりうる。","B":"要約層の追加は、契約を最初から指定すれば不要な後処理をパイプラインに恒久化する。往復とコストが増え、要約による情報落ちのリスクも加わる。","C":"モデルを替えても出力の形は変わらない。安く速く、同じように読み直しが必要な散文が返るだけだ。"},"explanation_en":{"why_correct":"A subagent's only channel back to the parent is its final message, and the spawn prompt is the one place that defines not just the task but the shape of the deliverable — the return contract. Specify the direct answer first, then structured items within a length budget, and the parent can use the report as-is, with no second re-reading pass. Stating the return shape, not just the goal, is the other half of explicit context passing.","A":"A turn limit addresses runs that get cut off; this run finishes — it just returns the wrong shape. More turns can mean more prose.","B":"A summarizer layer institutionalizes post-processing that a contract would make unnecessary, adding round trips, cost, and a lossy step.","C":"Changing the model changes nothing about the shape. You get the same re-read-requiring prose, cheaper and faster."},"references":[{"title":"Agent SDK: Subagents","url":"https://code.claude.com/docs/en/agent-sdk/subagents"},{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"}],"lesson":"サブエージェントにはゴールと一緒に返却契約（形式・順序・長さ予算）を渡す。親が再要約する構造は契約の欠如","lesson_en":"Hand subagents a return contract — format, order, length budget — along with the goal. A re-summarizing parent means the contract is missing","principle_tags":["explicit-context-passing","single-responsibility"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D1-003","scenario":"developer-productivity","domain":1,"task_statement":"1.4","question_en":"Your automation generates and executes database migration scripts, running unattended at night across several services. The system prompt states that a verified backup is required before any migration executes. Last week the agent skipped the check once and a failed migration caused data loss. The team needs this to never happen again. What is the right fix?","question_ja":"自動化システムがデータベースマイグレーションスクリプトを生成・実行しており、夜間に複数サービスへ無人で走る。システムプロンプトには「実行前に検証済みバックアップが必須」と書いてある。先週、エージェントがこのチェックを一度スキップし、失敗したマイグレーションでデータ喪失が起きた。チームはこれを二度と起こさないことを求めている。正しい修正はどれか。","options_en":{"A":"Make backup verification a programmatic precondition that blocks execution until a fresh backup is confirmed","B":"Move the backup instruction to the top of the system prompt and restate it in the user message of every run","C":"Add a second reviewer agent that checks each generated migration plan for a backup step before execution","D":"Require a human operator to approve each migration run before the agent is allowed to execute it"},"options_ja":{"A":"バックアップ検証をプログラム的な前提条件にし、新しいバックアップが確認されるまで実行をブロックする","B":"バックアップ指示をシステムプロンプトの先頭に移し、毎回のユーザーメッセージでも繰り返して念押しする","C":"レビュー担当のエージェントを追加し、生成された各マイグレーション計画にバックアップ手順があるか実行前に確認させる","D":"エージェントが実行する前に、各マイグレーション実行を人間のオペレータが承認する体制にする"},"correct":"A","explanation_ja":{"why_correct":"「二度と起こさない」は保証の要件であり、保証はコードで実装する（code must, prompt should）。実行コードがバックアップ検証を前提条件として持ち、確認できなければマイグレーションを起動しない構造にすれば、モデルの判断がどうであれ未バックアップ実行は構造的に不可能になる。すでに一度プロンプト指示がスキップされた実績が、確率的手段の限界を示している。","B":"prompt で保証型。位置や繰り返しで遵守率は上がっても確率的であることは変わらず、スキップが再発しうる。すでに破られた手段の強化にすぎない。","C":"確率的なチェックの上に確率的なチェックを重ねる構成で、依然として保証にならない。レビュー担当も見逃しうるうえ、実行時点でバックアップが存在する保証は誰もしていない。","D":"保証にはなるが、夜間無人で複数サービスに走るという要件と両立しない。毎回の人間承認は自動化の目的そのものを打ち消す過剰対応だ。"},"explanation_en":{"why_correct":"\"Never again\" is a guarantee requirement, and guarantees are implemented in code (code must, prompt should). If the execution path holds backup verification as a precondition and refuses to launch the migration without it, an unbacked run becomes structurally impossible regardless of the model's judgment. The prompt instruction was already skipped once — proof of the probabilistic limit.","B":"Prompt-for-guarantee. Position and repetition raise compliance but keep it probabilistic; it reinforces the very mechanism that already failed.","C":"Stacks a probabilistic check on a probabilistic check — still no guarantee. The reviewer can also miss it, and nobody verifies a backup actually exists at execution time.","D":"A real guarantee, but incompatible with unattended nightly runs across services. Per-run human approval cancels the purpose of the automation."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"「絶対に守らせたい」前提条件は、実行をブロックするコードのチェックにする。プロンプト指示は推奨まで","lesson_en":"A must-hold precondition becomes a code-level check that blocks execution; prompt instructions are only recommendations","principle_tags":["code-must-prompt-should","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D1-004","scenario":"developer-productivity","domain":1,"task_statement":"1.5","question_en":"Generated code from your productivity agent keeps failing the repository's formatter check. CLAUDE.md instructs \"run prettier on files you modify\", but the step is frequently forgotten, and unformatted files keep landing in branches. The team wants formatting to hold on every single write without depending on the model remembering. What should they configure?","question_ja":"生産性エージェントが生成するコードが、リポジトリのフォーマッタチェックに落ち続けている。CLAUDE.md には「変更したファイルには prettier をかけること」とあるが、この手順は頻繁に忘れられ、未フォーマットのファイルがブランチに入り続けている。チームは、モデルが覚えているかに依存せず、すべての書き込みでフォーマットが守られることを求めている。何を設定すべきか。","options_en":{"A":"Run the formatter over all changed files in a Stop hook when the session ends, so nothing is ever left unformatted","B":"Add a PreToolUse hook that rejects Write and Edit calls whenever the proposed content is unformatted","C":"Add a PostToolUse hook that runs the formatter automatically after every Write and Edit call","D":"Add a CI job that fails any pull request containing files with formatter violations in the diff"},"options_ja":{"A":"セッション終了時の Stop フックで全変更ファイルにフォーマッタをかけ、未整形のまま残るものをなくす","B":"PreToolUse フックを追加し、書き込もうとする内容が未フォーマットなら Write / Edit 呼び出しを拒否する","C":"PostToolUse フックを追加し、すべての Write / Edit 呼び出しの後に自動でフォーマッタを実行する","D":"CI ジョブを追加し、フォーマッタ違反のファイルを差分に含むプルリクエストを落とす"},"correct":"C","explanation_ja":{"why_correct":"「毎回必ず」は決定論的保証の要件で、フックの領分だ。PostToolUse フックは Write / Edit の完了後に必ず発火するため、フォーマッタの実行がモデルの記憶や判断から切り離される。フォーマットのような後段の正規化処理は、書き込みを妨げず結果を機械的に整える PostToolUse に置くのが正しい位置だ。","A":"フェーズの取り違えだ。セッション中に書かれたファイルは終了時まで未整形のまま残り、その間にテストや他のツール、途中コミットがそれを読む。「書かれた瞬間に整形済み」という保証は、Write/Edit 直後に発火する PostToolUse でしか成立しない。","B":"フェーズの取り違え。拒否されたモデルは自力で整形して再試行することになり、決定論的に一発で済む正規化を、確率的な整形・再試行ループに変えてしまう。","D":"検出であって防止ではない。未フォーマットのコードが生まれる根本はそのままで、開発者は PR 段階まで問題に気づけず、修正の往復が発生し続ける。"},"explanation_en":{"why_correct":"\"On every single write\" is a deterministic-guarantee requirement — hook territory. A PostToolUse hook fires unconditionally after Write/Edit completes, detaching formatter execution from the model's memory or judgment. Downstream normalization like formatting belongs in PostToolUse: it never blocks the write and mechanically cleans the result.","A":"Wrong phase. Files written mid-session sit unformatted until the session ends, while tests, other tools, and interim commits read them. The guarantee \"formatted the moment it is written\" only holds in a PostToolUse hook firing right after Write/Edit.","B":"Wrong phase. A rejected model must format and retry by itself, converting a one-shot deterministic normalization into a probabilistic format-and-retry loop.","D":"Detection, not prevention. The root source of unformatted code remains, developers learn about it only at PR time, and the fix round-trips continue."},"references":[{"title":"Agent SDK: Hooks","url":"https://code.claude.com/docs/en/agent-sdk/hooks"}],"lesson":"書き込み後の正規化（フォーマット等）は PostToolUse フックで決定論的に実行する。CLAUDE.md 指示は忘れられうる","lesson_en":"Post-write normalization (formatting etc.) runs deterministically in a PostToolUse hook; CLAUDE.md instructions can be forgotten","principle_tags":["code-must-prompt-should","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D1-005","scenario":"developer-productivity","domain":1,"task_statement":"1.6","question_en":"You automated a recurring chore — updating service dependency manifests — as a prompt chain with five fixed steps: parse manifest, resolve versions, edit file, run install, commit. It works for the standard layout, but real requests vary widely: some services use lockfiles, some have workspaces, some need only a version bump. The chain regularly breaks midway on these variants. How should the workflow be restructured?","question_ja":"サービスの依存関係マニフェスト更新という定型作業を、5つの固定ステップ（マニフェスト解析→バージョン解決→ファイル編集→インストール実行→コミット）の prompt chaining で自動化した。標準的な構成では動くが、実際の依頼は多様だ。lockfile を使うサービス、workspace 構成のサービス、バージョン番号の更新だけで済むケースもある。こうしたバリエーションでチェーンが途中で壊れることが常態化している。ワークフローをどう再構成すべきか。","options_en":{"A":"Extend the fixed chain with extra branches that explicitly handle each known input variation","B":"Add a validation-retry step after each stage so failures re-run with the error message included","C":"Collapse the five steps into one large prompt so there are no intermediate stages left to break","D":"Let the model assess each input first and plan its own steps, decomposing the task dynamically"},"options_ja":{"A":"既知の入力バリエーションを個別に扱う分岐を足して、固定チェーンを拡張する","B":"各ステージの後に validation-retry を追加し、失敗時はエラーメッセージ付きで再実行させる","C":"5ステップを1つの大きなプロンプトに統合し、壊れうる中間ステージ自体をなくす","D":"まずモデルに入力を評価させ、必要なステップを自分で計画させる動的なタスク分解に切り替える"},"correct":"D","explanation_ja":{"why_correct":"prompt chaining は「タスクが固定的な逐次ステップにきれいに分解できる」ときの手法だ。入力ごとに必要な手順が変わる——lockfile の有無、workspace、バージョン更新のみ——という症状は、この前提が崩れていることを示す。モデルが入力を評価して手順を動的に組み立てる適応的分解に切り替えれば、バリエーションは分岐の敵ではなく計画の入力になる。","A":"既知のバリエーションを列挙で潰す対応は、未知のバリエーションが来るたびに壊れて分岐を足す追いかけっこになる。固定分解という根本原因を温存している。","B":"validation-retry は一時的エラーや形式エラーの手当てであり、「そもそも手順が入力に合っていない」失敗は何度リトライしても成功しない。","C":"分解をやめる方向の極端化。ステップが消えても作業自体の多様性は消えず、検証可能な中間点を失うぶん、失敗の切り分けはむしろ難しくなる。"},"explanation_en":{"why_correct":"Prompt chaining fits when a task decomposes cleanly into fixed sequential steps. The symptom — required steps differing per input (lockfiles, workspaces, version-only bumps) — says that premise no longer holds. Switching to adaptive decomposition, where the model assesses the input and plans its own steps, turns variation from a branch-killer into an input to planning.","A":"Enumerating known variants becomes a chase: every unseen variant breaks the chain again and adds a branch. The root cause — fixed decomposition — is preserved.","B":"Validation-retry addresses transient or format errors; a step sequence that simply doesn't match the input will fail no matter how often it retries.","C":"Extremizing in the opposite direction. Removing steps doesn't remove the task's diversity, and losing verifiable intermediate points makes failures harder to isolate."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"入力ごとに必要な手順が変わるなら、固定シーケンスの chaining でなく、モデルが計画する動的分解にする","lesson_en":"When required steps vary per input, use model-planned dynamic decomposition, not a fixed-sequence chain","principle_tags":["root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D1-006","scenario":"developer-productivity","domain":1,"task_statement":"1.7","question_en":"After a long session, Claude has built up a deep understanding of a legacy payment module: call graphs, hidden invariants, and the quirks of three integrations. You now want to evaluate two incompatible refactoring strategies — strangler-fig extraction vs in-place modularization — and compare their conclusions side by side. Redoing the exploration is expensive, and you don't want one evaluation to color the other. What is the best way to proceed?","question_ja":"長いセッションを経て、Claude はレガシー決済モジュールの深い理解——呼び出しグラフ、暗黙の不変条件、3つの外部連携の癖——を築き上げた。ここから、互いに相容れない2つのリファクタリング戦略（strangler-fig による段階的抽出 vs その場でのモジュール分割）を評価し、結論を並べて比較したい。探索のやり直しは高くつくし、一方の評価がもう一方に影響するのも避けたい。最善の進め方はどれか。","options_en":{"A":"Start two fresh sessions and have each redo the exploration before evaluating its assigned strategy","B":"Fork the session into two branches so both evaluations start from the same explored state independently","C":"Evaluate strategy A in the current session, then run /compact and evaluate strategy B in the freed context","D":"Write a summary of the exploration to a file and paste it into two new sessions as shared context"},"options_ja":{"A":"新しいセッションを2つ開始し、それぞれに探索をやり直させてから担当戦略を評価させる","B":"セッションを2つにフォークし、両方の評価を同一の探索済み状態から独立にスタートさせる","C":"現在のセッションで戦略Aを評価し、/compact を実行してから続けて戦略Bを評価する","D":"探索内容の要約をファイルに書き出し、新規セッション2つに共有コンテキストとして貼り込む"},"correct":"B","explanation_ja":{"why_correct":"要件は3つ——探索を再利用する、2つの評価を独立させる、同一の出発点から比較する。セッションのフォーク（fork_session）は、探索で築いた会話状態を丸ごと複製して2つの分岐を作るため、3条件をすべて満たす唯一の選択肢だ。各分岐は互いの評価を一切見ないまま、同一の完全な理解の上で結論を出せる。（フォークは元セッションを不変に保ち、履歴を複製した分岐を作る。元＋分岐でも、2度フォークした2分岐でも、独立比較が成立する）","A":"独立性は確保できるが、高価な探索を2回払い直す。しかも2回の探索が同一の理解に到達する保証はなく、比較の土台が揃わない恐れもある。","C":"最も引っかかりやすい選択肢。/compact は非可逆の要約で探索の細部が落ちるうえ、戦略Aの評価の残骸が文脈に残り、Bの評価が汚染される。独立比較という要件を二重に破る。","D":"要約は非可逆で、呼び出しグラフや暗黙の不変条件のような細部——まさに戦略評価を分ける情報——が失われる。フォークが保持する完全な状態の劣化コピーで比較することになる。"},"explanation_en":{"why_correct":"Three requirements: reuse the exploration, keep the two evaluations independent, and compare from an identical starting point. Forking the session (fork_session) duplicates the entire built-up conversation state into two branches, satisfying all three. Each branch reaches its conclusion on the same complete understanding without ever seeing the other's reasoning. (A fork leaves the original session unchanged and creates a branch with a copied history; original-plus-branch or two forked branches both give the independent comparison.)","A":"Independent, but pays the expensive exploration twice — and two explorations aren't guaranteed to converge on the same understanding, undermining the comparison's common baseline.","C":"The most tempting trap. /compact is lossy, dropping exploration detail, and residue from evaluating strategy A stays in context and colors B — a double violation of independent comparison.","D":"Summaries are lossy: call graphs and hidden invariants — exactly the details that separate the strategies — get dropped. Both branches would compare on a degraded copy of the state a fork preserves in full."},"references":[{"title":"Agent SDK: Sessions","url":"https://code.claude.com/docs/en/agent-sdk/sessions"}],"lesson":"高価な探索状態から複数案を独立比較したいときは fork_session。要約貼り込みは非可逆、同一セッション続行は汚染","lesson_en":"To compare alternatives independently from expensive explored state, fork the session — summaries are lossy, sequential evaluation contaminates","principle_tags":["single-responsibility"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D2-001","scenario":"developer-productivity","domain":2,"task_statement":"2.1","question_en":"Your internal MCP server exposes a tool named run_query, described as \"Runs a SQL query against the development database.\" Last sprint, an agent used it to ALTER a table while \"fixing\" a failing test, corrupting shared dev data. The tool was only ever intended for inspecting data. The infrastructure team is separately migrating the tool to a read-only database credential, but that lands next sprint. What is the most effective change to the tool definition now?","question_ja":"社内 MCP サーバが run_query というツールを公開しており、description は「開発データベースに対して SQL クエリを実行する」。先スプリント、エージェントが失敗するテストを「修正」する過程でこのツールでテーブルを ALTER し、共有の開発データを壊した。このツールは本来データの参照のためだけに用意されたものだ。最も効果的な変更はどれか。","options_en":{"A":"Rename the tool to read_query and state in its description that it is read-only and not for schema changes","B":"Add a line to every agent's system prompt forbidding the use of run_query for any write operation","C":"Keep the interface but make the executor return success with zero rows whenever a non-SELECT arrives","D":"Move the tool behind an approval gate so a human confirms every individual query before it executes"},"options_ja":{"A":"ツールを read_query に改名し、description に読み取り専用であることとスキーマ変更は用途外であることを明記する","B":"すべてのエージェントのシステムプロンプトに、run_query を書き込み操作に使うことを禁じる一文を追加する","C":"インターフェースは維持し、SELECT 以外が来たら実行せず成功扱いで0行を返すようにエグゼキュータを変える","D":"ツールを承認ゲートの後ろに置き、個々のクエリすべてを人間が確認してから実行する体制にする"},"correct":"A","explanation_ja":{"why_correct":"モデルのツール選択と使い方を駆動するのは、名前と description だ。「Runs a SQL query」という記述は書き込みを含むあらゆる SQL を招いており、誤用はインターフェース設計の帰結と言える。read_query への改名と「読み取り専用・スキーマ変更は用途外」の明記は、境界条件をツール自身に語らせる修正であり、このツールを見るすべてのエージェントに設定なしで効く。（読み取り専用資格情報という決定論的な強制はインフラ側で別途進行中であり、本問の層はツール定義。description の修正は今すぐ入れられ、来る強制層と多層防御を成す）","B":"境界の知識をツールの外（各エージェントのプロンプト）に置く構成。エージェントを追加するたびに書き忘れのリスクがあり、ツールと一緒に境界が伝わらない。","C":"失敗の隠蔽型。書き込みを黙って0行の成功にすり替えると、モデルは操作が成功したと信じて後続の推論を積み上げ、より発見しにくい誤動作に変わる。","D":"参照専用ツールの全クエリに人間承認を課すのは過剰で、開発支援の即時性を壊す。境界が曖昧という根本原因も直っていない。"},"explanation_en":{"why_correct":"The model's tool selection and usage are driven by the name and description. \"Runs a SQL query\" invites any SQL, writes included — the misuse follows from the interface design. Renaming to read_query and stating read-only status plus out-of-scope uses makes the tool itself carry its boundary, which reaches every agent that sees the tool with zero per-agent configuration. (The deterministic enforcement — a read-only credential — is already coming from the infrastructure side; this question's layer is the tool definition. The description fix ships now and forms defense-in-depth with the coming enforcement.)","B":"Puts boundary knowledge outside the tool, in each agent's prompt. Every new agent risks omitting it, and the boundary doesn't travel with the tool.","C":"Failure hiding. Silently converting writes into zero-row successes makes the model believe the operation worked and build reasoning on top — a harder-to-detect malfunction.","D":"Human approval for every query of a read-only tool is disproportionate and kills the immediacy of a dev-productivity workflow, while the vague boundary — the root cause — remains."},"references":[{"title":"Writing tools for agents","url":"https://www.anthropic.com/engineering/writing-tools-for-agents"}],"lesson":"ツールの境界条件は名前と description に持たせる。誤用の第一の疑い先は呼び出し側でなくインターフェース","lesson_en":"Boundaries live in the tool's name and description; when a tool is misused, suspect the interface before the caller","principle_tags":["single-responsibility","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D2-002","scenario":"developer-productivity","domain":2,"task_statement":"2.3","question_en":"Your team built one universal productivity agent and attached 43 tools: code search, ticket management, deployment, documentation, database inspection, and more. Tool descriptions were audited last month and are clear, yet wrong-tool selections keep climbing as tools are added — the agent picks a ticketing tool during a code investigation, or a deploy tool while writing docs. What is the most effective restructuring?","question_ja":"チームは1つの万能生産性エージェントを構築し、43個のツール——コード検索、チケット管理、デプロイ、ドキュメント、データベース参照など——を付与した。description は先月監査済みで明確だが、ツールが増えるにつれ誤選択が増え続けている。コード調査中にチケットツールを選ぶ、ドキュメント作成中にデプロイツールを選ぶ、といった具合だ。最も効果的な再構成はどれか。","options_en":{"A":"Re-audit all descriptions and sharpen the boundary conditions of the most frequently confused pairs","B":"Use tool_choice to force the correct tool for each incoming request category before the agent runs","C":"Add a selection guide to the system prompt listing every tool and the rules for when to use each one","D":"Split the work across specialized agents, each holding only the small toolset its own role requires"},"options_ja":{"A":"全 description を再監査し、特に混同されやすいツールペアの境界条件を鋭くする","B":"リクエストのカテゴリごとに tool_choice で正しいツールを強制してからエージェントを走らせる","C":"全ツールと使い分けルールを列挙した選択ガイドをシステムプロンプトに追加する","D":"責務ごとの専門エージェントに分割し、それぞれに役割が必要とする少数のツールセットだけを持たせる"},"correct":"D","explanation_ja":{"why_correct":"決め手は2つ。description は監査済みで明確なこと、そして誤選択がツール数の増加と共に伸びていることだ。これは個々の記述の問題ではなく、選択空間そのものが広すぎる構造問題を示す。責務ごとの専門エージェントに分割し、各自に少数の関連ツールだけ配布すれば、どの時点でも選択肢は数個に絞られ、誤選択の余地が構造的に縮む。最小権限にも合致する。","A":"すでに監査済みという前提が、この方向の限界を示している。43個の選択空間では、記述をどれだけ磨いても認知負荷の総量は下がらない。","B":"tool_choice の強制は「どのツールが正しいか」を呼び出し側が事前に知っている前提で、リクエスト分類器を別に作ることになる。エージェントに判断させる設計自体を放棄する割に、分類器が同じ選択問題を抱え直す。","C":"確率的な緩和策。43ツールのガイドは常時コンテキストを消費し、リストが伸びるほど lost-in-the-middle で参照精度も落ちる。ツール数という根本原因は残る。"},"explanation_en":{"why_correct":"Two deciding details: descriptions are audited and clear, and errors climb as the tool count grows. That points to a structural problem — the selection space itself is too large — not a description problem. Splitting into specialized agents, each with a small related toolset, shrinks the choice at any moment to a handful, structurally removing room for error, and matches least privilege.","A":"The completed audit is the tell that this direction is exhausted. In a 43-tool space, polishing descriptions doesn't reduce total cognitive load.","B":"Forcing tool_choice presupposes the caller already knows the right tool, which means building a separate request classifier — abandoning agent judgment while handing the same selection problem to the classifier.","C":"A probabilistic mitigation: a 43-tool guide permanently consumes context, and as it grows, lost-in-the-middle degrades its own usefulness. The root cause — tool count per agent — remains."},"references":[{"title":"Writing tools for agents","url":"https://www.anthropic.com/engineering/writing-tools-for-agents"},{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"description が良くても誤選択がツール数と共に増えるなら、分配の問題。専門エージェントに少数ツールずつ配る","lesson_en":"If good descriptions can't stop selection errors that grow with tool count, it's a distribution problem: few tools per specialized agent","principle_tags":["least-privilege","single-responsibility"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S4-D2-003","scenario":"developer-productivity","domain":2,"task_statement":"2.4","question_en":"Your productivity agent needs GitHub operations: reading issues, commenting on pull requests, and checking review status. A teammate proposes spending the next sprint building a custom MCP server for the GitHub API, arguing the team will want full control. The same sprint is also supposed to deliver an MCP integration for your homegrown deployment tracker, which has no public API ecosystem. How should the sprint be planned?","question_ja":"生産性エージェントに GitHub 操作——Issue の読み取り、プルリクエストへのコメント、レビュー状況の確認——が必要になった。チームメンバーは「完全なコントロールが欲しくなるはずだ」と主張し、次スプリントを GitHub API のカスタム MCP サーバ構築に充てることを提案している。同じスプリントでは、公開 API エコシステムを持たない自社製デプロイトラッカーの MCP 統合も納品予定だ。スプリントをどう計画すべきか。","options_en":{"A":"Build a minimal custom GitHub server covering only the handful of endpoints the team needs today","B":"Skip MCP for GitHub and have the agent drive the gh CLI directly through the Bash tool","C":"Adopt a maintained GitHub MCP server and spend the custom-build effort on the deployment tracker","D":"Build one custom server that wraps both GitHub and the tracker behind a single unified interface"},"options_ja":{"A":"今チームが必要とする一握りのエンドポイントだけを覆う、最小のカスタム GitHub サーバを作る","B":"GitHub には MCP を使わず、エージェントに Bash ツール経由で gh CLI を直接操作させる","C":"メンテナンスされている GitHub MCP サーバを採用し、カスタム構築の工数はデプロイトラッカーに充てる","D":"GitHub とトラッカーの両方を単一の統一インターフェースで包む、1つのカスタムサーバを構築する"},"correct":"C","explanation_ja":{"why_correct":"使い分けの原則は「広く使われる外部サービスにはメンテされた既存サーバ、社内独自システムにはカスタム構築」だ。GitHub のような主要サービスには保守されたサーバが存在し、API の進化への追従やツール定義の改善を外部のメンテナンスに任せられる。一方、自社製トラッカーは既存サーバが存在しえない領域で、ここにこそカスタム構築の工数を使うべきだ。スプリントの2つの要求が、ちょうどこの使い分けの両側に対応している。","A":"最小限でも自作は自作で、GitHub API の変更に追従する保守負担を永続的に抱え込む。既存サーバで足りるものの再発明だ。","B":"gh CLI は個人のワークフローでは有効だが、チームのエージェント基盤としては、権限のスコープ制御・構造化されたツール定義・エラー処理を Bash 文字列の組み立てに委ねることになる。メンテされた MCP サーバはその層を提供済みだ。","D":"無関係な2システムを1インターフェースに統合する過剰設計。単一責任に反し、GitHub 側の変更がトラッカー統合にも波及する結合を生む。"},"explanation_en":{"why_correct":"The dividing rule: adopt maintained servers for widely used external services; build custom for internal systems nothing else covers. GitHub has maintained servers, outsourcing API-evolution tracking and tool-definition improvements. The homegrown tracker is exactly where no existing server can exist — that's where the custom effort belongs. The sprint's two demands map precisely onto the two sides of this rule.","A":"Minimal or not, custom is custom: a permanent maintenance burden tracking GitHub API changes, reinventing what a maintained server already provides.","B":"The gh CLI works well in personal workflows, but as team agent infrastructure it delegates permission scoping, structured tool definitions, and error handling to Bash string assembly. A maintained MCP server already provides that layer.","D":"Over-engineering: fusing two unrelated systems behind one interface violates single responsibility and couples GitHub-side changes to the tracker integration."},"references":[{"title":"Claude Code: MCP","url":"https://code.claude.com/docs/en/mcp"}],"lesson":"汎用サービスはメンテされた既存 MCP サーバを採用し、カスタム構築は既存サーバがありえない社内システムに温存する","lesson_en":"Adopt maintained MCP servers for common services; reserve custom builds for internal systems no existing server can cover","principle_tags":["single-responsibility"],"difficulty":"standard","s
