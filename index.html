<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CCA-F 練習試験コンソール</title>
<style>
:root{
  --bg:#0e1116; --bg2:#151a22; --card:#1a202b; --card2:#212936;
  --line:#2c3646; --text:#e6ebf2; --muted:#8b98ab; --dim:#5d6b80;
  --accent:#5aa9ff; --accent2:#8b7bff;
  --ok:#3ecf8e; --ok-bg:rgba(62,207,142,.12);
  --ng:#ff6b6b; --ng-bg:rgba(255,107,107,.12);
  --warn:#f7c948; --warn-bg:rgba(247,201,72,.10);
  --flag:#f7a83d;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;
  line-height:1.65; font-size:15px; min-height:100vh;
}
a{color:var(--accent)}
button{font:inherit; color:inherit; cursor:pointer; border:1px solid var(--line); background:var(--card2); border-radius:8px; padding:6px 14px}
button:hover{border-color:var(--accent)}
button:disabled{opacity:.45; cursor:default}
select,input[type=number]{
  font:inherit; color:var(--text); background:var(--card2);
  border:1px solid var(--line); border-radius:8px; padding:6px 10px;
}
header{
  position:sticky; top:0; z-index:20; background:rgba(14,17,22,.92);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
  padding:14px 18px 0;
}
.brand{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap}
.brand h1{font-size:18px; font-weight:700; letter-spacing:.02em}
.brand h1 span{background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent}
.brand .meta{font-size:12px; color:var(--muted)}
.user-ctl{display:flex; align-items:center; gap:6px; margin-left:auto; font-size:12.5px; color:var(--muted); white-space:nowrap}
.user-ctl select{max-width:180px}
.chip.user{color:var(--accent2); border-color:var(--accent2)}
.tabs{display:flex; gap:4px; margin-top:10px}
.tabs button{
  background:none; border:none; border-bottom:2px solid transparent; border-radius:0;
  padding:8px 16px 10px; color:var(--muted); font-weight:600;
}
.tabs button:hover{color:var(--text)}
.tabs button.active{color:var(--text); border-bottom-color:var(--accent)}
main{max-width:960px; margin:0 auto; padding:18px 16px 80px}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; margin-bottom:14px}
.muted{color:var(--muted)} .small{font-size:12.5px}
.chips{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px}
.chip{font-size:11.5px; padding:2px 9px; border-radius:99px; border:1px solid var(--line); color:var(--muted); background:var(--bg2)}
.chip.draft{color:var(--warn); border-color:var(--warn); background:var(--warn-bg)}
.chip.dom{color:var(--accent)}
/* --- filters --- */
.filters{display:flex; flex-wrap:wrap; gap:12px 18px; align-items:center}
.filters label{display:flex; align-items:center; gap:7px; font-size:13.5px; color:var(--muted); white-space:nowrap; min-width:0; max-width:100%}
.filters select{flex:1 1 auto; min-width:0; max-width:100%}
.filters .chk{cursor:pointer; user-select:none}
.seg{display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden}
.seg button{border:none; border-radius:0; background:var(--bg2); color:var(--muted); padding:5px 13px; font-size:13px}
.seg button+button{border-left:1px solid var(--line)}
.seg button.active{background:var(--accent); color:#0b1220; font-weight:700}
.progress-line{font-size:13px; color:var(--muted); margin:2px 2px 12px}
.progress-line b{color:var(--text)}
/* --- question --- */
.qtext{margin:6px 0 4px; white-space:pre-wrap}
.qtext.en{color:#d4ddea}
.qtext.ja{color:var(--text)}
.qtext.en + .qtext.ja{margin-top:10px; padding-top:10px; border-top:1px dashed var(--line)}
.options{display:flex; flex-direction:column; gap:8px; margin-top:14px}
.opt{
  display:flex; gap:10px; text-align:left; align-items:flex-start;
  background:var(--card2); border:1px solid var(--line); border-radius:10px; padding:10px 12px; width:100%;
}
.opt .key{
  flex:0 0 26px; height:26px; display:flex; align-items:center; justify-content:center;
  border-radius:7px; background:var(--bg2); border:1px solid var(--line); font-weight:700; font-size:13px;
}
.opt .body{flex:1}
.opt .body .en{display:block; color:#d4ddea}
.opt .body .en + .ja{display:block; margin-top:4px; color:var(--muted); font-size:13.5px}
.opt:not(:disabled):hover{border-color:var(--accent)}
.opt.correct{border-color:var(--ok); background:var(--ok-bg)}
.opt.correct .key{background:var(--ok); border-color:var(--ok); color:#08131b}
.opt.wrong-chosen{border-color:var(--ng); background:var(--ng-bg)}
.opt.wrong-chosen .key{background:var(--ng); border-color:var(--ng); color:#08131b}
.opt.selected{border-color:var(--accent); background:rgba(90,169,255,.10)}
.opt.selected .key{background:var(--accent); border-color:var(--accent); color:#0b1220}
/* --- explanation --- */
.verdict{font-size:16px; font-weight:700; margin-bottom:8px}
.verdict.ok{color:var(--ok)} .verdict.ng{color:var(--ng)}
.exp-block{margin-top:12px}
.exp-block h4{font-size:12.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); margin-bottom:5px}
.exp-wrong{border-left:3px solid var(--line); padding:6px 10px; margin:6px 0; border-radius:0 8px 8px 0; background:var(--bg2)}
.exp-wrong.mine{border-left-color:var(--ng); background:var(--ng-bg)}
.exp-wrong .k{font-weight:700; color:var(--muted)}
.exp-wrong.mine .k{color:var(--ng)}
.exp-wrong.mine .mine-tag{font-size:11px; color:var(--ng); border:1px solid var(--ng); border-radius:99px; padding:0 7px; margin-left:6px}
.lesson{background:var(--warn-bg); border:1px solid rgba(247,201,72,.35); border-radius:10px; padding:9px 12px; color:#f4dfa0}
.fb-block summary{cursor:pointer; color:var(--muted); font-size:13px}
.fb-block textarea{width:100%; margin-top:8px; background:var(--bg2); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font:inherit; font-size:13px; resize:vertical}
.refs a{display:inline-block; margin:2px 10px 2px 0; font-size:13px}
.qactions{display:flex; justify-content:flex-end; gap:10px; margin-top:4px}
.btn-primary{background:var(--accent); border-color:var(--accent); color:#0b1220; font-weight:700; padding:8px 20px}
.btn-primary:hover{filter:brightness(1.1)}
.btn-danger{border-color:var(--ng); color:var(--ng)}
.btn-flag.on{border-color:var(--flag); color:var(--flag); background:rgba(247,168,61,.12)}
/* --- mock --- */
.notice{border:1px solid rgba(247,201,72,.4); background:var(--warn-bg); border-radius:10px; padding:10px 14px; color:#f4dfa0; margin:12px 0}
.exam-top{display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:12px}
.timer{
  font-variant-numeric:tabular-nums; font-size:26px; font-weight:800; letter-spacing:.04em;
  background:var(--card); border:1px solid var(--line); border-radius:10px; padding:4px 16px;
}
.timer.low{color:var(--ng); border-color:var(--ng); animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.55}}
.exam-top .spacer{flex:1}
.exam-layout{display:grid; grid-template-columns:230px 1fr; gap:14px; align-items:start}
.qnav{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:12px; position:sticky; top:110px}
.qnav .grid{display:grid; grid-template-columns:repeat(5,1fr); gap:5px}
.qnav .cell{
  border:1px solid var(--line); background:var(--bg2); border-radius:6px;
  font-size:11.5px; padding:5px 0; text-align:center; color:var(--muted);
}
.qnav .cell.answered{background:rgba(90,169,255,.22); border-color:var(--accent); color:var(--text)}
.qnav .cell.flagged{border-color:var(--flag); color:var(--flag)}
.qnav .cell.flagged.answered{background:rgba(247,168,61,.20)}
.qnav .cell.current{outline:2px solid var(--accent2)}
.qnav .legend{margin-top:10px; font-size:11px; color:var(--muted); display:flex; flex-direction:column; gap:3px}
.qnav .legend i{display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:6px; vertical-align:-1px}
.scenario-ctx{margin-bottom:12px}
.scenario-ctx summary{cursor:pointer; color:var(--accent); font-size:13px; font-weight:600}
.scenario-ctx p{margin-top:8px; font-size:13.5px; color:var(--muted); white-space:pre-wrap}
/* --- result --- */
.score-hero{display:flex; gap:22px; align-items:center; flex-wrap:wrap}
.score-hero .big{font-size:46px; font-weight:800; line-height:1.1}
.score-hero .big small{font-size:15px; color:var(--muted); font-weight:400}
.badge{font-size:13px; font-weight:700; padding:5px 14px; border-radius:99px}
.badge.pass{background:var(--ok-bg); color:var(--ok); border:1px solid var(--ok)}
.badge.fail{background:var(--ng-bg); color:var(--ng); border:1px solid var(--ng)}
table.stats{width:100%; border-collapse:collapse; font-size:13.5px}
table.stats th,table.stats td{padding:7px 10px; border-bottom:1px solid var(--line); text-align:left}
table.stats th{color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:.06em}
table.stats td.num{font-variant-numeric:tabular-nums}
.bar{height:8px; border-radius:99px; background:var(--bg2); overflow:hidden; min-width:80px}
.bar i{display:block; height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent),var(--accent2))}
.bar.ok i{background:var(--ok)} .bar.ng i{background:var(--ng)}
.review-item{border-top:1px solid var(--line); padding:16px 0}
.review-item .rhead{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:6px}
.rmark{font-weight:800}
.rmark.ok{color:var(--ok)} .rmark.ng{color:var(--ng)}
/* --- history --- */
.hist-row{display:flex; gap:14px; align-items:center; flex-wrap:wrap; padding:11px 4px; border-bottom:1px solid var(--line); font-size:13.5px}
.hist-row .when{flex:0 0 150px; color:var(--muted)}
.hist-row .score{flex:0 0 120px; font-variant-numeric:tabular-nums}
.hist-row .bar{flex:1}
.empty{color:var(--dim); text-align:center; padding:36px 0}
@media(max-width:720px){
  main{padding:14px 10px 70px}
  .filters label{flex:1 1 100%}
  .exam-layout{grid-template-columns:1fr}
  .qnav{position:static}
  .qnav .grid{grid-template-columns:repeat(10,1fr)}
  .score-hero .big{font-size:36px}
  .hist-row .when{flex-basis:100%}
}
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1><span>CCA-F</span> 練習試験コンソール</h1>
    <div class="meta" id="bank-meta"></div>
    <label class="user-ctl">👤 学習者 <select id="user-select"></select></label>
  </div>
  <nav class="tabs">
    <button data-tab="practice" class="active">練習</button>
    <button data-tab="mock">本番モード</button>
    <button data-tab="history">履歴</button>
  </nav>
</header>
<main>
  <!-- ============ 練習 ============ -->
  <section id="tab-practice">
    <div class="card filters">
      <label>シナリオ <select id="pf-scenario"></select></label>
      <label>ドメイン <select id="pf-domain"></select></label>
      <label class="chk"><input type="checkbox" id="pf-unsolved"> 未正解のみ</label>
      <label>表示
        <span class="seg" id="pf-lang">
          <button data-lang="en">EN</button>
          <button data-lang="ja" class="active">JA</button>
          <button data-lang="both">EN+JA</button>
        </span>
      </label>
    </div>
    <div class="progress-line" id="pf-progress"></div>
    <div id="pf-question"></div>
  </section>

  <!-- ============ 本番モード ============ -->
  <section id="tab-mock" hidden>
    <div id="mk-start"></div>
    <div id="mk-exam" hidden></div>
    <div id="mk-result" hidden></div>
  </section>

  <!-- ============ 履歴 ============ -->
  <section id="tab-history" hidden>
    <div class="card" id="hist-box"></div>
  </section>
</main>

<script>const EXAM_DATA = {"meta":{"title":"CCA-F Original Question Bank","version":"0.5","generated_at":"2026-07-04","include_drafts":false},"scenarios":[{"key":"customer-support","number":1,"name_en":"Customer Support Resolution Agent","name_ja":"カスタマーサポート解決エージェント","context_en":"You are building a customer support resolution agent using the Claude Agent SDK. The agent handles high-ambiguity requests like returns, billing disputes, and account issues. It has access to your backend systems through custom MCP tools (get_customer, lookup_order, process_refund, escalate_to_human). Your target is 80%+ first-contact resolution while knowing when to escalate.","context_ja":"Claude Agent SDK でカスタマーサポート解決エージェントを構築している。返品・請求争議・アカウント問題など曖昧性の高い依頼を扱い、カスタムMCPツール（get_customer, lookup_order, process_refund, escalate_to_human）でバックエンドに接続する。目標は初回解決率80%以上と適切なエスカレーション判断。","primary_domains":[1,2,5]},{"key":"code-generation","number":2,"name_en":"Code Generation with Claude Code","name_ja":"Claude Code によるコード生成","context_en":"You are using Claude Code to accelerate software development. Your team uses it for code generation, refactoring, debugging, and documentation. You need to integrate it into your development workflow with custom slash commands, CLAUDE.md configurations, and understand when to use plan mode vs direct execution.","context_ja":"Claude Code で開発を加速している。コード生成・リファクタ・デバッグ・ドキュメント作成にチームで使い、カスタムスラッシュコマンドや CLAUDE.md 設定でワークフローに統合し、plan mode と直接実行の使い分けを判断する。","primary_domains":[3,5]},{"key":"multi-agent-research","number":3,"name_en":"Multi-Agent Research System","name_ja":"マルチエージェント・リサーチシステム","context_en":"You are building a multi-agent research system using the Claude Agent SDK. A coordinator agent delegates to specialized subagents: one searches the web, one analyzes documents, one synthesizes findings, and one generates reports. The system researches topics and produces comprehensive, cited reports.","context_ja":"Claude Agent SDK でマルチエージェント・リサーチシステムを構築している。コーディネータがWeb検索・文書分析・統合・レポート生成の各サブエージェントに委任し、出典付きの包括的レポートを生成する。","primary_domains":[1,2,5]},{"key":"developer-productivity","number":4,"name_en":"Developer Productivity with Claude","name_ja":"Claude による開発者生産性","context_en":"You are building developer productivity tools using the Claude Agent SDK. The agent helps engineers explore unfamiliar codebases, understand legacy systems, generate boilerplate code, and automate repetitive tasks. It uses the built-in tools (Read, Write, Bash, Grep, Glob) and integrates with MCP servers.","context_ja":"Claude Agent SDK で開発者生産性ツールを構築している。未知のコードベース探索・レガシー理解・ボイラープレート生成・繰り返しタスク自動化を支援し、組み込みツール（Read, Write, Bash, Grep, Glob）とMCPサーバを利用する。","primary_domains":[2,3,1]},{"key":"claude-code-ci","number":5,"name_en":"Claude Code for Continuous Integration","name_ja":"CI への Claude Code 統合","context_en":"You are integrating Claude Code into your CI/CD pipeline. The system runs automated code reviews, generates test cases, and provides feedback on pull requests. You need to design prompts that provide actionable feedback and minimize false positives.","context_ja":"CI/CDパイプラインに Claude Code を統合している。自動コードレビュー・テスト生成・PRフィードバックを行い、実行可能な指摘と偽陽性の最小化を目指すプロンプトを設計する。","primary_domains":[3,4]},{"key":"structured-extraction","number":6,"name_en":"Structured Data Extraction","name_ja":"構造化データ抽出","context_en":"You are building a structured data extraction system using Claude. The system extracts information from unstructured documents, validates the output using JSON schemas, and maintains high accuracy. It must handle edge cases gracefully and integrate with downstream systems.","context_ja":"Claude で構造化データ抽出システムを構築している。非構造化文書から情報を抽出し、JSONスキーマで検証し高精度を維持する。エッジケースを適切に処理し下流システムと統合する。","primary_domains":[4,5]}],"exam_structure":{"questions_total":60,"time_limit_minutes":120,"scenarios_drawn":4,"questions_per_scenario":15,"passing_scaled_score":720,"scaled_score_range":[100,1000]},"domains":[{"id":1,"name_en":"Agentic Architecture & Orchestration","name_ja":"エージェント型アーキテクチャとオーケストレーション","weight":0.27,"task_statements":[{"id":"1.1","title":"Design and implement agentic loops for autonomous task execution","keywords":["stop_reason (tool_use/end_turn)","tool results appended to history","model-driven vs pre-configured decision trees","anti-patterns: text parsing / iteration caps as primary stop"]},{"id":"1.2","title":"Orchestrate multi-agent systems with coordinator-subagent patterns","keywords":["hub-and-spoke","isolated subagent context","task decomposition & aggregation","dynamic subagent selection","scope partitioning to avoid duplication","iterative refinement loops"]},{"id":"1.3","title":"Configure subagent invocation, context passing, and spawning","keywords":["Task tool / allowedTools includes Task","explicit context in prompt (no inheritance)","AgentDefinition","parallel Task calls in one response","fork-based sessions","goals not step-by-step procedures"]},{"id":"1.4","title":"Implement multi-step workflows with enforcement and handoff patterns","keywords":["programmatic prerequisites vs prompt guidance","deterministic compliance (verify before refund)","structured handoff summaries for escalation"]},{"id":"1.5","title":"Apply Agent SDK hooks for tool call interception and data normalization","keywords":["PostToolUse normalization","tool-call interception for policy (e.g. refund > $500)","hooks = deterministic guarantee, prompt = probabilistic"]},{"id":"1.6","title":"Design task decomposition strategies for complex workflows","keywords":["prompt chaining (fixed sequential)","dynamic adaptive decomposition","per-file pass + cross-file integration pass"]},{"id":"1.7","title":"Manage session state, resumption, and forking","keywords":["session resumption","fork_session","named sessions","state persistence / crash recovery manifests"]}]},{"id":2,"name_en":"Tool Design & MCP Integration","name_ja":"ツール設計とMCP統合","weight":0.18,"task_statements":[{"id":"2.1","title":"Design effective tool interfaces with clear descriptions and boundaries","keywords":["description quality drives selection","split vs consolidate tools","naming to reduce ambiguity","boundary conditions"]},{"id":"2.2","title":"Implement structured error responses for MCP tools","keywords":["isError flag","errorCategory transient/validation/permission","isRetryable","never success-with-empty on failure","errors the model can act on"]},{"id":"2.3","title":"Distribute tools appropriately across agents and configure tool choice","keywords":["least privilege per agent","scoped tools (verify_fact)","tool_choice auto/any/forced","over-provisioning risks"]},{"id":"2.4","title":"Integrate MCP servers into Claude Code and agent workflows","keywords":[".mcp.json project scope vs ~/.claude.json user scope","env var expansion for tokens","MCP resources as content catalogs","community servers vs custom"]},{"id":"2.5","title":"Select and apply built-in tools (Read, Write, Edit, Bash, Grep, Glob) effectively","keywords":["Grep=content search","Glob=path patterns","Edit unique-anchor / Read+Write fallback","incremental codebase understanding"]}]},{"id":3,"name_en":"Claude Code Configuration & Workflows","name_ja":"Claude Code の設定とワークフロー","weight":0.2,"task_statements":[{"id":"3.1","title":"Configure CLAUDE.md files with appropriate hierarchy, scoping, and modular organization","keywords":["user/project/directory hierarchy","@import = organization not conditional loading","always-loaded vs on-demand","levels combine and are interpreted together"]},{"id":"3.2","title":"Create and configure custom slash commands and skills","keywords":["SKILL.md frontmatter","argument-hint","allowed-tools (incl. Bash(cmd:*) patterns)","context: fork","$ARGUMENTS / $1 $2","project vs user scope"]},{"id":"3.3","title":"Apply path-specific rules for conditional convention loading","keywords":[".claude/rules/ YAML frontmatter paths globs","noun (file-type) triggers vs verb (task) triggers","rules without paths = always loaded"]},{"id":"3.4","title":"Determine when to use plan mode vs direct execution","keywords":["ambiguous requirements + large architectural divergence → plan mode","established pattern + clear path → direct","scaffolding = implicit commitment, not deferral"]},{"id":"3.5","title":"Apply iterative refinement techniques for progressive improvement","keywords":["input/output examples","test-driven iteration","interview pattern","sequential vs parallel issue resolution"]},{"id":"3.6","title":"Integrate Claude Code into CI/CD pipelines","keywords":["-p/--print headless","--output-format json / --json-schema","--allowedTools pre-approval","blocking vs non-blocking checks"]}]},{"id":4,"name_en":"Prompt Engineering & Structured Output","name_ja":"プロンプトエンジニアリングと構造化出力","weight":0.2,"task_statements":[{"id":"4.1","title":"Design prompts with explicit criteria to improve precision and reduce false positives","keywords":["explicit review criteria","severity definitions","scope restriction","actionable feedback"]},{"id":"4.2","title":"Apply few-shot prompting to improve output consistency and quality","keywords":["target ambiguous cases","format consistency","classification consistency","varied-format examples"]},{"id":"4.3","title":"Enforce structured output using tool use and JSON schemas","keywords":["tool_use for structured output","tool_choice forcing","required vs optional","nullable fields prevent hallucination","enum + other/detail pattern","strict mode"]},{"id":"4.4","title":"Implement validation, retry, and feedback loops for extraction quality","keywords":["validation-retry with the specific error","retryable (format) vs not (absent info)","Pydantic/JSON Schema validation"]},{"id":"4.5","title":"Design efficient batch processing strategies","keywords":["Message Batches API 50% cost / up to 24h / no latency SLA","custom_id correlation","no multi-turn tool calling","latency-tolerance matching"]},{"id":"4.6","title":"Design multi-instance and multi-pass review architectures","keywords":["attention dilution → focused passes","per-file pass + integration pass","multi-instance verification","consensus suppresses intermittent detections"]}]},{"id":5,"name_en":"Context Management & Reliability","name_ja":"コンテキスト管理と信頼性","weight":0.15,"task_statements":[{"id":"5.1","title":"Manage conversation context to preserve critical information across long interactions","keywords":["lost-in-the-middle","position-aware ordering (edges)","structured fact extraction during summarization","/compact is lossy","scratchpad files"]},{"id":"5.2","title":"Design effective escalation and ambiguity resolution patterns","keywords":["explicit escalation criteria","policy gaps","honor customer preference","clarify vs assume"]},{"id":"5.3","title":"Implement error propagation strategies across multi-agent systems","keywords":["structured error context to coordinator","partial results + coverage-gap annotation","never mark failure as success","local recovery before escalation"]},{"id":"5.4","title":"Manage context effectively in large codebase exploration","keywords":["Explore subagent isolates verbose output","summary-only return","token budgets","trimming verbose tool outputs"]},{"id":"5.5","title":"Design human review workflows and confidence calibration","keywords":["field-level confidence scores","confidence-based routing","calibration with labeled sets","stratified sampling","accuracy segmentation"]},{"id":"5.6","title":"Preserve information provenance and handle uncertainty in multi-source synthesis","keywords":["claim-source mappings","conflict annotation with attribution (not arbitrary selection)","temporal data (publication dates)","contested vs established findings"]}]}],"questions":[{"id":"S1-D1-001","scenario":"customer-support","domain":1,"task_statement":"1.1","question_en":"Your support agent's loop terminates when the assistant's text contains the phrase \"issue resolved\". In production, some sessions run tools indefinitely even after the customer's problem is fixed, while others stop before calling escalate_to_human even though the model intended to. What is the most reliable fix?","question_ja":"サポートエージェントのループは、アシスタントのテキストに \"issue resolved\" という語句が含まれたら終了する実装になっている。本番では、問題解決後もツールを呼び続けるセッションがある一方、モデルが escalate_to_human を呼ぶつもりだったのに手前で停止するセッションもある。最も信頼できる修正はどれか。","options_en":{"A":"Add a maximum iteration cap of 10 tool calls per session as the primary stopping condition, with an alert when the cap is reached","B":"Drive the loop from stop_reason: continue executing tools while it is \"tool_use\" and terminate when it is \"end_turn\"","C":"Expand the completion-phrase list with variants like \"resolved\", \"all done\", and \"completed\" and match them case-insensitively","D":"Instruct the model in the system prompt to always end its final message with the exact marker string [DONE]"},"options_ja":{"A":"1セッションあたり最大10回のツール呼び出し上限を主たる停止条件として追加し、上限到達時にアラートを出す","B":"ループを stop_reason で制御する。\"tool_use\" の間はツールを実行し続け、\"end_turn\" になったら終了する","C":"完了フレーズのリストを \"resolved\" \"all done\" \"completed\" などのバリエーションに拡張し、大文字小文字を無視して照合する","D":"システムプロンプトで、最後のメッセージを必ず正確なマーカー文字列 [DONE] で終えるようモデルに指示する"},"correct":"B","explanation_ja":{"why_correct":"エージェントループの終了判定は API が返す stop_reason で行うのが公式の設計。\"tool_use\" は「ツールを実行して結果を返せ」、\"end_turn\" は「モデルのターン完了」を意味する決定論的なシグナルで、自然言語の揺らぎに依存しない。両方の症状（止まらない／早すぎる停止）は、テキスト解析という確率的な判定を使っていることが根本原因。","A":"回数上限は暴走の安全網にはなるが主たる停止条件ではない。正常に9回で終わるべきセッションを歪め、3回で終わるべきものは7回無駄に回る。根本原因（判定方法）を直していない。","C":"フレーズリストの拡張は同じ誤りの精緻化にすぎない。モデルの言い回しは無限に変わりうるので、テキスト照合は本質的に確率的なまま。","D":"プロンプト指示は確率的で、マーカーを忘れる／途中で出すケースが残る。保証が必要な制御をプロンプトに頼るのは \"code must, prompt should\" の原則違反。"},"explanation_en":{"why_correct":"The official design for terminating an agentic loop is to drive it from the API's stop_reason. \"tool_use\" is a deterministic signal meaning \"execute the tools and return the results\"; \"end_turn\" means the model's turn is complete. Neither depends on natural-language wording. Both symptoms — sessions that never stop and sessions that stop too early — share one root cause: using probabilistic text matching as the termination check.","A":"An iteration cap works as a runaway safety net, but not as the primary stopping condition. It distorts sessions that legitimately need nine calls and wastes seven calls on sessions that should end after three. The root cause (the detection method) is untouched.","C":"Expanding the phrase list is a refinement of the same mistake. The model's wording can vary indefinitely, so text matching remains inherently probabilistic.","D":"A prompt instruction is probabilistic: cases remain where the model forgets the marker or emits it mid-response. Relying on prompts for control that requires a guarantee violates \"code must, prompt should\"."},"references":[{"title":"Handling stop reasons","url":"https://platform.claude.com/docs/en/build-with-claude/handling-stop-reasons"}],"lesson":"ループ終了の保証が要件なら stop_reason（決定論）で判定する。テキスト解析・回数上限を主判定にしない","lesson_en":"When guaranteed loop termination is required, decide with stop_reason (deterministic) — never text matching or iteration caps as the primary check","principle_tags":["deterministic-termination","code-must-prompt-should"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D1-002","scenario":"customer-support","domain":1,"task_statement":"1.5","question_en":"Your support agent is built with the Claude Agent SDK. Company policy requires human approval for any refund above $200. Your system prompt states this rule prominently, yet audit logs show the agent processed a $340 refund directly last week. The compliance team says this must never happen again. What should you implement?","question_ja":"サポートエージェントは Claude Agent SDK で構築されている。会社のポリシーでは200ドルを超える返金には人間の承認が必須である。システムプロンプトにはこのルールが目立つ形で書かれているが、監査ログによると先週エージェントが340ドルの返金を直接処理していた。コンプライアンスチームは「二度と起こしてはならない」としている。何を実装すべきか。","options_en":{"A":"Rewrite the rule in the system prompt using stronger, unambiguous language and repeat it immediately before the tool definitions","B":"Add few-shot examples to the prompt showing the agent correctly escalating refunds of $250, $500, and $1,000 to a human","C":"Log every process_refund call to a dashboard and have the support team review flagged transactions each morning","D":"Add a hook that intercepts process_refund calls, blocks any amount above $200, and returns feedback directing the agent to escalate_to_human"},"options_ja":{"A":"システムプロンプトのルールをより強く曖昧さのない表現に書き直し、ツール定義の直前でも繰り返す","B":"250ドル・500ドル・1,000ドルの返金を正しく人間にエスカレーションする few-shot 例をプロンプトに追加する","C":"すべての process_refund 呼び出しをダッシュボードに記録し、サポートチームが毎朝フラグ付き取引をレビューする","D":"process_refund の呼び出しをインターセプトするフックで200ドル超を拒否し、escalate_to_human を使うよう理由をモデルに返す"},"correct":"D","explanation_ja":{"why_correct":"「must never happen（絶対に起こしてはならない）」は保証の要件。プロンプト指示はどれだけ強くても確率的で失敗率が非ゼロのまま。ツール呼び出しをコードでインターセプトして閾値超過を拒否するフック（PreToolUse の deny）だけが決定論的な保証を与える。拒否理由をモデルに返せば、モデルはそれを読んで escalate_to_human へ進む。","A":"表現強化もプロンプト内の位置変更も確率を改善するだけで、保証にはならない。既に「目立つ形で」書かれていたのに突破された事実がそれを示している。","B":"few-shot は遵守率を上げる有効な手法だが、依然として確率的。コンプライアンス要件（ゼロ違反）には不十分。","C":"事後検出であり、340ドルの返金は実行されてしまった後。予防の要件を満たさない症状対処。"},"explanation_en":{"why_correct":"\"Must never happen\" is a guarantee requirement. Prompt instructions, however strong, remain probabilistic with a non-zero failure rate. Only a hook that intercepts the tool call in code and denies any amount above $200 provides a deterministic guarantee. Returning the denial reason to the model lets it read the feedback and proceed to escalate_to_human.","A":"Stronger wording and better placement improve probabilities, never guarantees. The rule was already written prominently and was still bypassed — that fact is the evidence.","B":"Few-shot examples are a valid technique for raising compliance, but still probabilistic — insufficient for a zero-violation compliance requirement.","C":"After-the-fact detection: the $340 refund has already been executed. A review dashboard does not meet a prevention requirement."},"references":[{"title":"Agent SDK: Hooks","url":"https://code.claude.com/docs/en/agent-sdk/hooks"},{"title":"Claude Code: Hooks","url":"https://code.claude.com/docs/en/hooks"}],"lesson":"ビジネスルールの保証が要件なら、ツール呼び出しインターセプトのフックで遮断する（prompt は推奨まで）","lesson_en":"When a business rule must be guaranteed, block it with a tool-call-intercepting hook (prompts are for recommendations only)","principle_tags":["code-must-prompt-should","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D1-003","scenario":"customer-support","domain":1,"task_statement":"1.5","question_en":"Your agent uses three MCP tools built by different backend teams: get_customer returns dates as Unix timestamps, lookup_order returns ISO 8601 strings, and the billing tool returns numeric status codes (0, 1, 2) without labels. The agent occasionally mixes up order chronology when comparing dates across tools. The three backend APIs also serve other products and have no format changes on their roadmap; what you control is your agent's configuration. Where should you address this?","question_ja":"エージェントは別々のバックエンドチームが作った3つのMCPツールを使う。get_customer は日付を Unix タイムスタンプで、lookup_order は ISO 8601 文字列で返し、請求ツールはラベルなしの数値ステータスコード（0, 1, 2）を返す。ツールをまたいで日付を比較するとき、エージェントが時系列を取り違えることがある。3つのバックエンドAPIは他プロダクトでも使われており形式変更のロードマップはない。あなたが変更できるのは自エージェントの構成だけである。どこで対処すべきか。","options_en":{"A":"In a PostToolUse hook that normalizes timestamps and status codes to one consistent format before the model processes the results","B":"In the system prompt, by documenting each tool's date format and status code meanings so the model can convert between them","C":"In each backend service, by asking the three teams to migrate their APIs to a shared date and status format standard","D":"In the agent loop, by adding a dedicated convert_formats tool the model can call whenever it needs to compare values across tools"},"options_ja":{"A":"PostToolUse フックで、モデルが結果を処理する前にタイムスタンプとステータスコードを一貫した形式に正規化する","B":"システムプロンプトに各ツールの日付形式とステータスコードの意味を記載し、モデルが相互変換できるようにする","C":"3チームに依頼して、各バックエンドサービスのAPIを共通の日付・ステータス形式標準へ移行してもらう","D":"エージェントループに専用の convert_formats ツールを追加し、ツール間で値を比較するたびにモデルに呼ばせる"},"correct":"A","explanation_ja":{"why_correct":"異種データの正規化は PostToolUse フックの代表的用途。ツール結果がモデルに渡る前にコードで決定論的に変換するため、モデルの変換ミス（今回の症状）が構造的に起きなくなる。バックエンドに変更を求めず、自分の制御範囲で確実に解決できる。（Agent SDK では PostToolUse フックの updatedToolOutput でモデルに渡る前のツール出力を差し替えられる）","B":"モデルに毎回変換させるのは確率的で、まさに現在の「ときどき取り違える」を温存する。トークンも消費する。","C":"前提で明確に排除されている選択肢。3チームのAPIは他プロダクトも使い形式変更の予定はなく、自分の制御範囲は自エージェントの構成のみ。組織的変更で技術的問題に応える合わない経路でもある。","D":"変換ツールを「呼ぶかどうか」がモデル任せになり、呼び忘れれば同じバグが出る。往復も増える。保証したい変換を確率的な判断に委ねている。"},"explanation_en":{"why_correct":"Normalizing heterogeneous data is a canonical PostToolUse hook use case. The hook converts tool results deterministically in code before the model sees them, so model conversion mistakes (the observed symptom) become structurally impossible. It solves the problem entirely within your own configuration, without requiring backend changes. (In the Agent SDK, a PostToolUse hook can replace the tool output the model sees via updatedToolOutput.)","B":"Having the model convert formats each time is probabilistic — it preserves exactly the current \"occasionally mixes up\" behavior, and burns tokens.","C":"The premise explicitly rules this out: the three APIs serve other products, have no format changes on their roadmap, and what you control is your own agent's configuration. It also answers a technical problem through an organizational route.","D":"Whether the conversion tool gets called is left to the model; if it forgets, the same bug reappears. It also adds round trips. A conversion that needs a guarantee is delegated to a probabilistic decision."},"references":[{"title":"Agent SDK: Hooks","url":"https://code.claude.com/docs/en/agent-sdk/hooks"}],"lesson":"異種フォーマットの正規化は PostToolUse フックでモデルに渡る前に行う（モデル変換は確率的）","lesson_en":"Normalize heterogeneous formats in a PostToolUse hook before results reach the model (model-side conversion is probabilistic)","principle_tags":["code-must-prompt-should","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D1-004","scenario":"customer-support","domain":1,"task_statement":"1.6","question_en":"A customer writes: \"I was double-charged for order #1123, my new card was declined when I tried to update it, and also — does my plan include weekend support?\" Your agent refunds the double charge and ends the conversation. Review shows this pattern: multi-concern messages get only the first concern handled, hurting your 80% first-contact resolution target. What is the most effective change?","question_ja":"顧客からのメッセージ:「注文#1123 が二重請求されていて、カードを更新しようとしたら新しいカードが拒否されました。あと、私のプランに週末サポートは含まれますか？」エージェントは二重請求を返金して会話を終了した。レビューの結果、複数の関心事を含むメッセージは最初の1件しか処理されないパターンが判明し、初回解決率80%目標を損なっている。最も効果的な変更はどれか。","options_en":{"A":"Route each detected concern to a separate conversation session so every issue gets a dedicated context window","B":"Instruct the agent to always ask the customer which single issue they would like to prioritize before taking any action","C":"Increase max_tokens for the final response so the agent has room to address every topic the customer raised","D":"Decompose the message into distinct concerns, investigate each in shared context, then synthesize one unified resolution"},"options_ja":{"A":"検出した関心事ごとに別々の会話セッションへルーティングし、各問題に専用のコンテキストウィンドウを与える","B":"行動を起こす前に、どの問題を優先したいか顧客に必ず1つ選んでもらうようエージェントに指示する","C":"最終応答の max_tokens を増やし、顧客が挙げたすべてのトピックに触れる余裕を持たせる","D":"メッセージを個別の関心事に分解し、共有コンテキスト内でそれぞれを調査してから、1つの統合された解決策として合成する"},"correct":"D","explanation_ja":{"why_correct":"公式ガイドが示す複数関心事への標準パターン。①分解（3つの独立した問題として列挙）②各項目を調査（同一顧客・同一注文の文脈を共有したまま）③統合応答。関心事同士は関連しうる（二重請求とカード拒否は同じ請求システム）ので、共有コンテキストでの調査が精度も効率も高い。","A":"セッション分割は文脈の共有を壊す。カード拒否の調査に二重請求の調査結果が使えなくなり、顧客は3つの会話を強いられる。過剰な隔離。","B":"顧客に選ばせるのは初回解決率をむしろ下げる（残り2件は未解決のまま）。エージェント側の処理能力の問題を顧客に転嫁している。","C":"max_tokens は応答の長さの上限であって、調査行動を変えない。根本原因（1件目だけ処理して終了する行動パターン）に触れていない症状対処。"},"explanation_en":{"why_correct":"The standard pattern for multi-concern messages: (1) decompose into distinct concerns, (2) investigate each while sharing the same customer/order context, (3) synthesize one unified resolution. The concerns may be related (the double charge and the declined card touch the same billing system), so investigating in shared context is both more accurate and more efficient.","A":"Splitting sessions destroys context sharing: the card investigation loses access to the double-charge findings, and the customer is forced into three conversations. Excessive isolation.","B":"Making the customer pick one issue lowers first-contact resolution (the other two stay unresolved) and shifts the agent's limitation onto the customer.","C":"max_tokens caps response length; it does not change investigation behavior. A symptom-level tweak that never touches the root cause (handling only the first concern, then stopping)."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"複数関心事は「分解→共有コンテキストで各個調査→統合応答」。セッション分割でも顧客への転嫁でもない","lesson_en":"Multi-concern messages: decompose → investigate each in shared context → synthesize one response. Not session-splitting, not pushing the choice onto the customer","principle_tags":["root-cause-fix","explicit-context-passing"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D1-005","scenario":"customer-support","domain":1,"task_statement":"1.7","question_en":"Customers often return the next day to continue an open case. Your agent is built on the Claude API, and each new session starts with no knowledge of prior interactions. A teammate suggests: \"The API keeps conversation history server-side, so just reuse the same conversation.\" How should you design continuity?","question_ja":"顧客は翌日に戻ってきて未解決のケースを続けることが多い。エージェントは Claude API 上に構築されており、新しいセッションは過去のやり取りを知らない状態で始まる。同僚は「APIがサーバ側で会話履歴を保持しているから、同じ会話を再利用すればいい」と提案している。継続性をどう設計すべきか。","options_en":{"A":"Accept the suggestion: pass the previous conversation ID in the next request so the API restores the full message history","B":"Persist case state — customer ID, issue status, actions taken, commitments — and inject that summary when the case resumes","C":"Store the complete raw transcript of every session and prepend all of it, unmodified, to the context each time the customer returns","D":"Ask returning customers to briefly re-describe their issue so the agent can rebuild context from their own words"},"options_ja":{"A":"提案を受け入れる。次のリクエストで前回の会話IDを渡せば、APIがメッセージ履歴全体を復元してくれる","B":"ケース状態（顧客ID・問題ステータス・実施済みアクション・約束事項）を自前で永続化し、ケース再開時にその構造化サマリーを注入する","C":"全セッションの生トランスクリプトを保存し、顧客が戻るたびにそのすべてを無加工でコンテキスト先頭に付加する","D":"戻ってきた顧客に問題を簡単に再説明してもらい、顧客自身の言葉からエージェントが文脈を再構築する"},"correct":"B","explanation_ja":{"why_correct":"Claude API はステートレスで、サーバ側に会話状態は保持されない。継続性はアプリケーション側の責務。重要事実を構造化して永続化し再開時に注入する設計は、トークン効率が良く、lost-in-the-middle の影響も受けにくい。前提（同僚の誤解）を正すことが決め手。","A":"前提が誤り。Messages API に「会話IDで履歴復元」という仕組みはなく、毎リクエストで全メッセージを送るのはクライアントの責務。","C":"動くが劣化する。ケースが長引くほどコンテキストが肥大し、コストが増え、重要事実が中間に埋もれて見落とされる（lost-in-the-middle）。","D":"顧客体験を損ない（同じ説明の繰り返し）、実施済みアクションや約束事項など顧客が知らない内部状態は復元できない。"},"explanation_en":{"why_correct":"The Claude API is stateless — no conversation state is kept server-side; continuity is the application's responsibility. Persisting key facts as structured case state and injecting that summary on resumption is token-efficient and resistant to lost-in-the-middle. The deciding move is correcting the teammate's false premise.","A":"The premise is wrong: the Messages API has no \"restore history by conversation ID\" mechanism. Sending the full message list on every request is the client's responsibility.","C":"It works but degrades: as the case drags on, context bloats, costs rise, and key facts sink into the middle where they get overlooked (lost-in-the-middle).","D":"It hurts the customer experience (repeating themselves) and cannot recover internal state the customer never knew — actions taken, commitments made."},"references":[{"title":"Context windows","url":"https://docs.claude.com/en/docs/build-with-claude/context-windows"}],"lesson":"API はステートレス。会話の継続性はアプリ側が構造化状態の永続化＋再注入で担う","lesson_en":"The API is stateless. Conversation continuity is the app's job: persist structured state and re-inject it","principle_tags":["explicit-context-passing","position-aware-context"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D1-006","scenario":"customer-support","domain":1,"task_statement":"1.4","question_en":"When your agent escalates a billing dispute, it calls escalate_to_human with the message \"Customer needs help with billing.\" Human agents, whose ticketing tool does not automatically surface the AI conversation log, report spending 10+ minutes re-interviewing each escalated customer. What should the escalation include?","question_ja":"エージェントが請求争議をエスカレーションするとき、escalate_to_human を「顧客が請求の件でサポートを必要としています」というメッセージで呼んでいる。オペレーターのチケットツールにはAIの会話ログが自動連携されておらず、人間のオペレーターからエスカレーションされた顧客への再ヒアリングに毎回10分以上かかるという報告が上がっている。エスカレーションには何を含めるべきか。","options_en":{"A":"A link to the full conversation transcript so the human agent can read through everything the customer and AI discussed","B":"The customer's account tier and contact details, so the human agent can call them back at a convenient time","C":"A structured handoff: customer ID, known facts, suspected cause, actions attempted, and a recommended next action","D":"The customer's own words from their most recent message, quoted verbatim to preserve their emotional tone"},"options_ja":{"A":"会話トランスクリプト全文へのリンク。顧客とAIが話したすべてを人間のオペレーターが読めるようにする","B":"顧客のアカウント階層と連絡先。オペレーターが都合の良い時間に折り返せるようにする","C":"構造化された引き継ぎサマリー: 顧客ID・確定事実と推定原因・実施済みアクション・推奨される次のアクション","D":"顧客の直近メッセージの原文引用。感情的なトーンをそのまま保持する"},"correct":"C","explanation_ja":{"why_correct":"公式ガイドの構造化ハンドオフプロトコル。トランスクリプトに即アクセスできない人間が業務を引き継ぐには、要約済みの構造化情報（誰が・確定した事実・原因の推定（未確定なら未確定と明示）・何を試したか・次に何をすべきか）が必要。再ヒアリング10分の根本原因は「情報がない」ことではなく「使える形の情報がない」こと。確定事実と推定を区別することで、要約が捏造を誘発するのも防げる。","A":"全文を読むのは10分の再ヒアリングを10分の読解に置き換えるだけ。長い対話ほど読む時間が増え、要点抽出の負担をオペレーターに転嫁する。","B":"連絡先は引き継ぎの前提情報にすぎず、ケースの中身（原因・経緯）が何も伝わらない。再ヒアリングは減らない。","D":"感情トーンの保持は補助的には有用だが、直近メッセージだけでは経緯・実施済みアクションが欠落し、二重対応（同じ操作の再実行）のリスクもある。"},"explanation_en":{"why_correct":"The structured handoff protocol. A human taking over without instant access to the transcript needs pre-summarized, structured information: who, established facts, suspected cause (marked as unconfirmed if it is), what was attempted, and the recommended next action. The root cause of the 10-minute re-interviews is not missing information but information in an unusable form. Separating established facts from suspicions also prevents the summary from inducing fabrication.","A":"Reading the full transcript replaces a 10-minute re-interview with a 10-minute read. The longer the dialogue, the longer the read — it shifts the extraction burden onto the operator.","B":"Contact details are prerequisites, not case content: nothing about cause or history is conveyed, so re-interviewing does not shrink.","D":"Preserving emotional tone is useful as a supplement, but the latest message alone omits history and actions taken, risking duplicate operations."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"エスカレーションは構造化ハンドオフ（顧客ID・根本原因・実施済み・推奨アクション）で。転送先が読める形に要約するのは送り手の責務","lesson_en":"Escalate with a structured handoff (customer ID, facts and suspected cause, actions taken, recommended next step). Summarizing into a usable form is the sender's responsibility","principle_tags":["escalate-with-handoff","structured-errors"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D2-001","scenario":"customer-support","domain":2,"task_statement":"2.1","question_en":"Your agent has two order tools: lookup_order (fetches one order by order ID) and search_orders (finds orders by customer ID and date range). Logs show that when customers mention an order number, the agent calls search_orders about 30% of the time, scanning date ranges unnecessarily. Both tool descriptions currently read \"Retrieves order information.\" What is the best fix?","question_ja":"エージェントには2つの注文ツールがある。lookup_order（注文IDで1件取得）と search_orders（顧客IDと日付範囲で検索）。ログによると、顧客が注文番号を伝えているのに約30%のケースで search_orders が呼ばれ、不要な日付範囲スキャンが起きている。現在、両ツールの description はどちらも「注文情報を取得します」となっている。最善の修正はどれか。","options_en":{"A":"Rewrite both descriptions to state each tool's distinct purpose, required inputs, and when to prefer it over the other","B":"Merge the two tools into a single get_orders tool with optional parameters for order ID, customer ID, and date range","C":"Add a system prompt rule: \"If the customer provides an order number, you must always call lookup_order first\"","D":"Remove search_orders so the agent has no choice, and handle date-range searches through human escalation instead"},"options_ja":{"A":"両方の description を書き直し、各ツールの明確な用途・必要な入力・どちらを優先すべき状況を記載する","B":"2つのツールを1つの get_orders ツールに統合し、注文ID・顧客ID・日付範囲をオプションパラメータにする","C":"システムプロンプトに「顧客が注文番号を提示したら必ず先に lookup_order を呼ぶこと」というルールを追加する","D":"search_orders を削除して選択の余地をなくし、日付範囲の検索は人間へのエスカレーションで対応する"},"correct":"A","explanation_ja":{"why_correct":"ツール選択はモデルが description を読んで行う。同一文言の description が誤選択30%の根本原因であり、用途・入力・使い分け条件を明記するのが公式に推奨される第一の対処。ツール記述の品質はエージェントの信頼性に直結する。","B":"統合はオプションパラメータの組み合わせ爆発を招き、「どのパラメータをいつ使うか」という同じ曖昧さがツール内部に移動するだけ。単一責務の原則にも反する。","C":"プロンプトルールは description の欠陥を上から補う症状対処。ルールが増えるほどプロンプトが肥大し、根本（ツール自身が自分を説明していない）は残る。descriptionを直せば不要な層。","D":"能力の削除はやりすぎ。正当な日付範囲検索のユースケースを人間に転嫁し、初回解決率を下げる。"},"explanation_en":{"why_correct":"The model selects tools by reading their descriptions. Two identical descriptions are the root cause of the 30% misselection, and the officially recommended first fix is to state each tool's distinct purpose, required inputs, and when to prefer it over the other. Description quality directly drives agent reliability.","B":"Merging creates an optional-parameter combinatorial explosion; the same ambiguity — which parameters when — just moves inside the tool. It also violates single responsibility.","C":"A prompt rule papers over the description defect from above. The prompt bloats as rules accumulate, and the root cause (tools that don't explain themselves) remains. Fix the descriptions and this layer is unnecessary.","D":"Removing capability is overkill: legitimate date-range searches get pushed to humans, lowering first-contact resolution."},"references":[{"title":"Tool use overview","url":"https://docs.claude.com/en/docs/agents-and-tools/tool-use/overview"},{"title":"Writing effective tool descriptions","url":"https://www.anthropic.com/engineering/writing-tools-for-agents"}],"lesson":"ツール誤選択の第一の疑い先は description。用途・入力・使い分けをツール自身に語らせる","lesson_en":"For tool misselection, suspect the descriptions first. Let each tool state its purpose, inputs, and when to use it","principle_tags":["single-responsibility","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D2-002","scenario":"customer-support","domain":2,"task_statement":"2.2","question_en":"During a database outage, lookup_order returns an empty array. Your agent then tells customers \"I couldn't find any orders on your account,\" which is factually wrong and has triggered several angry follow-ups. How should the tool behave during backend failures?","question_ja":"データベース障害の間、lookup_order は空配列を返す。その結果エージェントは顧客に「お客様のアカウントに注文は見つかりませんでした」と伝えてしまい、事実と異なる案内として複数の苦情を招いた。バックエンド障害時、ツールはどう振る舞うべきか。","options_en":{"A":"Return an empty result but append a note field saying \"database may be unavailable\" for the agent to consider","B":"Retry internally with exponential backoff until the database recovers, then return the real result to the agent","C":"Return a structured error (isError, transient category, retryable flag) so the agent can retry or inform the customer","D":"Cache all order data nightly and serve from the cache whenever the primary database fails to respond"},"options_ja":{"A":"空の結果を返しつつ、「データベースが利用できない可能性があります」という note フィールドを付けてエージェントに考慮させる","B":"データベースが復旧するまでツール内部で指数バックオフ付きリトライを続け、復旧後に本当の結果をエージェントに返す","C":"明示的な構造化エラー（isError＋transient カテゴリ＋retryable フラグ）を返し、エージェントがリトライするか顧客に正直に伝えられるようにする","D":"全注文データを毎晩キャッシュし、プライマリデータベースが応答しないときはキャッシュから提供する"},"correct":"C","explanation_ja":{"why_correct":"「障害」と「結果ゼロ件」は意味が違うのに、空配列は両者を区別不能にする——これが誤案内の根本原因。MCP 仕様の isError フラグで「これはエラーである」ことを明示し、さらに content 内にエラーカテゴリ（transient/validation/permission）や retryable といった行動可能な情報を持たせれば、モデルは「一時障害だからリトライ／正直に状況を伝える」という判断ができる。なおカテゴリ・retryable は MCP 仕様のフィールドではなく、推奨される設計慣習である点に注意。","A":"成功扱いのまま注記を足す折衷案は、モデルが note を無視して空結果を信じるリスクを残す。エラーはエラーとして返すのが原則。","B":"障害が長引けばツール呼び出しがブロックし続け、顧客は無応答のまま待たされる。タイムアウトの問題を悪化させ、エージェントに判断機会を与えない。","D":"キャッシュは可用性向上策としてはあり得るが、返金・請求争議を扱うエージェントに古い注文データを見せるのは誤対応の温床。今回の「誤案内」問題への答えになっていない。"},"explanation_en":{"why_correct":"\"Outage\" and \"zero results\" mean different things, but an empty array makes them indistinguishable — that is the root cause of the false statements to customers. The MCP isError flag marks the result as an error, and carrying an error category (transient/validation/permission) and a retryable flag in the content gives the model actionable information: retry, or tell the customer honestly. Note that category/retryable are recommended design conventions, not MCP spec fields.","A":"A success-shaped result with a note attached still risks the model trusting the empty result and ignoring the note. Errors should be returned as errors.","B":"If the outage drags on, the tool call blocks indefinitely and the customer waits in silence. It worsens timeout behavior and denies the agent any chance to decide.","D":"Caching may help availability, but showing stale order data to an agent handling refunds and billing disputes invites wrong actions — and it doesn't answer the misinformation problem."},"references":[{"title":"MCP: Tools (isError)","url":"https://modelcontextprotocol.io/docs/concepts/tools"}],"lesson":"失敗を空結果・成功で偽装しない。構造化エラー（カテゴリ＋retryable）でモデルに行動可能な情報を渡す","lesson_en":"Never disguise failure as empty/successful results. Return structured errors (category + retryable) the model can act on","principle_tags":["structured-errors","nullable-over-hallucination"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D2-003","scenario":"customer-support","domain":2,"task_statement":"2.3","question_en":"Compliance requires that every support conversation begins with identity verification via get_customer before any other tool runs. Your system prompt says so, but traces show the agent occasionally jumps straight to lookup_order when the customer opens with an order number. The session already has the authenticated customer handle that get_customer requires. What is the most reliable way to enforce the verification-first requirement on the first turn?","question_ja":"コンプライアンス上、すべてのサポート会話は他のツールより先に get_customer による本人確認から始めなければならない。システムプロンプトにはそう書いてあるが、トレースを見ると、顧客が注文番号から会話を始めた場合にエージェントが直接 lookup_order へ飛ぶことがある。セッションには get_customer が必要とする認証済みの顧客ハンドルが既にある。最初のターンで「本人確認が先」を強制する最も信頼できる方法はどれか。","options_en":{"A":"Move the verification instruction to the very top of the system prompt and mark it as the highest-priority rule","B":"List get_customer first in the tools array so the model encounters it before the other tool definitions","C":"Add few-shot examples showing conversations that correctly start with get_customer before any lookup","D":"Use tool_choice to force get_customer on the first turn, then switch back to automatic tool selection afterwards"},"options_ja":{"A":"本人確認の指示をシステムプロンプトの最上部へ移動し、最優先ルールであると明記する","B":"tools 配列の先頭に get_customer を置き、モデルが他のツール定義より先に目にするようにする","C":"どの会話でも lookup の前に get_customer から正しく始める few-shot 例を追加する","D":"最初のターンは tool_choice で get_customer を強制し、その後は自動のツール選択に切り替える"},"correct":"D","explanation_ja":{"why_correct":"tool_choice で特定ツールを強制すれば、最初のターンで get_customer が呼ばれることが API レベルで保証される。以降は auto に戻して通常の判断に任せればよい。「必ず」が要件のときにプロンプトの工夫で応えるのは確率的で、コードで強制できる手段（tool_choice）があるならそれを使う。（forced tool use が利用できるモデル・設定であることが前提。拡張思考との併用など一部構成では強制指定に制約がある）","A":"位置と強調は遵守率を上げるが保証しない。すでにプロンプトに書いてあって破られているのだから、同種の対策の強化では要件を満たせない。","B":"ツールの列挙順はモデルの選択を保証する仕組みではない。挙動が変わったとしても偶発的で、コンプライアンス要件の根拠にできない。","C":"few-shot は精度向上には有効だが確率的。「occasionally 飛ぶ」を「まれに飛ぶ」に減らすだけで、ゼロにはできない。"},"explanation_en":{"why_correct":"Forcing get_customer via tool_choice guarantees at the API level that it runs on the first turn; afterwards, switch back to automatic selection. When the requirement is \"always,\" answering with prompt engineering is probabilistic — if a code-level mechanism (tool_choice) exists, use it. (Assumes a model/configuration where forced tool use is available; some setups, e.g. combined with extended thinking, restrict forcing.)","A":"Position and emphasis raise compliance but guarantee nothing. It was already written and still bypassed, so strengthening the same class of measure cannot meet the requirement.","B":"Tool listing order is not a mechanism that guarantees selection. Any behavioral change is incidental and cannot ground a compliance requirement.","C":"Few-shot helps accuracy but is probabilistic — it turns \"occasionally\" into \"rarely,\" never into zero."},"references":[{"title":"Tool use: forcing tool choice","url":"https://docs.claude.com/en/docs/agents-and-tools/tool-use/implement-tool-use"}],"lesson":"「最初に必ずこのツール」は tool_choice の強制で API レベルの保証にする","lesson_en":"\"This tool must run first\" → force it with tool_choice for an API-level guarantee","principle_tags":["code-must-prompt-should","least-privilege"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D2-004","scenario":"customer-support","domain":2,"task_statement":"2.4","question_en":"Your five-person team shares the support agent's MCP server configuration. Each developer has a personal API token for the staging backend. One teammate committed a config with his token hardcoded, which security flagged. How should the team configure the MCP server?","question_ja":"5人のチームでサポートエージェントのMCPサーバ設定を共有している。各開発者はステージング用バックエンドの個人APIトークンを持っている。あるメンバーがトークンをハードコードした設定をコミットしてしまい、セキュリティ部門に指摘された。チームはMCPサーバをどう設定すべきか。","options_en":{"A":"Define the server once in project-scoped .mcp.json with environment variable expansion, so each developer supplies their token via their own environment","B":"Have each developer register the server privately in user-scoped configuration with their token, keeping all MCP setup out of the repository","C":"Store one shared service token in the repository's CI secrets and have all developers use that token for local development","D":"Keep the token in .mcp.json but add the file to .gitignore so each developer maintains an uncommitted local copy of the full config"},"options_ja":{"A":"プロジェクトスコープの .mcp.json にサーバを一度だけ定義し、環境変数展開を使って各開発者が自分の環境からトークンを供給する","B":"各開発者がユーザースコープの設定に自分のトークンでサーバを個別登録し、MCP設定を一切リポジトリに置かない","C":"共有のサービストークンを1つ CI のシークレットに保存し、全開発者がローカル開発でもそのトークンを使う","D":".mcp.json にトークンを残したまま .gitignore に追加し、各開発者がコミットされないローカルコピーで全設定を管理する"},"correct":"A","explanation_ja":{"why_correct":"チーム共有のサーバ定義はプロジェクトスコープの .mcp.json に置き、秘密情報は環境変数展開（${VAR} 形式）で外出しするのが公式パターン。設定は1箇所でバージョン管理され、トークンは各人の環境に留まる——「共有すべきもの」と「個人の秘密」を正しい層に分離している。","B":"秘密は守れるがサーバ定義の共有をやめてしまう。5人がそれぞれ設定を複製し、サーバ更新のたびに5箇所で手動同期（ドリフトの温床）。ユーザースコープは個人的・実験的サーバの置き場。","C":"トークン共有は監査不能（誰の操作か区別できない）で、漏洩時の影響も全員分。個人トークンがある前提を無視している。","D":"設定全体が非管理になり、新メンバーはコピー元を人づてに探すことになる。環境変数展開という正攻法があるのに設定ごと隠すのは過剰。"},"explanation_en":{"why_correct":"The official pattern: define the shared server once in project-scoped .mcp.json and externalize secrets via environment-variable expansion (${VAR} syntax). The config is version-controlled in one place while tokens stay in each person's environment — \"what should be shared\" and \"personal secrets\" are separated into their correct layers.","B":"Secrets stay safe but server-definition sharing is abandoned: five people duplicate the config and hand-sync every update (a recipe for drift). User scope is the place for personal/experimental servers.","C":"A shared token is unauditable (you can't tell whose action it was) and a leak affects everyone. It also ignores the premise that individual tokens exist.","D":"The whole config becomes unmanaged; new members hunt for a copy by word of mouth. Hiding the entire config is excessive when env-var expansion is the standard solution."},"references":[{"title":"Claude Code: MCP","url":"https://code.claude.com/docs/en/mcp"}],"lesson":"共有するのはサーバ定義（プロジェクト .mcp.json）、隠すのは秘密（環境変数展開）。層を分ける","lesson_en":"Share the server definition (project .mcp.json); hide the secrets (env-var expansion). Separate the layers","principle_tags":["least-privilege","single-responsibility"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D5-001","scenario":"customer-support","domain":5,"task_statement":"5.1","question_en":"In a 40-turn billing dispute, the customer and agent agreed at turn 8 that the disputed amount was $127.50. At turn 35, the agent asks the customer to confirm the amount again, and the customer complains about repeating themselves. The conversation history was periodically summarized to stay within budget. What most likely went wrong, and what is the fix?","question_ja":"40ターンに及ぶ請求争議で、8ターン目に顧客とエージェントは争議額が127.50ドルであることに合意した。ところが35ターン目にエージェントが再度金額の確認を求め、顧客は「同じことを何度も言わせるのか」と苦情を述べた。会話履歴は予算内に収めるため定期的に要約されていた。最も可能性の高い原因と修正はどれか。","options_en":{"A":"The summarization ran too often; reduce its frequency so more of the raw conversation survives in the window","B":"The model's context window is too small for 40 turns; switch to a model variant with a larger context window","C":"The customer's confirmation was ambiguous at turn 8; require customers to restate key figures in a fixed format the agent can parse","D":"The agreed amount sat mid-conversation and was lost in summarization; extract key facts into a structured record summaries preserve"},"options_ja":{"A":"要約の実行頻度が高すぎた。頻度を下げて、生の会話がより多くウィンドウ内に残るようにする","B":"40ターンにはモデルのコンテキストウィンドウが小さすぎる。より大きなウィンドウを持つモデルに切り替える","C":"8ターン目の顧客の確認が曖昧だった。重要な数字はエージェントが解析できる固定形式で言い直してもらうようにする","D":"合意額が会話の中盤にあり要約時に失われた。重要事実を構造化レコードに抽出し、どの要約でも必ず保持されるようにする"},"correct":"D","explanation_ja":{"why_correct":"中盤の情報は要約・長文コンテキストの両方で失われやすい（lost-in-the-middle）。争議額のようなクリティカルな事実は、非可逆な要約に運命を委ねず、構造化された事実レコード（金額・合意事項・約束）として抽出し、要約とは別に常時保持するのが定石。","A":"頻度を下げても要約が走った瞬間に同じ喪失が起きうる。何を保持するかを制御しない限り、いつ要約するかの調整は運任せ。","B":"ウィンドウ拡大は要約による情報喪失という原因に無関係（要約は予算方針で走っている）。大きいウィンドウでも中間位置の注意低下は残る。","C":"顧客側の入力形式の問題ではない（8ターン目には正しく合意できている）。原因の取り違えで、顧客体験も悪化する。"},"explanation_en":{"why_correct":"Mid-conversation information is the most likely to be lost, both in summarization and in long contexts (lost-in-the-middle). Critical facts like the disputed amount should not be entrusted to lossy summarization: extract them into a structured fact record (amounts, agreements, commitments) that is preserved alongside every summary.","A":"Lowering the frequency doesn't help — the same loss can occur the moment any summary runs. Without controlling what is preserved, tuning when to summarize is luck.","B":"A larger window is irrelevant to the cause (summarization runs due to a budget policy), and mid-position attention degradation exists even in large windows.","C":"This wasn't an input-format problem — the agreement was correctly established at turn 8. A misdiagnosis that also worsens the customer experience."},"references":[{"title":"Context windows","url":"https://docs.claude.com/en/docs/build-with-claude/context-windows"},{"title":"Effective context engineering for AI agents","url":"https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents"}],"lesson":"クリティカルな事実は要約に委ねず、構造化抽出して要約横断で保持する（lost-in-the-middle対策）","lesson_en":"Don't entrust critical facts to summarization: extract them into structured records that survive across summaries (lost-in-the-middle countermeasure)","principle_tags":["position-aware-context","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D5-002","scenario":"customer-support","domain":5,"task_statement":"5.2","question_en":"A customer writes, \"This is the third time I'm contacting you. I just want to talk to a person.\" The CRM shows the two prior contacts and their outcomes. Your agent, optimized for the 80% first-contact resolution target, responds by asking diagnostic questions about the underlying issue. The customer abandons the chat. How should the agent have handled this?","question_ja":"顧客が「連絡するのはこれで3回目です。人間と話したいだけなんです」と書いてきた。CRMには過去2回の接触とその結果が記録されている。初回解決率80%目標に最適化されたエージェントは、根本の問題について診断的な質問を返した。顧客はチャットを離脱した。エージェントはどう対応すべきだったか。","options_en":{"A":"Continue diagnosing but acknowledge the frustration first, since resolving the issue in-chat still serves the customer fastest","B":"Honor the explicit request and escalate to a human immediately, with a structured summary of the three prior contacts","C":"Offer the customer a choice: continue with the agent for an instant answer, or wait in the queue for a human representative","D":"Escalate only after one more resolution attempt, so the first-contact resolution metric is not sacrificed unnecessarily"},"options_ja":{"A":"まず不満への共感を示した上で診断を続ける。チャット内で解決するのが結局は顧客にとって最速だから","B":"明示的な要望を尊重して直ちに人間へエスカレーションする。過去3回の接触の構造化サマリーを添えて","C":"顧客に選択肢を提示する。エージェントと続けて即答を得るか、人間の担当者の順番を待つか","D":"もう1回だけ解決を試みてからエスカレーションする。初回解決率の指標を不必要に犠牲にしないため"},"correct":"B","explanation_ja":{"why_correct":"「人間と話したい」という明示的な顧客の要望はエスカレーション基準の最上位に置くべき条件。3回目の接触という文脈は、これ以上の自動対応の試行が離脱リスクでしかないことを示す。エスカレーション時は過去の経緯の構造化サマリーを添えて、顧客に4度目の説明をさせないことまで含めて正解。","A":"共感の言葉を足しても要望を無視している構図は変わらない。指標のために顧客の意思を上書きする設計は、まさに今回の離脱を生んだ行動。","C":"既に明確な選択を表明した顧客に選択肢を再提示するのは、遠回しな引き止め。3回目の接触では侮辱的にすら受け取られる。","D":"「もう1回だけ」は指標を顧客より優先する発想。explicit request があった時点で試行の追加は逆効果。"},"explanation_en":{"why_correct":"An explicit \"I want to talk to a person\" belongs at the top of the escalation criteria. The third-contact context shows that further automated attempts only add abandonment risk. The complete answer includes attaching a structured summary of the three prior contacts so the customer never has to explain a fourth time.","A":"Adding empathy language doesn't change the structure of ignoring the request. Overriding the customer's stated will for the metric's sake is exactly the behavior that caused this abandonment.","C":"Re-offering choices to a customer who already made an explicit choice is a disguised retention attempt — on a third contact it can even read as insulting.","D":"\"One more try\" puts the metric above the customer. Once an explicit request exists, additional attempts are counterproductive."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"顧客の明示的なエスカレーション要望は指標より優先。経緯サマリー付きで即時ハンドオフ","lesson_en":"An explicit escalation request outranks metrics. Hand off immediately, with a history summary attached","principle_tags":["escalate-with-handoff"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D5-003","scenario":"customer-support","domain":5,"task_statement":"5.3","question_en":"Your resolution flow processes a refund, then calls send_confirmation to email the customer. Last month, the email service failed for two days; refunds went through but no confirmations were sent. The agent reported \"refund completed and confirmation sent\" every time, and support was flooded with \"did my refund happen?\" tickets. What is the right design change?","question_ja":"解決フローは返金を処理した後、send_confirmation を呼んで顧客にメールを送る。先月メールサービスが2日間障害を起こし、返金は成立したのに確認メールは送信されなかった。エージェントは毎回「返金完了、確認メールを送信しました」と報告し、サポートには「返金はされたのか？」という問い合わせが殺到した。正しい設計変更はどれか。","options_en":{"A":"Propagate each step's actual outcome: refund completed, confirmation failed, with a fallback such as in-chat confirmation","B":"Make send_confirmation retry until the email service recovers, so the agent's success report eventually becomes accurate","C":"Reverse the refund automatically whenever the confirmation step fails, keeping the two steps transactionally consistent","D":"Report success only after both steps succeed, and say nothing about the transaction if either step fails"},"options_ja":{"A":"各ステップの実際の結果を伝播する。返金は完了・確認メールは失敗と報告し、チャット内での確認表示などのフォールバックを添える","B":"メールサービスが復旧するまで send_confirmation にリトライさせ、エージェントの成功報告が最終的に正確になるようにする","C":"確認ステップが失敗したら返金を自動的に取り消し、2つのステップをトランザクションとして一貫させる","D":"両ステップが成功したときだけ成功と報告し、どちらかが失敗した場合はその取引について何も言わない"},"correct":"A","explanation_ja":{"why_correct":"失敗の隠蔽（部分失敗を全体成功として報告）が問い合わせ殺到の根本原因。ステップごとの結果を正確に伝播し、失敗したステップには代替手段（チャット内確認・後追い送信）を添えるのが正しいエラー伝播設計。部分的な成功は部分的な成功として扱う。","B":"2日間の障害では顧客は2日間何も知らされない。リトライ自体は有効な補助策だが、「その間どう報告するか」という本題に答えていない。","C":"成立した返金を通知の失敗で取り消すのは顧客への実害が最大の選択肢。主処理と通知の重要度を取り違えている。","D":"沈黙は誤報告より僅かにマシなだけで、顧客が状況を知れない点は同じ。問い合わせは減らない。"},"explanation_en":{"why_correct":"Concealing failure — reporting a partial failure as total success — is the root cause of the ticket flood. Propagate each step's actual outcome (refund completed, confirmation failed) and attach a fallback for the failed step (in-chat confirmation, delayed send). Partial success must be treated as partial success.","B":"During a two-day outage the customer learns nothing for two days. Retry is a fine auxiliary tactic, but it doesn't answer the real question: what to report in the meantime.","C":"Reversing a completed refund because a notification failed maximizes customer harm — it confuses the importance of the primary operation with that of the notification.","D":"Silence is only marginally better than a false report; the customer still can't learn the status, and the tickets don't stop."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"MCP: Tools (isError)","url":"https://modelcontextprotocol.io/docs/concepts/tools"}],"lesson":"部分失敗は部分失敗として伝播する。成功で偽装も、全体取り消しも、沈黙も誤り","lesson_en":"Propagate partial failure as partial failure. Success-masking, full rollback, and silence are all wrong","principle_tags":["structured-errors","root-cause-fix"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D5-004","scenario":"customer-support","domain":5,"task_statement":"5.5","question_en":"You want the agent to auto-approve routine refunds and route risky ones to humans. The model outputs a confidence score with each refund decision. Your team proposes: \"Route anything below 0.8 confidence to human review — 0.8 feels safely high.\" What is the flaw in this proposal?","question_ja":"定型的な返金はエージェントが自動承認し、リスクのあるものは人間にルーティングしたい。モデルは返金判断ごとに確信度スコアを出力する。チームの提案は「確信度0.8未満はすべて人間レビューへ。0.8なら十分に安全だろう」というもの。この提案の欠陥はどれか。","options_en":{"A":"Self-reported confidence should never be used for routing; only deterministic business rules can decide which cases humans review","B":"The 0.8 cutoff should be raised to 0.95, because refunds involve money and the cost of a wrong auto-approval is high","C":"The threshold is chosen by intuition; it should be calibrated against a labeled validation set so the cutoff maps to a measured error rate","D":"Confidence scores should route cases to more capable models first, with human review reserved for cases even those models flag"},"options_ja":{"A":"自己申告の確信度をルーティングに使ってはならない。人間がレビューすべきケースは決定論的なビジネスルールだけで決められる","B":"0.8 のカットオフは 0.95 に引き上げるべき。返金は金銭が絡み、誤った自動承認のコストが大きいから","C":"閾値が直感で選ばれている。ラベル付き検証セットで較正し、カットオフが実測エラー率に対応するようにすべき","D":"確信度スコアはまずより高性能なモデルへのルーティングに使い、人間レビューはそのモデルでも警告が出たケースに限定すべき"},"correct":"C","explanation_ja":{"why_correct":"モデルの確信度スコアは素のままでは較正されていない（0.8 が「80%正しい」を意味しない）。ラベル付き検証セットで「スコア X 以上なら実測エラー率 Y%」という対応を測ってから閾値を決めるのが公式の推奨。直感の 0.8 は根拠のない安心感にすぎない。","A":"極端な全否定。確信度ベースのルーティングは較正すれば有効な公式パターンで、決定論ルールと併用できる。","B":"0.95 も同じく直感値。較正なしでは 0.95 が 0.8 より安全かどうかすら実は分からない（閾値を上げれば人間レビュー量が爆発する副作用もある）。","D":"モデルの多段化は問題（閾値の根拠のなさ）に答えず複雑さだけ足している。どのモデルでも較正されていないスコアの問題は同じ。"},"explanation_en":{"why_correct":"Raw model confidence scores are not calibrated (0.8 does not mean \"80% correct\"). The recommended approach is to measure, on a labeled validation set, what actual error rate each score threshold corresponds to, and choose the cutoff from that. The intuitive 0.8 is unfounded reassurance.","A":"An extreme blanket rejection. Confidence-based routing is a valid pattern once calibrated, and it can be combined with deterministic business rules.","B":"0.95 is another gut number. Without calibration you don't even know whether 0.95 is safer than 0.8 (and raising the threshold explodes the human-review volume as a side effect).","D":"Model tiering adds complexity without answering the actual flaw — the threshold has no empirical basis. Uncalibrated scores are equally a problem for any model."},"references":[{"title":"Anthropic Academy（confidence calibration を扱う準備コース群）","url":"https://www.anthropic.com/learn"},{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"確信度スコアは較正してから使う。閾値は直感でなくラベル付きデータの実測エラー率で決める","lesson_en":"Calibrate confidence scores before using them. Set thresholds from measured error rates on labeled data, not intuition","principle_tags":["root-cause-fix"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D5-005","scenario":"customer-support","domain":5,"task_statement":"5.2","question_en":"A customer writes only: \"My charge is wrong.\" The account shows three recent charges: a subscription renewal, a one-time purchase, and a partial refund adjustment. Your agent's current behavior is to assume the most common dispute type (subscription renewal) and start the refund flow. What should it do instead?","question_ja":"顧客のメッセージは「請求が間違っています」の一文だけ。アカウントには直近3件の請求がある: サブスクリプション更新、単発購入、一部返金の調整。エージェントの現在の挙動は、最も多い争議タイプ（サブスク更新）と仮定して返金フローを開始する。代わりにどうすべきか。","options_en":{"A":"Escalate to a human immediately, since the message is too vague for any automated system to act on safely","B":"Ask one targeted clarifying question that lists the three charges and lets the customer identify which one is wrong","C":"Investigate all three charges in parallel and present the customer with a full analysis of each before taking action","D":"Proceed with the subscription assumption but clearly state it, so the customer can correct the agent if it guessed wrong"},"options_ja":{"A":"直ちに人間へエスカレーションする。このメッセージはどんな自動システムにも安全に対応できないほど曖昧だから","B":"3件の請求を列挙し、どれが間違っているか顧客に特定してもらう的を絞った確認質問を1つする","C":"3件の請求すべてを並行して調査し、行動を起こす前に各請求の完全な分析を顧客に提示する","D":"サブスク更新の仮定で進めるが、その仮定を明示する。推測が外れていれば顧客が訂正できるようにするため"},"correct":"B","explanation_ja":{"why_correct":"曖昧さが行動を妨げる場合の正しいパターンは「推測でも丸投げでもなく、的を絞った確認」。アカウント情報（3件の請求）を使って選択肢を具体化した1つの質問は、顧客の負担が最小で、誤った返金フロー開始（不可逆になり得る操作）を防ぐ。","A":"曖昧＝即エスカレーションでは自動化の価値がない。1問の確認で解消できる曖昧さはエスカレーション基準（ポリシーギャップ・顧客要望・進行不能）に該当しない。","C":"3件の完全分析は過剰対応で応答も遅い。顧客は自分がどの請求の話をしているか知っているのだから、聞くのが最短。","D":"現在の挙動に開示を足しただけ。誤った仮定で返金フローが動き出すリスク（部分実行・顧客の混乱）は残る。"},"explanation_en":{"why_correct":"When ambiguity blocks action, the right pattern is neither guessing nor punting: one targeted clarifying question. Using account data (the three charges) to make the question concrete minimizes customer effort and prevents starting a potentially irreversible refund flow on the wrong charge.","A":"Ambiguity ≠ instant escalation, or automation has no value. Ambiguity resolvable with one question doesn't meet escalation criteria (policy gap, customer request, inability to proceed).","C":"A full analysis of all three charges is overkill and slow. The customer knows which charge they mean — asking is the shortest path.","D":"This just adds disclosure to the current behavior. The risk of a refund flow launched on a wrong assumption (partial execution, customer confusion) remains."},"references":[{"title":"Building effective agents","url":"https://www.anthropic.com/research/building-effective-agents"}],"lesson":"行動を妨げる曖昧さは、文脈情報で具体化した1つの確認質問で解消する（推測実行も即エスカレも誤り）","lesson_en":"Resolve action-blocking ambiguity with one clarifying question made concrete by context (neither guess-and-run nor instant escalation)","principle_tags":["escalate-with-handoff"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D1-007","scenario":"customer-support","domain":1,"task_statement":"1.1","question_en":"Reviewing your agentic loop, a teammate acknowledges the API requires a tool_result block for each tool_use, but proposes: \"To save tokens, return an empty placeholder tool_result and keep the real data in our database — the model can look it up later if it needs it.\" Why must the actual result content be returned to the model?","question_ja":"エージェントループのレビューで、同僚は tool_use ごとに tool_result ブロックが必要なことは認めた上で、「トークン節約のため、中身は空のプレースホルダー tool_result を返し、実データはデータベースに保持すればいい。必要ならモデルが後で参照できる」と提案している。なぜ実際の結果の中身をモデルに返す必要があるのか。","options_en":{"A":"The API validates that every tool_result contains real content and rejects empty placeholder results with a 400 error","B":"Tool results are needed for billing reconciliation, since usage is metered per tool invocation recorded in history","C":"The model reasons about its next action from the history, so each result must be visible for it to decide what to do next","D":"Appending results lets the API cache the conversation prefix, which offsets the token cost the teammate is worried about"},"options_ja":{"A":"APIはすべての tool_result に実際の中身が含まれることを検証しており、空のプレースホルダー結果を400エラーで拒否するから","B":"ツール結果は課金照合に必要だから。使用量は履歴に記録されたツール呼び出しごとに計測される","C":"モデルは会話履歴から次の行動を推論するので、次に何をすべきか判断するには各結果が見えている必要があるから","D":"結果を追加すると会話プレフィックスがAPIにキャッシュされ、同僚が心配するトークンコストが相殺されるから"},"correct":"C","explanation_ja":{"why_correct":"エージェントループの本質は「ツール結果を見て次の行動をモデル自身が決める」こと。空のプレースホルダーでは lookup_order が何を返したのか分からず、返金へ進むか顧客に確認するかの分岐が不可能になる。「後で参照」も、その参照手段を与えて往復を増やすだけで、履歴に結果が見えなければ意思決定の連鎖が壊れる点は同じ。","A":"誤り。APIが検証するのは tool_use ID と tool_result の対応関係であり、中身が空であることは拒否しない（空の content は受理される）。「動いてしまう」からこそ、この提案は静かに推論を壊す。","B":"課金はトークン量ベースであり、履歴中のツール記録で照合される仕組みではない。","D":"プロンプトキャッシュは実在するが、それは結果を返す理由ではなくコストを和らげる副次効果。因果が逆。"},"explanation_en":{"why_correct":"The essence of an agentic loop is that the model itself decides its next action from the results it sees in history. With an empty placeholder it cannot know what lookup_order returned, so the branch — proceed to refund, or confirm with the customer — becomes impossible. \"Look it up later\" merely adds a retrieval round trip; while results aren't visible in the history, the decision chain is broken all the same.","A":"False. The API validates the correspondence between tool_use IDs and tool_results, not that content is non-empty (empty content is accepted). Precisely because it \"works,\" the proposal silently breaks reasoning.","B":"Billing is token-based; it is not reconciled via tool records in the history.","D":"Prompt caching is real, but it's a cost-softening side effect, not the reason results must be returned. The causality is reversed."},"references":[{"title":"Tool use overview","url":"https://docs.claude.com/en/docs/agents-and-tools/tool-use/overview"}],"lesson":"tool_result は形式を満たすだけでは無意味。中身がモデル駆動の意思決定の材料になる","lesson_en":"A tool_result that merely satisfies the format is useless — its content is the raw material for model-driven decisions","principle_tags":["deterministic-termination","explicit-context-passing"],"difficulty":"hard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S1-D2-005","scenario":"customer-support","domain":2,"task_statement":"2.3","question_en":"You add a summarize_case subagent that condenses long support cases for the escalation handoff. For convenience, you give it the same tool set as the main agent, including process_refund and escalate_to_human. During testing, a summarization run unexpectedly triggered a refund. What is the correct prevention?","question_ja":"長いサポートケースをエスカレーション引き継ぎ用に要約する summarize_case サブエージェントを追加した。便宜上、メインエージェントと同じツールセット（process_refund や escalate_to_human を含む）を与えている。テスト中、要約の実行が予期せず返金を発動させた。正しい防止策はどれか。","options_en":{"A":"Add a rule to the subagent's system prompt: \"You are a summarizer. Never call refund or escalation tools under any circumstances\"","B":"Restrict the subagent's tool set to read-only tools it actually needs, so action tools are not available to it at all","C":"Wrap process_refund with a confirmation step that requires the main agent to approve any refund a subagent initiates","D":"Log all subagent tool calls and review the logs daily so unintended actions are caught within one business day"},"options_ja":{"A":"サブエージェントのシステムプロンプトに「あなたは要約担当です。いかなる状況でも返金・エスカレーションツールを呼ばないこと」というルールを追加する","B":"サブエージェントのツールセットを実際に必要な読み取り専用ツールだけに制限し、アクション系ツールをそもそも利用不能にする","C":"process_refund に確認ステップを挟み、サブエージェント発の返金はメインエージェントの承認を必須にする","D":"サブエージェントの全ツール呼び出しをログに記録し、毎日レビューして意図しないアクションを1営業日以内に検出する"},"correct":"B","explanation_ja":{"why_correct":"最小権限の原則。要約タスクに必要なのは読み取りだけで、アクションツールを与えない構成にすれば「呼んでしまう」事故はアーキテクチャ上不可能になる。AgentDefinition のツール制限は、まさにサブエージェントごとに権限を絞るための仕組み。","A":"プロンプト禁止は確率的で、今回のような予期しない発動を確実には防げない。ツールが見えている限りリスクは残る。","C":"承認フローは正当な返金経路には有効な多層防御だが、要約担当がそもそも返金能力を持つ必要がないのに保持させる点で過剰かつ根本未解決。","D":"事後検出。返金は実行された後で、防止策ではない。"},"explanation_en":{"why_correct":"The principle of least privilege. Summarization only needs read access; if action tools are simply not granted, the \"accidentally called it\" incident becomes architecturally impossible. Per-subagent tool restriction (AgentDefinition) exists exactly to scope permissions this way.","A":"A prompt prohibition is probabilistic and cannot reliably prevent unexpected invocations. As long as the tool is visible, the risk remains.","C":"An approval flow is useful defense-in-depth for legitimate refund paths, but the summarizer shouldn't hold refund capability at all — excessive, and the root cause stays unresolved.","D":"After-the-fact detection: the refund has already executed. Not prevention."},"references":[{"title":"Agent SDK: Subagents","url":"https://code.claude.com/docs/en/agent-sdk/subagents"}],"lesson":"サブエージェントには任務に必要な最小のツールだけ与える。不要な能力は禁止でなく不付与","lesson_en":"Give subagents only the minimum tools their task needs. Unneeded capability is not granted — not merely \"prohibited\"","principle_tags":["least-privilege","code-must-prompt-should"],"difficulty":"standard","source":"original","review":{"agent":"2026-07-04","codex":"2026-07-04"},"status":"reviewed"},{"id":"S2-D3-001","scenario":"code-generation","domain":3,"task_statement":"3.1","question_en":"Your team's repository has a checked-in CLAUDE.md. One developer added his personal preferences to it — \"respond in Japanese\" and shortcuts for his local shell aliases — and teammates now get Japanese responses. Meanwhile, he keeps the team's commit-message conventions in his own ~/.claude/CLAUDE.md, so new teammates never receive them. How should this configuration be reorganized?","question_ja":"チームのリポジトリにはコミット済みの CLAUDE.md がある。ある開発者が個人的な好み——「日本語で応答すること」や自分のローカルシェルエイリアスのショートカット——をそこに追記したため、他のメンバーへの応答まで日本語になってしまった。一方その開発者は、チームのコミットメッセージ規約を自分の ~/.claude/CLAUDE.md に置いており、新しいメンバーには規約が一切届かない。この設定をどう再編成すべきか。","options_en":{"A":"Keep team-wide conventions in the checked-in project CLAUDE.md, and move his personal preferences to his user-level ~/.claude/CLAUDE.md","B":"Keep everything in the project CLAUDE.md, labeling each personal section \"applie
